slug: 2026-03-28-gov-it-procurement-monopoly-or-innovation
title: Does Government IT Procurement Lead to Monopoly or Reward Innovation?
subtitle: Government IT Procurement & Market Concentration — Argument Map (v2, retrofit R3)

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: |
    The market outcome of government IT procurement (concentration vs openness) is not determined by the digitalization of process, but by "how institutions allocate risk, responsibility, entry conditions, and exit capacity." Expenditure concentration and dependency concentration must be observed separately — surface-level multi-vendor participation does not equal dispersed underlying dependency. Five mechanisms (oversized contract scope + closed framework lock-in + specification information asymmetry + insufficient buyer capacity + lock-in risk) systematically push the market toward a small number of large vendors; five tools (Dynamic Purchasing System + divisible work packages + outcome-based specifications + reasonable eligibility conditions + portable interoperable exit rights) can pull the market in a more open direction. This article provides the procurement political-economy foundation for the main series article 14 (cross-jurisdictional-redress-gap) and article 11 (wallet-as-essential-facility), supplying the primary draft for Ch12.1.
  summary: Government IT procurement outcomes (concentration vs openness) are determined by institutional design (risk/responsibility/entry/exit allocation), not by digitalization of process; expenditure-concentration and dependency-concentration must be separated.
  formal:
    expression: |
      Market(IT_procurement) ∈ {concentrated, open}

      Outcome(Market) = f(institutional_design)   ≠ g(digitalization_of_process)
      Concentration_drivers = ⟨large_contract, closed_framework, asym_info, weak_buyer, lock-in⟩
      Openness_tools = ⟨DPS, divisible_packages, outcome-based_spec, fair_eligibility, portability⟩
      Expenditure_concentration  ⊥  Dependency_concentration   (orthogonal axes)
    caption: Market outcomes in procurement are determined by institutional design, not process digitalization. Expenditure concentration (where money flows) and dependency concentration (who controls replaceability) are orthogonal axes; the combination of five concentration-driving mechanisms vs five openness tools determines which direction the market converges.
    legend:
      - symbol: Market(IT_procurement)
        meaning: Government IT procurement market structure
      - symbol: institutional_design
        meaning: Institutional design (allocation of risk + responsibility + entry + exit conditions)
      - symbol: DPS
        meaning: Dynamic Purchasing System
      - symbol: ⊥
        meaning: "Orthogonal" (independent, parallel axes)
      - symbol: ⇒
        meaning: Implies
      - symbol: ∧
        meaning: Conjunction

# ─────────────────────────────────────────────────────────────
# Transitions
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    The formula states the position; the next step is to separate common misreadings. Discourse on public-sector digital transformation is often simplified to "process digitalization equals openness" — if procurement moves to the cloud, tendering goes electronic, and documents become searchable, market structure naturally improves. This technicist position obscures the central role of institutional design. Digitalization tools can reduce procedural friction, but what truly determines market direction is how contracts are divided, how entry mechanisms are designed, how specifications are written, whether buyers have governance capacity, and whether data and systems can be replaced. The map's first move is to separate "process digitalization equals openness" from "institutional design determines market outcome."

  beforePillars: |
    The distinction is merely a declaration. To prove that "institutional design determines market outcome" holds, five independent sources of support are needed. On the classification front, expenditure concentration and dependency concentration are decomposed into orthogonal axes, avoiding the misreading that "apparent multi-vendor presence equals openness"; on the mechanism front, five systemic convergence-driving mechanisms are identified (contract scale + framework lock-in + information asymmetry + buyer capacity + lock-in risk); on the tool front, five policy tools that can be operated in reverse are synthesized (DPS + work packages + outcome specifications + eligibility conditions + portability rights); on the theoretical front, OECD + SIGMA + Hoekman-Taş comparative research establishes the boundary conditions for tool effectiveness; on the empirical front, cases from the EU Data Act, ANAO, and Olivares verify the practical feasibility of tool implementation. Five pillars correspond to five types of argument.

  beforeChain: |
    The pillars are affirmative arguments. The framework agreement lock-in effect provides a specific causal chain from "early 2015 framework list → fixed for the 5-year validity period → new vendors unable to enter mid-term → deep dependency formed before list expiry → renewal makes introducing competition difficult." The first part is normatively necessary (determined by the legal nature of framework agreements), while the latter part is probabilistic (depth of dependency varies by data governance maturity). The purpose of unfolding the chain is to translate the abstract "concentration driver" into a mechanically traceable event sequence.

  beforeBorders: |
    Once the position and causal chain are established, counterarguments pose a genuine threat. Lewis-Faupel et al. 2016's Indian e-procurement study argues that "process digitalization does improve vendor participation"; the panacea-of-splitting counterargument claims that "breaking contracts into smaller pieces automatically promotes competition"; the laissez-faire procurement counterargument claims "the market will self-correct without intervention." Carefully examining the empirical strength of each counterargument reveals that they not only fail to refute the map's position but actually flip to support "institutional design determines market outcome" — that is, the evidential structure of the counterarguments themselves is precisely the second layer of support for the map.

  beforeConditions: |
    Once counterarguments are absorbed, what remains are design implications. Under what conditions can "institutional design toward openness" be considered a legitimate policy path? Six conditions translate the abstract openness tools into verifiable engineering or legal obligations, filling in the Openness_tools of the core formula.

  beforeConclusion: |
    Bringing together the normative, classificatory, mechanistic, tool-based, theoretical, and empirical layers, what the map ultimately argues is a political-economy achievement (market structure will not naturally evolve toward openness; deliberate institutional design must continuously advance it) and an asymmetric principle running through all levels — what the public sector decides in IT procurement has always been more than who wins a contract today; it actually determines whether this market will still have alternatives in the coming years, and whether government retains bargaining power.

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: ❌ Rejected
    title: Process digitalization equals market openness
    body: |
      Reducing the market structure question of public IT procurement to "whether the process is digitalized," "whether tendering is electronic," "whether documents are easily searchable," and "whether procurement procedures are efficient." This technicist position assumes that digitalization tools automatically bring market openness, but research over the past decade repeatedly shows that digitalization can improve procedural friction without automatically changing underlying market dependency relations. Lewis-Faupel et al. 2016's India study does show that e-procurement improves vendor participation rates, but that study's outcome variable is "number of bidding vendors," not "long-term change in market concentration" or "dependency relationship structure." Directly extrapolating this outcome to "digitalization solves market concentration" is over-inference.
    formal: "Market(IT) ⇐ digitalization   (treating digitalization as a sufficient condition for openness)"
  accepted:
    label: ✓ Defended
    title: Institutional design determines market outcome
    body: |
      The market structure of public IT procurement is determined by institutional design, not process digitalization. Institutional design encompasses five dimensions — how contracts are divided, how entry mechanisms are designed, how specifications are written, buyer governance capacity, and the replaceability of data and systems. Expenditure concentration (large contracts flowing to a few vendors) and dependency concentration (who controls replaceability) must be observed as orthogonal axes — apparent multi-vendor participation does not equal dispersed underlying dependency. The combination of five concentration-driving mechanisms vs five openness tools determines which direction the market converges; process digitalization can only improve procedural friction, while market structure requires deliberate design and continuous advancement.
    formal: "Market(IT) = f(institutional_design)   ;   Expenditure_concentration ⊥ Dependency_concentration"

# ─────────────────────────────────────────────────────────────
# Five Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: §2 — Classification (expenditure concentration vs dependency concentration orthogonal axes)
    title: The two types of concentration must be observed separately
    role: Provides the analytical framework; without the orthogonal-axis classification of "expenditure concentration vs dependency concentration," the concept of "market openness" cannot be operationalized. Apparent multi-vendor participation does not equal dispersed underlying dependency; this distinction allows policy design to precisely match its target.
    body: |
      Expenditure concentration reflects where money flows — whether large contracts and most procurement budgets flow long-term to a small number of large vendors. Dependency concentration reflects replaceability — even if multiple vendors exist on paper, whether a small number of vendors still hold the key data, interfaces, operational knowledge, and replacement capacity. For IT procurement, the second concern is often more critical — large vendors may make replacement costs progressively higher through each cycle of operations, upgrades, and transitions, while the market appears dispersed on the surface yet underlying dependency grows increasingly concentrated. International comparative research (OECD 2018, Hoekman & Taş 2020) measuring "SME contract win rates" primarily captures the expenditure concentration axis; measurement of the dependency concentration axis is far more difficult — it requires technical indicators such as "data portability," "interface replaceability," and "degree of operational knowledge documentation."
    finding: The two axes are not mutually exclusive — a market may simultaneously exhibit expenditure concentration + dependency concentration (high lock-in), expenditure dispersion + dependency concentration (apparent openness with underlying lock-in), expenditure concentration + dependency dispersion (high-value but replaceable), or expenditure dispersion + dependency dispersion (true openness). Policy goals must clearly target which axis.
    formal: "Expenditure_conc ⊥ Dependency_conc   ;   ∀ market m : ∃ (axis_position(m)) ∈ {⟨HH, HL, LH, LL⟩}"

  - section: §3 — Mechanism (five concentration-driving mechanisms)
    title: Why institutions push the market toward concentration
    role: Provides problem diagnosis; without a list of mechanisms explaining "why concentration occurs," policy design can only respond to symptoms (market concentration) rather than address causes (driving mechanisms). The five mechanisms provide a list that can be individually verified.
    body: |
      **Mechanism 1 — Oversized contract scope with overly concentrated integration responsibility**: When a single contract simultaneously requires cross-system integration, long-term operations, security commitments, data migration, multi-unit coordination, and real-time SLAs, the set of vendors truly capable of bidding quickly converges. Hoekman & Taş 2020 and OECD 2018 research on SME participation confirms that contract scale and procedural design directly affect SME contract win rates. **Mechanism 2 — Closed frameworks vs Dynamic Purchasing Systems**: Once a framework agreement is established, participants are typically fixed for the duration; new vendors cannot enter mid-term. Dynamic Purchasing Systems allow qualified parties to continuously enter. SIGMA 2016's comparison of framework agreements and European Commission 2021 guidelines on DPS use establish the institutional differences between the two mechanisms. **Mechanism 3 — Information asymmetry in specification writing and pre-interaction**: Vendors familiar with the existing architecture know which constraints are built into the specifications, which interfaces are hardest to handle, and which acceptance conditions favor them most; specifications naturally lean toward an existing system logic, making it hard for newcomers to offer competitive proposals. **Mechanism 4 — Insufficient buyer capacity and conservative risk preference**: Splitting contracts, modularization, and multi-vendor governance can theoretically open space for new entrants, but require the buyer to have capacity to define requirements, coordinate responsibility boundaries, accept overall service quality, and continuously manage multi-vendor dependency; when capacity is insufficient, handing all integration responsibility to a single large vendor is the easiest choice (OECD 2023 on professionalization of procurement personnel). **Mechanism 5 — Lock-in risk from non-portable data, closed interfaces, and accumulated operational knowledge**: Lock-in in IT procurement often does not stem from legal monopoly but takes shape gradually after go-live — data export is difficult, interfaces are non-interoperable, migration costs are high, and critical knowledge exists only within the vendor's team. The EU Data Act (EU) 2023/2854's provisions on cloud switching, interoperability, and exit rights are evidence that this type of lock-in is viewed as a market competition-level problem.
    finding: The five mechanisms can act simultaneously or in part — they are not mutually exclusive but cumulative; policy diagnosis must assess each mechanism independently, avoiding any single tool (such as "splitting") being treated as a panacea.
    formal: "Concentration ⇐ ⋁ᵢ Mᵢ   where M ∈ {large_contract, closed_framework, asym_info, weak_buyer, lock-in}"

  - section: §4 — Tools (five openness tools)
    title: Institutions can pull the market in a more open direction
    role: Provides policy synthesis; if there is only a mechanism diagnosis of "why concentration occurs" without an openness tool design of "how to open up," policy recommendations remain at the critical level. The five tools provide policy paths that can be operated in reverse.
    body: |
      **Tool 1 — Dynamic entry mechanism (DPS)**: The vendor pool continuously expands during the validity period; the market is not locked to an early list at some point in time. Most useful for highly standardized, commoditizable services (modular information services, platform services, high-repetition digital function procurement). European Commission 2021 DPS guidelines + ANAO 2020 evaluation of Australia's ICT procurement panels provide institutional precedent. **Tool 2 — Divisible and governable work packages**: Smaller work packages may indeed increase SME contract win rates (Hoekman & Taş 2020), but effectiveness is conditional — work packages must be governable, verifiable, and able to collaborate with other modules, and the buyer must have the capacity to integrate results. Without these conditions, splitting merely transfers complexity back onto the government itself. **Tool 3 — Outcome-based specifications + more mature value evaluation**: Using labor hours, headcount, existing scale, and government contract history as criteria naturally advantages large vendors; shifting to emphasize deliverable outcomes, maintainability, system quality, interface clarity, and migration capacity gives new entrants a better chance to compete on professional merit. The difficulty is that the buyer must genuinely have the capacity to define and accept outcomes, otherwise the system slides back to a scale-favoring conservative mode. **Tool 4 — More reasonable eligibility conditions and contract performance evidence design**: New entrants are most often blocked out of the self-reinforcing loop of "past revenue + past large government contract experience + historical credentials." A better direction is to reduce administrative burdens disproportionate to actual risk, allowing technical capability, verified outcomes, and deliverable evidence to partially replace large credential thresholds. Flynn 2025's research on SME participation in public procurement confirms this direction. **Tool 5 — Writing portability, interoperability, replacement, and exit rights into specifications, contracts, and acceptance**: Many markets appear competitive, but the real problem is that exit costs are too high. The EU Data Act (EU) 2023/2854 has written in cloud switching, interoperability, and exit rights; if portability requirements do not enter contracts and acceptance, so-called open markets easily become only superficially open.
    finding: The five tools must be used in combination rather than individually; a single tool (such as splitting) has conditions, and only a tool combination can continuously resist concentration mechanisms. Olivares et al. 2024's research on government procurement data science + market design demonstrates the empirical feasibility of multi-tool combinations.
    formal: "Openness ⇐ ⋀ᵢ Tᵢ   where T ∈ {DPS, divisible_pkg, outcome_spec, fair_eligibility, portability}"

  - section: §5 — Theory (boundary conditions from comparative research)
    title: Boundary conditions for tool effectiveness, not a panacea
    role: Provides tool boundaries; without a theoretical foundation, the five tools would be treated as "directly applicable." Comparative research establishes the boundary conditions for tool effectiveness, avoiding one-size-fits-all policy.
    body: |
      OECD 2018 *SMEs in Public Procurement* confirms the positive effect of splitting on SME participation rates, while simultaneously noting "boundary conditions" — targets suitable for splitting need clear boundaries and moderate scale. Hoekman & Taş 2020 *Procurement policy and SME participation*, a quantitative analysis of EU procurement data, confirms the negative correlation between contract scale and SME wins, and identifies "buyer capacity" as a conditioning variable. SIGMA 2016's comparison of framework agreements shows that frameworks themselves are not the problem; the problem lies in the design of the framework's "validity period" and "mid-term entry mechanism." Flynn 2025's latest research on SME participation in public procurement confirms that "outcome-based specifications" require buyers to have needs-definition capacity. Khorana et al. 2024's research on the public procurement transparency index provides quantitative measurement methods for tool effectiveness.
    finding: Each tool has applicable boundaries — DPS suits standardized services, splitting requires buyer integration capacity, outcome specifications require needs-definition capacity, eligibility conditions require technical capability assessment capacity, and portability rights require data governance capacity; buyer capacity building (OECD 2023 procurement personnel professionalization) is the common prerequisite for all tools.
    formal: "∀ tool Tᵢ : effective(Tᵢ) ⇔ ∃ boundary_condition(Tᵢ) ∧ buyer_capability(Tᵢ)"

  - section: §6 — Empirical (Data Act + ANAO + procurement data science)
    title: Historical precedents and technical feasibility of tool implementation
    role: Provides implementation validation; with only normative arguments and comparative research, "tool feasibility" remains a theoretical hypothesis. The EU Data Act, ANAO evaluation, and Olivares procurement data science cases provide historical precedents and technical feasibility evidence for tool implementation.
    body: |
      The EU Data Act (EU) 2023/2854 enshrining cloud switching, interoperability, and exit rights into legislation is a historic turning point where "Tool 5 — portability and interoperability" moves from norm to policy; the regulation took effect in September 2025, and by 2026 multiple implementation guidelines have been published. ANAO 2020's audit report on ICT procurement panels and related arrangements (*Establishment and Use of ICT Related Procurement Panels and Arrangements*) provides an implementation evaluation of DPS-like mechanisms, confirming the feasibility and limitations of dynamic entry mechanisms in ICT procurement. Olivares et al. 2024 *Saving Millions in Government Procurement Through Data Science and Market Design* demonstrates that a combination of procurement data science + market design can empirically save government expenditure, indirectly validating the hypothesis that "institutional design determines market outcome." Taiwan's Executive Yuan 2023 *Government Information Service Procurement Reform: Information Security Regulations and Procurement Guidelines* + Fair Trade Commission 2026 *Summary Report of Public Consultation on Competition Law Issues Related to Generative Artificial Intelligence* provide policy starting points in the Taiwan context.
    finding: Tool implementation has historical precedents and technical feasibility evidence; the evidence chain from "normative argument" to "empirically effective" for procurement policy has been established; Taiwan has a policy window to enter the tool implementation phase.
    formal: "∃ {Data_Act_EU_2023, ANAO_2020, Olivares_2024} : empirical_validation(Openness_tools)"

# ─────────────────────────────────────────────────────────────
# Causal Chain
# ─────────────────────────────────────────────────────────────
chain:
  title: Five-step causal chain of framework agreement lock-in effect (early list → deep dependency → renewal lock-in)
  steps:
    - tag: T0
      kind: deterministic
      text: Early framework agreement established; vendor list fixed according to market structure at the time (normatively necessary, determined by the legal nature of framework agreements)
    - tag: T1
      kind: deterministic
      text: New vendors cannot enter mid-term during the framework's validity period (typically 4–7 years) (normatively necessary)
    - tag: T2
      kind: deterministic
      text: Existing vendors accumulate operational knowledge, data governance rights, and interface control (normatively necessary, arising from system operational inertia)
    - tag: T3
      kind: probabilistic
      text: The depth of buyer dependency varies by data governance maturity and degree of interface openness (varies by individual organizational capacity)
    - tag: T4
      kind: probabilistic
      text: Deep dependency has formed before framework expiry; migration costs significantly exceed renewal costs (varies by cumulative effect of lock-in mechanisms 1–5)
    - tag: T5
      kind: probabilistic
      text: Renewal makes introducing meaningful competition difficult; the vendor pool for the next framework cycle overlaps heavily with the current cycle (varies by subsequent market changes)
  legend:
    - kind: deterministic
      label: Mechanistically necessary (structural, does not depend on external trigger)
    - kind: probabilistic
      label: Probabilistic (requires an external trigger to materialize, but probability is non-negligible)

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: Counterargument 1
    title: Lewis-Faupel et al. 2016 — Process digitalization does improve vendor participation
    pivot: The counterargument appeals to Lewis-Faupel, Neggers, Olken, and Pande 2016 *Can Electronic Procurement Improve Infrastructure Provision?*, a quantitative study of India showing that e-procurement increased the number of bidding vendors. The empirical strength is high and the research design is rigorous.
    flip: |
      On closer inspection, the outcome variable in Lewis-Faupel et al. 2016 is "number of bidding vendors" (short-term participation opportunity), not "long-term change in market concentration" or "dependency relationship structure." The study's own scope is infrastructure procurement (roads, bridges), not information systems procurement — the latter's lock-in mechanisms (non-portable data, closed interfaces, accumulated operational knowledge) do not exist in the former. The correct use of the study is "digitalization improves procedural friction," not "digitalization solves market concentration." The counterargument inversely supports the "expenditure concentration vs dependency concentration orthogonal axes" classification, highlighting the distinctiveness of IT procurement.

  - label: Counterargument 2
    title: Splitting as a panacea — breaking contracts into smaller pieces automatically promotes competition
    pivot: The counterargument claims that "breaking large integrated contracts into small work packages automatically brings market openness." OECD 2018 + Hoekman & Taş 2020's research on SME contract win rates is commonly cited as support for this position.
    flip: |
      OECD and Hoekman-Taş's research itself marks boundary conditions — targets suitable for splitting need clear boundaries and moderate scale; work packages must be governable, verifiable, and able to collaborate, and the buyer must have the capacity to integrate results. Without these conditions, splitting only transfers complexity back to the government. In contexts lacking buyer integration capacity, splitting leads to "failed dispersion" — multiple vendors appear to participate on the surface, but actual integration responsibility remains concentrated in one vendor or the government itself. The counterargument inversely supports "buyer capacity building is the common prerequisite for tool effectiveness," highlighting the necessity of the OECD 2023 procurement personnel professionalization agenda.

  - label: Counterargument 3
    title: Market self-correction — no government intervention needed
    pivot: The counterargument claims that markets will self-correct concentration problems through natural vendor entry and exit, technological substitution, and newcomer business model innovation. Empirically, some markets (such as SaaS cloud services) did see large-scale new entrants in the 2010s.
    flip: |
      The market self-correction argument has a structural blind spot in the context of IT procurement — the "lock-in mechanism 5" in IT procurement (non-portable data + closed interfaces + accumulated operational knowledge) is not a natural competitive outcome of the market but a side effect of institutions failing to explicitly require portability. The legislative rationale for the EU Data Act (EU) 2023/2854 is precisely that "market self-correction has failed to solve cloud lock-in." For markets to self-correct in IT procurement, at least three institutional prerequisites are needed: "portability rights written into contracts," "open interface standards," and "data governance accountability." Absent these prerequisites, the self-correction argument amounts to "waiting for large vendors to voluntarily relinquish lock-in advantages" — an assumption that empirically never occurs. The counterargument inversely supports the policy necessity of "Tool 5 — portability, interoperability, replacement, and exit rights."

# ─────────────────────────────────────────────────────────────
# Procedural Conditions
# ─────────────────────────────────────────────────────────────
conditions:
  title: Any IT procurement institution seeking to pull the market in a more open direction must pass six conditions
  formalPrelude: "open_market(IT) ⇔ V_DPS ∧ V_pkg ∧ V_outcome ∧ V_eligibility ∧ V_portability ∧ V_capability"
  items:
    - title: Dynamic entry mechanism
      body: |
        Highly standardized, commoditizable services should use DPS rather than closed framework agreements, allowing the vendor pool to continuously expand during the validity period. Modeled after European Commission 2021 DPS guidelines + ANAO 2020 evaluation.
      formal: "V_DPS: ∀ standardized_service : ∃ DPS(service) ∧ ¬closed_framework(service)"
    - title: Divisible and governable work packages
      body: |
        Large IT contracts should be divided into work packages with clear boundaries, moderate scale, that are governable, verifiable, and able to collaborate. Modeled after OECD 2018 + Hoekman-Taş 2020 research on SME participation.
      formal: "V_pkg: ∀ large_contract : ∃ divisible(contract) ∧ governable(packages) ∧ verifiable(packages)"
    - title: Outcome-based specifications
      body: |
        Evaluation criteria should emphasize deliverable outcomes, maintainability, system quality, interface clarity, and migration capacity, rather than labor hours / headcount / past scale.
      formal: "V_outcome: ∀ evaluation : ⟨deliverable_outcome, maintainability, interface_clarity, migration_capability⟩ ⊆ criteria"
    - title: Reasonable eligibility conditions
      body: |
        Eligibility conditions should reduce administrative burdens disproportionate to actual risk, allowing technical capability + verified outcomes + deliverable evidence to partially replace large credential thresholds. Modeled after the direction of Flynn 2025's research on SME participation.
      formal: "V_eligibility: ∀ eligibility_criteria : proportional(criteria, actual_risk) ∧ technical_capability_recognized(criteria)"
    - title: Portability, interoperability, and exit rights
      body: |
        Contracts + specifications + acceptance must include data export capacity + open interfaces + migration plan + replacement testing + exit rights. Modeled after the EU Data Act (EU) 2023/2854.
      formal: "V_portability: ∀ contract : ⟨data_export, open_interface, migration_plan, exit_right⟩ ⊆ contract_terms"
    - title: Buyer capacity building
      body: |
        The common prerequisite for the effectiveness of all tools is buyer capacity. OECD 2023 procurement personnel professionalization agenda + continuous training + inter-agency knowledge sharing.
      formal: "V_capability: ∀ procurement_org : ∃ professionalization(org) ∧ continuous_training(org) ∧ inter-agency_knowledge_sharing(org)"

# ─────────────────────────────────────────────────────────────
# Conclusion + Formal Coda
# ─────────────────────────────────────────────────────────────
conclusion:
  paragraphs:
    - <strong>What the public sector decides in IT procurement has always been more than who wins a contract for a particular system today.</strong> It actually determines whether this market will still have alternatives in the coming years, whether government retains bargaining power, and whether new entrants can genuinely develop delivery capacity from their current position as also-rans. Process digitalization is certainly important, but the real battleground remains the institution itself — market outcomes are determined by institutional design (the allocation of risk + responsibility + entry + exit conditions), not by digitalization tools.
    - The combination of five concentration-driving mechanisms (oversized contract scope + closed framework lock-in + specification information asymmetry + insufficient buyer capacity + lock-in risk) vs five openness tools (DPS + divisible work packages + outcome-based specifications + reasonable eligibility conditions + portable interoperable exit rights) determines which direction the market converges. <em>No single tool is a panacea</em> — each tool has applicable boundaries, and buyer capacity building is the common prerequisite for all tools.
    - <strong>This article provides the procurement political-economy foundation for the main series article 14 (cross-jurisdictional-redress-gap) and article 11 (wallet-as-essential-facility)</strong>, supplying the primary draft for Ch12.1 of the dissertation. The lock-in mechanisms of IT procurement (non-portable data + closed interfaces + accumulated operational knowledge) directly correspond to the essential facility doctrine application in article 11; buyer capacity building + cross-jurisdictional remedy gaps directly correspond to the three-axis parallel policy synthesis in article 14; the five openness tools are structurally isomorphic with the P1 statutory obligations, P2 equivalence, and P3 anti-discrimination clauses in article 15 (civic-proof-inclusion-rights). Taiwan's Executive Yuan 2023 procurement reform guidelines + Fair Trade Commission 2026 AI competition law issue summary serve as the Taiwan policy starting points for this article.
  formalCoda: |
    Final form:
      Market(IT_procurement) ∈ {concentrated, open}
      Outcome(Market) = f(institutional_design)   ≠ g(digitalization_of_process)
      Concentration_drivers = ⟨large_contract, closed_framework, asym_info, weak_buyer, lock-in⟩
      Openness_tools = ⟨DPS, divisible_pkg, outcome_spec, fair_eligibility, portability⟩
      ∀ tool Tᵢ : effective(Tᵢ) ⇔ buyer_capability ∧ boundary_condition(Tᵢ)
      Expenditure_concentration ⊥ Dependency_concentration
