slug: 2026-05-09-cross-jurisdictional-redress-gap
title: "When Your Digital Wallet Is Rejected in Another Country: The Legal Vacuum in Cross-Jurisdictional Redress"
subtitle: Cross-Jurisdictional Wallet Redress Gap — Argument Map (v2)

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: |
    Current digital identity architecture assumes the issuer jurisdiction equals the redress jurisdiction; cross-border wallet use thoroughly undermines this assumption. Redress gaps can be categorized into four types, partially remedied within the EU through Brussels I Recast, eIDAS 2.0, and GDPR consistency procedures, but with no corresponding coordination framework outside the EU. This asymmetry constitutes a parallel of three layers of structural problems: conflict of laws in wallet cross-border use is over-determined (rule boundary + rule ambiguity + meta-rule absence), existing cross-border redress templates can only be stitched at the clause level, and normative extension requires bilateral consent rather than unilateral projection.
  summary: Cross-border wallet redress is structurally over-determined; recovery requires clause-level template stitching plus bilateral normative extension, not unilateral law projection.
  formal:
    expression: |
      R(c) ⇐ J(c) ∧ E(c) ∧ M(c)   where   J(c) ⇔ G₁ ∧ G₂ ∧ G₃ ∧ G₄

      ¬∃ meta_rule(c) : priority(applicable_rules(c))   ⇒   over_determined(c)
      paths(R) = {πₐ, π_b, π_c}   indexed by   ⟨coverage, feasibility, coupling⟩   ; non_linear(paths)
      stateless_redress  ⊥  paths(R)   (orthogonal axis, unmappable to a/b/c)
    caption: The establishment of cross-border wallet redress R(c) is derived from "jurisdiction J + enforcement E + mechanism M" jointly; J(c) can be anchored simultaneously by four connecting factors G₁..G₄, but lacks a meta-rule to determine priority, and is therefore over-determined rather than under-determined. The three supplementary paths πₐ π_b π_c are arranged in parallel along three axes; the stateless track is orthogonal to the three paths.
    legend:
      - symbol: R(c)
        meaning: Redress for citizen c on cross-border wallet event — redress for a citizen harmed by a cross-border wallet dispute
      - symbol: J(c)
        meaning: Jurisdiction available to c — litigation jurisdiction / complaint channel available to c
      - symbol: E(c)
        meaning: Enforcement strength reachable by c — enforcement power c can mobilize (law enforcement, compensation execution)
      - symbol: M(c)
        meaning: Coordination mechanism (one-stop shop / mutual recognition / cooperation network) — redress coordination mechanism
      - symbol: G₁..G₄
        meaning: Four connecting factors (issuer jurisdiction / verifier jurisdiction / vendor jurisdiction / holder domicile jurisdiction)
      - symbol: ⊥
        meaning: "orthogonal" (independent and parallel, cannot be subsumed)
      - symbol: ⇐
        meaning: "sufficient ground for"
      - symbol: ⇔
        meaning: "if and only if"
      - symbol: ∧
        meaning: conjunction (simultaneously holds)
      - symbol: ¬
        meaning: negation
      - symbol: ∃
        meaning: existential quantifier

# ─────────────────────────────────────────────────────────────
# Transitions (inter-block connective descriptions)
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    The formula establishes the position; the next step is to separate common misreadings. The entire policy debate on cross-border wallet redress is bound by the assumption that "issuer jurisdiction equals redress jurisdiction"; as long as this assumption goes unchallenged, all subsequent redress design will center on "finding the right issuer country," structurally ignoring non-EU citizens. The map's first move is to distinguish "issuer jurisdiction centrism" from "four-party relationship + normative extension."

  beforePillars: |
    The distinction itself is merely a declaration. To prove that the four-party relationship + normative extension path is valid, four independent sources of support are required — the inductive dimension provides empirical evidence for four categories of typical gaps, the deductive dimension provides a precise description of the conflict-of-laws over-determined structure, the analogical dimension provides an inventory of clause-level templates from six cross-border redress models, and the abductive dimension provides the functional equivalence basis of eIDAS 2.0 + GDPR + MLETR three mechanisms. The four pillars correspond to four argument types; without any one, the position degrades to a mere appeal.

  beforeChain: |
    The pillars constitute positive arguments. The Camerfirma case provides a concrete causal chain from "first warning in early 2022" to "failures occurring successively in 2024"; the first segment is normatively necessary (QTSP violation → license revocation), the second segment is a probabilistic event (concrete losses from cross-border tender conflicts require environmental conditions). The purpose of unfolding the chain is to translate the abstract four categories of gaps into an event sequence that can be mechanically traced.

  beforeBorders: |
    Once the position + causal chain are established, the objections become genuinely threatening. Svantesson argues that existing conflict of laws already covers internet cross-border disputes; Goldsmith and Wu argue that cyber-jurisdiction imagination is exaggerated and the state-centric structure remains effective; the cyber-sovereignty school argues that cross-border mutual recognition is equivalent to sovereignty surrender. Careful examination of the empirical strength of each objection reveals that not only do they fail to refute the map's position, they actually flip to support the three-layer structural argument — that is, the evidentiary structure of each objection becomes the second layer of support for the map.

  beforeConditions: |
    After the objections are absorbed, what remains is design implications. Under what conditions can the framework of "normative extension + four-party layered responsibility + stateless persons independent track" be regarded as a legitimate policy path? Six conditions translate the abstract three-axis parallel structure into verifiable engineering or legal obligations, while also filling in G₁..G₄ and V_bilateral of the core formula.

  beforeConclusion: |
    Drawing together six layers — norms, conflict of laws, templates, normative extension, policy synthesis, and stateless persons dimension — the map's final message is the political-economy achievement (bilateral consent rather than unilateral projection) and an asymmetric principle spanning all levels — for non-EU citizens, especially Taiwanese citizens and stateless persons, the coverage of the current framework is a structural deficiency, and strengthening it requires governments to proactively pursue bilateral treaties; it cannot await the natural spillover of norms.

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: ❌ Rejected
    title: Issuer Jurisdiction = Redress Jurisdiction
    body: |
      Treating "finding the right issuer country" as the entry point for redress. This structural assumption presumes that the disputing parties can return to the issuer jurisdiction to sue or file complaints and obtain redress under local substantive law. In a wallet cross-border scenario, the issuer jurisdiction is only one of four connecting factors; the other three (verifier jurisdiction, vendor jurisdiction, holder domicile jurisdiction) are simultaneously available in parallel with the issuer jurisdiction and often point to different countries. Tying redress to the issuer jurisdiction will deny access to all non-EU citizens, Taiwanese citizens, and stateless persons.
    formal: "R(c) ⇐ J_issuer(c)   (treating issuer jurisdiction as the sole connecting factor for J)"
  accepted:
    label: ✓ Defended
    title: Four-Party Relationship + Normative Extension + Three-Axis Parallel
    body: |
      Disaggregating redress into three axes of "jurisdiction + enforcement + mechanism." The jurisdictional dimension acknowledges that G₁..G₄ four connecting factors are simultaneously available and over-determined; the mechanism dimension employs normative extension (existing EU mechanisms can be extended, but require the receiving jurisdiction to consent through bilateral/multilateral agreement); the enforcement dimension introduces layered vendor liability (Tier 1 provider / Tier 2 joint controller / Tier 3 intermediary). The three supplementary paths πₐ π_b π_c are arranged in parallel along the three axes of normative coverage, empirical feasibility, and technical-legal coupling; the stateless persons track is handled as an independent parallel dimension.
    formal: "R(c) ⇐ J(c) ∧ E(c) ∧ M(c)   ;   paths(R) along ⟨coverage, feasibility, coupling⟩   ;   stateless_redress ⊥ paths(R)"

# ─────────────────────────────────────────────────────────────
# Five Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: §3 — Inductive (4 Categories of Typical Gaps)
    title: Gaps Can Be Typologized, But the Typology Is Asymmetric Within and Outside the EU
    role: Provides empirical support — if the four categories of gaps cannot be stably typologized, subsequent deduction and policy synthesis lose their footing. At the same time, the asymmetric coverage of the typology within and outside the EU must be acknowledged, to avoid misreading "partially remedied within EU" and "no coordination framework outside EU" as problems of the same degree.
    body: |
      The four categories of typical gaps are: (a) losses from verifier rejection with no clear litigation jurisdiction; (b) issuer revocation errors with no single DPA complaint channel; (c) vendor failure causing service interruption with no clear redress pathway; (d) cross-border privacy breaches with no single enforcement authority able to investigate. Five cases — Camerfirma 2022–2024, India UIDAI 2023, Swedish BankID 2023, Singpass 2024, Cambridge Analytica 2018 — correspond to the first four categories respectively. Within the EU, gaps (a) and (c) have been partially remedied by Brussels I Recast Art 17–19 special consumer jurisdiction and eIDAS 2.0 Art 5a(20) Single Point of Contact; outside the EU there is an almost complete vacuum. In the exhaustiveness check, vendor insolvency (C1) and compelled disclosure (C5) are merged as sub-types into existing gaps, and the stateless persons issue (C4) is transferred to the independent track.
    finding: The four-category gap typology has the character of "rule ambiguity + enforcement absence" within the EU and "coordination framework not established" outside the EU — the two structures are different, and the supplementary paths are also different.
    formal: "G_taxonomy: { gap_a, gap_b, gap_c, gap_d } ⊆ Gaps   ;   coverage_EU(gap) > coverage_non_EU(gap)"

  - section: §4 — Deductive (Conflict-of-Laws Over-Determined Structure)
    title: Rules Are Not Absent; Meta-Rules Are
    role: Provides precise normative description — if cross-border wallet redress is described as a "legal vacuum," it would be refuted by scholars like Svantesson using the centre of interests principle from eDate one by one. Retreating to the academically harder-to-refute proposition of "over-determined + meta-rule absent" is key to argumentative strength.
    body: |
      Brussels I Recast, Rome I, Rome II, and the Hague Convention framework present no genuine "rule vacuum" for cross-border wallet disputes. Any case can find one or more applicable connecting factors from existing provisions, but wallet involvement creates four connecting factors, with multiple rules simultaneously available in parallel pointing to different jurisdictions, and no single connecting factor able to achieve structural priority. Three categories of failure modes are: rule boundary (Brussels I Art 17–19 covers only the platform–user segment), rule ambiguity (Erfolgsort multi-track without a meta-rule in the wallet scenario), and meta-rule absence (Rome II Art 4(3) closest connection is an escape clause, not a normal meta-rule). For aggrieved citizens, the loss of predictability from over-determined redress is practically equivalent to rule absence in its effects.
    finding: Conflict of laws in wallet cross-border use is over-determined rather than under-determined. By retreating to this proposition, the argument shifts from "EU law should be extrapolated" (easily refuted) to "rule competition requires a meta-rule to fill the gap" (academically harder to refute).
    formal: "|applicable_rules(c)| ≥ 2  ∧  ¬∃ meta_rule(c) : priority(applicable_rules)  ⇒  predictability(R(c)) ≈ predictability(¬R)"

  - section: §5 — Analogical (Six Cross-Border Redress Templates)
    title: Clause-Level Stitching, Not Wholesale Transplant
    role: Provides institutional precedent — if four-party relationship + normative extension is a "wholly novel design," it requires defense from scratch; if it can abstract clauses from six cross-border redress templates, the burden of defense is substantially reduced. At the same time, the analogy strength must be honestly marked as "moderate-weak," avoiding overstatement of template transferability.
    body: |
      Cross-border governance has accumulated at least six mature templates: Montreal 1999 + IATA Resolution 824 (air passengers), SWIFT/SEPA + FIN-NET (cross-border payments), EU CPC Network (cross-border consumer protection), ICCAT (fisheries compliance), CETA Chapter 8 + ICS (investment disputes), APEC CBPR + OECD Privacy Framework (cross-border privacy soft law). These constitute a clause library for cross-border redress. Extension to wallet must pass through four filter conditions (structural isomorphism of subject matter, hard law / soft law basis, political feasibility, empirical effectiveness). The clause combination that can be stitched is: mutual recognition agreement writing format + liability allocation clauses + one-stop complaint portal + mediation-arbitration layering + resource support clauses + e-APP electronic verification. Each clause must individually verify its similarity to the wallet scenario.
    finding: Clause-level stitching (cherry-picking) is a reasonable policy starting point; wholesale adoption will fail at wallet's four-party relationship and cryptographic state verification attributes. CETA ICS appellate tribunal decoupling from the overall ISDS dispute is a useful precedent; APEC CBPR soft law effectiveness is extremely weak (9 members).
    formal: "∃ clauses {ξ₁..ξₖ} ⊆ ⋃ᵢ template_i  :  applicable(ξⱼ, wallet)  ∧  ¬wholesale(template_i, wallet)"

  - section: §6 — Abductive (Bilateral Consent Conditions for Normative Extension)
    title: Existing EU Mechanisms Can Be Extended, Requiring Bilateral Consent Rather Than Unilateral Projection
    role: Provides the rationality argument for normative extension — if unilateral extraterritoriality were the only path, it would be simultaneously knocked down by Goldsmith and the cyber-sovereignty school. Explicitly formalizing the rationality conditions for normative extension as "bilateral/multilateral agreement consent" is a methodological correction responding to the lessons of Schrems II.
    body: |
      The eIDAS 2.0 framework established within the EU — "liability allocation + supervisory body cross-member-state coordination + responsible Member State mechanism" — together with GDPR's one-stop-shop consistency procedure and UNCITRAL MLETR's functional equivalence principle, together constitute a set of normative modules for cross-border identity / electronic records / data protection. Extending this module to non-EU jurisdictions is "normative extension" in character rather than the creation of new law, premised on the receiving jurisdiction explicitly consenting through bilateral/multilateral agreement. eIDAS 2.0 itself contains built-in sovereignty reservation clauses (Art 5a(5), Recital 24, Art 11a); these clauses themselves prove that "cross-border mutual recognition" and "sovereignty surrender" belong to different categories.
    finding: The key difference between normative extension and unilateral projection is the bilateral consent condition of the receiving jurisdiction. MLETR's role is "supplier of the equivalence principle," not "supplier of the redress mechanism."
    formal: "Extension(eIDAS) ⊨ R(c)  ⇔  ∃ Agreement A : sign(A, src) ∧ sign(A, dst)   ;   ¬unilateral_projection"

  - section: §7–§8 — Policy Synthesis (Three-Axis Parallel + Stateless Persons Independent Track)
    title: Three-Axis Parallel; Stateless Persons Track Orthogonal to Three Paths
    role: Provides the final structure for policy synthesis — if the three paths were written as a single priority order, they would be misread as normatively necessary; splitting them into three axes (normative coverage, empirical feasibility, technical-legal coupling) separates political judgment from normative judgment. At the same time, placing the stateless persons issue as an independent parallel dimension avoids issue capture.
    body: |
      Three supplementary paths arranged in parallel along three axes. πₐ (modeling IATA + ICCAT multilateral treaty + liability allocation) has the widest non-EU coverage; timeline 72+ months. π_b (eIDAS one-stop redress extending through GDPR adequacy + bilateral treaty) has the lowest political resistance; timeline 24–48 months; this is the starting point for near-term implementation. π_c (cross-border wallet credential mutual recognition + joint liability) is most direct for vendor failure; timeline 36–60 months; depends on vendor tiering — Tier 1 provider / Tier 2 joint controller / Tier 3 intermediary. The stateless persons track is orthogonal to the three paths: SDG 16.9 + 1954/1961 Conventions + UNHCR Handbook establish the baseline rights track; cross-border wallet redress is a secondary supplement, and the order must not be reversed.
    finding: Near-term implementation should start from π_b, advancing π_c in the medium term and πₐ in the long term. "No new legislation" is a political expediency, not a normative necessity; if vendor market structure imbalance or cross-jurisdictional risk concentration occurs, an EU AI Act-style approach (new horizontal legislation) may be more viable.
    formal: "paths = {πₐ, π_b, π_c} ⊆ Policy   ;   priority(πᵢ) varies by axis   ;   stateless_redress ⊥ paths"

# ─────────────────────────────────────────────────────────────
# Causal Chain (Camerfirma cross-border failure trace)
# ─────────────────────────────────────────────────────────────
chain:
  title: "Camerfirma Cross-Border Failure Six-Step Causal Chain (2022 Warning → 2024 Successive Failures → Ongoing Rule Ambiguity)"
  steps:
    - tag: T0
      kind: deterministic
      text: 2022 — Camerfirma received its first EU warning for ETSI ESI non-conformance (QTSP certification failure is normatively necessary)
    - tag: T1
      kind: deterministic
      text: 2024 — Camerfirma cross-border certificates successively failed; thousands of e-signatures suddenly invalid in DE / PT / IT (vendor failure is normatively necessary)
    - tag: T2
      kind: deterministic
      text: Affected parties sought to sue in verifier jurisdiction; Brussels I Art 17–19 consumer qualification excluded because tender activities are commercial transactions (rule boundary is normatively necessary)
    - tag: T3
      kind: probabilistic
      text: Falling back to Brussels I Art 7(2) tort jurisdiction, but the characterization of "place of rejection" vs. "place of license revocation" is a gray zone after eDate (rule ambiguity requires judicial elaboration to fill)
    - tag: T4
      kind: probabilistic
      text: Losses by SMEs coupled to the timeline of the tender process, creating quantifiable amounts (concrete losses depend on environmental conditions)
    - tag: T5
      kind: probabilistic
      text: Redress predictability continues to erode; similar events recur in BankID 2023 and Singpass 2024; lack of SPOC mutual recognition causes delays in cross-border coordination (systemic degradation is a probabilistic event, but continuously observed)
  legend:
    - kind: deterministic
      label: Mechanically necessary (structural, not dependent on external trigger)
    - kind: probabilistic
      label: Probabilistic (requires external trigger to materialize, but probability is non-negligible)

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: Objection 1
    title: "Svantesson — Existing Conflict of Laws Already Covers Internet Cross-Border Disputes"
    pivot: The objection claims that Brussels I Recast has already covered most internet cross-border disputes through the centre of interests principle established by eDate (C-509/09) and Bolagsupplysningen (C-194/16); wallet cross-border use is merely an extension application, requiring no new rules. In terms of empirical strength, this position has CJEU case law accumulation behind it and is academically rigorous.
    flip: |
      Looking closely, the centre of interests principle is restricted to personality rights and defamation; the CJEU's handling of IP infringement in Wintersteiger (C-523/10) and Pinckney (C-170/12) already shows the non-uniform application of this principle across different tort types. Wallet cross-border disputes involve economic losses, credit damage, and restrictions on socioeconomic participation that cannot be directly mapped to personality rights or IP case law. Svantesson's argument actually highlights two layers of failure modes — rule ambiguity (rules exist but boundaries unclear) and rule boundary (specific provisions cover only specific scenarios) — inversely supporting the over-determined structure proposition.

  - label: Objection 2
    title: "Goldsmith & Wu — Cyber-Jurisdiction Imagination Is Exaggerated"
    pivot: The objection claims that Who Controls the Internet? (2006) argues that countries have re-established effective legal boundaries through technical filtering, server localization, ISP cooperation, and similar means; the cross-border wallet redress gap is a normal mode of operation in the existing state-centric structure, not a new issue. In terms of empirical strength, China's 2024 Data Export Security Assessment Measures and India's Mallory v Norfolk Southern (2023) restrictive approach to internet jurisdiction both support this analysis.
    flip: |
      The map partially accepts this analysis, but the more precise description is "the cross-border wallet redress gap is a coupling problem between the existing state-centric structure and wallet's multiple connecting factors." This coupling problem is not resolved by the restoration of a state-centric structure; in fact, as the state-centric structure strengthens (as with Mallory's restriction of general jurisdiction), the problem worsens — the stronger individual states are, the harder cross-national coordination becomes, and the more serious the rule competition in cross-border wallet redress. Goldsmith and Wu's analysis inversely supports the necessity of the three-axis parallel policy synthesis.

  - label: Objection 3
    title: "Cyber-Sovereignty Position — Cross-Border Mutual Recognition Equals Sovereignty Surrender"
    pivot: The objection from the cyber-sovereignty school (Chinese position and some nationalist legal philosophy) argues that cross-border mutual recognition agreements and normative extension in effect outsource normative decision-making authority to other countries, equivalent to sovereignty surrender; any asymmetric normative extension should be rejected, regardless of whether it is labeled "cooperation" or "agreement." In terms of empirical strength, China's 2023 Global Data Security Initiative and Schrems II's critique of the EU adequacy mechanism both invoke similar structures.
    flip: |
      eIDAS 2.0 itself contains built-in sovereignty reservation clauses. Art 5a(5) reserves core authority over wallet governance for each member state, Recital 24 emphasizes member state policy space, and the Art 11a responsible Member State mechanism is itself a concrete expression of "sovereignty cooperation." Equating cross-border mutual recognition with sovereignty surrender is a slippery slope in argumentation, conflating "normative extension (bilateral consent, sovereignty reserved)" with "unilateral extraterritoriality (unilateral projection, no consent)." The cyber-sovereignty objection inversely supports the methodological condition that "normative extension requires bilateral consent" — precisely the core conclusion of the map's abductive pillar.

# ─────────────────────────────────────────────────────────────
# Procedural Conditions (six firewalls of bilateral redress)
# ─────────────────────────────────────────────────────────────
conditions:
  title: Any cross-border wallet redress solution must first pass through six conditions to establish legitimacy
  formalPrelude: "valid_redress(c) ⇔ V_directing ∧ V_SPOC ∧ V_tier ∧ V_bilateral ∧ V_resource ∧ V_stateless"
  items:
    - title: Extension of the Directing-Activity Test
      body: |
        Brussels I Recast Art 17–19 directing-activity test (Pammer/Alpenhof C-585/08) must be extended to the scenario where a wallet verifier "accepts cross-border credentials via multilingual interface." Otherwise, consumer jurisdiction cannot stably cover gap (a).
      formal: "V_directing: ∀ verifier v with multilingual_interface(v) → directing_activity(v)"
    - title: SPOC + Supervisory Cooperation Mutual Recognition
      body: |
        The Single Point of Contact mechanism under eIDAS 2.0 Art 5a(20) must be extended to non-EU jurisdictions through bilateral treaties, together with GDPR Art 50 international cooperation clauses; without this condition, gaps (b) and (c) have no coverage outside the EU.
      formal: "V_SPOC: ∀ third_country t : ∃ Agreement A : SPOC(EU) ↔ SPOC(t) via A"
    - title: Wallet Vendor Three-Tier Classification
      body: |
        Vendor classification — Tier 1 provider / Tier 2 joint controller / Tier 3 intermediary — must be confirmed at the treaty level, with tiering adjusted based on market share and third-party auditor determination. Tier 1 bears strict liability + mandatory liability insurance; Tier 2 bears negligence liability + reversed burden of proof; Tier 3 bears ordinary negligence liability.
      formal: "V_tier: ∀ provider p : tier(p) ∈ {T₁, T₂, T₃} ⇒ liability(p) = liability_function(tier(p))"
    - title: Bilateral Consent Condition
      body: |
        Normative extension must be accompanied by explicit consent through bilateral/multilateral agreement. GDPR adequacy is one form of bilateral consent; e-APP is another; both reject unilateral projection. Normative projection without bilateral consent falls into the unilateral extraterritoriality trap.
      formal: "V_bilateral: ∀ extension E : valid(E) ⇔ ∃ Agreement A : sign(A, src) ∧ sign(A, dst)"
    - title: Resource Support Simultaneous Expansion
      body: |
        Expanding existing mechanisms (CPC 16-month timeline, noyb 22-month median) must simultaneously expand resources — FTEs, SLAs, cross-border coordination budget. Without resource support, extension only replicates delays into new jurisdictions.
      formal: "V_resource: ∀ extended_mechanism M : ∃ resources R : capacity(M, R) ≥ baseline(M)"
    - title: Stateless Persons Independent Track
      body: |
        Cross-border difficulties for stateless persons are handled as an independent parallel dimension, with the support mechanism being a UNHCR + ID4D + ICN tripartite working group (by 2027). The baseline rights track established by the 1954/1961 Conventions takes priority over cross-border wallet redress; the order must not be reversed.
      formal: "V_stateless: stateless_redress ⊥ paths(R)  ∧  priority(stateless_track) > priority(wallet_redress)"

# ─────────────────────────────────────────────────────────────
# Conclusion + Formal Coda
# ─────────────────────────────────────────────────────────────
conclusion:
  paragraphs:
    - <strong>Cross-border wallet redress gaps constitute a coupling problem between the design premise of the current architecture (state-centric + bilateral treaties) and wallet's multiple connecting factors</strong> — not a temporal issue of "EU law has not yet advanced globally." Three layers of structural problems stand in parallel: conflict of laws is over-determined, templates can only be stitched at the clause level, and normative extension requires bilateral consent.
    - "Near-term implementation trajectory: π_b (24–48 months) → π_c (36–60 months) → πₐ (72+ months), advancing non-linearly along three axes of normative coverage, empirical feasibility, and technical-legal coupling. <em>The stateless persons issue is handled as an independent parallel dimension</em>, orthogonal to the three paths, with the order not to be reversed; wallet redress is a secondary supplement, and acquisition of nationality remains the primary remedy."
    - <strong>The critical warning for non-EU citizens, especially Taiwanese citizens, is that there is almost no effective redress channel under the current architecture.</strong> Taiwan's PDPA extraterritorial effect is weak; Singapore or Japan has no adequacy decision toward Taiwan; PIPC has no coercive authority over foreign verifiers; representative offices can only engage in political intervention. To change this situation, governments must proactively pursue bilateral treaties. This cross-level asymmetric principle is the most direct trigger for article 14's policy agenda (federated trust-list alliance + civic proof inclusion rights) in the doctoral dissertation Ch 14.
  formalCoda: |
    Final form:
      R(c) ⇐ J(c) ∧ E(c) ∧ M(c)
      valid_redress(c) ⇔ V_directing ∧ V_SPOC ∧ V_tier ∧ V_bilateral ∧ V_resource ∧ V_stateless
      paths(R) = {πₐ, π_b, π_c}  along  ⟨coverage, feasibility, coupling⟩
      stateless_redress ⊥ paths(R)
      ¬R(c, t=2026, c.nationality ∈ {TW, non_EU}) → effective_action_required(government, c.nationality)
