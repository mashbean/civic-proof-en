conclusion:
  paragraphs:
    - "<strong>The institutional limits of AI agents in civic action are institutional limits, not engineering limits.</strong> The Tomasev five-element × civic proof triple conjoint analysis yields a 5×3 = 15 cell necessity matrix: 9 cells condition-satisfiable, 4 cells probabilistically degraded, 2 cells structurally unsatisfiable (M[RT, ℬ] = ✗ + M[AA, ℬ] = ✗). The three-zone demarcation (θ₁ ≈ 0.2, θ₂ ≈ 0.7) — combined with the division of structural non-delegability into intrinsic type (determined by ℬ) and contextual type (determined by co-failure of 𝒩 + ℱ) — jointly supports the normative necessity that physical presence, political speech, final voting, expression of personality, and criminal liability cannot be executed by an AI agent."
    - "The normative hard constraint on the conditionally delegable zone Z₂ comes from CRPD Art 12 General Comment No. 1 §26–29. The distinguishability of supported / substituted must be established simultaneously across the ex-ante deliberation layer, ex-post reversibility layer, and decision-trace layer. The multi-profile provided by EUDI Wallet ARF is not multi-tenant and must be corrected with three engineering measures (audit-by-design + minimal delegation + multi-tenant delegated key custody). <em>CRPD Art 12 flows back through ICCPR Art 26 + ICESCR Art 9 as a universal engineering obligation for all wallet users</em> — it is not an \"accessibility accommodation\" for special groups."
    - "<strong>The cross-jurisdictional liability vacuum is subdivided into three types: moral crumple zone, algorithmic opacity, and cross-jurisdictional diffusion.</strong> The A14 category-5 gap is split into Q10a (authority transfer cryptographic accountability) + Q10b (accountability allocation cross-border multi-party accountability). FTLA-Agent four-layer governance exhibits asymmetric thickness in 2026 — G_industry^A and G_oversight^A thick / G_state^A weak / G_recognition^A weakest. Time staging is in three phases of 5 / 5–10 / 10–15 years. The five-party liability ratio 25 / 25 / 15 / 25 / 10 is an analytical recommendation, not a prediction. A key warning for readers in Taiwan: when the TW DIW enters the LLM-agent phase, if AI agents continue to be treated as tools rather than as agents with independent delegation structures, the intrinsic structurally non-delegable zone will be crossed by engineering means, and supported decisions will degrade into substituted decisions under the wallet's three engineering defaults."
  formalCoda: |
    Final form:
      Delegate(action) ≜ ⟨AT, RT, AA, BS, TC⟩
