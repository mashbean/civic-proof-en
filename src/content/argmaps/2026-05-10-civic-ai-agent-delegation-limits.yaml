chain:
  title: LLM-Agent Wallet Automatic Credential Co-Signing × Cross-Border Rights Failure Five-Segment Chain (Formalisation of A14 Category-5 Gap)
  steps:
    - tag: L1
      kind: deterministic
      text: The agent developer designs the agent's decision authority and trust calibration (normative necessity — agent intervention necessarily introduces a new governance layer; corresponds to Tomasev's TC element)
    - tag: L2
      kind: deterministic
      text: The agent operator / principal selects the deployment scenario and issues high-level instructions (normative necessity — the delegation structure shifts from direct holder action to a dual holder + agent operator layer; corresponds to Tomasev's AT + BS elements)
    - tag: L3
      kind: deterministic
      text: "The wallet provider / EUDI Wallet issuer supplies cryptographic primitives for holder/agent distinction; EUDI ARF v1.4–1.5 provides multi-profile but not multi-tenant (normative necessity + engineering reality — absence of multi-tenant means supported degrades to substituted)"
    - tag: L4
      kind: probabilistic
      text: The issuer issues a misused credential (probabilistic event — whether the issuer verified holder self-signing vs. agent co-signing depends on issuer policy and W3C VC v2.0 conformance)
    - tag: L5
      kind: probabilistic
      text: "The verifier accepts agent-automated co-signing (probabilistic event — whether the verifier identifies the presentationOrigin=agent tag depends on verifier policy and interoperability standard maturity; when the 5 segments span different countries across jurisdictions, the liability vacuum spreads from a single node to the entire five-segment chain)"
  legend:
    - kind: deterministic
      label: Normative necessity (structural; governance layer necessarily present after agent intervention)
    - kind: probabilistic
      label: Probabilistic (realised depending on specific policy, standards maturity, and jurisdictional combination, but probability non-negligible)

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: Objection 1
    title: Coeckelbergh relational personhood — AI agents can satisfy the functional requirements of plurality
    pivot: The objection draws on *AI Ethics* (2020) and "Robot Rights" (2022), arguing that AI agents acquire personhood through relational practices, so plurality is not exclusive to humans; as long as AI agents can provide heterogeneous perspectives (multi-model ensemble: GPT-5 + Claude 4.7 + Gemini Ultra + Grok-4), they satisfy the functional requirements of Arendt plurality, and intrinsic Z₃ does not exist. Empirically, relational personhood has structural support in Chinese-language scholarship and parts of European-continental AI ethics research.
    flip: |
      On closer inspection, Arendt's §1 Prologue defines plurality as "the fact that men, not Man, live on the earth and inhabit the world" — explicitly specifying "the coexistence of multiple *who*s," where *who* is subjecthood at the ontological level, not output diversity. A multi-model ensemble satisfies "functional perspectival heterogeneity" (epistemological heterogeneity), not Arendt's "Erscheinen vor Anderen" (appearing before others — phenomenological presence). Conflating the two is a category error, analogous to confusing "diversity of photographs" with "diversity of human community." The Coeckelbergh objection, read carefully, supports the argument's discipline of distinguishing "ontological vs. functional" — this paper's response is in §4 directly, with an explicit acknowledgement that this is a philosophical position choice (stated within the honesty boundary). The CF3 counterfactual stress test (if relational personhood is fully accepted, the ℬ column of the matrix must be redone but RT-ℬ ✗ + AA-ℬ ✗ remain standing) shows "downgrades one level, not two."

  - label: Objection 2
    title: GDPR Art 22 + EU AI Act Art 25 — existing law already covers AI agents' cross-border obligations
    pivot: The objection holds that GDPR Art 22's coverage of fully automated decision-making has been expansively interpreted in SCHUFA (C-634/21, 2023); EU AI Act Art 25 covers cross-border obligations on providers; no new FTLA-Agent four-layer governance is needed. Empirically, these two rules are the most important current tools for AI agent governance, covering 450 million EU citizens.
    flip: |
      On closer inspection, GDPR Art 22 + EU AI Act Art 25 are the EU-internal minimum baseline, **not cross-border mutual recognition mechanisms**. Art 22's application to AI agents in wallet scenarios (mostly semi-automated: human-triggered, AI-executed) falls in a grey area; the SCHUFA expansive interpretation is effective only within the EU. Art 25 enforcement depends on member-state market surveillance authorities, whose cross-border coordination operates in parallel with — but is not integrated with — GDPR Art 56's lead supervisory authority. Neither provision has direct applicability to cross-border AI agent behaviour outside the EU. The GDPR/AI Act objection, read carefully, supports the argument's discipline of "layered governance" — the Q10a + Q10b split shows that Art 22 (covering part of Q10a) + Art 25 (covering part of G_oversight^A) are only partial bearers of two layers within FTLA-Agent, and the G_recognition^A cross-border mutual recognition layer remains vacant in 2026.

  - label: Objection 3
    title: Reductionism — Tomasev's five elements can be reduced to the traditional principal-agent model
    pivot: The objection holds that the Jensen-Meckling (1976) + Eisenhardt (1989) principal-agent model already covers all important aspects of delegation structure; Tomasev's five elements can be reduced to two (authority transfer + responsibility transfer), with the remaining three (accountability allocation + boundary setting + trust calibration) being merely operational details. Empirically, the principal-agent model has more than half a century of application in management, economics, and law, with high external validity.
    flip: |
      On closer inspection, the principal-agent model implicitly presupposes utility maximisation and one-shot delegation (contract-bound). The goals of civic action are often not utility-based (dignity, recognition, voice), and AI agent delegation is long-term and dynamic rather than one-shot. The three dynamic governance elements of Tomasev's five elements (AA + BS + TC) are precisely designed for scenarios involving "continuity + non-utility goals + multiple connections." Reducing to two elements leaves dynamic governance without a home — AA handles multi-party accountability, BS handles scope minimisation, and TC handles long-term trust calibration. These three elements bear special weight in civic action scenarios (multi-party interaction in democratic action + scope minimisation is essential for supported decision-making + trust calibration is the maintenance mechanism after 6–18 months of model drift). The reductionist objection, read carefully, supports the argument's discipline of the "2+3 structure" — the layering of formal delegation elements (AT+RT) and dynamic governance elements (AA+BS+TC) is necessary, not redundant.

