slug: 2026-05-10-civic-proof-inclusion-rights
title: "What About Those Who Cannot Use a Wallet: Civic Proof Access as a Fundamental Right"
subtitle: Civic Proof Inclusion Rights as a Precursor Right — Argument Map (v2)

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: |
    The right to access civic proof is a "human-rights-level precursor right" that traverses all three of Marshall's citizenship layers and stands alongside the right to legal personality (UDHR Art 6, ICCPR Art 16). The three-tier state obligation structure (procedural / substantive / institutional) must be satisfied simultaneously; the failure of any one tier constitutes a corresponding state on the severity spectrum of "administrative invisibility / accumulated exclusion / structural deprivation of citizenship." The three default presuppositions of wallet engineering — personal ownership / personal identification / personal private key — must themselves be examined as normative biases; shared devices and delegated agency cannot normatively be treated as edge cases.
  summary: Civic proof access is a precursor right that traverses Marshall's three citizenship layers; states must satisfy three concurrent obligation tiers, and wallet engineering's three default presuppositions are themselves normative biases.
  formal:
    expression: |
      P[civic_proof] ≜ precursor right   ;   P ⊆ ⋂ᵢ Mᵢ  (i ∈ civil, political, social)

      Inclusion(s) ⇔ T_proc(s) ∧ T_subst(s) ∧ T_inst(s)
      ¬Inclusion(s) ⇒ severity(s) ∈ {invisibility, accumulated, structural_deprivation}
      Wallet_default = ⟨ownership ∧ identification ∧ key_custody⟩  ;  ¬default ⇒ inclusion_failure
      civic_proof_min(stateless_de_jure) ⊥ civic_proof_min(de_facto_no_ID)
    caption: The civic proof access right P is a precursor right traversing all three of Marshall's citizenship layers (Mᵢ denotes the civil / political / social layer). Inclusion is constituted by the conjunction of three obligation tiers T; failure of any one tier places the case on a specific level of the severity spectrum. Failure to satisfy the wallet's three default presuppositions constitutes an inclusion failure. The minimum viable civic proof for de jure stateless persons and de facto persons without ID runs on orthogonal tracks.
    legend:
      - symbol: P[civic_proof]
        meaning: Civic proof access right
      - symbol: Mᵢ
        meaning: Marshall citizenship layer i (civil / political / social)
      - symbol: T_proc / T_subst / T_inst
        meaning: Three-tier state obligation (procedural / substantive / institutional)
      - symbol: "severity ∈ {invisibility, accumulated, structural_deprivation}"
        meaning: Three-level severity spectrum (administrative invisibility / accumulated exclusion / structural deprivation of citizenship)
      - symbol: Wallet_default
        meaning: Wallet engineering's three default presuppositions (ownership / identification / key_custody)
      - symbol: ⊥
        meaning: Orthogonal (independent, parallel, non-absorbable)
      - symbol: ⊆
        meaning: Subset
      - symbol: ⋂
        meaning: Intersection (traversing all elements)
      - symbol: ≜
        meaning: "Defined as"
      - symbol: ⇔
        meaning: If and only if
      - symbol: ∧
        meaning: Conjunction (simultaneously satisfied)

# ─────────────────────────────────────────────────────────────
# Transitions
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    The formal expression states the position; the next step is to separate common misreadings. Civic proof is frequently treated in current policy discourse as a "statutory right" (a legislative policy choice). If this classification stands, the state can reduce alternative pathways and inclusion obligations under budgetary or political pressure, and marginalised groups will be structurally left outside the wallet system. The map's first move is to draw a line between "legislative policy choice" and "human rights tier + constitutional fundamental rights tier."

  beforePillars: |
    The distinction is merely a declaration. Proving that civic proof belongs to both the human rights tier and the constitutional fundamental rights tier calls for four independent lines of support. The inductive strand provides four structural mechanisms of exclusion among affected populations; the deductive strand provides the hierarchy argument from the political philosophy of Marshall + Sen + Nussbaum + Anderson; the abductive strand provides the legal basis for the three-tier state obligation and examples of failure; the counter-example strand provides evidence for normative bias in wallet engineering's three default presuppositions. The four pillars correspond to four argument types — any one missing and the position degrades to advocacy.

  beforeChain: |
    The pillars constitute the affirmative argument. The Aadhaar PDS fatality cases in India provide a concrete causal chain running from "mandatory linkage design in 2009" to "cumulative 30 Jharkhand / Bihar / Karnataka fatalities as of 2024." The upstream segment is normative necessity (mandatory linkage + administrative legitimacy failure); the downstream segment is a probabilistic event (food ration timing coupling for specific households). Unfolding the chain translates the abstract three-tier obligation violation into a mechanistically traceable event sequence.

  beforeBorders: |
    Once the position and the causal chain hold, objections become genuinely threatening. Banerjee/Duflo's RCTs show a "net inclusion benefit" from Aadhaar in leakage improvement; Posner/Vermeule argues for flexibility in the administrative state; the Lessig cyber-libertarian position argues for market primacy. Careful examination of the empirical strength of each objection reveals that they not only fail to overturn the map's position but actually flip to support the three-tier protection structure — the evidentiary structure of each objection turns out to be the map's second-order support.

  beforeConditions: |
    Once the objections are absorbed, what remains are design implications. Under what conditions can "civic proof inclusion rights" be treated as a legitimate policy pathway? Six conditions translate the abstract three-tier protection into verifiable engineering or legal obligations, while filling in the T_proc / T_subst / T_inst positions of the core formula.

  beforeConclusion: |
    Drawing together six layers — norms, political philosophy, state obligations, wallet engineering's three default presuppositions, policy synthesis, and the severity spectrum — the map ultimately argues for achievement at the political-economic level (precursor rights cannot be realised through engineering alone; political recognition is required) and a cross-tier asymmetry principle: for Taiwan's persons with disabilities / dementia in old age, migrant workers, and stateless persons, coverage under the current framework is structurally deficient, and remediation requires the government to actively promote mandatory IIA + mandatory alternative pathways + engineering of delegated agency.

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: "❌ Rejected"
    title: Civic proof is a legislative policy choice (statutory right only)
    body: |
      Treats the civic proof access right as merely a statutory right at the legislative level. This structure assumes that parliamentary majorities can determine who may access civic proof, who may use alternative pathways, and who is excluded; state obligations are limited to procedural compliance (providing some alternative pathway suffices), with no substantive obligation (for stateless persons) and no institutional obligation (for mandatory IIA). Under budgetary or political pressure, the inclusion provisions for marginalised groups are the easiest to cut; the argumentative paths of Banerjee/Duflo and Posner/Vermeule ultimately converge on this classification.
    formal: "P ∈ Statutory   (treats P as a right modifiable by parliamentary majority)"
  accepted:
    label: "✓ Defended"
    title: Civic proof is a precursor right at the human rights tier + constitutional fundamental rights tier
    body: |
      The civic proof access right is a precondition traversing all three of Marshall's citizenship layers, standing alongside the right to legal personality (UDHR Art 6, ICCPR Art 16) as a human-rights-tier right; at the constitutional level it should be interpreted by each country as a fundamental right (fundamental right / Grundrecht). This structure acknowledges three levels of meaning (human rights tier / constitutional fundamental rights tier / statutory rights tier) and asserts that the first two both hold, while critiquing accounts that treat civic proof only as a statutory right. The three-tier state obligation structure (procedural / substantive / institutional) is such that failure of any one tier constitutes a corresponding state on the severity spectrum.
    formal: "P[civic_proof] ⊆ Human_Right ∩ Fundamental_Right   ;   P ⊆ ⋂ᵢ Mᵢ"

# ─────────────────────────────────────────────────────────────
# Five Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: "§3 — Inductive (four structural mechanism types)"
    title: Exclusion can be typologised, and the four types have independent intervention points
    role: Provides empirical support — without stable typologisation of excluded populations, the downstream deductive argument and policy synthesis lose their footing. At the same time, the "digital divide" framework must be rejected, emphasising that the four types have independent policy intervention points.
    body: |
      Excluded populations can be divided into four structural mechanism types. (a) Device exclusion corresponds to infrastructure policy — GSMA 2024 reports 23% of women in Sub-Saharan Africa and 19% in South Asia are non-owner shared users; ITU 2024 estimates 2.6 billion people globally without internet connectivity. (b) Literacy exclusion corresponds to education and long-term care — WHO 2024 estimates a global dementia population of 55 million, of which over 60% are in low-to-middle-income countries; NIST FRVT 2022 shows algorithm misidentification is lower for darker skin tones and East Asian faces. (c) Documentation exclusion corresponds to nationality and immigration law — UNHCR 2024 statistics count approximately 4.4 million de jure stateless persons; the UK Windrush case (2018) is the largest documented case of citizenship loss. (d) Institutional exclusion corresponds to social welfare and labour law — India's Aadhaar PDS fatality cases (Khera series, cumulative 30 cases), Australia's Robodebt (2016–2020), and Taiwan's migrant worker ARC detention (TIWA 5,000 cases). A fifth category — "voluntary non-users" — is excluded, on the grounds that Germany's Volkszählungsurteil (1983) already established informational self-determination protection for passive non-use; mixing it with structural exclusion dilutes normative force.
    finding: The four-type classification is one of "structural mechanisms," not demographic listing; each type corresponds to an independent policy intervention point. Downstream writers may not revert to the "digital divide" framework.
    formal: "Excluded = ⋃ᵢ Tᵢ where Tᵢ ∈ {device, literacy, documentation, institutional}; intervention(Tᵢ) ≠ intervention(Tⱼ) for i ≠ j"

  - section: "§4 — Deductive (Marshall + Sen + Nussbaum + Anderson)"
    title: Civic proof is a precondition traversing all three citizenship layers
    role: Provides the political-philosophical foundation — if civic proof is merely a right within one of Marshall's three layers (analogous to the right to vote), it can be substituted or reduced; if it is a precondition traversing all three layers, the "substantive capability" of all three citizenship layers directly depends on civic proof access. Drawing on the argumentative tradition of the right to legal personality in ICCPR Art 16, this is named a precursor right.
    body: |
      Marshall 1950 *Citizenship and Social Class* divides citizenship into three layers (civil, political, social); the three layers are built in historical order but are mutually presupposed normatively. Mapping Marshall's three layers onto contemporary digitalised public life, civic proof plays the role of a "substantive capability" precondition for entering the rights of each layer. Sen 1999 *Development as Freedom* + Nussbaum 2011 *Creating Capabilities* institutionalise the capability approach as a list of "central capabilities," of which "affiliation" and "control over one's environment" directly cover civic proof scenarios. Anderson 1999 *Ethics* relational equality defines equality as "an equal standing relationship among citizens," opposing measurement by distribution outcomes alone. Pettit 1997 *Republicanism* argues from the republican *libertas* tradition for "freedom as non-domination"; Young 2000 *Inclusion and Democracy* redefines democracy as "structural inclusion"; Habermas 1962/1992 *Strukturwandel der Öffentlichkeit* / *Faktizität und Geltung* argues that public sphere formation requires communicative competence; Alston 2019 UN A/74/493 *Digital welfare state* directly argues from human rights law that civic proof inclusion is a basic human right.
    finding: Civic proof belongs to the precursor right tier, standing alongside the right to legal personality, traversing all three of Marshall's citizenship layers. This tier claim holds at both the human rights level (with treaty grounding) and the constitutional fundamental rights level (requiring constitutional interpretation in each country).
    formal: "∀ rights r ∈ ⋃ᵢ Mᵢ : exercise(r, c) requires civic_proof(c)"

  - section: "§5 — Abductive (three-tier state obligation + cross-jurisdictional bearing)"
    title: Three-tier state obligation + severity spectrum
    role: Provides the abductive argument — inferring in reverse from five failure cases that the three-tier obligation (procedural / substantive / institutional) must be satisfied simultaneously. Simultaneously establishes the severity spectrum (administrative invisibility / accumulated exclusion / structural deprivation of citizenship) as a layered measure of statement severity.
    body: |
      If civic proof is a fundamental right, state obligations must include a three-tier protection structure. Procedural protection requires providing alternative pathways beyond the wallet without discriminatory add-on conditions. Substantive protection requires providing "minimum viable civic proof" for undocumented persons, stateless persons, and persons in exile. Institutional protection requires mandating inclusion impact assessments at the infrastructure design stage. The three-tier classification is an "analytical typology"; cross-jurisdictional equivalents are: common law procedural / substantive / institutional due process; civil law formelle / materielle Rechtsstaatlichkeit / Schutzpflicht; East Asian constitutional "institutionally guaranteed rights." "Minimum viable civic proof" connects to 1954 Convention Art 27/28 + UNHCR 2014 Handbook (as an argumentative extension, not direct treaty coverage), establishing a dual safeguard (cannot substitute nationality conferral + residence upgrade pathway). "Structural deprivation of citizenship" corresponds to arbitrary deprivation of nationality (HRC Resolutions 20/5, 32/5, etc. — authoritative interpretive guidance of non-binding resolutions), used only for extreme cases such as the Aadhaar fatality cases and the Windrush citizenship loss cases.
    finding: The three-tier obligation must be satisfied simultaneously; failure of any one tier places the case on a corresponding level of the severity spectrum. The three-level severity spectrum (administrative invisibility / accumulated exclusion / structural deprivation of citizenship) corresponds to different degrees of failure.
    formal: "Inclusion(state) ⇔ T_proc ∧ T_subst ∧ T_inst   ;   ¬Inclusion ⇒ severity ∈ {invisibility, accumulated, structural_deprivation}"

  - section: "§6 — Counter-example (wallet engineering's three default presuppositions)"
    title: Wallet engineering defaults are themselves normative biases
    role: Provides counter-evidence — without proving that mainstream wallet engineering defaults are themselves normative biases, the institutional protection obligation (mandatory IIA, multi-tenant, auditable delegation chain) is merely a procedural compliance requirement rather than substantive transformation.
    body: |
      Wallet engineering's mainstream defaults comprise a three-part structure: personal ownership of device + individual biometric / behavioural binding + individually held key material. Shared devices primarily break the binding of (1) and (2); delegated agency primarily breaks the binding of (3) and "the subject exercising the right." These two scenarios represent the everyday reality of at least one billion people globally, not edge phenomena. GSMA 2024 (SSA women 23% non-owner shared user) + ITU 2024 (2.6 billion globally unconnected) + WHO 2024 (55 million globally with dementia) + Wyche et al. ICTD 2018 "Sharing this with the family" + Sambasivan et al. SOUPS 2018 "Privacy is not for me." CRPD Art 12 + General Comment No. 1 (2014) explicitly require the progressive abolition of substituted decision-making and its replacement with supported decision-making. Taiwan's 2019 Civil Code voluntary guardianship system is a partial response to this international trend, but wallet engineering has not provided design primitives aligned with supported decision-making.
    finding: Wallet engineering's three default presuppositions are not neutral engineering choices but normative positions. The three engineering requirements for inclusion-by-design (mandatory IIA + multi-tenant + auditable delegation chain) are each necessary.
    formal: "Wallet_default ∧ shared_device ⇒ exclude(non_primary_user)   ;   Wallet_default ∧ delegation ⇒ exclude(supported_decision)"

  - section: "§7 — Policy synthesis (three-tier concrete provisions + five limitations)"
    title: Three-tier provisions in parallel + dual safeguard + three anti-decay measures
    role: Provides policy synthesis — without translating the three-tier obligation from the abstract level into legislative or administrative implementation, the entire argument degrades to advocacy. This pillar translates abstract obligations into concrete provisions with timelines, political resistance, and quantitative indicators.
    body: |
      Three procedural protection provisions. P1 statutory obligation (may not provide only the wallet interface) + P2 equivalence (distinguishing formal equivalence vs. substantive equivalence, with quantitative indicators: timeline no more than 1.5× wallet pathway, rejection rate no higher than 1.5× wallet pathway) + P3 anti-discrimination (alternative pathways may not carry additional charges or processing timeline discrimination). Three substantive protection axes in parallel: W3C DID track + UNHCR/IOM/NGO trust framework + city-level sanctuary card backfill (NYC IDNYC 2017–2020 ICE data request pressure demonstrates its legal sustainability risk, positioned as "city-level backfill when federal protection is insufficient"). "Minimum viable civic proof" splits into two populations: de jure stateless persons (protected by the 1954/1961 Conventions, approximately 4.4 million; UNHCR Digital Identity for Refugees covers 11.4M but "user-led" in only a very small proportion) and de facto persons without ID (World Bank ID4D approximately 850M; no international treaty provides direct coverage). Institutional protection IIA three-tier design (L1 mandatory at design stage + L2 third-party audit + L3 participation rights for affected groups), with three anti-decay measures (mandatory disclosure + third-party audit + participation rights for affected groups) as partial mitigation of box-ticking degradation risk.
    finding: The three-tier provisions must proceed in parallel. Short-term implementation should begin with P1 statutory obligation (12–24 months); medium-term should advance W3C DID track for substantive protection and IIA L1 for institutional protection (24–48 months); long-term should advance the UNHCR trust framework for substantive protection and L2/L3 for institutional protection (36–72 months).
    formal: "Policy = ⟨P_proc, P_subst, P_inst⟩   ;   civic_proof_min(stateless_de_jure) ⊥ civic_proof_min(de_facto_no_ID)   ;   IIA_robust = ⟨public, audit, participation⟩"

# ─────────────────────────────────────────────────────────────
# Causal Chain (Aadhaar PDS exclusion process trace)
# ─────────────────────────────────────────────────────────────
chain:
  title: "Aadhaar PDS Fatality Cases: Six-Step Causal Chain (Mandatory Linkage → Structural Deprivation of Citizenship)"
  steps:
    - tag: T0
      kind: deterministic
      text: "2009–2016 — Mandatory Aadhaar-PDS linkage design established without IIA assessment of exclusion risks (institutional protection violation is normative necessity)"
    - tag: T1
      kind: deterministic
      text: "2017+ — Some beneficiaries denied access at ration stations due to Aadhaar linkage errors, biometric failures, and administrative negligence (procedural protection without effective alternative pathway)"
    - tag: T2
      kind: deterministic
      text: PDS mandatory linkage design conflicts with Aadhaar's existing operational logic; Khera 2019 *EPW* series documents cumulative 30 fatalities in Jharkhand / Bihar / Karnataka
    - tag: T3
      kind: probabilistic
      text: "2017 *K.S. Puttaswamy v. Union of India* established privacy as a fundamental right; 2018 *Puttaswamy II* partially limited mandatory Aadhaar linkage (external trigger)"
    - tag: T4
      kind: probabilistic
      text: "2018–2024 subsequent relief procedures partially reformed; UN Special Rapporteur Alston 2019 report cited the Aadhaar fatality cases as a representative example of digital welfare state failure"
    - tag: T5
      kind: probabilistic
      text: Some administrative negligence improved but structural exclusion pattern continues; Banerjee 2020 + Muralidharan 2016 RCT shows leakage improvement but different outcome variables; the tail-end exclusion fatality problem remains unresolved
  legend:
    - kind: deterministic
      label: Mechanistic necessity (structural; does not depend on external trigger)
    - kind: probabilistic
      label: Probabilistic (requires external trigger to materialise, but probability non-negligible)

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: Objection 1
    title: Banerjee/Duflo — the economic benefits of universal ID should not be equated with fundamental rights
    pivot: The objection draws on *Poor Economics* (2011) + *Good Economics for Hard Times* (2019) + Banerjee, Duflo, Imbert, Mathew, Pande 2020 + Muralidharan, Niehaus, Sukhtankar 2016 RCTs, arguing that Aadhaar has a "net inclusion benefit" in leakage improvement, and that elevating civic proof to a fundamental right may weaken rights language itself. Empirically, these RCTs are rigorous causal inferences with high external validity.
    flip: |
      On closer inspection, the outcome variable of the two RCTs is "net leakage improvement" and "overall ration distribution efficiency," while §3 and §8 Khera series of this paper document a "tail-end exclusion fatality" outcome variable. (i) leakage improvement and (ii) tail-end exclusion fatality can simultaneously be true — the two conclusions are not mutually exclusive. Banerjee/Duflo's argument is correct, but the issue they argue about is different from this paper's. Elevating civic proof to a precursor right does not deny its instrumental benefits; rather, it adds a floor protection above instrumental benefits — the tail end must not be subjected to fatalities. The Banerjee/Duflo objection, read carefully, supports the argument's discipline of "precisely distinguishing outcome variables."

  - label: Objection 2
    title: Posner/Vermeule — the flexibility needs of the administrative state
    pivot: The objection draws on *The Executive Unbound* (2010), arguing that decision-making in the contemporary administrative state requires flexibility; locking civic proof as a fundamental right will limit the government's agility in responding to new technologies. Empirically, Posner & Vermeule's account of US administrative expansion has an empirical basis, and is partly taken up by the Schmittian tradition of emergency state theory.
    flip: |
      Recognising civic proof as a precursor right does not require the government to implement it with a specific technology; it only requires the government to satisfy outcome conditions (everyone can access it). Flexibility in technology choice is preserved within constitutional fundamental rights protection. The Posner/Vermeule objection, read carefully, supports the distinction between "outcome conditions vs. technological means" — fundamental rights specify outcome conditions, and administrative flexibility resides in the choice of means. This distinction is precisely the core conclusion of the map's abductive pillar.

  - label: Objection 3
    title: "Lessig cyber-libertarian — market primacy vs. state withdrawal"
    pivot: The objection draws on *Code* (1999), arguing that wallet adoption should proceed through market vs. state withdrawal, rather than upgrading access rights to fundamental rights. Empirically, the cyber-libertarian position has structural support in the open-source wallet community (Polygon ID, ENS, Worldcoin).
    flip: |
      When the wallet has become a factually necessary channel for entering public life, market withdrawal cannot satisfy the outcome condition. Market-led wallet design will leave marginalised groups to the fiction of "free choice not to use," which in substance amounts to exclusion — precisely what the exhaustive examination of the fifth category "voluntary non-users" in Sub-Arg 1 reveals. The Lessig objection, read carefully, supports the critique that "market vs. state dichotomy" is overly simplistic, and reinforces the "tiered responsibility design" policy pathway (Tier 1 providers bear strict liability + Tier 3 intermediaries have low regulation).

# ─────────────────────────────────────────────────────────────
# Procedural Conditions (six firewalls of inclusion rights)
# ─────────────────────────────────────────────────────────────
conditions:
  title: The legitimacy of any civic proof inclusion policy must first pass six conditions
  formalPrelude: "valid_inclusion(s) ⇔ V_proc_alt ∧ V_equiv ∧ V_anti_disc ∧ V_min_proof ∧ V_IIA ∧ V_audit"
  items:
    - title: Mandatory procedural protection alternative pathway
      body: |
        All civic proof services may not provide only the wallet interface; at least one non-wallet alternative pathway must also be provided simultaneously (paper / NFC card / customer service / delegated agency / stamp authorisation). The EU EAA Directive (EU) 2019/882 + EU EECC Directive (EU) 2018/1972 provide a partial EU legal basis.
      formal: "V_proc_alt: ∀ service s : ∃ path p ≠ wallet : provided(s, p)"
    - title: Quantitative equivalence indicators
      body: |
        Alternative pathways are legally equivalent to the wallet (formal equivalence) and are not substantively discriminatory in efficiency (substantive equivalence). Substantive equivalence must include quantitative indicators — timeline no more than 1.5× the wallet pathway; rejection rate no higher than 1.5× the wallet pathway. The 1.5× figure is a policy recommendation value requiring legislative negotiation.
      formal: "V_equiv: ∀ alt p : time(p) ≤ 1.5·time(wallet) ∧ rejection_rate(p) ≤ 1.5·rejection_rate(wallet)"
    - title: Anti-discrimination provisions
      body: |
        Alternative pathways must not carry additional charges, processing timeline discrimination, or similar conditions. Violators can be challenged by citizens through administrative litigation. Supporting complaint channels include each country's data protection authority (DPA) + administrative courts.
      formal: "V_anti_disc: ∀ alt p : ¬extra_fee(p) ∧ ¬discriminatory_processing(p)"
    - title: Minimum viable civic proof dual-track design
      body: |
        For de jure stateless persons (protected by the 1954/1961 Conventions), provide minimum viable civic proof connected to 1954 Convention Art 27/28 + UNHCR 2014 Handbook, accompanied by a dual safeguard of "cannot substitute nationality conferral + residence upgrade pathway." For de facto persons without ID, reliance on each country's constitutional fundamental rights and administrative law + city-level sanctuary card backfill is necessary.
      formal: "V_min_proof: provide(min_civic_proof, c_stateless_de_jure) ∧ provide(min_civic_proof, c_de_facto)   ;   ¬substitute_nationality ∧ ∃ upgrade_path"
    - title: Mandatory inclusion impact assessment
      body: |
        Any state-issued or state-certified wallet system must submit an IIA report prior to deployment, modelled on the EAA Directive 2019/882 conformity assessment procedure. The IIA report must be independently audited by a third party.
      formal: "V_IIA: ∀ deployment d : pre_deployment(IIA_report(d)) ∧ third_party_audit(IIA_report(d))"
    - title: Participation rights for affected groups and auditable delegation chains
      body: |
        The IIA design and audit process must include participation rights for civil society NGOs + affected groups (including representatives of persons with disabilities / dementia, stateless persons, elderly persons, and migrant workers), modelled on the CRPD "Nothing About Us Without Us" principle. Delegation chains in delegated agency scenarios must be simultaneously auditable by law and engineering.
      formal: "V_audit: ∀ IIA report r : ∃ participation(NGO, affected_groups, r) ∧ ∀ delegation chain : auditable(chain)"

# ─────────────────────────────────────────────────────────────
# Conclusion + Formal Coda
# ─────────────────────────────────────────────────────────────
conclusion:
  paragraphs:
    - "<strong>Civic proof inclusion rights are a dually-positioned precursor right at the human rights tier + constitutional fundamental rights tier</strong>, traversing all three of Marshall's citizenship layers and standing alongside the right to legal personality. The three-tier state obligation structure (procedural / substantive / institutional) must be satisfied simultaneously; failure of any one tier constitutes a corresponding state on the severity spectrum of \"administrative invisibility / accumulated exclusion / structural deprivation of citizenship.\""
    - "Short-term implementation should begin with procedural protection P1 (12–24 months); medium-term should advance the W3C DID track for substantive protection + IIA L1 for institutional protection (24–48 months); long-term should advance the UNHCR trust framework for substantive protection + L2/L3 for institutional protection (36–72 months). <em>\"Minimum viable civic proof\" must be split and treated separately for de jure stateless persons and de facto persons without ID</em>, accompanied by the dual safeguard of \"cannot substitute nationality conferral + residence upgrade pathway.\" Wallet engineering's three default presuppositions (ownership / identification / key custody) must themselves be examined as normative biases."
    - "<strong>A key warning for readers in Taiwan: under the current framework, over 300,000 elderly persons with dementia, approximately 5,000 migrant workers whose ARC has been detained, and a considerable number of elderly persons who have long not collected their mobile natural person certificates, are already in a state of \"administrative invisibility.\"</strong> When TW DIW becomes mandatory for more government services (national health insurance, long-term care, retirement pension, education), this state will escalate to \"accumulated exclusion.\" To change this situation, the government must actively promote three measures: mandatory IIA + mandatory alternative pathways + engineering of delegated agency. This cross-tier asymmetry principle is the most direct trigger for the policy agenda of thesis Ch. 14 (federated trust-list alliance + civic proof inclusion rights + Indo-Pacific demo grants) referenced in article 15."
  formalCoda: |
    Final form:
      P[civic_proof] ≜ precursor right
      P ⊆ Human_Right ∩ Fundamental_Right ⊆ ⋂ᵢ Mᵢ  (i ∈ civil, political, social)
      Inclusion(s) ⇔ T_proc(s) ∧ T_subst(s) ∧ T_inst(s)
      ¬Inclusion(s) ⇒ severity(s) ∈ {invisibility, accumulated, structural_deprivation}
      Wallet_default = ⟨ownership ∧ identification ∧ key_custody⟩  ;  ¬default ⇒ inclusion_failure
      civic_proof_min(stateless_de_jure) ⊥ civic_proof_min(de_facto_no_ID)
