slug: 2026-05-10-civic-proof-inclusion-rights
title: 不會用皮夾的人怎麼辦：公民證明取得權作為基本權利
subtitle: Civic Proof Inclusion Rights as a Precursor Right — Argument Map (v2)

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: |
    Civic proof 取得權是「人權層級的前置權利」（precursor right），位階橫貫 Marshall 三層公民權，與法律人格權（UDHR Art 6, ICCPR Art 16）並列。國家義務的三層保障結構（程序 / 實質 / 制度）必須同時滿足；缺一即構成「行政可見性喪失 / 累積性排除 / 結構性褫奪公民資格」三層嚴重度光譜中的對應狀態。Wallet 工程的個人擁有 / 個人識別 / 個人私鑰三重預設本身須被檢驗為規範偏誤，共用裝置與委任代理在規範上不能被當作邊緣情境。
  summary: Civic proof access is a precursor right that traverses Marshall's three citizenship layers; states must satisfy three concurrent obligation tiers, and wallet engineering's three default presuppositions are themselves normative biases.
  formal:
    expression: |
      P[civic_proof] ≜ precursor right   ;   P ⊆ ⋂ᵢ Mᵢ  (i ∈ civil, political, social)

      Inclusion(s) ⇔ T_proc(s) ∧ T_subst(s) ∧ T_inst(s)
      ¬Inclusion(s) ⇒ severity(s) ∈ {invisibility, accumulated, structural_deprivation}
      Wallet_default = ⟨ownership ∧ identification ∧ key_custody⟩  ;  ¬default ⇒ inclusion_failure
      civic_proof_min(stateless_de_jure) ⊥ civic_proof_min(de_facto_no_ID)
    caption: 公民證明取得權 P 屬橫貫 Marshall 三層的前置權利（Mᵢ 指公民層 / 政治層 / 社會層）。Inclusion 由三層義務 T 合取構成；缺一即落入嚴重度光譜的某一層級。Wallet 三重預設不滿足即構成 inclusion 失敗；最小可用 civic proof 對法律無國籍與 de facto 無 ID 兩種人群分屬正交軌道。
    legend:
      - symbol: P[civic_proof]
        meaning: Civic proof access right — 公民證明取得權
      - symbol: Mᵢ
        meaning: Marshall citizenship layer i (civil / political / social) — Marshall 三層公民權之一
      - symbol: T_proc / T_subst / T_inst
        meaning: 三層國家義務（程序 / 實質 / 制度）
      - symbol: severity ∈ {invisibility, accumulated, structural_deprivation}
        meaning: 三層嚴重度光譜（行政可見性喪失 / 累積性排除 / 結構性褫奪公民資格）
      - symbol: Wallet_default
        meaning: Wallet 工程三重預設（ownership / identification / key_custody）
      - symbol: ⊥
        meaning: 「正交」（orthogonal，獨立並行不可吸納）
      - symbol: ⊆
        meaning: 子集
      - symbol: ⋂
        meaning: 交集（橫貫所有元素）
      - symbol: ≜
        meaning: 「定義為」
      - symbol: ⇔
        meaning: 當且僅當
      - symbol: ∧
        meaning: 合取（同時成立）

# ─────────────────────────────────────────────────────────────
# Transitions (區塊之間的接連描述)
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    公式給出立場，下一步要把常見誤讀拉開。Civic proof 在當前政策論述中常被當作「立法政策選擇」（statutory right）處理；只要這個分類成立，國家可在預算或政治壓力下削減替代路徑與 inclusion 義務，弱勢群體將被結構性留在 wallet 體系之外。地圖的第一動作是把「立法政策選擇」與「人權層 + 憲法基本權層」這兩個分類拉開。

  beforePillars: |
    區分本身只是宣告。要證明 civic proof 屬人權層 + 憲法基本權層的雙重定位，需要四條獨立來源的支撐。歸納面提供被排除人群的四類結構機制；演繹面提供 Marshall + Sen + Nussbaum + Anderson 政治哲學的位階論證；溯因面提供國家三層義務的法理基礎與失敗案例；反例面提供 wallet 三重預設的規範偏誤證據。四條 pillar 對應四個論證類型，缺一立場就退化為呼籲。

  beforeChain: |
    pillars 是正向論證。印度 Aadhaar PDS 致死案提供從「2009 設計強制連結」到「2024 累積 30 件 Jharkhand / Bihar / Karnataka 致死」的具體因果鏈。前段是規範必然（強制連結 + 行政正當性失敗），後段是概率事件（特定家庭的食物配給時序耦合）。把鏈條展開的目的是把抽象的三層義務違反翻譯成可被機制性追溯的事件序列。

  beforeBorders: |
    立場 + 因果鏈成立後，反論才真的具威脅。Banerjee/Duflo 的 RCT 顯示 Aadhaar 在 leakage 改善上有「淨包容效益」；Posner/Vermeule 主張行政國家彈性需求；Lessig cyber-libertarian 立場主張市場主導應優先。仔細檢驗每條反論的實證強度，會發現它們不僅未推翻地圖立場，反而 flip to support 三層保障結構——亦即反論自己的證據結構，正好是地圖的第二層支撐。

  beforeConditions: |
    反論被吸收後，留下的是設計含意。在什麼條件下，「civic proof inclusion rights」可以被視為合法的政策路徑？六道條件把抽象的三層保障翻譯成可被檢驗的工程或法律義務，同時填入核心公式的 T_proc / T_subst / T_inst。

  beforeConclusion: |
    把規範、政治哲學、國家義務、wallet 三重預設、政策合成、嚴重度光譜這六層收束起來，地圖最終要說的是政治經濟層的成就（precursor right 不能只透過工程實現，須政治承認）以及一條跨越所有層級的不對稱原則——對台灣失能 / 失智長者、移工、無國籍者，現行架構的覆蓋是結構性缺失，補強需政府主動推動 IIA 強制 + 替代路徑強制 + 委任代理工程化。

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: ❌ 被拒絕
    title: Civic proof 屬立法政策選擇（statutory right only）
    body: |
      把 civic proof 取得權僅當作立法層級的法定權利。這個結構假設國會多數可以決定誰能取得 civic proof、誰能用替代路徑、誰被排除；國家義務僅限於程序合規（提供某條替代路徑即可），無實質義務（對無國籍者）也無制度義務（強制 IIA）。在預算或政治壓力下，弱勢群體的 inclusion 條款最容易被削減；Banerjee/Duflo 與 Posner/Vermeule 的論述路徑最終都會被收束到此分類。
    formal: "P ∈ Statutory   （把 P 當作可被國會多數修改的權利）"
  accepted:
    label: ✓ 被辯護
    title: Civic proof 屬人權層 + 憲法基本權層的前置權利（precursor right）
    body: |
      Civic proof 取得權是橫貫 Marshall 三層公民權的前置條件，與法律人格權（UDHR Art 6, ICCPR Art 16）並列為人權層級權利；在憲法層級應被各國解釋為基本權利（fundamental right / Grundrecht）。這個結構承認三層意義（人權層 / 憲法基本權層 / 立法權利層）並主張前兩層皆成立，並批判把 civic proof 僅當作立法權利的論述。國家義務有三層保障結構（程序 / 實質 / 制度），任一層失敗即構成嚴重度光譜中的對應狀態。
    formal: "P[civic_proof] ⊆ Human_Right ∩ Fundamental_Right   ;   P ⊆ ⋂ᵢ Mᵢ"

# ─────────────────────────────────────────────────────────────
# Five Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: §3 — 歸納（四類結構機制）
    title: 排除可被類型化，且四類有獨立介入點
    role: 提供實證面支撐——若被排除人群不能被穩定類型化，後續演繹與政策合成失去著力點。同時必須拒斥「數位落差」框架，強調四類有獨立政策介入點。
    body: |
      被排除人群可被分為四類結構機制。(a) 工具排除對應基礎建設政策——GSMA 2024 報告 Sub-Saharan Africa 女性 23% 屬於 non-owner shared user、South Asia 19%；ITU 2024 估全球 26 億未連網人口。(b) 識讀排除對應教育與長照——WHO 2024 估全球失智人口 5500 萬，其中超 60% 在低中收入國家；NIST FRVT 2022 演算法錯認對深色膚色與東亞臉部偏低。(c) 證件排除對應國籍與移民法——UNHCR 2024 統計 ~440 萬法律無國籍者；UK Windrush 案（2018）為失國籍案的最具規模記錄。(d) 制度排除對應社會福利與勞動法——印度 Aadhaar PDS 致死案（Khera 系列累積 30 件）、澳洲 Robodebt（2016-2020）、台灣移工 ARC 扣留（TIWA 5000 件）。第五類「自願不使用者」被剔除，理由為德國 Volkszählungsurteil（1983）已建立資訊自決權保護消極不使用，與結構排除混合會稀釋規範力道。
    finding: 四類分類為「結構機制」而非人口學列舉，每一類對應獨立政策介入點；下游 writer 不可回退到「數位落差」框架。
    formal: "Excluded = ⋃ᵢ Tᵢ where Tᵢ ∈ {device, literacy, documentation, institutional}; intervention(Tᵢ) ≠ intervention(Tⱼ) for i ≠ j"

  - section: §4 — 演繹（Marshall + Sen + Nussbaum + Anderson）
    title: Civic proof 是橫貫三層公民權的前置條件
    role: 提供政治哲學基礎——若 civic proof 僅是 Marshall 三層其中一層的權利（如類比投票權），可被替代或削減；若它是橫貫三層的前置條件，三層公民權的「實質可行能力」直接依賴於 civic proof 取得。借自 ICCPR Art 16 法律人格權的論述傳統，命名為 precursor right。
    body: |
      Marshall 1950 *Citizenship and Social Class* 把公民權分為三層（公民層、政治層、社會層）；三層按歷史順序依次建立，但在規範上互為前提。把 Marshall 三層套到當代數位化的公共生活，civic proof 在每一層都扮演進入該層權利的「實質可行能力」前提。Sen 1999 *Development as Freedom* + Nussbaum 2011 *Creating Capabilities* 把 capability approach 制度化為「核心可行能力」清單，其中「affiliation」與「control over one's environment」直接涵蓋 civic proof 場景。Anderson 1999 *Ethics* relational equality 把平等定義為「公民之間的平等地位關係」，反對僅以分配結果衡量。Pettit 1997 *Republicanism* 從共和主義 *libertas* 傳統論證「免於支配」；Young 2000 *Inclusion and Democracy* 把民主重新定義為「結構性 inclusion」；Habermas 1962/1992 *Strukturwandel der Öffentlichkeit* / *Faktizität und Geltung* 論證公共領域成立需 communicative competence；Alston 2019 UN A/74/493 *Digital welfare state* 從人權法直接論證 civic proof inclusion 是基本人權。
    finding: Civic proof 屬 precursor right 位階，與法律人格權並列，橫貫 Marshall 三層；該位階主張在人權層（已有公約根據）+ 憲法基本權層（須各國憲法解釋）皆成立。
    formal: "∀ rights r ∈ ⋃ᵢ Mᵢ : exercise(r, c) requires civic_proof(c)"

  - section: §5 — 溯因（國家義務三層 + 跨法域承載）
    title: 國家三層義務 + 嚴重度光譜
    role: 提供溯因論證——從 5 件失敗案例反推三層義務（程序 / 實質 / 制度）必須同時滿足。同時建立嚴重度光譜（行政可見性喪失 / 累積性排除 / 結構性褫奪公民資格）為措辭強度分層。
    body: |
      若 civic proof 是基本權利，國家義務必須包含三層保障結構。程序保障要求提供 wallet 之外的替代路徑且不得有歧視性附加條件；實質保障要求對無證件者、無國籍者、流亡者提供「最小可用 civic proof」；制度保障要求基礎設施設計階段強制 inclusion impact assessment。三層分類為「分析性類型學」，跨法域對應為普通法系 procedural / substantive / institutional due process、大陸法系 formelle / materielle Rechtsstaatlichkeit / Schutzpflicht、東亞憲政「制度的保障」。「最小可用 civic proof」對接 1954 公約 Art 27/28 + UNHCR 2014 Handbook（屬論述延伸而非條約直接覆蓋），建立雙防線（不可替代國籍授予 + 居住升級條款）。「結構性褫奪公民資格」對應 arbitrary deprivation of nationality（HRC Resolution 20/5、32/5 等非拘束性決議的權威解釋指引），僅用於 Aadhaar 致死案、Windrush 失國籍案等極端情境。
    finding: 三層義務必須同時滿足，缺一即落入嚴重度光譜的某一層級；嚴重度光譜的三層措辭（行政可見性喪失 / 累積性排除 / 結構性褫奪公民資格）對應不同程度的失敗。
    formal: "Inclusion(state) ⇔ T_proc ∧ T_subst ∧ T_inst   ;   ¬Inclusion ⇒ severity ∈ {invisibility, accumulated, structural_deprivation}"

  - section: §6 — 反例（Wallet 三重預設）
    title: Wallet 預設本身為規範偏誤
    role: 提供反向證據——若無法證明 wallet 工程主流預設本身是規範偏誤，制度保障義務（強制 IIA、multi-tenant、代理鏈可審計）就只是程序合規要求，而非實質改造。
    body: |
      Wallet 工程的主流預設由三重結構組成，個人擁有（personal ownership of device）+ 個人識別（individual biometric / behavioural binding）+ 個人私鑰（individually held key material）。共用裝置主要打破 (1) 與 (2) 的綁定；委任代理主要打破 (3) 與「行使主體」的綁定。這兩個情境屬於全球至少十億人的日常實況，並非邊緣現象。GSMA 2024（SSA 女性 23% non-owner shared user）+ ITU 2024（全球 26 億未連網）+ WHO 2024（全球失智 5500 萬）+ Wyche et al. ICTD 2018「Sharing this with the family」+ Sambasivan et al. SOUPS 2018「Privacy is not for me」。CRPD Art 12 + General Comment No. 1（2014）明確要求逐步廢除替代決策（substituted decision-making），代之以 supported decision-making；台灣 2019 民法意定監護新制是這個國際趨勢的部分回應，但 wallet 工程未提供對齊 supported decision-making 的設計原語。
    finding: Wallet 三重預設並非中立的工程選擇，而是規範立場；inclusion-by-design 的三項可工程要求（強制 IIA + multi-tenant + 代理鏈可審計）缺一即未達成。
    formal: "Wallet_default ∧ shared_device ⇒ exclude(non_primary_user)   ;   Wallet_default ∧ delegation ⇒ exclude(supported_decision)"

  - section: §7 — 政策合成（三層具體條款 + 五項限定）
    title: 三層條款並行 + 雙防線 + 三道防腐
    role: 提供政策合成——若三層義務只停留在抽象層級，無法被立法或行政命令落實，整個論證會退化為呼籲。本 pillar 把抽象義務翻譯為具體條款，含時程、政治阻力、量化指標。
    body: |
      程序保障三條款。P1 法定義務（不得只提供 wallet）+ P2 等效性（區分形式等效 vs 實質等效，含量化指標時程不超過 1.5 倍、駁回率不高於 1.5 倍）+ P3 反歧視（替代路徑不得有附加費用、處理時程歧視）。實質保障三軸並行，W3C DID 軌道 + UNHCR/IOM/NGO trust framework + 城市級 sanctuary card 回填（NYC IDNYC 2017-2020 ICE 資料調取壓力顯示其法律可持續性風險，定位為「在聯邦保護不足時的城市級回填」）。「最小可用 civic proof」拆成法律無國籍者（受 1954/1961 公約保護，~440 萬，UNHCR Digital Identity for Refugees 計畫覆蓋 11.4M 但「使用者主導」極小）與 de facto 無 ID 者（World Bank ID4D ~850M，無國際公約直接覆蓋）兩種人群。制度保障 IIA 三層設計（L1 設計階段強制 + L2 第三方 audit + L3 受影響人群參與權），配三道防腐（強制公開 + 第三方 audit + 受影響人群參與權）為部分緩解 box-ticking 退化風險。
    finding: 三層條款必須並行，短期實施應從 P1 法定義務（12-24 月）開始，中期推進實質保障 W3C DID 軌道與制度保障 IIA L1（24-48 月），長期推進實質保障 UNHCR trust framework 與制度保障 L2/L3（36-72 月）。
    formal: "Policy = ⟨P_proc, P_subst, P_inst⟩   ;   civic_proof_min(stateless_de_jure) ⊥ civic_proof_min(de_facto_no_ID)   ;   IIA_robust = ⟨public, audit, participation⟩"

# ─────────────────────────────────────────────────────────────
# Causal Chain (Aadhaar PDS exclusion process trace)
# ─────────────────────────────────────────────────────────────
chain:
  title: Aadhaar PDS 致死案六步因果鏈（強制連結 → 結構性褫奪公民資格）
  steps:
    - tag: T0
      kind: deterministic
      text: 2009-2016 — Aadhaar 強制連結 PDS 設計確立，無 IIA 評估排除風險（制度保障違反屬規範必然）
    - tag: T1
      kind: deterministic
      text: 2017+ — 部分受益人因 Aadhaar 連結錯誤、生物識別失敗、行政人員疏忽被拒於配給站（程序保障無有效替代路徑）
    - tag: T2
      kind: deterministic
      text: PDS 強制連結設計與 Aadhaar 既有運作邏輯衝突；Khera 2019 *EPW* 系列累積 30 件 Jharkhand / Bihar / Karnataka 致死案
    - tag: T3
      kind: probabilistic
      text: 2017 *K.S. Puttaswamy v. Union of India* 確立隱私為基本權；2018 *Puttaswamy II* 部分限縮 Aadhaar 強制連結（外部 trigger）
    - tag: T4
      kind: probabilistic
      text: 2018-2024 後續救濟程序部分改革；UN Special Rapporteur Alston 2019 報告把 Aadhaar 致死案標為 digital welfare state 失敗的代表
    - tag: T5
      kind: probabilistic
      text: 部分行政疏失改善但結構性排除模式持續，Banerjee 2020 + Muralidharan 2016 RCT 顯示 leakage 改善但 outcome variable 不同；尾端排除致死問題未解
  legend:
    - kind: deterministic
      label: 機制必然（結構性，不依賴外部 trigger）
    - kind: probabilistic
      label: 概率性（需要外部 trigger 才實現，但概率不可忽略）

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: 反論 1
    title: Banerjee/Duflo — universal ID 的經濟效益不應與基本權利等同
    pivot: 反論訴求是 *Poor Economics* (2011) + *Good Economics for Hard Times* (2019) + Banerjee, Duflo, Imbert, Mathew, Pande 2020 + Muralidharan, Niehaus, Sukhtankar 2016 RCT 主張 Aadhaar 在 leakage 改善上有「淨包容效益」，把 civic proof 提升為基本權利可能弱化權利語言本身。實證強度上，這些 RCT 是嚴格的因果推論，外部效度高。
    flip: |
      仔細看，兩個 RCT 的 outcome variable 是「淨 leakage 改善」與「整體配給效率」；本文 § 3 與 § 8 Khera 系列記錄的是「尾端排除致死」outcome variable。可以同時 (i) leakage 改善 + (ii) 尾端排除致死，兩個結論不互斥。Banerjee/Duflo 的論證是對的，但他們論證的議題與本文不同。把 civic proof 提升為 precursor right 並非否認其工具性效益，而屬於在工具性效益之上加一層底線保障，尾端不可被致死。Banerjee/Duflo 反論反向支撐「精確區分 outcome variable」的論證紀律。

  - label: 反論 2
    title: Posner/Vermeule — 行政國家彈性需求
    pivot: 反論訴求是 *The Executive Unbound* (2010) 主張當代行政國家的決策需要彈性，把 civic proof 鎖定為基本權利會限制政府靈活回應新技術。實證強度上，Posner & Vermeule 對美國行政擴權的描述有實證基礎，且部分被 Schmitt 傳統的緊急狀態論承接。
    flip: |
      把 civic proof 認定為 precursor right 並未要求政府用特定技術實現它，僅要求政府滿足結果條件（所有人都能取得）。技術選擇的彈性保留在憲法基本權利保護之內。Posner/Vermeule 反論反向支撐「結果條件 vs 技術手段」的區分——基本權利規定的是結果條件，行政彈性留在手段選擇上。這個區分正好是地圖溯因 pillar 的核心結論。

  - label: 反論 3
    title: Lessig cyber-libertarian — 市場主導 vs 國家退出
    pivot: 反論訴求是 *Code* (1999) 主張 wallet 普及應透過市場 vs. 國家退出，而非把入場權升級為基本權利。實證強度上，cyber-libertarian 立場在開源 wallet 社群（Polygon ID、ENS、Worldcoin）有結構性支持。
    flip: |
      當 wallet 已成為進入公共生活的事實必要通道，市場退出無法滿足結果條件。市場主導的 wallet 設計會把弱勢群體留給「自由選擇不使用」的 fiction，這個 fiction 在實質上等於排除——這正是 Sub-Arg 1 第五類「自願不使用者」窮盡性檢查所揭示的問題。Lessig 反論反向支撐「市場 vs 國家二分」過於簡化的批判，並補強「分層責任設計」（Tier 1 提供者承擔嚴格責任 + Tier 3 中介低監管）的政策路徑。

# ─────────────────────────────────────────────────────────────
# Procedural Conditions (six firewalls of inclusion rights)
# ─────────────────────────────────────────────────────────────
conditions:
  title: 任何 civic proof inclusion 政策的合法性，必須先通過六道條件
  formalPrelude: "valid_inclusion(s) ⇔ V_proc_alt ∧ V_equiv ∧ V_anti_disc ∧ V_min_proof ∧ V_IIA ∧ V_audit"
  items:
    - title: 程序保障替代路徑強制
      body: |
        所有 civic proof 服務不得僅提供 wallet 介面；必須同時提供至少一條非 wallet 替代路徑（紙本 / NFC 卡 / 客服 / 委任代理 / 印章授權）。EU EAA Directive (EU) 2019/882 + EU EECC Directive (EU) 2018/1972 提供了部分歐盟法基礎。
      formal: "V_proc_alt: ∀ service s : ∃ path p ≠ wallet : provided(s, p)"
    - title: 等效性量化指標
      body: |
        替代路徑與 wallet 在法律效力上等同（形式等效），且實質效率不歧視（實質等效）。實質等效須含量化指標——時程不超過 wallet 路徑的 1.5 倍；駁回率不高於 wallet 路徑的 1.5 倍。1.5 倍是政策建議數，須立法協商。
      formal: "V_equiv: ∀ alt p : time(p) ≤ 1.5·time(wallet) ∧ rejection_rate(p) ≤ 1.5·rejection_rate(wallet)"
    - title: 反歧視條款
      body: |
        替代路徑不得有附加費用、處理時程歧視等。違反者公民可循行政訴訟救濟。配套申訴管道為各國資料保護機關（DPA）+ 行政法院。
      formal: "V_anti_disc: ∀ alt p : ¬extra_fee(p) ∧ ¬discriminatory_processing(p)"
    - title: 最小可用 civic proof 雙軌設計
      body: |
        對法律無國籍者（受 1954/1961 公約保護），提供對接 1954 公約 Art 27/28 + UNHCR 2014 Handbook 的最小可用 civic proof，伴隨「不可替代國籍授予 + 居住升級條款」雙防線。對 de facto 無 ID 者，須仰賴各國憲法基本權與行政法 + 城市級 sanctuary card 回填。
      formal: "V_min_proof: provide(min_civic_proof, c_stateless_de_jure) ∧ provide(min_civic_proof, c_de_facto)   ;   ¬substitute_nationality ∧ ∃ upgrade_path"
    - title: 強制 inclusion impact assessment
      body: |
        任何國家發行或認證的 wallet 系統部署前須提交 IIA 報告，仿 EAA Directive 2019/882 conformity assessment 程序。IIA 報告須由獨立第三方 audit。
      formal: "V_IIA: ∀ deployment d : pre_deployment(IIA_report(d)) ∧ third_party_audit(IIA_report(d))"
    - title: 受影響人群參與權與可審計代理鏈
      body: |
        IIA 設計與 audit 過程須有民間 NGO + 受影響人群（含失能 / 失智者代表、無國籍者代表、年長者代表、移工代表）的參與權，仿 CRPD「Nothing About Us Without Us」原則。委任代理場景的代理鏈必須可被法律與工程同時審計。
      formal: "V_audit: ∀ IIA report r : ∃ participation(NGO, affected_groups, r) ∧ ∀ delegation chain : auditable(chain)"

# ─────────────────────────────────────────────────────────────
# Conclusion + Formal Coda
# ─────────────────────────────────────────────────────────────
conclusion:
  paragraphs:
    - <strong>Civic proof inclusion rights 是「人權層 + 憲法基本權層」的雙重定位前置權利</strong>，位階橫貫 Marshall 三層公民權，與法律人格權並列。國家義務的三層保障結構（程序 / 實質 / 制度）必須同時滿足；缺一即構成「行政可見性喪失 / 累積性排除 / 結構性褫奪公民資格」三層嚴重度光譜中的對應狀態。
    - 短期實施應從程序保障 P1（12-24 月）開始，中期推進實質保障 W3C DID 軌道 + 制度保障 IIA L1（24-48 月），長期推進實質保障 UNHCR trust framework + 制度保障 L2/L3（36-72 月）。<em>「最小可用 civic proof」必須拆成法律無國籍者與 de facto 無 ID 者兩種人群分別處理</em>，配「不可替代國籍授予 + 居住升級條款」雙防線。Wallet 三重預設（ownership / identification / key custody）本身須被檢驗為規範偏誤。
    - <strong>對台灣讀者的關鍵警示為現行架構下超過 30 萬失智長者、~5000 位被扣留 ARC 的移工、相當數量的長期未領取行動自然人憑證的年長者，已構成「行政可見性喪失」狀態。</strong>當 TW DIW 強制上線於更多政府服務（健保、長照、退休金、教育），這個狀態會升級至「累積性排除」。要改變這個現況，必須政府主動推動 IIA 強制 + 替代路徑強制 + 委任代理工程化三項措施。這條跨層級不對稱原則是 article 15 對博論 Ch 14 政策議程（federated trust-list alliance + civic proof inclusion rights + Indo-Pacific demo grants）的最直接引信。
  formalCoda: |
    Final form:
      P[civic_proof] ≜ precursor right
      P ⊆ Human_Right ∩ Fundamental_Right ⊆ ⋂ᵢ Mᵢ  (i ∈ civil, political, social)
      Inclusion(s) ⇔ T_proc(s) ∧ T_subst(s) ∧ T_inst(s)
      ¬Inclusion(s) ⇒ severity(s) ∈ {invisibility, accumulated, structural_deprivation}
      Wallet_default = ⟨ownership ∧ identification ∧ key_custody⟩  ;  ¬default ⇒ inclusion_failure
      civic_proof_min(stateless_de_jure) ⊥ civic_proof_min(de_facto_no_ID)
