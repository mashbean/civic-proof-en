slug: 2026-05-09-no-phone-home-engineering-economics
title: "Why Credential Revocation Must Phone Home: The Engineering Economics of No-Phone-Home"
subtitle: "No-Phone-Home Engineering Economics — Argument Map (v2)"

coreThesis:
  text: |
    The default position of phone-home is an engineering preference (not an engineering necessity). Technology is production-grade, but issuers' spontaneous adoption rate under conditions of no regulatory push R=0 and no consumer choice C=0 is only 1.6–5% — all three motivational layers (verification intelligence monetization, legal immunity, switching cost) are negative incentives. A four-component push combination (standards-layer default-off + procurement specification prohibitions + privacy law minimal contact mandate + wallet unilateral switch) can push adoption to 60–90%. The revocation freshness counterargument is resolved by time-limited refresh as a compromise; CRLite provides proof of scaled zero phone-home.
  summary: "No-phone-home is technically mature but politically blocked. Issuer Disincentive Theorem (IDT) explains why; four-pronged regulatory push remedies it; time-limited refresh dissolves the freshness counterargument."
  formal:
    expression: |
      Issuer_Disincentive_Theorem (IDT):
        ∀ issuer I :
          P(I adopts no_phone_home | R=0, C=0)
          = f(–E(I), –L(I), –T(I))
          ≈ 1.6% to 5%   (empirical, 2024)

        where
          E(I) = revenue from verification analytics monetization
          L(I) = legal liability hedge from real-time revocation
          T(I) = one-time switching cost
          R    = regulatory push (0 = absent)
          C    = consumer choice mechanism (0 = absent)

      Four_Pronged_Push:
        P(I adopts | R≠0) ≥ 60%  ⇔  R ⊨ (Layer₁ ∧ Layer₂ ∧ Layer₃ ∧ Layer₄)
        Layer₁: standard_default_off (W3C / ISO / EUDI)
        Layer₂: procurement_mandate (EU / AAMVA / GSA)
        Layer₃: privacy_law_minimal_contact (GDPR 5(1)(c))
        Layer₄: wallet_unilateral_default_switch

      Time_Limited_Refresh:
        ∀ scenario s ∈ {finance, license, medical, employee, national_security_narrow}:
          ∃ refresh_interval(s) :
            privacy_preserved ∧ freshness_satisfied(s)
            where national_security_narrow ⇒ phone_home_legitimate (but scope-creep rejected)

      Engineering_Maturity:
        ∀ path ∈ {W3C_BSL_1.0, ISO_18013-5_mDL, Anoncreds_v1.0}:
          ⋀_{i=1..4} D_i(path) ⊨ production_grade
          subject to: freshness ≤ 24h ∧ scale ≤ 10⁸ credentials
    caption: "The IDT model explains why spontaneous adoption rate is < 5%; Four-Pronged Push achieves ≥ 60%; Time-Limited Refresh dissolves the freshness counterargument; Engineering Maturity constrains the argument's scope to reasonable-use scenarios."
    legend:
      - symbol: I
        meaning: Issuer (credential issuers, including government agencies, banks, schools, and commercial companies)
      - symbol: P(I adopts | R, C)
        meaning: Probability that issuer I adopts no-phone-home (conditional on regulatory push R and consumer choice C)
      - symbol: E(I)
        meaning: Economic motive — monetization value of verification behavior as market intelligence (mid-size €500K–3M/year; large €15M–80M/year)
      - symbol: L(I)
        meaning: Legal immunity motive — legal buffer from real-time revocation verification (financial issuer ≈ E; general issuer ≈ 0)
      - symbol: T(I)
        meaning: Switching cost — one-time engineering cost of switching from phone-home to no-phone-home (€500K–2M)
      - symbol: R
        meaning: Regulatory push (0 = absent)
      - symbol: C
        meaning: Consumer choice mechanism (0 = absent)
      - symbol: Layer₁..₄
        meaning: Four-component push (standards default-off / procurement prohibition / privacy law mandate / wallet switch)
      - symbol: D₁..₄
        meaning: Four dimensions of engineering maturity (normative stability / interoperability / deployment scale / maintainability)
      - symbol: refresh_interval(s)
        meaning: Time-limited status list refresh update interval for scenario s
      - symbol: ⋀
        meaning: Large conjunction (all conditions simultaneously satisfied)
      - symbol: ⊨
        meaning: '"satisfies" (model satisfies formula)'
      - symbol: ⇔
        meaning: "if and only if"

transitions:
  beforeDistinction: "The formula establishes the position, but a distinction between two ways of viewing phone-home must first be drawn. Most engineering communities treat phone-home as 'an engineering necessity for revocation freshness'; this map rejects that classification — it should be viewed as 'the confluent result of issuer economic motives + legal immunity motives + simple implementation preference,' a product of path dependency rather than technical necessity."
  beforePillars: "The distinction itself is merely a declaration. To prove the path that 'phone-home is not an engineering necessity,' five independent sources are required: comparative engineering costs of six revocation mechanism families (I inductive), three-path production-grade maturity (D deductive), IDT formalized model explaining adoption resistance (C causal), EU EUDI and AAMVA regulatory push precedents (Ab abductive), and time-limited refresh dissolving the freshness counterargument (counterexample). Without any one of these five, the argument risks being destroyed in one blow by typical objections such as 'but financial scenarios require real-time' and 'but technology is not mature enough.'"
  beforeChain: "The five pillars above provide positive support. But the claim that 'phone-home will not naturally recede' must be underpinned by a concrete causal chain: the evolution chain from issuer motivation to phone-home as default. The six-step causal chain shows how this mechanism formed and at which nodes it can be interrupted by the four-component push."
  beforeBorders: "Once the position + causal chain are established, the objections become genuinely threatening. 'Financial scenarios require real-time phone-home,' 'technology is not mature enough,' and 'issuers have not actually collected verification data' are frequently cited as reasons; but careful examination of the evidentiary strength of each objection reveals that not only do they not support 'phone-home is necessary,' they actually flip to support no-phone-home — that is, the limiting scope of each objection precisely constitutes the second layer of support for the map."
  beforeConditions: "After the objections are absorbed, what remains is design implications: under what conditions can no-phone-home be legitimately deployed? Four-component push + five-scenario refresh interval + three-dimensional engineering constraints (reasonable use scenarios) translate the abstract 'no-phone-home' into verifiable engineering and policy obligations."
  beforeConclusion: "Drawing together cost comparison, technology maturity, IDT model, regulatory push, and refresh compromise across five layers, the map's final message is the political-economic character of the engineering issue — and a design principle spanning all levels: technology maturity is a necessary condition but not a sufficient condition; governance push determines whether the commitment is honored."

distinction:
  rejected:
    label: ❌ Rejected
    title: Phone-Home Is an Engineering Necessity for Revocation Freshness
    body: "Treating phone-home as the sole technical solution for revocation freshness. This classification assumes the conflation that 'real-time freshness requirement = verifier must directly contact issuer.' But alternative mechanisms such as W3C Bitstring Status List 1.0, ISO 18013-5 mDL, and Anoncreds v1.0 are all production-grade; Mozilla CRLite enabled as default in Firefox 137 with a 12-hour push mode further proves that scaled zero phone-home is entirely feasible engineering. The default position of phone-home is path dependency, not technical necessity."
    formal: "phone_home(W) ∈ Engineering_Necessity  ⇒  ¬∃ alternative(W)  (rejected; alternatives exist and are production-grade)"
  accepted:
    label: ✓ Defended
    title: Phone-Home Is an Engineering Preference (IDT Explanation) + Four-Component Push Can Change the Equilibrium
    body: "The default position of phone-home is the confluent result of issuer economic motives + legal immunity motives + simple implementation preference. The IDT formalized model P(I | R=0, C=0) = f(-E, -L, -T) quantitatively estimates spontaneous adoption rate at 1.6–5%; the four-component push combination (standards default + procurement prohibition + privacy law + wallet switch) can push to 60–90%. The revocation freshness counterargument is resolved by time-limited refresh (finance 5min / driver's license 1h / medical 30min / employee 15min); the phone-home legitimacy in the narrow national security scenario must explicitly reject scope-creep to civilian wallet ecosystems. The argument's scope is constrained to 'reasonable use scenarios (freshness ≤ 24h, scale ≤ 100 million credentials).'"
    formal: "(IDT_explains_low_adoption) ∧ (Four_Pronged_Push_remedies) ∧ (Time_Limited_Refresh_dissolves_freshness_objection) ⇒ no_phone_home(W) viable"

pillars:
  - section: §2 — Comparative Engineering Costs of Revocation Mechanisms
    title: Six Families + Variants, Five-Dimension Trade-Off
    role: "Provides engineering empirical basis — without credible cost comparison, 'phone-home is not necessary' is an empty claim. This pillar unfolds the five-dimension trade-off of six revocation mechanism families (W3C BSL / RSA acc / Merkle acc / batch / Idemix / Bloom) + variants (BBS+, Cuckoo, sparse Merkle), demonstrating that the engineering choice space is far larger than phone-home default implies. Naming revision: the W3C track version is Bitstring Status List 1.0 (2024-12 Recommendation), not the old name 'Status List 2021.'"
    body: "Six revocation mechanism families each have trade-offs: W3C Bitstring Status List 1.0 — strong privacy, freshness at cache TTL (5min–1h); RSA accumulator — strongest privacy (ZK proof) but complex witness update; Merkle accumulator — middle ground; batch revocation epoch latency 1–24h, high privacy; Idemix CL — strongest privacy (complete unlinkability) but pairing-based complexity; Bloom filter — has false positive problem. Anoncreds v1.0 uses RSA accumulator; v2 working draft has shifted to BBS+ + status list / Merkle. Privacy strength spectrum: RSA acc / Idemix (strongest) > Bitstring SL / Bloom (medium-strong) > phone-home (weak)."
    finding: "Engineering choice space is diverse; phone-home is the weakest of the six families on the privacy dimension; naming and versioning must be precise (Bitstring SL 1.0 replaces Status List 2021)."
    formal: "∀ mech ∈ {W3C_BSL_1.0, RSA_acc, Merkle_acc, batch, Idemix, Bloom}: privacy(mech) > privacy(phone_home)  ∧  cost(mech) ∈ feasible_range"

  - section: §3 — Three-Path Production-Grade Maturity
    title: D1-D4 Four-Dimension Assessment
    role: "Provides technology maturity basis — if alternatives are not mature enough, 'phone-home is path dependency' would be accused of being a theoretical claim. Breaking down 'production-grade maturity' into four dimensions — D1 normative stability / D2 interoperability / D3 deployment scale / D4 maintainability — and assessing per path, avoids overgeneralization. The argument's scope is also constrained to 'reasonable use scenarios (freshness ≤ 24h, scale ≤ 100 million credentials).'"
    body: "Three-path D1-D4 assessment: (A) W3C Bitstring Status List 1.0 — D1-D4 all ⭐⭐⭐⭐⭐ (2024-12 Recommendation; EU EUDI, Canada BC, New Zealand RealMe, Singapore, Japan already deployed); (B) ISO 18013-5 mDL — D1-D4 all ⭐⭐⭐⭐⭐ (published 2021; deployed in 13 US states + EU 27 + Canada + New Zealand + Singapore + Japan + Australia; dual-track revocation 'offline optional + online optional'); (C) Hyperledger Anoncreds v1.0 — D1 ⭐⭐⭐⭐ (Hyperledger Project Spec level, not W3C), D4 ⭐⭐⭐ (pairing-based complexity). Argument scope: reasonable use scenarios (freshness ≤ 24h, scale ≤ 100 million credentials); does not claim global dominance over phone-home."
    finding: "All three paths are production-grade within reasonable use scenarios; mDL dual-track revocation design requires attention; ultra-large-scale + real-time update scenarios (national security / wartime mobilization) retain phone-home legitimacy."
    formal: "∀ path ∈ {BSL, mDL, Anoncreds}: ⋀_{i=1..4} D_i(path) ⊨ production_grade  s.t.  freshness ≤ 24h ∧ scale ≤ 10⁸"

  - section: §4 — IDT Formalized Model
    title: "P(I | R=0, C=0) = f(-E, -L, -T) ≈ 1.6% to 5%"
    role: "Provides causal basis — without explaining why issuers do not adopt, the argument would be accused of 'ignoring real-world adoption resistance.' The Issuer Disincentive Theorem (IDT) formalizes three motivational layers (verification intelligence monetization E + legal immunity L + switching cost T), quantitatively estimates spontaneous adoption rate, and identifies the KYC/AML template transplantation fallacy."
    body: "IDT model: P(I adopts no_phone_home | R=0, C=0) = f(-E(I), -L(I), -T(I)). Three motivational layers quantified: E(I) verification intelligence monetization (mid-size €500K–3M/year; large €15M–80M/year); L(I) legal immunity (financial issuer ≈ E; general ≈ 0); T(I) switching cost (€500K–2M one-time, 0.1–0.3× E). Spontaneous adoption rate 1.6–5% (W3C VC Status List 2024 + OID4VC Implementer Survey 2024 cross-validated). Three counterfactuals: GDPR 5(1)(c) strong interpretation → 60–90%; mandatory disclosure of verification logs → 30–50%; OIDC IdP default-off introspection → 20–30%. KYC/AML template transplantation fallacy: extending the legal framework of financial scenarios to everyday verification is a category error."
    finding: "Issuer non-adoption is a motivation problem, not a technology problem; economic motive > legal immunity > switching cost; KYC/AML scenarios must be separated from everyday issuers."
    formal: "P(I adopts | R=0, C=0) = f(-E, -L, -T) ≈ 0.016 to 0.05  ∧  ¬KYC_template_extension(daily_verification)"

  - section: §5 — Four-Component Regulatory Push
    title: "EU Normative Stratification + AAMVA mDL v1.4→v1.5 Six-Month Case"
    role: "Provides abductive basis — without proving that regulatory push can change issuer behavior, the IDT model is merely descriptive. The EU EUDI ARF four-level normative stratification and the AAMVA six-month procurement-level case of upgrading from warning to prohibiting server retrieval demonstrate that the four-component push combination is operationally viable in practice."
    body: "EU EUDI normative stratification four levels: Reg 2024/1183 Art 5a (Level 1) → Implementing Reg 2024/2979 (Level 2) → ARF Annex 2 Topic 7 (normative) → Discussion Topic A/G (guidance). AAMVA mDL Implementation Guidelines v1.4 (2024-12 warned server retrieval) → v1.5 (2025-05 prohibited server retrieval) six-month case. No Phone Home petition by 100+ experts (CDT / ACLU / EFF / EPIC / Bruce Schneier / Brendan Eich / Jan Camenisch) 2025-06 civil society push. Four-component push: Layer₁ standards default-off (W3C / ISO / EUDI) + Layer₂ procurement specification prohibition (EU / AAMVA / GSA) + Layer₃ privacy law minimal contact mandate (GDPR 5(1)(c) + CNIL Bitouzet 2022) + Layer₄ wallet unilateral default switch. Complementary logic: EU uses 1+2+3; AAMVA uses 1+2; Asia relies only on 3, push is weak."
    finding: "Four-component push combination can achieve 60–90% adoption rate; EU and AAMVA are two successful precedents; Asia lacks mechanisms and needs to build parallel push."
    formal: "P(I adopts | R≠0) ≥ 60%  ⇔  R ⊨ (Layer₁ ∧ Layer₂ ∧ Layer₃ ∧ Layer₄)"

  - section: §6 — Time-Limited Refresh + CRLite Proof
    title: Dissolving the Freshness Counterargument
    role: "Provides the counterexample pillar — without dissolving the 'financial scenarios require real-time' counterargument, the argument would be stalled on narrow scenarios. The time-limited refresh mechanism + Mozilla CRLite's existence proof as scaled deployment in Firefox 137 completely refutes the conflation 'real-time freshness requirement = phone-home necessary.' National security narrow exceptions explicitly reject scope-creep."
    body: "Five-scenario latency comparison: financial sanctions (real-time / SWIFT 5–15min / refresh 5min); license revocation (minute-level / mDL 24h+push / refresh 1h+push); medical practice license (same-day / day-level / refresh 30min); employee ID dismissal (minute-level / MFA 5–15min / refresh 15min); national security (real-time / phone-home narrow exception). Time-limited refresh mechanism: driver-side automatic refresh / verifier-side cache expiry / issuer-side routine maintenance / privacy maintained. Mozilla CRLite Firefox 137 (2025-04 enabled by default) is proof of scaled zero phone-home: full WebPKI + 12h push + Bloom filter cascade ~1MB, replacing traditional OCSP phone-home. National security / counter-terrorism narrow exception retains phone-home legitimacy, but must explicitly reject scope-creep to civilian wallet ecosystems."
    finding: "Time-limited refresh dissolves the freshness counterargument; CRLite provides scaled proof; national security narrow exception must not scope-creep."
    formal: "∀ s ∈ {finance, license, medical, employee}: ∃ refresh_interval(s) ⊨ (privacy_preserved ∧ freshness_satisfied)  ∧  national_security_narrow ⇒ no_scope_creep"

chain:
  title: "Six-Step Causal Chain of Phone-Home Default Formation: From Issuer Motivation to Engineering Default"
  legend:
    - kind: deterministic
      label: Mechanically necessary (structural, not dependent on external trigger)
    - kind: probabilistic
      label: Probabilistic (dependent on policy choices + regulatory enforcement)
  steps:
    - tag: T0
      kind: deterministic
      text: "OAuth / OIDC / SAML and other phone-home toolchains mature (accumulated 1990s–2010s), becoming the default design"
    - tag: T1
      kind: deterministic
      text: "Issuer-side establishes verification log infrastructure (for debug, risk control, marketing analytics); E(I) motivation becomes visible"
    - tag: T2
      kind: deterministic
      text: "Financial scenarios establish KYC/AML phone-home legal precedents due to FATF / OFAC / AMLD 6 requirements for real-time revocation queries"
    - tag: T3
      kind: probabilistic
      text: "KYC/AML template incorrectly extended to everyday verification (login, age, academic credentials); phone-home becomes rhetorical packaging for 'genuinely necessary'"
    - tag: T4
      kind: deterministic
      text: "T(I) switching cost accumulates: alternative mechanisms require new client-side cryptography; OAuth toolchain locks issuers into phone-home"
    - tag: T5
      kind: probabilistic
      text: "Under R=0 + C=0 conditions, IDT predicts spontaneous adoption rate 1.6–5%; four-component push combination can push to 60–90%"

borders:
  - label: Objection 1
    title: Financial Scenarios Require Real-Time Phone-Home
    pivot: "The objection claims that 'financial sanctions list real-time updates require verifiers to directly contact issuers.' But examining actual latency: SWIFT internal 5–15 minutes is the current standard; FATF Recommendation 6 does not require millisecond-level real-time. Time-limited status list refresh at 5-minute intervals can satisfy the same freshness requirement with significantly higher privacy. Mozilla CRLite (Firefox 137 default 12-hour push full WebPKI revocation) proves that scaled zero phone-home is entirely feasible engineering."
    flip: "The financial scenario latency counterargument not only fails to support 'phone-home necessary,' it actually provides the strongest argument for 'time-limited refresh is already feasible in financial scenarios' — SWIFT 5–15 minute standard perfectly corresponds to 5-minute refresh. CRLite's success in the WebPKI scenario proves that extending the same mechanism to financial credentials is an incremental engineering problem, not a paradigm shift."
  - label: Objection 2
    title: Alternative Technologies Are Not Mature Enough
    pivot: "The objection claims that 'W3C Bitstring Status List is too new, Anoncreds is too complex, mDL revocation dual-track is confusing.' But D1-D4 four-dimension assessment shows all three paths are production-grade: BSL 2024-12 W3C Recommendation; mDL published 2021 as ISO standard + 13 US states + EU 27 + Canada, New Zealand, Singapore, Japan, Australia deployed; Anoncreds running on Hyperledger/Sovrin mainnet for years. The argument's scope is constrained to reasonable use scenarios (freshness ≤ 24h, scale ≤ 100 million credentials); all three paths are already production-grade."
    flip: "'Alternative technologies not mature enough' not only fails to support 'phone-home necessary,' it exposes information delays in objectors regarding recent standards developments — possibly valid before 2021, but facts changed after 2024–2025. The evidence of all three paths being production-grade, layered with the IDT model, inversely supports the core claim that 'adoption resistance is a motivation problem, not a technology problem.'"
  - label: Objection 3
    title: Issuers Have Not Actually Collected Verification Data / E(I) Estimate Is Too High
    pivot: "The objection claims that 'issuers will not collect verification data under GDPR regulation; E(I) €500K–80M/year estimates lack direct evidence.' But GDPR DSR (Data Subject Request) public disclosures show some issuers do store verification logs; Apple Wallet and Apple Pay understanding user patterns through verification behavior is a case documented in academic literature (Acquisti et al. 2015 Science; Zuboff 2019). The E(I) range is an estimate, but even if the lower bound (€500K/year) is halved, it remains significantly higher than T(I) switching cost, leaving the IDT model's core conclusion unchanged."
    flip: "'E(I) estimate too high' not only fails to support 'phone-home has no economic motive,' it actually provides a more robust argument for 'even if E(I) is discounted, IDT model still predicts spontaneous adoption rate < 5%.' The objector implicitly acknowledges that verification behavior has value > 0; only the estimate is disputed. This dispute can be further refined after RA-level quantitative verification, but does not change the qualitative conclusion."

conditions:
  title: Legitimate deployment of no-phone-home must pass four-component push + five-scenario refresh + three-dimensional engineering constraints
  formalPrelude: "deploy(no_phone_home, W) valid ⇔ (Layer₁ ∧ Layer₂ ∧ Layer₃ ∧ Layer₄) ∧ (∀ s ∈ S: ∃ refresh_interval(s)) ∧ (D₁ ∧ D₂ ∧ D₃ ∧ D₄)"
  items:
    - title: Layer 1 — Standards-Layer Default-Off
      body: "Standards organizations such as W3C / ISO / EUDI / OpenID Foundation move phone-home from default to exception. Already partially realized (W3C Bitstring Status List 1.0 2024-12 Recommendation + ISO 18013-5 dual-track revocation + EUDI ARF Annex 2 Topic 7)."
      formal: "Layer₁: standard_default(W) = no_phone_home  ∧  phone_home ∈ exception_list(justified)"
    - title: Layer 2 — Procurement Specification Prohibition
      body: "Government digital identity project procurement specifications written to prohibit 'use of phone-home mechanisms.' EU government projects + AAMVA mDL v1.5 (2025-05 prohibition of server retrieval) + US GSA digital identity procurement standards (draft) + Canada BC Government Verifiable Organizations Network already partially realized."
      formal: "Layer₂: procurement_spec(W) ⊨ ¬phone_home  in {EU_gov, AAMVA, GSA}"
    - title: Layer 3 — Privacy Law Minimal Contact Mandate
      body: "GDPR Article 5(1)(c) data minimization principle extension + CNIL Bitouzet 2022 specific guidance on phone-home + UK ICO Code of Practice for Online Identity."
      formal: "Layer₃: privacy_law ⊨ minimal_contact_principle  ∧  phone_home(W) ∉ minimal_contact"
    - title: Layer 4 — Wallet Unilateral Default Switch
      body: "Apple iOS / Google Android privacy interface strengthening + third-party wallet (Spruce / Trinsic) differentiation strategy + consumer protection agencies (FTC / CMA) enforcement."
      formal: "Layer₄: wallet_default(W) = no_phone_home  ∧  user_notified"
    - title: Refresh Interval × 5 Scenarios
      body: "Financial sanctions 5 minutes / license revocation 1 hour + push / medical practice 30 minutes / employee ID 15 minutes / national security narrow exception retains phone-home. Time-limited refresh mechanism: driver-side automatic refresh / verifier-side cache expiry / issuer-side routine maintenance / privacy maintained."
      formal: "∀ s ∈ {finance, license, medical, employee}: refresh_interval(s) ⊨ (privacy_preserved ∧ freshness_satisfied(s))"
    - title: D1 Normative Stability
      body: "Standard must be upgraded to normative recommendation with version compatibility guarantees. W3C Bitstring Status List 1.0 meets standard; ISO 18013-5 meets standard; Anoncreds v1.0 is Hyperledger Project Spec level."
      formal: "D₁: standard ∈ normative_recommendation_with_versioning"
    - title: D2 Interoperability
      body: "Cross-issuer / verifier / wallet vendor interoperability implementations + interop test reports. All three paths meet standard."
      formal: "D₂: ∃ interop_test_report(path, ≥ 3 vendors)"
    - title: D3 Deployment Scale + D4 Maintainability
      body: "D3: actual deployment countries / credential volumes. D4: engineering implementation complexity / toolchain maturity. All three paths meet standard within reasonable use scenarios (freshness ≤ 24h, scale ≤ 100 million credentials)."
      formal: "D₃ ∧ D₄: deployment_scale ⊨ production_threshold  ∧  maintainability ⊨ tooling_maturity"

conclusion:
  paragraphs:
    - '<strong>The default position of phone-home is an engineering preference (not an engineering necessity).</strong> Technology is production-grade (W3C Bitstring Status List 1.0 + ISO 18013-5 mDL + Anoncreds v1.0 three paths, D1-D4 four dimensions all meeting standard), but issuers'' spontaneous adoption rate under R=0 + C=0 conditions is only 1.6–5%. The Issuer Disincentive Theorem (IDT) provides a formal explanation: three motivational layers (verification intelligence monetization E + legal immunity L + switching cost T) are all negative incentives. This structure is path dependency, not technical necessity.'
    - "The debate should shift from 'real-time freshness vs. latency tolerance' to <em>'vendor collection motives vs. interoperability obligations.'</em> The four-component regulatory push combination (standards default-off + procurement specification + privacy law minimal contact mandate + wallet unilateral switch) can push adoption rate to 60–90%. EU EUDI ARF four-level normative stratification and AAMVA mDL v1.4→v1.5 six-month upgrade to prohibiting server retrieval demonstrate that the push combination is operationally viable. No Phone Home petition by 100+ experts represents civil society push. Asia (Taiwan, Japan, Korea, Singapore) currently lacks mechanisms and needs to build parallel push."
    - "A cross-level principle runs throughout: <strong>technology maturity is a necessary condition but not a sufficient condition; governance push determines whether the commitment is honored.</strong> This article extends article 01's 'accountable pseudonymity' judgment mode, applying the same structure from cryptographic engineering to revocation mechanism engineering; it forms cross-article coupled arguments with article 02 𝒩.M₄, article 04 T_Trigger, article 07 SRP, article 09 NCT, and article 11 wallet essential facility. No-phone-home is a political-economic achievement; CRLite Firefox 137 enabled by default is proof of scaled zero phone-home; national security narrow exception must not scope-creep."
