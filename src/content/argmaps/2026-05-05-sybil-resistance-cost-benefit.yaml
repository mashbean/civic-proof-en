slug: 2026-05-05-sybil-resistance-cost-benefit
title: The Price of One Account Per Person
subtitle: 從 Worldcoin 到 zkPassport 的唯一性證明矩陣

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: Sybil resistance is a scenario-dependent spectrum with no single universal target. U (uniqueness) ↔ D (disclosure) ↔ I (inclusion) form the impossibility triangle IT', and no scheme can simultaneously maximise all three. Analogous to the CAP theorem&#58; IT' is a formal prompt for design choice, shifting practitioners from "finding a universal personhood proof" to "stratifying by scenario."
  summary: IT' = U ↔ D ↔ I; the three cannot be simultaneously maximised; analogy with CAP is medium-strong, carrying no theorem authority.
  formal:
    expression: |
      IT' ≡  ¬∃ S [ U(S) = max  ∧  D(S) = min  ∧  I(S) = max ]

      under premises P = {
        real-world root distribution is uneven,
        information-theoretic lower bound is non-zero,
        engineering resources are finite,
        fallback pathways must exist
      }

      analogy(IT', CAP) = medium-strong (structural ∧ pedagogical, NOT formal)
    caption: No Sybil resistance scheme S exists that simultaneously maximises U / D / I across all three axes. IT' is an empirical + normative synthetic proposition, analogous but not equivalent to the CAP theorem.
    legend:
      - symbol: U(S)
        meaning: Uniqueness — one-account-per-person strength (marginal cost for an attacker to create N fake accounts)
      - symbol: D(S)
        meaning: Disclosure — amount of personal information disclosed to issuer / verifier / observer (min is preferred)
      - symbol: I(S)
        meaning: Inclusion — proportion of population the scheme can cover (especially unbanked / undocumented / disability / language minorities)
      - symbol: IT'
        meaning: Impossibility Triangle (revised) — revised impossibility triangle
      - symbol: ¬∃
        meaning: Does not exist
      - symbol: P
        meaning: Normative premise set (4 conditions)
      - symbol: CAP
        meaning: Brewer 2000 / Gilbert-Lynch 2002 distributed systems triangle
      - symbol: ≅_analogy
        meaning: Analogical isomorphism (not formal theorem isomorphism)

transitions:
  beforeDistinction: The formula provides the tension structure. But to persuade the reader that "Worldcoin is not the template," the first step is to distinguish two conflated design orientations — universal personhood proof (one solution for everything) versus scenario stratification (selecting tools by need).
  beforePillars: The distinction itself is merely a declaration. To demonstrate that IT' holds, five independent supports are needed&#58; induction from a five-scheme matrix, formal deduction of IT', methodological positioning of the CAP analogy, causal analysis of Worldcoin's over-generalisation, and boundary conditions with inclusivity considerations.
  beforeChain: Once the five pillars are established, the most concrete causal chain is the six-step sequence of Worldcoin's over-generalisation. From the universal design goal, to the physical-layer irreversibility of iris hashes, to the identity creep of covering multiple scenarios with the same iris hash — projecting the political cost of centralising irreversible biometrics onto scenarios that do not need them.
  beforeBorders: Counter-arguments centre on three claims&#58; "Worldcoin is a scam," "zkPassport is the perfect solution," and "Sybil resistance = KYC." Examining each counter-argument reveals that they all demonstrate different forms of "over-generalisation," lending inverse support to the "prohibition on extrapolation" position.
  beforeConditions: Once the counter-arguments are absorbed, what remains are the design implications of scenario stratification — L0 passkey / L1 social root / L2 multi-source stamps / L3 strong passport root tiered governance + five boundary conditions.
  beforeConclusion: IT' + CAP analogy + five boundary conditions + scenario stratification converge on&#58; stop looking for a universal personhood proof; make the three-axis trade-off explicit, and select tools by scenario.

distinction:
  rejected:
    label: ❌ Rejected
    title: Universal personhood proof (Worldcoin orb model)
    body: '"Find a globally unique scheme and use it for all Sybil resistance scenarios." This orientation imposes the political costs of centralising irreversible biometrics onto scenarios that do not need them (forum login / political petitions / subsidy distribution / cross-border UBI, etc.). The problem is not that Worldcoin chose the strong-U corner — the problem is that it claims no choice is necessary.'
    formal: "∃ S* : ∀ scenario : use(S*, scenario)   ❌ violates IT'"
  accepted:
    label: ✓ Defended
    title: Scenario stratification + IT' three-axis trade-off
    body: Sybil resistance is a scenario-dependent spectrum. L0 login uses passkey / L1 forum uses social root / L2 petition uses multi-stamp / L3 voting uses strong passport root. Each scenario has a different optimal corner on the U / D / I three axes — universal design is an engineering utopia.
    formal: "∀ scenario : ∃ S(scenario) : optimize(S, U, D, I | scenario)"

pillars:
  - section: §2 — Five-Scheme Comparison Matrix
    title: Worldcoin / BrightID / Gitcoin Passport / zkPassport / PoH
    role: Provides the empirical anchor — if IT' is an abstract tension, the first step is to see how concrete schemes distribute across the three axes. The different corner positions of the five schemes demonstrate IT' directly.
    body: "Worldcoin (U&#58;5, D&#58;1, I&#58;2) — iris irreversible. BrightID (U&#58;2, D&#58;4, I&#58;3) — social graph exposed. Gitcoin Passport (U&#58;3, D&#58;3, I&#58;3) — multi-signal compromise. zkPassport (U&#58;4, D&#58;4, I&#58;2) — passport root excludes undocumented population. PoH (U&#58;3, D&#58;1, I&#58;3) — public face permanently on record. No scheme reaches (5,5,5)."
    finding: The three-axis totals of the five schemes fall in the 7–11 range; the Pareto frontier on the three-dimensional simplex forms a concave surface, and the apex (5,5,5) is unreachable.
    formal: "∀ S ∈ {Worldcoin, BrightID, Gitcoin, zkPassport, PoH} : U(S) + D(S) + I(S) ≤ 11"

  - section: §3 — Formal Deduction of IT'
    title: Structure of Unreachable Conjunctive Maximisation
    role: Provides the formal skeleton — without formalisation, IT' would be treated as common design-trade-off wisdom; only formalisation makes "cannot simultaneously maximise all" into a testable proposition.
    body: "Under the normative premise set P = { real-world root distribution is uneven, information-theoretic lower bound is non-zero, engineering resources are finite, fallback pathways must exist }, ¬∃ S [ U(S)=max ∧ D(S)=min ∧ I(S)=max ]. The three variables carry 9 sub-dimensions (U&#58; per-identity cost / detection latency / collusion resistance; D&#58; enrollment / verification / observer-side / future leakage; I&#58; document / biometric / technology / language gap)."
    finding: IT' shares a conjunctive structure with article 03's H1', article 04's T, article 06's CB-Justice, and article 07's SRP — but operates at different levels&#58; IT' is an engineering tension of "cannot simultaneously maximise," while the other four are "conjunctive necessity — failure of any one entails overall failure."
    formal: "IT' ≡ ¬∃ S [ U(S)=max ∧ D(S)=min ∧ I(S)=max ]   under P"

  - section: §5 — CAP Analogy + PACELC Extension
    title: Medium-Strong Analogy (A strong / B weak red line / C medium-strong / D strong)
    role: Provides methodological positioning — CAP's role in distributed systems is "formalisation of design choice"; IT' serves a corresponding function in Sybil resistance. But IT' is an empirical + normative induction and does not enjoy CAP's theorem authority.
    body: "Four-tier strength assessment&#58; A adversarial goal isomorphism (strong); B formalisation structure (weak, red line — CAP is a theorem, IT' is empirical + normative); C failure mode isomorphism (medium-strong — refusing to acknowledge trade-offs → design or political collapse); D design-choice educational implication isomorphism (strong). Overall medium-strong — sufficient as a normative guide but insufficient for formal inference."
    finding: PACELC extension — IS-AUEL-D (dual trade-off when surveillance attack occurs vs. when it does not) — as a weak-tier methodological prompt.
    formal: "analogy(IT', CAP) = ⟨A:strong, B:weak, C:medium-strong, D:strong⟩ ⊨ medium-strong"

  - section: §6 — Worldcoin Over-Generalisation Six-Step Causal Chain
    title: Irreversible Biometrics + Cross-Scenario Extrapolation
    role: Provides a concrete case — if IT' is an abstract warning, a mechanistically traceable causal chain is needed to underpin the claim that "over-generalisation leads to failure."
    body: "M1 universal design goal → M2 iris hash physical-layer irreversibility → M3 same iris hash covering multiple scenarios (identity creep) → M4 cross-platform linkability (ZK isolation vs. side channels) → M5 concentration in a single company (Tools for Humanity / Worldcoin Foundation) → M6 collection prioritisation (economic incentives driving developing-country-first rollout). Three counterfactuals show that cutting any one of M3 / M4 / M5 / M6 significantly reduces the political cost."
    finding: Irreversibility precisely distinguishes three layers — software / institution / physical; iris falls at the physical-layer irreversibility level. Worldcoin's regulatory pushback in Spain AEPD 2024-03 / Kenya ODPC 2023-08 / Argentina AAIP 2024-05 / Brazil ANPD 2025-01 is the downstream consequence.
    formal: "M1 ∧ M2 ⇒ M3 ⇒ M4 (with side channels) ⇒ M5 ⇒ M6   |   argument strength: medium-strong"

  - section: §7 — Scenario Stratification + Five Boundary Conditions
    title: L0 / L1 / L2 / L3 + B1–B5
    role: Provides the engineering design response — if IT' is only critique without design implications, scenario stratification is the concrete template for "selecting the optimal corner by need."
    body: "L0 login (passkey) / L1 forum verification badge (social root) / L2 political petition (multi-stamp) / L3 one-person-one-vote (strong passport root). Accompanied by five boundary conditions&#58; B1 how weak-identity-document states substitute for L3 / B2 Aadhaar lessons / B3 shared-device counter-test / B4 multi-rooted conditions satisfied / B5 cross-jurisdictional recognition spectrum."
    finding: Multi-rooted does not "simultaneously resolve all three angles" — it conditionally improves the disclosure side, conditionally improves the uniqueness side, and shows no significant improvement on the inclusion side. Its true function is to mitigate the political cost of a single root.
    formal: "∀ scenario : ∃ L_i ∈ {L0, L1, L2, L3} : appropriate(L_i, scenario)   ∧   ∀ deployment : valid ⇔ ⋀ⱼ Bⱼ"

chain:
  title: Worldcoin Over-Generalisation Six-Step Causal Chain
  steps:
    - tag: M1
      kind: deterministic
      text: Universal proof of personhood design goal explicitly stated (covering all Sybil scenarios)
    - tag: M2
      kind: deterministic
      text: Iris hash physical-layer irreversibility (same natural person's eyes → same hash value)
    - tag: M3
      kind: deterministic
      text: M1 + M2 → same iris hash covering multiple scenarios (identity creep + WLD token economic binding)
    - tag: M4
      kind: probabilistic
      text: Cross-platform linkability (ZK isolation vs. three-layer side channels&#58; device / service / token)
    - tag: M5
      kind: deterministic
      text: Concentration in a single company (TFH + Worldcoin Foundation) → information asymmetry + extremely high exit costs
    - tag: M6
      kind: probabilistic
      text: Collection prioritisation (economic incentives driving developing-country-first rollout; medium-strong correlation, not unidirectional causation)
    - tag: ⊥
      kind: deterministic
      text: The political cost of centralising irreversible biometrics is extrapolated to scenarios that do not need them and to populations that cannot opt out
  legend:
    - kind: deterministic
      label: Mechanistic necessity (M1 / M2 / M3 / M5)
    - kind: probabilistic
      label: Probabilistic (M4 / M6 — contingent on user practices + economic incentives)

borders:
  - label: Counter-argument 1
    title: Worldcoin is a scam
    pivot: The counter-argument claims that "Worldcoin is dishonest / should be entirely prohibited." But TFH's five engineering efforts (Semaphore ZK circuit / iris template on-device deletion / open-source orb specifications / self-custody / Privacy Documentation) have genuine value. The problem lies not in Worldcoin as a whole but in the combination of the universal design goal + iris physical irreversibility + collection prioritisation and their extrapolation.
    flip: The counter-argument confuses "prohibiting extrapolation" with "prohibiting Worldcoin"; once clarified, the claim is to prohibit the universal approach, not individual engineering efforts.
  - label: Counter-argument 2
    title: zkPassport is the perfect solution
    pivot: The counter-argument claims that "zkPassport wraps government documents in ZK and is better than Worldcoin." But zkPassport has three-layer vulnerabilities&#58; state-level Sybil (hostile regimes can issue large numbers of genuine-but-fraudulent passports) / CSCA maintenance fragmentation / global 850 million undocumented persons completely excluded. Treating zkPassport as the perfect replacement for Worldcoin trades the irreversibility problem for an inclusivity problem without resolving IT'.
    flip: The counter-argument reveals that any single-root scheme will collapse on one side of the IT' triangle; it positively supports the scenario-stratification + multi-rooted approach.
  - label: Counter-argument 3
    title: Sybil resistance = KYC
    pivot: The counter-argument claims that "Sybil resistance is equivalent to KYC, therefore real-name disclosure and surveillance are necessary." But KYC is a legal compliance process for financial institutions (identifying real-name identity + ongoing monitoring), while Sybil resistance is "ensuring one-account or one-vote per person within a system," which has no necessary connection to real-name identification. Most configurations of BrightID / PoH / Gitcoin Passport are not KYC.
    flip: The counter-argument forcibly conflates two different categories; once clarified, "Sybil resistance ≠ KYC" inversely supports the possibility of pseudonymous civic proof.

conditions:
  title: Scenario Stratification 4 Tiers + 5 Boundary Conditions
  formalPrelude: "∀ scenario : ∃ L_i : appropriate(L_i, scenario)   ∧   valid(deployment) ⇔ ⋀ⱼ Bⱼ"
  items:
    - title: L0 — Login (passkey)
      body: Local authentication suffices; no personhood proof required. Scenarios&#58; forum login, app account creation, device binding. Corresponds to weak U, strong D, medium I.
      formal: "L0: scenario = login ⇒ optimal(passkey)"
    - title: L1 — Forum Verification Badge (social root)
      body: Social graph roots such as BrightID. Scenarios&#58; reputation systems, sub-components of Gitcoin Passport stamps. Corresponds to medium U, medium D, medium I.
      formal: "L1: scenario = social_attestation ⇒ optimal(social_root)"
    - title: L2 — Political Petition (multi-source stamps)
      body: Gitcoin Passport / Holonym multi-stamp. Scenarios&#58; grants funding, quadratic voting, subsidy distribution. Corresponds to medium-strong U, medium D, medium I.
      formal: "L2: scenario = community_voting ⇒ optimal(multi_stamp)"
    - title: L3 — One Person One Vote (strong passport root)
      body: zkPassport / mDL. Scenarios&#58; cross-border voting, bank KYC, political elections. Corresponds to strong U, medium D, weak I (excludes undocumented population).
      formal: "L3: scenario = legal_voting ⇒ optimal(passport_root)   |   B1-B5 boundaries must be addressed"
    - title: B1–B5 Boundary Conditions
      body: B1 how weak-identity-document states substitute for L3 / B2 Aadhaar lessons / B3 shared-device counter-test / B4 multi-rooted conditions satisfied / B5 cross-jurisdictional recognition spectrum. Any deployment valid ⇔ ⋀ⱼ Bⱼ.
      formal: "∀ deployment : valid ⇔ B₁ ∧ B₂ ∧ B₃ ∧ B₄ ∧ B₅"

conclusion:
  paragraphs:
    - From Worldcoin to zkPassport, every personhood proof scheme makes trade-offs on the U / D / I axes of the impossibility triangle IT'. This triangle shares a conjunctive structure with article 03's H1' three walls, article 04's T three-part conjunction, and article 06's CB-Justice D₁*∧D₂* — but operates at different levels&#58; the former three are conjunctive necessary conditions where "failure of any one entails overall failure," while <strong>IT' is conjunctive maximisation unreachability where "all cannot be simultaneously maximised."</strong>
    - CAP taught engineers to make trade-offs explicit; IT' teaches civic technologists to stratify by scenario. <strong>The problem with the Worldcoin orb model is not that it chose the strong-U corner — the problem is that it claims no choice is necessary; it concealed that choice.</strong>
    - Scenario stratification remains subject to five boundary conditions (mobilisability in weak-identity-document states / Aadhaar strong-root cost / shared household devices / multi-rooted three-axis asymmetry / cross-jurisdictional recognition spectrum); the absence of any one leads to failure modes seen in Aadhaar exclusion, Worldcoin regulatory defeat, Gitcoin GG18 Sybil attacks, and Indonesia's e-KTP fraud scandal.
  formalCoda: |
    Final form:
      IT' ≡ ¬∃ S [ U(S)=max ∧ D(S)=min ∧ I(S)=max ]   under P
      ∀ scenario : ∃ L_i ∈ {L0, L1, L2, L3} : appropriate(L_i, scenario)
      analogy(IT', CAP) = medium-strong  (NOT formal theorem transfer)
      ∀ deployment : valid ⇔ B₁ ∧ B₂ ∧ B₃ ∧ B₄ ∧ B₅
