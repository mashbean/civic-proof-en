    - "<strong>Conditional validity of four UX engineering primitive implementation.</strong> The conditional validity of F2's four cryptographic engineering primitives at the cryptographic selection / long-term preservation / court admissibility / cross-border mutual recognition four layers has as its premise <code>Informed(holder, r)</code> — without UX engineering correction, this premise cannot be fulfilled under four cognitive-normative bottlenecks. The specific bottlenecks are — Miller / Cowan cognitive ceiling plus cognitive load theory in multi-attribute selective disclosure scenarios makes informed consent P(informed_consent) < θ_inform when attribute_count > 3; verifier policy dark patterns identically replay the GDPR cookie banner eight-year failure in wallet scenarios (Nouwens 2020 UK Top 10k compliance rate 11.8%, Sanchez-Rola 2019 reject still tracking 49%, Matte 2020 54% violating at least one GDPR provision); capacity fluctuation invalidates \"previously informed consent\" and with mechanism-based likelihood medium-high (conservatively ≥ 50%) degrades to substituted; supporter intervention boundary ambiguity causes \"assisting understanding\" to slide into \"deciding on behalf.\" V_receipt is upgraded in F3 to V_receipt' ≜ V_receipt ∧ V_ux, the latter conjunctively borne by four UX engineering primitives. Any one missing raises F2 SA2 CRPD §29 reverse-use risk to high. <em>\"≤ 3 attribute group\" and θ_inform = 0.5 are analytical recommendation values</em>, pending calibration from EUDI POTENTIAL / EWC / DC4EU / NOBID LSP final reports on ecologically valid pilot studies in wallet scenarios."
    - "<strong>CF5's engineering implementation-level extension of F1 boundaries (not bypass).</strong> F3's four UX engineering primitives operate entirely within the Z₂ (conditionally delegable zone) scope; no claim is made that any UX engineering can reach F1's RT-ℬ ✗ and AA-ℬ ✗ two cells. T2' has already formalised \"no UX primitive subset exists that makes degradation probability P_degrade fall below threshold θ_2\" — UX1 progressive_disclosure_ui can reduce cognitive load but cannot generate first-personal mens rea; UX2 dark_patterns_firewall can protect holders from being misled but cannot generate contestation's active-stance. CF5 LLM-agent substitute handles engineering implementation fragility inside the Z₂ boundary — agent slides between \"assisting understanding\" and \"deciding on behalf\" with every wallet operation; the boundary exists at the user subjective layer, not the cryptographic layer. F1 §7.3.1 AgentDelegationProof plus presentationOrigin tag plus separation of comprehension_attestation and chooser_signature plus agent vs. supporter cryptographic split four-part design jointly maintain the cryptographic boundary. F1 RT-ℬ ✗ and AA-ℬ ✗ remain intrinsic non-delegable conclusions; this paper does not modify them. CF5's LLM-agent substitute \"limited to Z₂ extension, not bypassing F1 conclusion\" is F3's \"engineering implementation-level extension honesty boundary\" for F1's boundary conclusion."
    - "<strong>Strict distinction between working thesis and strengthened thesis; separate recommendations for three target reader groups bear the survival gap.</strong> F3 working thesis (without mitigations) empirically fails under either CF2 or CF5 alone. F3 strengthened thesis (including three critical-path mitigations — UX-agility by design, threshold signatures + court-supervised downgrade, agent vs. supporter cryptographic split + AgentDelegationProof institutionalisation) retains core functionality under the extreme scenario of all five CFs triggering simultaneously (first segment: baseline progressive disclosure + supporter UI framework fully retained; second segment: CRPD §29 fulfillability reinforcement at-scale timeline extended by ≥ 10 years; third segment: LLM-agent boundary maintenance conditionally failing). F3 main text adopts the strengthened thesis as the formal position; the working thesis serves only as the starting point of argumentation and stress test comparison. For the <strong>CRPD Committee</strong> — should issue a General Comment supplementary explicitly clarifying: supporter scope boundary (not limited to family), safeguard requirements for supporter triggered downgrade, and the functional test violation boundary of issuer-side capacity hint. For <strong>EUDI Phase 2</strong> — conformance suite should include dark patterns automated detection and supporter UI three-layer separation conformance testing before 2026 Q3. For three target reader groups — <strong>UX engineering community / CRPD policy researchers / disability policy scholars</strong> — separate recommendations are detailed in §12.3. A specific warning for Taiwan's TW DIW before entering the LLM-agent phase — <strong>without capacity-aware UX and supporter UI three-layer separation, the degradation pathway of A15 §6.2's three default presuppositions in dementia scenarios will trigger on the very first day of the mandatory wallet phase; DIW v1.0 spec should explicitly include capacity-aware UX provisions + supporter sub-account specifications + EUDI Phase 2 conformance adding dark patterns automated detection.</strong>"
