slug: 2026-05-03-civic-proof-concept-positioning
title: The Conceptual Positioning of Civic Proof
subtitle: Civic Proof — Concept Positioning Argument Map (v2)

coreThesis:
  text: '"Civic Proof" is a third category between existential ID (who is a citizen) and entitlement ID (what this person is permitted to do) — a concept engineering proposal defined by a three-part structure of normative difference matrix + formal definition + boundary conditions. Neither a KYC equivalent nor a renaming of existing systems fully covers this position. Its defense does not depend on the invention of something new but on correcting a category error in the existing conceptual landscape.'
  summary: Civic Proof is a third category between existential ID and entitlement ID — defined by a matrix of normative differences plus formal scope plus boundary conditions.
  formal:
    expression: |
      CivicProof  ≜  ⟨ 𝒩, ℱ, ℬ ⟩
        where
          𝒩  =  normative_difference_matrix(M₁, M₂, M₃, M₄)        — four need-types
          ℱ  =  formal_scope(min_necessary ∧ max_allowed)          — §6 formal definition
          ℬ  =  CI ∧ Cohen ∧ Hildebrandt ∧ Marshall(heuristic)     — philosophical basis

      ¬derivable_from(CivicProof, {ExistentialID, EntitlementID, KYC, SBT})
      ⇔  CivicProof ∈ ConceptEngineering ∧ ¬CivicProof ∈ Renaming
    caption: Civic Proof is defined by three parts (normative matrix 𝒩 + formal scope ℱ + philosophical basis ℬ). Its non-derivability from existing systems pushes it from "renaming" to "concept engineering."
    legend:
      - symbol: 𝒩
        meaning: Normative differences matrix — four need-types (M₁ existential / M₂ entitlement / M₃ cumulative / M₄ privacy calibration)
      - symbol: ℱ
        meaning: Formal scope — minimum necessary condition ∧ maximum permitted range
      - symbol: ℬ
        meaning: Philosophical basis — CI plurality + Cohen self-constitution + Hildebrandt agonistic legality + Marshall three-tier citizenship (heuristic)
      - symbol: CI
        meaning: Contextual Integrity (Nissenbaum's contextual integrity)
      - symbol: ¬derivable_from
        meaning: Not derivable from... (negation of the derivability relation)
      - symbol: ≜
        meaning: "Is defined as"
      - symbol: ConceptEngineering
        meaning: Concept engineering (Cappelen / Plunkett's methodology — deliberate revision of existing concepts)

transitions:
  beforeDistinction: The formula states the position, but two conflated readings must first be distinguished. Most discussions treat "civic proof" as a KYC equivalent or a synonym for SBT; this map opposes that classification — it should be understood as a "concept engineering proposal" — a third category arrived at after correcting a category error in the existing conceptual landscape.

  beforePillars: The distinction is merely a declaration. To prove that "civic proof ∉ renaming," four independent sources are needed — the normative basis from philosophical foundations (CI / Cohen / Hildebrandt), Marshall's three-tier citizenship as a heuristic analogy (honestly downgraded to an analogy rather than a structure), the abductive argument for four need-types (the M₁..M₄ normative matrix), and the engineering specifications of the formal definition + boundary conditions. Without any one of these, the proposal reverts to general "identity political philosophy."

  beforeChain: The four pillars above are affirmative arguments. But the strong claim that "civic proof is not derivable from existing systems" must be held up by a specific reverse derivation chain — otherwise it is merely assertion. Starting from ExistentialID (who is a citizen) through EntitlementID (what this person is permitted to do) through KYC (financial compliance) through SBT (non-transferable tokens), each system is examined to determine whether it can cover the four need-types M₁..M₄; the conclusion is that no existing system covers all — therefore "renaming" does not hold.

  beforeBorders: Once the position and reverse derivation are established, counterarguments pose a genuine threat. The three counterarguments that "civic proof is just another name for SBT," "civic proof is just the political version of W3C VC," and "civic proof equals 'soft KYC'" are commonly cited; but carefully examining the coverage rate of each counterargument across the four need-types reveals that each covers only partial needs — this partial coverage is itself the failure of the counterargument, inversely supporting the "concept engineering" classification.

  beforeConditions: Once counterarguments are absorbed, what remains are design implications — under what conditions can "civic proof" be legitimately deployed without being misused? Four boundary conditions (normative matrix completeness / honest downgrading of heuristic analogy / formal definition precision / integration with article 01) translate the abstract "concept engineering" into verifiable academic obligations.

  beforeConclusion: Bringing together the philosophical, analogical, normative matrix, formal, and boundary layers, what the map ultimately argues is the methodology of "concept engineering" itself (no single system's victory can substitute for it), and the academic path along which the other 17 articles in this series will unfold under the three-part definition.

distinction:
  rejected:
    label: ❌ Rejected
    title: Civic proof = renaming of an existing system
    body: Treating "civic proof" as another name for KYC, ExistentialID, EntitlementID, or SBT. This classification assumes that at least one of the four need-types M₁..M₄ is completely covered by an existing system; but empirical examination shows that no existing system covers all — therefore the "renaming" classification is factually untenable.
    formal: "CivicProof ∈ {KYC, ExistentialID, EntitlementID, SBT}  ⇒  ∃ existing : covers(existing, M₁ ∧ M₂ ∧ M₃ ∧ M₄) — but empirically ¬∃"
  accepted:
    label: ✓ Defended
    title: Civic proof = concept engineering proposal
    body: Civic proof is a proposal that deliberately corrects a category error in the existing conceptual landscape — a three-part definition ⟨𝒩, ℱ, ℬ⟩. Its defense does not depend on inventing something new but on (1) the normative difference matrix showing coverage gaps in existing systems, (2) the formal definition providing minimum necessary and maximum permitted ranges, and (3) the philosophical basis providing normative grounds.
    formal: "CivicProof ≜ ⟨𝒩, ℱ, ℬ⟩  ∧  ¬derivable_from(CivicProof, {ExistentialID, EntitlementID, KYC, SBT})"

pillars:
  - section: §3 — Privacy Philosophy Foundation
    title: Three-stage argument — CI / Cohen / Hildebrandt
    role: Provides the normative basis — without a philosophical foundation, "civic proof" will be accused of being arbitrarily defined. The three-stage argument of CI plurality + Cohen self-constitution + Hildebrandt agonistic legality provides the chain of reasoning from "why normative differentiation is needed" to "why agonistic design is needed."
    body: CI plurality as premise (Nissenbaum) — different social domains have their own information norms; cross-domain diffusion violates contextual integrity. Formal non-derivability argument — the four need-types M₁..M₄ cannot be derived from one another; the scenario differences in identity verification cannot be absorbed by a "unified identity." Conceptual difference between Cohen and Nissenbaum — Cohen emphasizes the political-economic conditions of self-constitution (scope exceeding "information flow norms"), a difference that corresponds to the "agency" requirement of civic proof. Extension via Hildebrandt's agonistic legality — the function of law should fall on "preserving space for contestation," beyond the purely technical role of "enforcing existing rules" — corresponding to the remedy design in §7 of civic proof.
    finding: The philosophical basis ℬ is not "decorative citation" but the basis for arguing why the 𝒩 matrix requires four independent dimensions (rather than one or two); without the philosophical basis, the dimensional division of 𝒩 is arbitrary.
    formal: "ℬ ≜ CI(plurality) ∧ Cohen(self-constitution) ∧ Hildebrandt(agonistic) ⇒ justifies(𝒩.dimensions = 4)"

  - section: §4 — Marshall's Three-Tier Citizenship (heuristic analogy)
    title: Civil / Political / Social citizenship — heuristic correspondence
    role: Provides a precise boundary for analogy strength — treating the Marshall structure as "the formal skeleton of civic proof" would commit the error of overstating analogy strength; this pillar downgrades the analogy to "heuristic framing," undertaking limited work (providing a narrative structure) without undertaking structural work (providing a formal definition).
    body: Marshall's structure as heuristic framing — the 18th–19th century development of civic rights (civil legal status) → 19th–20th century political rights (voting) → 20th century social rights (welfare) provides a narrative template for "staged expansion." Work undertaken by the heuristic analogy — (1) showing that "civic identity" is itself a historically expanding concept; (2) providing historical context for the §3 philosophical basis; (3) providing layered intuition for the §5 four need-types. Reinforcement by Sen and Anderson and their tensions — Sen's capability approach emphasizes "substantive freedom," Anderson's relational equality emphasizes "status position" — both reinforce Marshall but also generate tensions. Analogy strength grades — α strong analogy (structural isomorphism) → β medium analogy (narrative isomorphism) → γ weak analogy (intuitive heuristic); this pillar argues that Marshall belongs to γ.
    finding: Marshall is a γ weak heuristic analogy, not a strong structural isomorphism. The purpose of downgrading it is to ensure that the argumentative strength does not depend on historical analogy; strong analogies are reserved for the abductive argument in §5. Honest downgrading is itself part of the argument.
    formal: "Marshall ∈ heuristic(γ) ∧ ¬structural-isomorphism ⇒ ¬load-bearing(formal_definition)"

  - section: §5 — Four Need-Types Abductive Argument
    title: M₁..M₄ normative difference matrix
    role: Provides the argumentative skeleton — without the normative matrix, the differences between "civic proof" and existing systems remain vague. M₁..M₄ precisely marks the differences — M₁ existential, M₂ entitlement, M₃ cumulative, M₄ privacy calibration. The formalized structure shows that no existing system covers all four dimensions.
    body: Four dimensions of the normative difference matrix — M₁ existential need (who is a citizen, corresponding to ExistentialID), M₂ entitlement need (what this person is permitted to do, corresponding to EntitlementID), M₃ cumulative need (civic identity changes over time, including accumulation of obligations and rights, low coverage in existing systems), M₄ privacy calibration need (disclosure boundary for each scenario, corresponding to V₁..V₆ in article 01). Formalized M₁–M₄ structure — each Mᵢ has independent success indicators + failure modes, and cannot be mutually derived (non-derivability). Honest downgrading of the concept engineering proposal — the argument does not claim "civic proof is a new discovery," but claims "civic proof is a deliberate proposal addressing the M₃/M₄ gaps."
    finding: Matrix 𝒩 = (M₁, M₂, M₃, M₄) is the core of the argument; coverage gaps in existing systems (especially M₃ cumulative and M₄ privacy calibration) are the empirical basis for "non-derivability from existing systems."
    formal: "𝒩 ≜ (M₁, M₂, M₃, M₄)  ∧  ∀ system ∈ {KYC, ExistentialID, EntitlementID, SBT} : ∃ Mᵢ : ¬covers(system, Mᵢ)"

  - section: §6 — Formal Definition and Boundary Conditions
    title: ℱ — minimum necessary condition ∧ maximum permitted range
    role: Provides precision — without a formal definition, "civic proof" will be accused of being a "decorative concept." The minimum necessary condition gives "what is at minimum required," the maximum permitted range gives "what can at most be covered"; the two ends jointly define the boundaries of ℱ.
    body: Two ends of the formal definition — minimum necessary condition (must simultaneously satisfy M₁ existential root + at least one of M₂/M₃ + M₄ privacy calibration design; missing any one does not count as civic proof); maximum permitted range (does not extend to "the overall civic identity system" — limited to "the normative matrix of identity verification"). Core convergence sentence — civic proof = a concept engineering proposal with ℬ philosophical basis as foundation, 𝒩 normative matrix as content, and ℱ formal scope as boundary. Integration with "accountability without identification" (§7) — V₁..V₆ in article 01 is the concrete instantiation of the M₄ privacy calibration dimension; article 02 provides the conceptual landscape, article 01 provides the concrete sub-specification.
    finding: The boundaries given by ℱ make "civic proof" verifiable — claims that are too broad violate the maximum permitted range; claims that are too narrow miss the minimum necessary condition. This bidirectional constraint is the precision guarantee of the argument.
    formal: "ℱ ≜ min_necessary(M₁ ∧ (M₂ ∨ M₃) ∧ M₄)  ∧  max_allowed ⊆ identity_verification_normative_matrix"

  - section: §8 — Academic Positioning + Subsequent Connections
    title: Conditional conclusion + position of the 18-article series
    role: Provides intellectual honesty — without marking conditions, "civic proof" will be incorrectly extrapolated as a "settled conclusion." This pillar argues that the conclusion of this paper is "conditional" (Conditional Conclusion), dependent on ℬ + 𝒩 + ℱ all holding; simultaneously it marks the position of the subsequent 17 articles under this three-part definition.
    body: Conditional conclusion — CivicProof ≜ ⟨𝒩, ℱ, ℬ⟩ holds on the preconditions that (1) the ℬ philosophical basis is accepted, (2) the four dimensions of the 𝒩 matrix are acknowledged, and (3) the ℱ formal boundaries are not accused of being too strict or too broad. If any one of the three preconditions fails, the argument needs to be downgraded. Open questions awaiting subsequent validation — concrete formalization of M₃ cumulativity, gradation of M₄ privacy calibration across different domains, and boundary testing of ℱ's maximum permitted range. Connections with subsequent chapters — article 01 (V₁..V₆ instantiate M₄), article 03 (H1' three walls correspond to ℬ's historical premise), article 04 (T tripartite corresponds to ℱ's formal extension), article 05 (IT' impossibility triangle corresponds to 𝒩's dimensional constraints), article 06 (CB-Justice corresponds to ℬ's political philosophy foundation), article 07 (SRP corresponds to ℬ's sovereignty premise), article 08 (HM corresponds to ℬ's historical premise). The 18 articles form a shared skeleton.
    finding: The 18 articles are not 18 independent topics but the unfolding of the ⟨𝒩, ℱ, ℬ⟩ three-part definition across different sub-problems. Argumentative strength is shared across articles, but each corresponds to a different dimension.
    formal: "∀ article_i ∈ {01..18} : ∃ component ∈ {𝒩, ℱ, ℬ} : refines(article_i, component)"

chain:
  title: Six-step concept engineering derivation — from existing conceptual landscape to three-part definition
  steps:
    - tag: T0
      kind: deterministic
      text: Current state of the conceptual landscape — ExistentialID + EntitlementID + KYC + SBT are the mainstream candidates
    - tag: T1
      kind: deterministic
      text: Five-layer abstraction table analysis — the four existing systems differ in coverage levels, but none achieves full coverage of M₁..M₄
    - tag: T2
      kind: deterministic
      text: Two common misreadings — (a) treating civic proof as a KYC equivalent (M₃/M₄ missing), (b) treating civic proof as a renaming of SBT (M₂ partially covered but M₁/M₃ missing)
    - tag: T3
      kind: deterministic
      text: §3 philosophical basis establishes ℬ — CI (basis for M₄) + Cohen (basis for M₂) + Hildebrandt (basis for remedy design)
    - tag: T4
      kind: probabilistic
      text: §4 Marshall's three tiers as γ heuristic analogy — provides narrative, not formal structure
    - tag: T5
      kind: deterministic
      text: §5 abductive argument yields 𝒩 = (M₁, M₂, M₃, M₄) normative matrix
    - tag: T6
      kind: deterministic
      text: §6 formal definition converges ℱ; CivicProof ≜ ⟨𝒩, ℱ, ℬ⟩ three-part definition established
  legend:
    - kind: deterministic
      label: Mechanistically necessary (structural facts of the conceptual landscape + formal derivation)
    - kind: probabilistic
      label: Probabilistic (choice of analogy strength + acceptance of philosophical position)

borders:
  - label: Counterargument 1
    title: Civic proof = SBT renaming
    pivot: The counterargument claims that "Soulbound Tokens already encompass all the functions of civic proof." But examining the M₁..M₄ coverage rate — SBT partially covers M₂ (entitlement, non-transferable) and partially covers M₃ (cumulative, on-chain records), but does not cover M₁ (existential root requires a sovereignty link, which SBT lacks) + M₄ (privacy calibration — SBT is a public on-chain record, violating CI plurality). SBT covers 0.5 dimensions in article 02's normative matrix.
    flip: SBT not only fails to support the "renaming" classification, but actually provides the strongest argument for "civic proof is a concept engineering proposal" — SBT's partial coverage + privacy gaps are themselves a concrete validation of the normative matrix.

  - label: Counterargument 2
    title: Civic proof = political version of W3C VC
    pivot: The counterargument claims that "Verifiable Credentials are already an industry standard; civic proof is merely politicized packaging." But W3C VC is an engineering implementation of ℱ (formal scope), not the overall definition of ℬ (philosophical basis) + 𝒩 (normative matrix). VC provides engineering protocols for "how to issue / verify / revoke credentials," but does not provide normative grounds for "why these four dimensions and not others." VC corresponds to a subset of ℱ in article 02's three-part structure.
    flip: W3C VC is not "another name for civic proof" but an engineering implementation of the ℱ component in CivicProof's three-part structure. This result inversely supports the overall classification of "concept engineering = philosophical basis + normative matrix + formal scope," while VC fills only one piece.

  - label: Counterargument 3
    title: Civic proof ≈ soft KYC
    pivot: A genuine partial exception — "soft KYC" (e.g., W3C VC + attribute proofs) does indeed approximate a subset of civic proof on M₂ entitlement + M₄ partial privacy calibration. But "soft KYC"'s design purpose is financial compliance, lacking M₁ (existential — not concerned with civic identity root) + M₃ (cumulative — KYC is a time-slice, not cumulative). "Soft KYC" covers 1.5 dimensions.
    flip: Even if "soft KYC" approximates civic proof in a narrow domain, universalizing "civic proof = soft KYC" cannot be defended. Civic Proof's boundary condition B₃ (formal definition precision) precisely demonstrates this kind of precise scope constraint — soft KYC is one of the engineering instances of civic proof in the M₂/M₄ dimensions, not civic proof itself.

conditions:
  title: Legitimate deployment of civic proof must first pass four boundary conditions
  formalPrelude: "deploy(CivicProof) valid ⇔ B₁ ∧ B₂ ∧ B₃ ∧ B₄"
  items:
    - title: B₁ Normative matrix completeness
      body: 𝒩 = (M₁, M₂, M₃, M₄) must have all four dimensions simultaneously examined; a deployment missing one dimension degrades to an existing system. Any system claiming to "implement civic proof" must provide coverage rates across all four dimensions.
      formal: "B₁: implement(CivicProof) ⇒ ∀ Mᵢ ∈ {M₁..M₄} : coverage(impl, Mᵢ) ∈ [0, 1] ∧ documented(coverage)"
    - title: B₂ Honest downgrading of heuristic analogy
      body: Citations of Marshall's three tiers + Sen + Anderson must be maintained at the γ heuristic level and must not be promoted to α structural isomorphism. Any deployment that treats "Marshall's three tiers" as the formal skeleton of civic proof violates B₂.
      formal: "B₂: cite(Marshall ∨ Sen ∨ Anderson) ⇒ level(citation) = γ ∧ ¬load_bearing(formal_definition)"
    - title: B₃ Formal definition precision
      body: The minimum necessary condition + maximum permitted range of ℱ must be explicitly listed in deployment documentation; vagueness will cause "civic proof" to be expanded to any identity system, violating the precision obligation of concept engineering.
      formal: "B₃: deploy(CivicProof) ⇒ ∃ doc : specifies(doc, min_necessary) ∧ specifies(doc, max_allowed)"
    - title: B₄ Integration with article 01
      body: The M₄ privacy calibration dimension must be integrated with the V₁..V₆ procedural firewalls of article 01; deployments that do not integrate will cause the M₄ dimension to degrade from "procedural obligation" to a "privacy statement." Article 02 provides the conceptual landscape; article 01 provides the M₄ sub-specification.
      formal: "B₄: deploy(M₄) ⇒ M₄ ⊨ article_01.V₁ ∧ article_01.V₂ ∧ ... ∧ article_01.V₆"

conclusion:
  paragraphs:
    - <strong>Civic proof is not the invention of something new but a concept engineering proposal that deliberately corrects a category error in the existing conceptual landscape.</strong> Its academic positioning is a "conditional conclusion" — on the precondition that ℬ + 𝒩 + ℱ all hold, civic proof is the third category between existential and entitlement identity.
    - The debate should shift from "civic proof vs KYC / SBT / VC" to <em>"under the normative matrix 𝒩, which dimensions do existing systems cover, and which do they lack."</em> The work of civic proof is to precisely mark the positions of existing systems, especially to show the coverage gaps in M₃ cumulativity and M₄ privacy calibration — the two dimensions most commonly overlooked.
    - A principle of academic integrity runs through the entire text — <strong>heuristic analogies undertake heuristic work, formal definitions undertake formal work, philosophical bases undertake normative work; none may cross these boundaries.</strong> Marshall falls in the γ heuristic slot, VC belongs to the ℱ component, KYC belongs to the M₂/M₄ subset — the precise marking of these positions is where the boundaries of the CivicProof three-part formula lie.
  formalCoda: |
    Final form:
      CivicProof  ≜  ⟨ 𝒩, ℱ, ℬ ⟩
        𝒩  =  (M₁, M₂, M₃, M₄)
        ℱ  =  min_necessary ∧ max_allowed
        ℬ  =  CI ∧ Cohen ∧ Hildebrandt ∧ Marshall(γ)

      ¬derivable_from(CivicProof, {ExistentialID, EntitlementID, KYC, SBT})
      deploy valid  ⇔  ⋀ⱼ Bⱼ  (j ∈ 1..4)

      ∀ article_i ∈ {01..18} : ∃ component ∈ {𝒩, ℱ, ℬ} : refines(article_i, component)
