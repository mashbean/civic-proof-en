slug: 2026-05-03-civic-proof-concept-positioning
title: 公民證明的概念定位
subtitle: Civic Proof — Concept Positioning Argument Map (v2)

coreThesis:
  text: 「公民證明」是介於存在性 ID（誰是公民）與資格性 ID（這個人能做什麼）之間的第三類——一個由規範差異矩陣 + 形式定義 + 邊界條件三件式定義的概念工程提案，KYC 等同物與現成系統重命名都未能完整覆蓋這個位置。它的辯護不依賴新事物的發明，而依賴對既有概念地景的層級錯置作出修正。
  summary: Civic Proof is a third category between existential ID and entitlement ID — defined by a matrix of normative differences plus formal scope plus boundary conditions.
  formal:
    expression: |
      CivicProof  ≜  ⟨ 𝒩, ℱ, ℬ ⟩
        where
          𝒩  =  normative_difference_matrix(M₁, M₂, M₃, M₄)        — 四需求型態
          ℱ  =  formal_scope(min_necessary ∧ max_allowed)          — §6 形式定義
          ℬ  =  CI ∧ Cohen ∧ Hildebrandt ∧ Marshall(heuristic)     — 哲學基礎

      ¬derivable_from(CivicProof, {ExistentialID, EntitlementID, KYC, SBT})
      ⇔  CivicProof ∈ ConceptEngineering ∧ ¬CivicProof ∈ Renaming
    caption: 公民證明是三件式定義（規範矩陣 𝒩 + 形式範圍 ℱ + 哲學基礎 ℬ）。它與既有系統的不可衍生性，把它從「重命名」推到「概念工程」。
    legend:
      - symbol: 𝒩
        meaning: Normative differences matrix — 四需求型態（M₁ 存在性 / M₂ 資格性 / M₃ 累積性 / M₄ 隱私衡量）
      - symbol: ℱ
        meaning: Formal scope — 最小必要條件 ∧ 最大允許範圍
      - symbol: ℬ
        meaning: Philosophical basis — CI 多元性 + Cohen 自我構成 + Hildebrandt agonistic legality + Marshall 三層公民權（啟發式）
      - symbol: CI
        meaning: Contextual Integrity（Nissenbaum 的脈絡完整性）
      - symbol: ¬derivable_from
        meaning: 不可從...衍生（衍生關係的否定）
      - symbol: ≜
        meaning: 「定義為」（is defined as）
      - symbol: ConceptEngineering
        meaning: 概念工程（Cappelen / Plunkett 的方法論：對既有概念作有意改造）

transitions:
  beforeDistinction: 公式給出立場，但要先區分兩種被混用的解讀。多數討論把「公民證明」當作 KYC 等同物或 SBT 的同義詞，本地圖反對該分類；它應該被視為「概念工程提案」——對既有概念地景作層級錯置修正後的第三類。

  beforePillars: 區分本身只是宣告。要證明「公民證明 ∉ 重命名」，需要四條獨立來源：哲學基礎（CI / Cohen / Hildebrandt）的規範性根據、Marshall 三層公民權的啟發式類比（誠實降級為類比而非結構）、四需求型態的溯因論證（M₁..M₄ 規範矩陣）、以及形式定義 + 邊界條件的工程規範。四者缺一，提案就會退回到一般性的「身分政治哲學」。

  beforeChain: 前面四條 pillar 是正向論證。但「公民證明不可從既有系統衍生」這個強主張，必須有一條具體的反向推導鏈頂住。從 ExistentialID（誰是公民）到 EntitlementID（這個人能做什麼）到 KYC（金融合規）到 SBT（不可轉讓代幣），逐步檢驗每個系統能否覆蓋四需求型態 M₁..M₄；結論是沒有任何一個現成系統覆蓋全部，因此「重命名」不成立。

  beforeBorders: 立場 + 反向推導成立後，反論才真的具威脅。「公民證明就是 SBT 的另一個名字」「公民證明就是 W3C VC 的政治版本」「公民證明等於『軟性 KYC』」三條反論常被引為理由；但仔細檢驗每條反論在四需求型態的覆蓋率，會發現它們各自只覆蓋部分需求——這個部分覆蓋本身就是反論的失敗，反向支持「概念工程」分類。

  beforeConditions: 反論被吸收後，留下的是設計含意：在什麼條件下，「公民證明」這個概念可以被合法部署而不被誤用？四個邊界條件（規範矩陣完整性 / 啟發式類比的誠實降級 / 形式定義精確性 / 與 article 01 整合）把抽象的「概念工程」翻譯成可被檢驗的學術義務。

  beforeConclusion: 把哲學、類比、規範矩陣、形式、邊界五層收束起來，地圖最終要說的是「概念工程」這個方法論本身（沒有任何單一系統的勝利可以替代它），以及這個系列其他 17 篇文章將在三件式定義之下展開的學術路徑。

distinction:
  rejected:
    label: ❌ 被拒絕
    title: 公民證明 = 既有系統的重命名
    body: 把「公民證明」當作 KYC、ExistentialID、EntitlementID、或 SBT 的另一個名字。這個分類預設四需求型態 M₁..M₄ 至少有一個被現成系統完整覆蓋；但實證檢驗顯示沒有任何現成系統覆蓋全部——因此「重命名」分類在事實層面就不成立。
    formal: "CivicProof ∈ {KYC, ExistentialID, EntitlementID, SBT}  ⇒  ∃ existing : covers(existing, M₁ ∧ M₂ ∧ M₃ ∧ M₄) — 但實證 ¬∃"
  accepted:
    label: ✓ 被辯護
    title: 公民證明 = 概念工程提案
    body: 公民證明是對既有概念地景的層級錯置作有意修正的提案——三件式定義 ⟨𝒩, ℱ, ℬ⟩。它的辯護不依賴新事物的發明，而依賴 (1) 規範差異矩陣顯示既有系統的覆蓋缺口，(2) 形式定義給出最小必要與最大允許範圍，(3) 哲學基礎提供規範性根據。
    formal: "CivicProof ≜ ⟨𝒩, ℱ, ℬ⟩  ∧  ¬derivable_from(CivicProof, {ExistentialID, EntitlementID, KYC, SBT})"

pillars:
  - section: §3 — 隱私哲學基礎
    title: CI / Cohen / Hildebrandt 三段式論證
    role: 提供規範性根據——若沒有哲學基礎，「公民證明」會被指控為任意定義。CI 多元性 + Cohen 自我構成 + Hildebrandt agonistic legality 三段式提供從「為什麼需要規範差異」到「為什麼需要 agonistic 設計」的論證鏈。
    body: CI 多元性主張作為前提（Nissenbaum）：不同社會領域有各自的資訊規範，跨領域擴散侵犯脈絡完整性。Non-derivability 的形式論證：M₁..M₄ 四需求型態無法相互推導；身分驗證的場景差異不可被「統一身分」吸收。Cohen 與 Nissenbaum 的概念差異：Cohen 強調自我構成的政治經濟條件（範圍超出「資訊流動規範」），這個差異對應到公民證明的「能動性」需求。Hildebrandt 的 agonistic legality 延伸：法律的功能應落在「保留爭議空間」，超越「執行已有規則」的純技術角色——對應到公民證明的 §7 救濟設計。
    finding: 哲學基礎 ℬ 不是「裝飾性引用」，是論證 𝒩 矩陣為什麼需要四個獨立維度（而非一個或兩個）的根據；缺哲學基礎則 𝒩 的維度劃分是任意的。
    formal: "ℬ ≜ CI(plurality) ∧ Cohen(self-constitution) ∧ Hildebrandt(agonistic) ⇒ justifies(𝒩.dimensions = 4)"

  - section: §4 — Marshall 三層公民權（啟發式類比）
    title: Civil / Political / Social Citizenship 啟發式對應
    role: 提供類比強度的精確邊界——若把 Marshall 結構當作「公民證明的形式骨架」會犯類比強度誇大；本 pillar 把類比降級為「啟發式 framing」，承擔有限工作（提供敘事結構），不承擔結構性工作（提供形式定義）。
    body: Marshall 結構作為啟發式 framing：18-19 世紀公民權（civil 法律地位）→ 19-20 世紀政治權（voting）→ 20 世紀社會權（welfare）三層發展史，提供「分階段擴展」的敘事模板。啟發式類比承擔的工作：(1) 顯示「公民身分」本身就是歷史擴展的概念；(2) 提供 §3 哲學基礎的歷史脈絡；(3) 為 §5 四需求型態提供分層直覺。Sen 與 Anderson 的補強及其張力：Sen 的能力進路強調「實質自由」，Anderson 的關係平等強調「身分位置」——兩者補強 Marshall 但也產生張力。類比強度的等級：α 強類比（結構同構）→ β 中類比（敘事同構）→ γ 弱類比（直覺啟發）；本 pillar 主張 Marshall 屬於 γ。
    finding: Marshall 是 γ 弱啟發式類比，不是強結構同構。把它降級的目的是讓論證強度不依賴歷史類比；強類比留給 §5 的溯因論證。誠實降級本身就是論證的一部分。
    formal: "Marshall ∈ heuristic(γ) ∧ ¬structural-isomorphism ⇒ ¬load-bearing(formal_definition)"

  - section: §5 — 四需求型態溯因論證
    title: M₁..M₄ 規範差異矩陣
    role: 提供論證骨架——若沒有規範矩陣，「公民證明」與既有系統的差異仍是含混的。M₁..M₄ 把差異精確標出：M₁ 存在性、M₂ 資格性、M₃ 累積性、M₄ 隱私衡量。形式化結構顯示沒有現成系統覆蓋全部四個維度。
    body: 規範差異矩陣的四個維度：M₁ 存在性需求（誰是公民，對應 ExistentialID）、M₂ 資格性需求（這個人能做什麼，對應 EntitlementID）、M₃ 累積性需求（公民身分隨時間變動，包含義務與權利的累積，既有系統覆蓋率低）、M₄ 隱私衡量需求（每場景的揭露邊界，對應 article 01 的 V₁..V₆）。M₁-M₄ 形式化結構：每個 Mᵢ 有獨立的成功指標 + 失敗模式，且不可相互衍生（non-derivability）。Concept-engineering proposal 的誠實降級——論證不主張「公民證明是新發現」，主張「公民證明是對 M₃/M₄ 缺口的有意提案」。
    finding: 矩陣 𝒩 = (M₁, M₂, M₃, M₄) 是論證的核心；既有系統的覆蓋缺口（特別是 M₃ 累積性與 M₄ 隱私衡量）是「不可從現成系統衍生」的實證根據。
    formal: "𝒩 ≜ (M₁, M₂, M₃, M₄)  ∧  ∀ system ∈ {KYC, ExistentialID, EntitlementID, SBT} : ∃ Mᵢ : ¬covers(system, Mᵢ)"

  - section: §6 — 形式定義與邊界條件
    title: ℱ — 最小必要條件 ∧ 最大允許範圍
    role: 提供精確性——若沒有形式定義，「公民證明」會被指控為「裝飾性概念」。最小必要條件給出「至少要有什麼」，最大允許範圍給出「最多能涵蓋什麼」，兩端共同定義 ℱ 的邊界。
    body: 形式定義的兩端：最小必要條件（必須同時滿足 M₁ 存在性根 + M₂/M₃ 至少一項 + M₄ 隱私衡量設計；缺任一不算公民證明）；最大允許範圍（不延伸到「整體公民身分系統」——僅限於「身分驗證的規範矩陣」）。核心收束句：公民證明 = 在 ℬ 哲學基礎上，以 𝒩 規範矩陣為內容，以 ℱ 形式範圍為邊界的概念工程提案。與「accountability without identification」的整合（§7）：article 01 的 V₁..V₆ 是 M₄ 隱私衡量維度的具體填入；article 02 提供概念地景，article 01 提供具體子規格。
    finding: ℱ 給出的邊界讓「公民證明」可被檢驗——主張過大會違反最大允許範圍，主張過小會缺漏最小必要條件。這個雙向約束是論證的精確性保證。
    formal: "ℱ ≜ min_necessary(M₁ ∧ (M₂ ∨ M₃) ∧ M₄)  ∧  max_allowed ⊆ identity_verification_normative_matrix"

  - section: §8 — 學術定位 + 後續對接
    title: 條件性結論 + 18 篇系列的位置
    role: 提供誠實性——若不標出條件性，「公民證明」會被誤推為「定論」。本 pillar 主張本論文的結論是「條件性的」（Conditional Conclusion），依賴 ℬ + 𝒩 + ℱ 三件成立；同時標出後續 17 篇文章在這個三件式定義下的位置。
    body: 條件性結論：CivicProof ≜ ⟨𝒩, ℱ, ℬ⟩ 成立的前提是 (1) ℬ 哲學基礎被接受、(2) 𝒩 矩陣的四維度被承認、(3) ℱ 形式邊界不被指控過嚴或過寬。三個前提任一不成立，論證需要降級。待後續驗證的開放問題：M₃ 累積性的具體形式化、M₄ 隱私衡量在不同場域的等級劃分、ℱ 最大允許範圍的邊界檢驗。與後續章節的對接：article 01（V₁..V₆ 填入 M₄）、article 03（H1' 三道牆對應 ℬ 的歷史前提）、article 04（T 三件式對應 ℱ 的形式擴展）、article 05（IT' 不可能三角對應 𝒩 的維度約束）、article 06（CB-Justice 對應 ℬ 的政治哲學基礎）、article 07（SRP 對應 ℬ 的主權前提）、article 08（HM 對應 ℬ 的歷史前提）。18 篇形成一個共同骨架。
    finding: 18 篇不是 18 個獨立論題，是 ⟨𝒩, ℱ, ℬ⟩ 三件式定義在不同子問題上的展開。文章間的論證強度共享，但每篇對應不同維度。
    formal: "∀ article_i ∈ {01..18} : ∃ component ∈ {𝒩, ℱ, ℬ} : refines(article_i, component)"

chain:
  title: 概念工程六步推導：從現成概念地景到三件式定義
  steps:
    - tag: T0
      kind: deterministic
      text: 概念地景現狀：ExistentialID + EntitlementID + KYC + SBT 為主流候選
    - tag: T1
      kind: deterministic
      text: 五層抽象表分析：四個現成系統的覆蓋層級不同，但都未達 M₁..M₄ 全覆蓋
    - tag: T2
      kind: deterministic
      text: 兩個常見誤讀：(a) 把公民證明當 KYC 等同物（M₃/M₄ 缺）、(b) 把公民證明當 SBT 重命名（M₂ 部分覆蓋但 M₁/M₃ 缺）
    - tag: T3
      kind: deterministic
      text: §3 哲學基礎建立 ℬ：CI（M₄ 根據）+ Cohen（M₂ 根據）+ Hildebrandt（救濟設計根據）
    - tag: T4
      kind: probabilistic
      text: §4 Marshall 三層作為 γ 啟發式類比；提供敘事不提供形式
    - tag: T5
      kind: deterministic
      text: §5 溯因論證得出 𝒩 = (M₁, M₂, M₃, M₄) 規範矩陣
    - tag: T6
      kind: deterministic
      text: §6 形式定義收束 ℱ；CivicProof ≜ ⟨𝒩, ℱ, ℬ⟩ 三件式成立
  legend:
    - kind: deterministic
      label: 機制必然（概念地景的結構性事實 + 形式推導）
    - kind: probabilistic
      label: 概率性（類比強度的選擇 + 哲學立場的接受度）

borders:
  - label: 反論 1
    title: 公民證明 = SBT 重命名
    pivot: 反論訴求是「Soulbound Token 已涵蓋公民證明的所有功能」。但檢驗 M₁..M₄ 覆蓋率：SBT 部分覆蓋 M₂（資格性、不可轉讓）、部分覆蓋 M₃（累積性、鏈上記錄），但未覆蓋 M₁（存在性根需要主權連結，SBT 缺）+ M₄（隱私衡量在 SBT 是公開鏈上記錄，違反 CI 多元性）。SBT 在 article 02 規範矩陣下覆蓋 0.5 維度。
    flip: SBT 不僅不支持「重命名」分類，反而給「公民證明是概念工程提案」提供了最強論證——SBT 的部分覆蓋 + 隱私缺口本身就是規範矩陣的具體驗證。

  - label: 反論 2
    title: 公民證明 = W3C VC 的政治版本
    pivot: 反論訴求是「Verifiable Credentials 已是業界標準，公民證明只是政治化包裝」。但 W3C VC 是 ℱ（形式範圍）的工程實作，不是 ℬ（哲學基礎）+ 𝒩（規範矩陣）的整體定義。VC 提供「如何發證 / 驗證 / 撤銷」的工程協議，但不提供「為什麼這四個維度而非其他」的規範性根據。VC 在 article 02 三件式中對應 ℱ 子集。
    flip: W3C VC 不是「公民證明的另一個名字」，是 CivicProof 三件式中 ℱ 元件的工程實作。這個結果反向支持「概念工程 = 哲學基礎 + 規範矩陣 + 形式範圍」的整體分類，而 VC 只填補其中一塊。

  - label: 反論 3
    title: 公民證明 ≈ 軟性 KYC
    pivot: 真正的部分例外——「軟性 KYC」（如 W3C VC + 屬性證明）在 M₂ 資格性 + M₄ 部分隱私衡量上確實接近公民證明的子集。但「軟性 KYC」的設計目的是金融合規，缺 M₁（存在性、不涉公民身分根）+ M₃（累積性、KYC 是時間切片不是累積）。「軟性 KYC」覆蓋 1.5 維度。
    flip: 即使「軟性 KYC」在窄場域接近公民證明，普世化「公民證明 = 軟性 KYC」也無法被辯護。CivicProof 邊界條件 B₃（形式定義精確性）正好示範這種精確的範圍約束——軟性 KYC 是公民證明在 M₂/M₄ 維度的工程實例之一，不是公民證明本身。

conditions:
  title: 公民證明的合法部署，必須先通過四條邊界條件
  formalPrelude: "deploy(CivicProof) valid ⇔ B₁ ∧ B₂ ∧ B₃ ∧ B₄"
  items:
    - title: B₁ 規範矩陣完整性
      body: 𝒩 = (M₁, M₂, M₃, M₄) 必須四維度同時被檢驗，缺一維度的部署退化為現成系統。任何聲稱「實作公民證明」的系統必須給出四維度的覆蓋率。
      formal: "B₁: implement(CivicProof) ⇒ ∀ Mᵢ ∈ {M₁..M₄} : coverage(impl, Mᵢ) ∈ [0, 1] ∧ documented(coverage)"
    - title: B₂ 啟發式類比的誠實降級
      body: Marshall 三層 + Sen + Anderson 的引用必須維持在 γ 啟發式等級，不可被推為 α 結構同構。任何把「Marshall 三層」當作公民證明形式骨架的部署都違反 B₂。
      formal: "B₂: cite(Marshall ∨ Sen ∨ Anderson) ⇒ level(citation) = γ ∧ ¬load_bearing(formal_definition)"
    - title: B₃ 形式定義精確性
      body: ℱ 的最小必要條件 + 最大允許範圍必須在部署文件中明確列出；模糊化會導致「公民證明」被擴張到任意身分系統，違反概念工程的精確性義務。
      formal: "B₃: deploy(CivicProof) ⇒ ∃ doc : specifies(doc, min_necessary) ∧ specifies(doc, max_allowed)"
    - title: B₄ 與 article 01 的整合
      body: M₄ 隱私衡量維度必須與 article 01 的 V₁..V₆ 程序防火牆整合；不整合的部署會使 M₄ 維度退化為「隱私聲明」而非「程序義務」。article 02 提供概念地景，article 01 提供 M₄ 子規格。
      formal: "B₄: deploy(M₄) ⇒ M₄ ⊨ article_01.V₁ ∧ article_01.V₂ ∧ ... ∧ article_01.V₆"

conclusion:
  paragraphs:
    - <strong>公民證明不是新事物的發明，是對既有概念地景的層級錯置作有意修正的概念工程提案。</strong>它的學術定位是「條件性結論」——在 ℬ + 𝒩 + ℱ 三件式成立的前提下，公民證明是介於存在性與資格性之間的第三類。
    - 辯論應從「公民證明 vs KYC / SBT / VC」轉向<em>「在規範矩陣 𝒩 下，現成系統覆蓋哪些維度、缺哪些維度」</em>。公民證明的工作是把現成系統的位置精確標出，特別是顯示 M₃ 累積性與 M₄ 隱私衡量這兩個常被忽略的維度的覆蓋缺口。
    - 一條學術誠實原則貫穿全文：<strong>啟發式類比承擔啟發式工作，形式定義承擔形式工作，哲學基礎承擔規範性工作；不可越界。</strong>Marshall 落在 γ 啟發式那一格，VC 屬於 ℱ 元件，KYC 屬於 M₂/M₄ 子集——這些位置的精確標示就是 CivicProof 三件式公式的邊界所在。
  formalCoda: |
    Final form:
      CivicProof  ≜  ⟨ 𝒩, ℱ, ℬ ⟩
        𝒩  =  (M₁, M₂, M₃, M₄)
        ℱ  =  min_necessary ∧ max_allowed
        ℬ  =  CI ∧ Cohen ∧ Hildebrandt ∧ Marshall(γ)

      ¬derivable_from(CivicProof, {ExistentialID, EntitlementID, KYC, SBT})
      deploy valid  ⇔  ⋀ⱼ Bⱼ  (j ∈ 1..4)

      ∀ article_i ∈ {01..18} : ∃ component ∈ {𝒩, ℱ, ℬ} : refines(article_i, component)
