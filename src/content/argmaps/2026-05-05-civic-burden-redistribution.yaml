slug: 2026-05-05-civic-burden-redistribution
title: Who Bears the Democratic Cost When Digital Wallets Arrive
subtitle: Civic Burden 的分配正義分析

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: The design shift from issuer-centric (MOICA) to holder-centric (TW DIW) redistributes civic burden across four dimensions (comprehension / verification access / trust judgement / dispute liability). Without accompanying safeguards, this redistribution violates the dual necessary conditions CB-Justice = D₁* ∧ D₂* of Rawls's Difference Principle and Anderson's relational equality. Taiwan's quantitative estimates project a median exclusion of 3.2–4.8 million people without mitigation; with three-tier compulsory reinforcement in place, this falls to 0.65–1.1 million.
  summary: CB-Justice = D₁* ∧ D₂*; necessary but not sufficient; compulsory reinforcement divided into soft/hard dual-track three tiers.
  formal:
    expression: |
      CB-Justice  ⇔  D₁*  ∧  D₂*

      D₁* (Rawls, lexical): S passes D₁* iff
        (i) ¬violate(S, basic_liberties)
        (ii) ¬violate(S, FEO)
        (iii) ∀ G_w : primary_goods(G_w, t₁) ≥ primary_goods(G_w, t₀)

      D₂* (Anderson): S passes D₂* iff
        (i) ¬oppression(S, ∀ groups)
        (ii) ¬strip(S, common_citizenship)
        (iii) ¬weaken(S, social_equal_standing)

      C₁ (soft) ∧ C₂ (hard) ∧ C₃ (dual-track) → mitigate(burden_shift)
    caption: The CB-Justice dual criterion is a necessary but not sufficient condition — even if both criteria are satisfied, failure remains possible on the dimensions of Hayekian dispersed knowledge, Sen's capability approach, recognition justice, and intergenerational equity.
    legend:
      - symbol: D₁*
        meaning: Rawls's Difference Principle in lexical order (including basic liberties + FEO fair equality of opportunity + primary goods for the least advantaged)
      - symbol: D₂*
        meaning: Anderson's relational equality in democratic citizenship version (no oppression + common citizenship + social standing parity)
      - symbol: G_w
        meaning: The least-advantaged group (elderly / low digital literacy / no smartphone / mobile population / disability)
      - symbol: t₀, t₁
        meaning: State before design transition S / stable state after (with safeguards in place)
      - symbol: C₁ / C₂ / C₃
        meaning: Three-tier compulsory reinforcement conditions (soft compulsion UX / hard compulsion verifier certification / dual-track compulsion dispute adjudication)
      - symbol: C₄
        meaning: Single-portal political choice (not included in the core abductive set)

transitions:
  beforeDistinction: The formula provides the normative precondition. The first step is to distinguish two conflated design orientations&#58; placing accountability on the issuer (MOICA) versus placing it on the holder (TW DIW). The latter is not inherently superior — it requires accompanying safeguards to avoid shifting costs onto the most vulnerable.
  beforePillars: The distinction itself is merely a declaration. To demonstrate that the CB-Justice dual criterion is the normative precondition for holder-centric design, five independent supports are needed&#58; a survey of civic burden across four dimensions, deduction of the Rawls + Anderson dual criterion, three-tier compulsory reinforcement, Taiwan's quantitative exclusion estimates, and comparison across seven cross-national cases.
  beforeChain: Once the five pillars are established, the quantitative component requires a concrete causal chain. Taiwan's three-tier thresholds (A device / B digital literacy / C cognitive and physical) project a median exclusion of 3.2–4.8 million without mitigation; with all three reinforcements in place this falls to 0.65–1.1 million (a 72.5–83.8% reduction).
  beforeBorders: Counter-arguments centre on three claims&#58; "holder-centric is inherently superior," "cost transfer is a neutral phenomenon," and "consumer protection equals regulatory suppression." Examining the empirical basis of each reveals that they all demonstrate different forms of "collapse without safeguards."
  beforeConditions: Once the counter-arguments are absorbed, what remains are the specific design obligations of the three-tier compulsory reinforcement conditions C₁ / C₂ / C₃, together with five boundary conditions B1–B5.
  beforeConclusion: The dual criterion + three-tier reinforcement + quantitative exclusion + five boundaries + cross-national comparison converge on&#58; holder-centric normative superiority is a normative claim, not an engineering fact; safeguards must come first if the promises of autonomy are to be honoured.

distinction:
  rejected:
    label: ❌ Rejected
    title: Holder-centric design is inherently superior
    body: '"Holder-centric design returns control to users and is therefore progressive." This orientation assumes holders have the capacity to bear the costs shifted to them (comprehension / verification / trust / dispute), treating an asymmetric burden as a neutral fact. Singapore SingPass (issuer-centric) is a high-UX counterexample; NIST SP 800-63-4 ipd lists holder-centric wallets as "one option" rather than the single optimum.'
    formal: holder_centric ⊨ optimal(∀ users)   ❌ no empirical basis
  accepted:
    label: ✓ Defended
    title: CB-Justice = D₁* ∧ D₂* (necessary, not sufficient)
    body: Holder-centric normative superiority is a normative claim that must pass the dual necessary conditions of D₁* (primary goods of the least advantaged must not decline) and D₂* (common citizenship must not be stripped). The three-tier compulsory reinforcement conditions (C₁ soft compulsion UX / C₂ hard compulsion verifier certification / C₃ dual-track compulsion dispute adjudication) are the engineering obligations required to honour the normative claim.
    formal: holder_centric_valid ⇔ D₁* ∧ D₂* ∧ C₁ ∧ C₂ ∧ C₃

pillars:
  - section: §2 — Redistribution of Civic Burden across Four Dimensions
    title: Comprehension / Verification / Trust / Dispute
    role: Provides the empirical anchor — if civic burden is an abstract concept, the first step is to see the four concrete dimensions across which it is redistributed.
    body: (1) Comprehension burden (issuer centralised education → holder individual); (2) verification access burden (central API → verifier self-integration); (3) trust judgement burden (central trust list → distributed judgement by holder + verifier); (4) dispute liability attribution (clear binary → multi-party ambiguity). Issuer-centric / holder-centric is a liability distribution spectrum (not a binary opposition) — TW DIW's trust list remains legally authorised by the public sector.
    finding: Seven operationalisation indicators (cross-platform portable learning / revocation recovery / verifier integration compliance / holder judgement / third-party liability gap / cross-border fallback / disability human-assisted remedy); cost transfer systematically amplifies inequality along three axes&#58; age × digital literacy × device availability.
    formal: "burden_redistribution(S) = ⟨comprehension, verification, trust, dispute⟩  with asymmetric impact on G_w"

  - section: §3 — Rawls + Anderson Dual Criterion
    title: Deduction of D₁* ∧ D₂*
    role: Provides the normative precondition — without a formalised dual criterion, "unfair" is mere intuition; only by conjoining Rawls's D₁* and Anderson's D₂* as necessary conditions does "holder-centric must pass" become a testable proposition.
    body: D₁* (lexical order) + D₂* (democratic citizenship) as conjunctive necessary conditions. Rawls's Difference Principle requires that the primary goods and the social bases of self-respect of the least advantaged must not decline; Anderson's relational equality requires no structural oppression, common citizenship, and parity of social standing. The conjunctive dual criterion provides complementary coverage&#58; DP addresses distribution; DE addresses relations.
    finding: D₁* ∧ D₂* is necessary but not sufficient — the Hayek-Sowell counter-argument is absorbed ("retain fallback" + dynamic G_w); other failure modes remain possible (Sen capability / recognition justice / intergenerational).
    formal: "CB-Justice ⇔ D₁* ∧ D₂*   (necessary, not sufficient)"

  - section: §4 — Three-Tier Compulsory Reinforcement
    title: C₁ Soft Compulsion / C₂ Hard Compulsion / C₃ Dual-Track Compulsion
    role: Provides engineering obligations — the dual criterion is the normative precondition, but delivering on it requires concrete reinforcement at the engineering level. The three-tier compulsory reinforcement translates normative requirements into enforceable obligations.
    body: C₁ privacy-by-default UX (soft compulsion&#58; relying on nudge norms + WCAG 2.2 / Section 508 + Hartzog 2018 design-as-law); C₂ verifier certification system (hard compulsion&#58; eIDAS 2.0 qualified TSP + ETSI EN 319 401 / 411); C₃ unified dispute adjudication body (dual-track compulsion&#58; Consumer Protection Act 1994 / Personal Data Protection Act 2010 / Administrative Litigation Act). Elderly-friendly design broken down into cognitive / sensory / operational three tiers.
    finding: C₄ (single-portal political choice) is the pivotal variable in cross-national comparison but is not included in the core abductive set; Nordic BankID success = C₁ + C₂ + C₃ + C₄ all in place; FranceConnect partial failure = all three simultaneously absent.
    formal: "C₁ (soft) ∧ C₂ (hard) ∧ C₃ (dual-track)  ⇒  burden_absorbed(S, G_w)"

  - section: §5 — Taiwan Quantitative Exclusion Estimates
    title: Three-Tier Thresholds + Counterfactual Reduction
    role: Provides causal argument + quantitative evidence — if D₁* is a normative requirement, quantitative analysis is needed to see how many people would be excluded without mitigation; otherwise the claim remains abstract.
    body: Three non-overlapping threshold tiers&#58; A device threshold 3.4 million / B digital literacy 1.65 million / C cognitive and physical 0.95 million; median 6 million (strict summation) / 3.2–4.8 million (conservative adjusted). Counterfactual D all three reinforcements in place (paper-based + customer service + authorised proxy) reduces this to 0.65–1.1 million, a 72.5–83.8% reduction. Remaining exclusion consists primarily of those with severe cognitive disabilities, remote-dwelling isolated individuals, and new residents and migrant workers.
    finding: Causal argument strength ceiling is "medium-strong"; quantitative estimates ≠ precise predictions; exclusion ≠ natural attrition; 65+ share of 17.0% must be cited.
    formal: "exclusion_population(t₀ no_compensation) ∈ [320, 480] × 10⁶   |   with C₁∧C₂∧C₃: [65, 110] × 10⁶"

  - section: §6 — Five Boundary Conditions + Commercial vs. Government Obligations
    title: Seven Cross-National Cases + Normative Category Distinction
    role: Provides cross-national comparison + normative category distinction — without cross-national testing, CB-Justice risks being misread as Western-centric; without distinguishing commercial wallet from government wallet obligations, normative misapplication will arise.
    body: Nordic BankID (D₁* ∧ D₂* both satisfied, special conditions) / Estonia X-Road / Singapore SingPass (issuer-centric counterexample) / India Aadhaar (partial failure) / France FranceConnect (partial D₂* violation) / USA Login.gov (fragmented failure) / South Korea mobile ID (emerging). Five boundary conditions B1–B5&#58; commercial vs. government wallet normative category distinction / civic education investment / KYC interface pathway / multi-dimensional digital divide intersection / legal status of alternative pathways.
    finding: Commercial wallet (contract + consumer protection + arbitration) vs. government wallet (rule of law + public service + state compensation) differ in normative category, not degree — applying the same obligation framework to both produces normative misapplication.
    formal: "duty(commercial_wallet) ⊨ {contract, consumer_protection, arbitration}  ≠  duty(government_wallet) ⊨ {admin_procedure, public_service, state_compensation}"

chain:
  title: Three-Tier Thresholds + Counterfactual Reduction
  steps:
    - tag: A
      kind: deterministic
      text: Device threshold&#58; no smartphone + no NFC-enabled phone → median exclusion 3.4 million (range 2.9–4 million)
    - tag: B
      kind: deterministic
      text: Digital literacy threshold&#58; unable to independently complete wallet onboarding five-step process → median exclusion 1.65 million (range 1–2.2 million)
    - tag: C
      kind: deterministic
      text: Cognitive and physical threshold&#58; visual / auditory / motor / cognitive / language disabilities → median exclusion 0.95 million (range 0.6–1.4 million)
    - tag: D₀
      kind: deterministic
      text: Without mitigation, combined median exclusion 3.2–4.8 million (13.7–20.5% of total population)
    - tag: D₁
      kind: probabilistic
      text: Counterfactual — mandatory paper-based option with no expiry → remaining exclusion 0.5–0.8 million (80–87.5% reduction)
    - tag: D₂
      kind: probabilistic
      text: Counterfactual — 24/7 multilingual customer service + video assistance + community service points → remaining 1.9 million (52.5% reduction)
    - tag: D₃
      kind: probabilistic
      text: Counterfactual — legal authorised proxy pathway (family member / caregiver / social worker written authorisation + audit log) → remaining 1.9 million (52.5% reduction)
    - tag: D*
      kind: deterministic
      text: All three combined (A + B + C simultaneously in place) → remaining 0.65–1.1 million (72.5–83.8% reduction)
  legend:
    - kind: deterministic
      label: Mechanistic necessity (demographics + device penetration)
    - kind: probabilistic
      label: Probabilistic (contingent on quality of policy implementation)

borders:
  - label: Counter-argument 1
    title: Holder-centric design is inherently superior
    pivot: The counter-argument claims that "returning control to users is progress." But SingPass is issuer-centric yet achieves high UX; NIST SP 800-63-4 lists subscriber-controlled wallets as "one option" rather than the single optimum; Cavoukian 2009 PbD emphasises that "by design" requires institutional support and is not automatically achieved by wallet UI.
    flip: The counter-argument reveals&#58; normative superiority is a normative claim that requires D₁* ∧ D₂* + C₁ ∧ C₂ ∧ C₃ to be honoured at the engineering level.
  - label: Counter-argument 2
    title: Cost transfer is a market mechanism
    pivot: The counter-argument claims that "shifting costs will incentivise user self-education and wallet provider competition." However, data from ENISA and TW DIW pilot programmes consistently show that market mechanisms do not automatically absorb the costs borne by vulnerable users; Sasse & Flechais 2005 long demonstrated that designs pushing security responsibility onto users ultimately result in system failure.
    flip: The counter-argument reveals&#58; cross-platform non-portability is a consequence of platform lock-in, unrelated to market efficiency; a 22% onboarding failure rate among users aged 65+ is counter-evidence against the market mechanism claim.
  - label: Counter-argument 3
    title: Consumer protection equals regulatory suppression
    pivot: The counter-argument claims that "mandatory verifier certification raises compliance costs and stifles startups." But consumer protection legislation is a 30-year accumulation of civil society consensus since 1994; EU eIDAS 2.0 regulation of wallet providers has not suppressed innovation — clear regulation has reduced uncertainty for relatively smaller vendors.
    flip: The counter-argument reveals&#58; consumer protection is necessary infrastructure for market operation, not the market's opposite; Solove & Hartzog 2014's observations on the FTC confirm this argument.

conditions:
  title: Three-Tier Compulsory Reinforcement Conditions C₁ ∧ C₂ ∧ C₃
  formalPrelude: "∀ holder_centric S : valid(S) ⇒ C₁ ∧ C₂ ∧ C₃   (necessary)"
  items:
    - title: C₁ — Privacy-by-Default UX (Soft Compulsion)
      body: Nudge norms + WCAG 2.2 SC 1.4.3 contrast 4.5&#58;1 / 1.4.4 text 200% / 1.4.10 reflow / 2.5.7 dragging movements / 2.5.8 target size 24×24 pixels + Section 508 + W3C ATAG/UAAG. Elderly-friendly design decomposed into cognitive / sensory / operational three tiers.
      formal: "C₁: ∀ wallet UX : default = minimal_disclosure ∧ WCAG_2.2_AA(UX)"
    - title: C₂ — Verifier Certification System (Hard Compulsion)
      body: eIDAS 2.0 qualified TSP must be certified by a conformity assessment body + ETSI EN 319 401 + 411-1 + 411-2 + ISO/IEC 27701 / 29115. Taiwan's existing Consumer Protection Act + Personal Data Protection Act framework can carry this obligation.
      formal: "C₂: ∀ verifier v : qualified(v) ⇒ accredited_by(CAB, v) ∧ ∈ trust_list"
    - title: C₃ — Unified Dispute Adjudication Body (Dual-Track Compulsion)
      body: Consumer Protection Act Arts. 43–47 (complaint → mediation → class action) + Personal Data Protection Act Arts. 28–31 statutory damages + Administrative Litigation Act / Petition Act (government wallet) / Civil Code Art. 184 + Arbitration Act (commercial wallet) + EU ADR Directive 2013/11.
      formal: "C₃: ∀ dispute d : ∃ unified_forum(d) ∧ effective_remedy(d)"
    - title: B1–B5 Boundary Conditions
      body: B1 weak-identity-document states / B2 Aadhaar lessons / B3 shared device / B4 multi-rooted conditions satisfied / B5 cross-jurisdictional recognition spectrum.
      formal: "valid(deployment) ⇔ ⋀ⱼ Bⱼ   (j ∈ 1..5)"
    - title: C₄ — Single-Portal Political Choice (Not Included in Core Abductive Set)
      body: The pivotal variable in Nordic BankID's success, but involves sovereign choice and path dependence of governance history; not included in the minimal engineering-sociological set.
      formal: "C₄: optional but pivotal in Nordic case"
    - title: Normative Category Distinction&#58; Commercial vs. Government Wallet Obligations
      body: Commercial wallet (contract + consumer protection + arbitration) vs. government wallet (rule of law + public service + state compensation); this is a normative category difference, not a difference of degree; applying the same obligation framework to both produces normative misapplication.
      formal: "duty(commercial_wallet) ≠ duty(government_wallet)   (categorical, not gradient)"

conclusion:
  paragraphs:
    - From MOICA to TW DIW, from issuer-centric to holder-centric, the democratic cost is redistributed across four dimensions. The CB-Justice dual criterion composed of Rawls's Difference Principle and Anderson's relational equality shares a conjunctive structure with article 03's H1' three walls, article 04's T three-part conjunction, article 05's IT' impossibility triangle, and article 07's SRP — but operates at different levels; <strong>CB-Justice is the normative precondition for holder-centric design transitions, requiring that the primary goods and democratic citizenship of the most vulnerable must not be stripped away.</strong>
    - The three-tier compulsory reinforcement conditions (C₁ soft compulsion UX, C₂ hard compulsion verifier certification, C₃ dual-track compulsion dispute adjudication) must all be in place simultaneously; <strong>Taiwan's quantitative estimates project a median exclusion of 3.2–4.8 million people without mitigation, falling to 0.65–1.1 million with all three reinforcements in place — a 72.5–83.8% reduction.</strong>
    - <strong>The normative superiority of holder-centric design is not an engineering fact</strong>; for the promises of autonomy, minimal disclosure, and composability to be genuinely honoured, safeguards must come first, and the legal status of paper-based, customer service, and authorised proxy alternative pathways must be explicitly guaranteed by legislation.
  formalCoda: |
    Final form:
      CB-Justice ⇔ D₁* ∧ D₂*   (necessary, not sufficient)
      holder_centric_valid ⇔ CB-Justice ∧ C₁ ∧ C₂ ∧ C₃ ∧ ⋀ⱼ Bⱼ
      duty(commercial) ≠ duty(government)   (categorical)
      Taiwan: "exclusion(no_compensation) ∈ [320, 480]M  →  with C₁∧C₂∧C₃: [65, 110]M"
