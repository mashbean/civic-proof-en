slug: 2026-05-05-civic-burden-redistribution
title: 數位皮夾把民主成本下放給誰
subtitle: Civic Burden 的分配正義分析

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: 從 issuer-centric（MOICA）轉向 holder-centric（TW DIW）的設計選擇，會在四個面向重新分配 civic burden（理解 / 驗證接入 / 信任判斷 / 爭議責任）。這種重新分配在缺乏配套時違反 Rawls 差別原則 + Anderson 關係平等的雙重必要條件 CB-Justice = D₁* ∧ D₂*。台灣量化估計顯示無補強下中位排除 320-480 萬人；三項分層強制補強齊備可降至 65-110 萬。
  summary: CB-Justice = D₁* ∧ D₂*；必要而非充分；compulsory 補強分軟硬雙軌三層。
  formal:
    expression: |
      CB-Justice  ⇔  D₁*  ∧  D₂*

      D₁* (Rawls, lexical): S 通過 D₁* iff
        (i) ¬violate(S, basic_liberties)
        (ii) ¬violate(S, FEO)
        (iii) ∀ G_w : primary_goods(G_w, t₁) ≥ primary_goods(G_w, t₀)

      D₂* (Anderson): S 通過 D₂* iff
        (i) ¬oppression(S, ∀ groups)
        (ii) ¬strip(S, common_citizenship)
        (iii) ¬weaken(S, social_equal_standing)

      C₁ (soft) ∧ C₂ (hard) ∧ C₃ (dual-track) → mitigate(burden_shift)
    caption: CB-Justice 雙重判準是必要而非充分條件——即便雙重判準滿足，仍可能在 Hayek 知識分散、Sen capability、認可正義、跨世代維度失敗。
    legend:
      - symbol: D₁*
        meaning: Rawls 差別原則辭典序版本（含基本自由 + FEO 公平機會 + 最不利者基本益品）
      - symbol: D₂*
        meaning: Anderson 關係平等民主公民身分版本（無壓迫 + 共同公民身分 + 社會交往對等地位）
      - symbol: G_w
        meaning: 最不利處境群體（年長者 / 低數位識讀 / 無智慧型手機 / 流動人口 / disability）
      - symbol: t₀, t₁
        meaning: 設計轉換 S 前狀態 / 後穩態（含配套）
      - symbol: C₁ / C₂ / C₃
        meaning: 三項分層強制補強條件（軟強制 UX / 硬強制 verifier 認證 / 雙軌強制爭議裁決）
      - symbol: C₄
        meaning: 單一入口的政治選擇（不納入溯因核心）

transitions:
  beforeDistinction: 公式給出規範前提。第一步要區分兩條被混用的設計取向：把問責放在 issuer（MOICA）vs 把問責放在 holder（TW DIW）。後者並非天然優越，而是需要配套才能避免成本下放給弱勢。
  beforePillars: 區分本身只是宣告。要證明 CB-Justice 雙重判準是 holder-centric 設計的規範前提，需要五條獨立支撐——四面向 civic burden 的盤點、Rawls + Anderson 雙判準演繹、三項分層強制補強、台灣量化排除人口、跨國七案例對照。
  beforeChain: 五條 pillar 建立後，量化部分要看具體因果鏈。台灣三層門檻（A 設備 / B 數位識讀 / C 認知與身體）在無補強下中位排除 320-480 萬；三項補強齊備可降至 65-110 萬（72.5-83.8% 降幅）。
  beforeBorders: 反論集中在「holder-centric 天然優越」、「成本轉移是中性現象」、「消費者保護 = 監管打壓」三條——檢視每條反論的實證後，它們都示範了「沒有配套就會崩盤」的不同形式。
  beforeConditions: 反論吸收後，留下三項分層強制補強條件 C₁ / C₂ / C₃ 的具體設計義務，加上 5 條邊界條件 B1-B5。
  beforeConclusion: 雙重判準 + 三項補強 + 量化排除 + 5 邊界 + 跨國對照收束於：holder-centric 規範優越是規範性主張，不是工程事實；要兌現自主允諾，配套必須先到。

distinction:
  rejected:
    label: ❌ 被拒絕
    title: holder-centric 天然優越
    body: 「holder-centric 設計把控制權還給使用者，所以是進步。」這個取向假設 holder 有能力承擔被下放的成本（理解 / 驗證 / 信任 / 爭議），把不對稱負擔當成中性事實。Singapore SingPass（issuer-centric）是高 UX 反例；NIST SP 800-63-4 ipd 把 holder-centric 列為「一種選項」而非單一最優。
    formal: holder_centric ⊨ optimal(∀ users)   ❌ 無實證根據
  accepted:
    label: ✓ 被辯護
    title: CB-Justice = D₁* ∧ D₂*（必要非充分）
    body: holder-centric 規範優越是規範性主張，需通過 D₁*（最不利者基本益品不下降）+ D₂*（共同公民身分不被剝奪）雙重必要條件。三項分層強制補強條件（C₁ 軟強制 UX / C₂ 硬強制 verifier 認證 / C₃ 雙軌強制爭議裁決）是兌現規範優越的工程義務。
    formal: holder_centric_valid ⇔ D₁* ∧ D₂* ∧ C₁ ∧ C₂ ∧ C₃

pillars:
  - section: §2 — 四面向 civic burden 重新分配
    title: 理解 / 驗證 / 信任 / 爭議
    role: 提供經驗錨點——若 civic burden 是抽象概念，需要先看具體在哪四個面向被重新分配。
    body: (1) 理解負擔（issuer 中央教育 → holder 個人）；(2) 驗證接入負擔（中央 API → verifier 自行整合）；(3) 信任判斷負擔（中央信任清單 → holder + verifier 分散判斷）；(4) 爭議責任歸屬（清楚二元 → 多方不明確）。issuer-centric / holder-centric 是責任分配光譜（不是二元對立），TW DIW 信任清單仍由公部門法定授權。
    finding: 7 操作化指標（跨平台可攜學習 / 撤銷恢復 / verifier 整合合規 / holder 判斷 / 第三方責任空白 / 跨境 fallback / 失能人工救濟）；成本轉移系統性放大「年齡 × 數位識讀 × 設備可得性」三軸不平等。
    formal: "burden_redistribution(S) = ⟨理解, 驗證, 信任, 爭議⟩  with asymmetric impact on G_w"

  - section: §3 — Rawls + Anderson 雙重判準
    title: D₁* ∧ D₂* 演繹
    role: 提供規範前提——若沒有形式化的雙重判準，「不公平」只是直覺；只有把 Rawls D₁* 與 Anderson D₂* 合取為必要條件，才能讓「holder-centric 需通過」成為可被檢驗的命題。
    body: D₁*（辭典序內）+ D₂*（民主公民身分）合取必要條件。Rawls 差別原則要求最不利者基本益品 + 自尊基礎不下降；Anderson 關係平等要求無結構性壓迫 + 共同公民身分 + 社會交往對等地位。雙重判準合取覆蓋互補：DP 處理分配 / DE 處理關係。
    finding: D₁* ∧ D₂* 是必要而非充分——Hayek-Sowell 反論吸收（「保留 fallback」+ G_w 動態化）；其他失敗模式仍可能（Sen capability / 認可正義 / 跨世代）。
    formal: "CB-Justice ⇔ D₁* ∧ D₂*   (necessary, not sufficient)"

  - section: §4 — 三項分層強制補強
    title: C₁ 軟強制 / C₂ 硬強制 / C₃ 雙軌強制
    role: 提供工程義務——雙重判準是規範前提，但要兌現需要工程層的具體補強。三項分層強制是把規範要求翻譯成可被執行的義務。
    body: C₁ 預設安全 UX（軟強制：依靠 nudge 規範性 + WCAG 2.2 / Section 508 + Hartzog 2018 design-as-law）；C₂ verifier 認證制度（硬強制：eIDAS 2.0 qualified TSP + ETSI EN 319 401 / 411）；C₃ 統一爭議裁決機關（雙軌強制：消保法 1994 / 個資法 2010 / 行政訴訟法）。老人友善拆解認知 / 感官 / 操作三層。
    finding: C₄（單一入口政治選擇）是跨國比較關鍵變因但不納入溯因核心；BankID 北歐三國成功 = C₁ + C₂ + C₃ + C₄ 齊備；FranceConnect 部分失敗 = 三項同步缺席。
    formal: "C₁ (soft) ∧ C₂ (hard) ∧ C₃ (dual-track)  ⇒  burden_absorbed(S, G_w)"

  - section: §5 — 台灣量化排除人口
    title: 三層門檻 + 反事實降幅
    role: 提供因果論證 + 量化證據——若 D₁* 是規範要求，需要量化看「無補強」會排除多少人。否則仍是抽象命題。
    body: 三層門檻互不重疊：A 設備門檻 340 萬 / B 數位識讀 165 萬 / C 認知身體 95 萬；中位 600 萬（嚴格加總）/ 320-480 萬（保守通報）。反事實 D 三補強齊備（紙本 + 客服 + 委任）可降至 65-110 萬，降幅 72.5-83.8%。剩餘排除主要為重度認知障礙、偏遠獨居、新住民移工。
    finding: 因果論證強度上限「中強」；量化估計 ≠ 精確預測；排除 ≠ 自然淘汰；65+ 比例 17.0% 必須引用。
    formal: "exclusion_population(t₀ no_compensation) ∈ [320, 480] × 10⁶   |   with C₁∧C₂∧C₃: [65, 110] × 10⁶"

  - section: §6 — 5 條邊界條件 + 商業 vs 政府義務
    title: 跨國七案例 + 規範類別差異
    role: 提供跨國比較 + 規範類別區分——若不在跨國對照中檢驗，CB-Justice 會被誤推為西方中心主義；若不區分商業 wallet 與政府 wallet 的義務，會出現規範錯置。
    body: 北歐 BankID（D₁* ∧ D₂* 雙滿足，特殊條件）/ Estonia X-Road / Singapore SingPass（issuer-centric 反例）/ 印度 Aadhaar（部分失敗）/ 法國 FranceConnect（D₂* 部分違反）/ 美國 Login.gov（碎片化失敗）/ 韓國 모바일 신분증（新興）。5 條邊界 B1-B5：商業 vs 政府義務規範類別差異 / 公民教育投資 / KYC 銜接路徑 / 數位落差多維交叉 / 替代路徑法律地位。
    finding: 商業 wallet（契約 + 消保 + 仲裁）vs 政府 wallet（依法行政 + 公共服務 + 國賠）規範類別不同，不是程度差異——把兩者套同一義務體系會出現規範錯置。
    formal: "duty(commercial_wallet) ⊨ {contract, consumer_protection, arbitration}  ≠  duty(government_wallet) ⊨ {admin_procedure, public_service, state_compensation}"

chain:
  title: 三層門檻 + 反事實降幅
  steps:
    - tag: A
      kind: deterministic
      text: 設備門檻：無智慧型手機 + 無 NFC 手機 → 中位排除 340 萬人（範圍 290-400 萬）
    - tag: B
      kind: deterministic
      text: 數位識讀門檻：無法獨立完成 wallet onboarding 五步驟 → 中位排除 165 萬（範圍 100-220 萬）
    - tag: C
      kind: deterministic
      text: 認知與身體門檻：視 / 聽 / 手 / 認知 / 語言障礙 → 中位排除 95 萬（範圍 60-140 萬）
    - tag: D₀
      kind: deterministic
      text: 無補強下中位排除合計 320-480 萬人（13.7-20.5% 總人口）
    - tag: D₁
      kind: probabilistic
      text: 反事實 — 強制紙本不限期並行 → 剩餘排除 50-80 萬人（80-87.5% 降幅）
    - tag: D₂
      kind: probabilistic
      text: 反事實 — 24/7 多語客服 + 視訊 + 社區據點 → 剩餘 190 萬（52.5% 降幅）
    - tag: D₃
      kind: probabilistic
      text: 反事實 — 合法委任路徑（家屬 / 看護 / 社工書面授權 + audit log）→ 剩餘 190 萬（52.5% 降幅）
    - tag: D*
      kind: deterministic
      text: 三條合計（A + B + C 同時到位）→ 剩餘 65-110 萬人（72.5-83.8% 降幅）
  legend:
    - kind: deterministic
      label: 機制必然（人口統計 + 設備普及）
    - kind: probabilistic
      label: 概率性（依政策實作品質）

borders:
  - label: 反論 1
    title: holder-centric 天然優越
    pivot: 反論訴求是「把控制權還給使用者就是進步」。但 SingPass 是 issuer-centric 卻取得高 UX；NIST SP 800-63-4 把 subscriber-controlled wallet 列為「一種選項」而非單一最優；Cavoukian 2009 PbD 強調「by design」需要制度配合，不是 wallet UI 自動實現。
    flip: 反論揭露：規範優越是規範性主張，需要 D₁* ∧ D₂* + C₁ ∧ C₂ ∧ C₃ 才能在工程層兌現。
  - label: 反論 2
    title: 成本轉移是市場機制
    pivot: 反論訴求是「成本下放會推動使用者自我教育、推動 wallet provider 競爭」。但 ENISA + TW DIW 試辦資料一致顯示市場機制不會自動吸收弱勢使用者的成本；Sasse & Flechais 2005 早已論證把安全責任推給使用者的設計最終以系統失敗告終。
    flip: 反論揭露：跨平台不可攜屬於平台鎖定的後果，與市場效率無關；65+ onboarding 失敗率 22% 是市場機制的反證。
  - label: 反論 3
    title: 消費者保護 = 監管打壓
    pivot: 反論訴求是「強制 verifier 認證會抬高合規成本、扼殺新創」。但消保法是 1994 年立法後 30 年累積的市民社會共識；EU eIDAS 2.0 規範 wallet provider 並未壓抑創新——明確規範降低了相對小型廠商的不確定性。
    flip: 反論揭露：消費者保護是市場運作的必要基礎設施，不是市場的對立面；Solove & Hartzog 2014 對 FTC 的觀察印證此論。

conditions:
  title: 三項分層強制補強條件 C₁ ∧ C₂ ∧ C₃
  formalPrelude: "∀ holder_centric S : valid(S) ⇒ C₁ ∧ C₂ ∧ C₃   (necessary)"
  items:
    - title: C₁ — 預設安全 UX（軟強制）
      body: nudge 規範性 + WCAG 2.2 SC 1.4.3 對比 4.5:1 / 1.4.4 文字 200% / 1.4.10 reflow / 2.5.7 dragging movements / 2.5.8 target size 24×24 pixels + Section 508 + W3C ATAG/UAAG。老人友善拆認知 / 感官 / 操作三層。
      formal: "C₁: ∀ wallet UX : default = minimal_disclosure ∧ WCAG_2.2_AA(UX)"
    - title: C₂ — verifier 認證制度（硬強制）
      body: eIDAS 2.0 qualified TSP 須經 conformity assessment body 認證 + ETSI EN 319 401 + 411-1 + 411-2 + ISO/IEC 27701 / 29115。台灣消保法 + 個資法既有框架可承擔。
      formal: "C₂: ∀ verifier v : qualified(v) ⇒ accredited_by(CAB, v) ∧ ∈ trust_list"
    - title: C₃ — 統一爭議裁決機關（雙軌強制）
      body: 消保法第 43-47 條（申訴 → 調解 → 團體訴訟）+ 個資法第 28-31 條法定賠償 + 行政訴訟法 / 訴願法（政府 wallet）/ 民法 184 條 + 仲裁法（商業 wallet）+ EU ADR Directive 2013/11。
      formal: "C₃: ∀ dispute d : ∃ unified_forum(d) ∧ effective_remedy(d)"
    - title: B1-B5 邊界條件
      body: B1 弱身分證國家 / B2 Aadhaar 教訓 / B3 共用裝置 / B4 multi-rooted 條件成立 / B5 跨法域承認光譜。
      formal: "valid(deployment) ⇔ ⋀ⱼ Bⱼ   (j ∈ 1..5)"
    - title: C₄ — 單一入口政治選擇（不納入溯因核心）
      body: BankID 北歐成功的關鍵變因，但涉及主權選擇與治理史路徑依賴；不納入工程社會學的最小集。
      formal: "C₄: optional but pivotal in Nordic case"
    - title: 商業 vs 政府義務規範類別差異
      body: 商業 wallet（契約 + 消保 + 仲裁）vs 政府 wallet（依法行政 + 公共服務 + 國賠）；不是程度差異，是規範類別差異；把兩者套同一義務體系會出現規範錯置。
      formal: "duty(commercial_wallet) ≠ duty(government_wallet)   (categorical, not gradient)"

conclusion:
  paragraphs:
    - 從 MOICA 到 TW DIW，從 issuer-centric 到 holder-centric，民主成本在四個面向重新分配。Rawls 差別原則 + Anderson 關係平等構成的 CB-Justice 雙重判準，與 article 03 H1' 三道牆、article 04 T 三件式、article 05 IT' 不可能三角、article 07 SRP 同樣是合取結構，但用於不同層級；<strong>CB-Justice 是 holder-centric 設計轉換的規範前提，要求最弱勢者的基本益品與民主公民身分都不被剝奪。</strong>
    - 三項分層強制補強條件（C₁ 軟強制 UX、C₂ 硬強制 verifier 認證、C₃ 雙軌強制爭議裁決）必須同時到位；<strong>台灣量化估計顯示無補強下中位 320-480 萬人實質排除，三補強齊備可降至 65-110 萬，72.5-83.8% 降幅。</strong>
    - <strong>Holder-centric 的規範優越並非工程事實</strong>；要讓自主、最小揭露、可組合的允諾真的兌現，配套必須先到，紙本、客服、委任三條替代路徑的法律地位必須由立法明文保障。
  formalCoda: |
    Final form:
      CB-Justice ⇔ D₁* ∧ D₂*   (necessary, not sufficient)
      holder_centric_valid ⇔ CB-Justice ∧ C₁ ∧ C₂ ∧ C₃ ∧ ⋀ⱼ Bⱼ
      duty(commercial) ≠ duty(government)   (categorical)
      Taiwan: "exclusion(no_compensation) ∈ [320, 480]M  →  with C₁∧C₂∧C₃: [65, 110]M"
