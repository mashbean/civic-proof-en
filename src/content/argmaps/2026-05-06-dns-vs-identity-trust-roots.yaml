slug: 2026-05-06-dns-vs-identity-trust-roots
title: Why DNS Cannot Be Replicated&#58; Why Identity Governance Cannot Simply Copy the Domain Name Model
subtitle: Historical Mismatch — Argument Map (v2)
coreThesis:
  text: Using DNS as a template for digital identity governance commits the error of "historical precondition misplacement." The four preconditions of DNS governance history (early community culture / strategic state withdrawal / technical neutrality discourse / IANA transition multi-veto points) all fail in the identity domain — P_DNS and P_ID are disjoint. The FTLA four-tier governance framework is an alternative design, but cannot be directly copied — it must correspond to the sovereignty density of each layer.
  summary: The four enabling preconditions of DNS governance do not hold for digital identity. P_DNS ∩ P_ID = ∅.
  formal:
    expression: |
      HM:  ∀ Pᵢ ∈ P_DNS,  Pᵢ ∉ P_ID
      ⇒  ¬transferable(governance_model(DNS), identity)

      FTLA:  ⊨ identity_governance  ⇔  ⋀_{ℓ=1..4} L_ℓ  ∧  sovereignty_density_match(L_ℓ)
    caption: HM is a "conjunctive maximisation unreachable" structure&#58; the four preconditions P1–P4 of DNS governance all fail in the identity domain, so the entire conjunction is unsatisfied. The FTLA four tiers (L1–L4) are stratified by sovereignty density, and each tier's governance mechanism must match the sovereignty density of that tier.
    legend:
      - symbol: P_DNS
        meaning: The four enabling preconditions of DNS governance history ({P1, P2', P3', P4'} revised version)
      - symbol: P_ID
        meaning: The set of preconditions that could enable identity governance ({P1'', P2'', P3'', P4''} — all corresponding positions fail)
      - symbol: HM
        meaning: Historical Mismatch — precondition misplacement (DNS experience is not transferable to identity)
      - symbol: FTLA
        meaning: Four-Tier Layered Architecture — four-tier governance framework (protocol / standard / implementation / application)
      - symbol: L₁..L₄
        meaning: The four governance tiers of FTLA (L1 protocol root / L2 standard / L3 implementation / L4 application)
      - symbol: ⋀
        meaning: Big conjunction (all tiers simultaneously necessary)
      - symbol: ∉
        meaning: "Does not belong to" (negation of ∈)

transitions:
  beforeDistinction: The formula states the position, but the first step is to distinguish two ways of viewing the DNS-identity analogy. Most engineering communities treat DNS as "a successful decentralised governance template that can be directly transferred to identity"; this map opposes that classification — it should be treated as "an accidental product of specific historical conditions, which ceases to hold once those conditions are removed."

  beforePillars: The distinction itself is merely a declaration. To demonstrate that "DNS experience is not transferable to identity," four independent sources are needed&#58; analysis of the preconditions across the four phases of DNS governance history, evidence of corresponding failure at P1''–P4'' in the identity domain, a criteria matrix for analogising four cross-national governance models, and the feasibility of the FTLA alternative design. Without all four, the argument reverts to anti-DNS-analogy rhetoric.

  beforeChain: The four pillars provide the positive argument. But the claim "P_DNS ∩ P_ID = ∅" requires a concrete counterfactual chain to underpin it. From the 1969 ARPANET early community, to the 1980–90s US strategic withdrawal, to the technical neutrality discourse deliberately constructed by the engineering community, to the 2014–2016 IANA Stewardship Transition — each phase has a corresponding identity-context failure, and five counterfactual scenarios provide mechanistic tracing.

  beforeBorders: Once the position and counterfactual chain are established, counter-arguments become genuinely threatening. "The ITU model can be borrowed," "the IETF model can be borrowed," "the W3C model can be borrowed," and "the ICANN model can be borrowed" are four arguments commonly cited as reasons; but careful examination of each model against five applicability criteria (sovereignty density / stakeholder structure / technical reversibility / standards speed / remedy mechanism) reveals that each holds only in a narrow domain — cross-contextual generalisation is not warranted.

  beforeConditions: Once the counter-arguments are absorbed, what remains are the design implications&#58; under what conditions can FTLA four-tier governance be deployed without degenerating? The four boundary conditions (sovereignty density match / sub-domain replication feasibility / three major governance risk avoidance / remedy mechanism embedding) translate the abstract "FTLA" into testable engineering obligations.

  beforeConclusion: Bringing together the five layers of governance history, counterfactuals, analogy, design, and boundaries, the map ultimately argues for the methodology of "historical precondition matching" (the irreplicability of DNS being only one application of this result), and for a sovereignty-density principle that cuts across all levels.

distinction:
  rejected:
    label: ❌ Rejected
    title: DNS governance model is transferable to identity
    body: Treating the 1969–2016 DNS governance history as a replicable template for "decentralised identity governance." This structure assumes that the historical preconditions of the two domains are similar; but the four preconditions of DNS — "early community culture + strategic state withdrawal + technical neutrality discourse + IANA transition" — all fail in the identity domain&#58; identity has never had an early community phase (national governments dominated from the start), states have never withdrawn (high vigilance), identity inherently involves sovereignty (technical neutrality is impossible), and there is no IANA-equivalent transition mechanism.
    formal: "P_DNS = {P1, P2', P3', P4'}  ∧  P_ID = {P1'', P2'', P3'', P4''}  ∧  P_DNS ∩ P_ID = ∅"
  accepted:
    label: ✓ Defended
    title: FTLA Four-Tier Governance + Sovereignty Density Match
    body: Decompose identity governance into four tiers&#58; L1 protocol root (high sovereignty density — who is a citizen, who may revoke, cross-border validity; must be governed by states or multilateral organisations, borrowing ITU model + national administrative layer); L2 standards (medium sovereignty density — interoperability formats, ZK specifications, revocation mechanism; can be governed by W3C/IETF model, but requires "sovereignty reservation interfaces"); L3 implementation (low sovereignty density — open-source SDK, vendor implementation, performance optimisation; market + open-source suffices); L4 application (varies by scenario — financial identity high sovereignty, social identity low sovereignty; configured by scenario). Each tier's governance mechanism must match its sovereignty density — applying L1 governance to L4 mechanisms causes collapse, and vice versa.
    formal: "FTLA:  ⊨ identity_governance  ⇔  ⋀_{ℓ=1..4} L_ℓ  ∧  sovereignty_density_match(L_ℓ)"

pillars:
  - section: §2 — Four Phases of DNS Governance History
    title: Enabling Conditions for P1 / P2' / P3' / P4'
    role: Provides historical grounding — if DNS governance history had no preconditions to speak of (purely natural technical evolution), HM has nothing to argue from. But the four-phase timeline (1969–2016) shows that each phase had specific political-economic preconditions; change the preconditions and the governance model ceases to be replicable.
    body: "P1 — Postel-era early academic community culture (1969–1980s, hundreds-of-people scale, strong trust, weak commercial interests). P2' — 1980–90s US strategic withdrawal of state power (not a surrender of sovereignty, but a choice after judging that 'commercial internet growth > cost of control'). P3' — technical neutrality discourse deliberately constructed by the engineering community (IETF culture elevated 'rough consensus and running code' to a governance norm). P4' — IANA Stewardship Transition was a political product that barely passed through multiple veto points (2014–2016, requiring agreement from NTIA / IANA / ICANN / Government Advisory Committee). The core feature of all four phases is the dual support of 'strategic state withdrawal + engineering community culture construction.'"
    finding: P_DNS = {P1, P2', P3', P4'} is the conjunctive necessary condition for DNS governance to hold; if any one condition fails, DNS governance would have followed a different historical path.
    formal: "DNS_governance(model) ⇔ P1 ∧ P2' ∧ P3' ∧ P4'"

  - section: §3 — HM Conjunctive Claim
    title: P1''–P4'' All Fail in the Identity Domain
    role: Provides counter-evidence — if DNS's four preconditions all held in the identity domain, HM would collapse; but since all four corresponding positions fail, HM becomes a clear case of "conjunctive maximisation unreachable."
    body: "HM formalisation&#58; ∀ Pᵢ ∈ P_DNS, Pᵢ ∉ P_ID. P1'' — identity's early community was dominated by national governments (no prior accumulation of P1's academic community culture; identity systems were government infrastructure from the outset). P2'' — state power remains highly vigilant (no strategic withdrawal; identity directly connects to taxation, social welfare, and borders — states cannot withdraw). P3'' — identity inherently involves sovereignty (technical neutrality is impossible; any identity system's root involves the sovereign question of 'who is a citizen'). P4'' — no IANA-equivalent transition mechanism exists (identity systems have no 'neutral intermediary' to bear the transition role; UN/UNHCR both carry political colouring). Five counterfactual scenarios in support&#58; (a) what if identity had an early community phase; (b) what if states withdrew; (c) what if technical neutrality discourse existed; (d) what if an IANA transition existed; (e) what if all four are absent (i.e., reality)."
    finding: P_DNS ∩ P_ID = ∅ is a strong conjunctive claim; if any one precondition in P_DNS held in the identity domain, the argument would need to be downgraded. But all four corresponding positions currently show failure, and the strong form of HM holds.
    formal: "∀ i ∈ {1, 2', 3', 4'} : Pᵢ ∉ P_ID  ⇒  ¬transferable(DNS_model, identity)"

  - section: §4 — Four Cross-National Governance Model Analogies
    title: ITU / IETF / W3C / ICANN Applicability Matrix
    role: Provides precise boundaries on analogy strength — without examining other governance models, HM can still be accused of "only rejecting DNS, not all cross-national governance." Examining the four models of ITU/IETF/W3C/ICANN against five criteria precisely delineates analogy strength.
    body: "Deep description of four models&#58; ITU (state-centric, treaty-driven, slow, remediable); IETF (engineer-centric, consensus-driven, fast, no formal remedy); W3C (vendor-centric, membership-driven, medium speed, dialogue mechanism); ICANN (multi-stakeholder, contract-driven, medium speed, accountability mechanism). Five applicability criteria&#58; J1 sovereignty density, J2 stakeholder structure, J3 technical reversibility, J4 standards speed, J5 remedy mechanism. The four-model applicability matrix shows no single model covers all needs in the identity domain; ITU is partially borrowable for L1, IETF is borrowable for L3, W3C is borrowable for L2/L3, ICANN structure is partially borrowable but the identity domain has higher 'sovereignty density' on criterion J1."
    finding: No single existing governance model can be directly copied; FTLA is a "mixed borrowing" design, selecting the most appropriate model for each tier without copying any whole mechanism.
    formal: "∀ M ∈ {ITU, IETF, W3C, ICANN} : ∃ ℓ : applicable(M, L_ℓ) ∧ ∃ ℓ' : ¬applicable(M, L_ℓ')"

  - section: §5 — FTLA Four-Tier Governance Framework
    title: L₁..L₄ Sovereignty Density Stratification
    role: Provides feasibility of the alternative design — without a concrete implementable alternative, HM is only critique. FTLA four tiers + sovereignty density matching lower "mixed governance" from rhetoric to engineering specification.
    body: "L1 protocol root (high sovereignty density&#58; who is a citizen, who may revoke, cross-border validity; must be governed by states or multilateral organisations, borrowing ITU model + national administrative layer). L2 standards (medium sovereignty density&#58; interoperability formats, ZK specifications, revocation mechanism; can be governed by W3C/IETF model, but requires 'sovereignty reservation interfaces'). L3 implementation (low sovereignty density&#58; open-source SDK, vendor implementation, performance optimisation; market + open-source suffices). L4 application (varies by scenario&#58; financial identity high sovereignty, social identity low sovereignty; configured by scenario). Three major governance risks&#58; R1 cross-tier boundary crossing (routing L1 issues to L3 mechanisms or vice versa); R2 sovereignty density mismatch (applying L4 mechanisms to L1); R3 missing transition mechanism (hard-pushing global unification without an IANA-equivalent)."
    finding: FTLA is not "the identity version of DNS" — it is a design that "decomposes identity governance problems by sovereignty density, applying the corresponding mechanism to each piece." Each tier must have independent success metrics and remedy mechanisms.
    formal: "FTLA(identity) ⇔ ⋀_{ℓ=1..4} (L_ℓ ∧ sovereignty_density_match(L_ℓ) ∧ ¬R₁ ∧ ¬R₂ ∧ ¬R₃)"

  - section: §6 — Sub-Domain Replication Feasibility
    title: 4 Cases + 4 Boundary Conditions
    role: Provides intellectual honesty — without examining FTLA's replication feasibility in sub-domains, HM risks being accused of "only rejecting DNS without offering a viable alternative." Four cases (academic credentials / medical records / travel documents / driving licences) + four boundary conditions precisely delineate FTLA's scope of applicability.
    body: "Four sub-domain cases&#58; (a) academic credentials (W3C VC has partially succeeded, medium sovereignty density); (b) medical records (HL7 FHIR standard is mature, medium sovereignty density, L3 open-source sufficient); (c) travel documents (ICAO eMRTD already exists, high sovereignty density, directly interfaces with article 07 SRP); (d) driving licences (mDL standard advancing, high sovereignty density but cross-state mutual recognition already has precedents). Four boundary conditions&#58; B1 sovereignty density is stratifiable (cannot be flattened); B2 engineering community culture exists (FTLA's L3 implementation tier cannot operate in domains without an equivalent IETF culture, causing the whole framework to collapse to L1+L2 government governance); B3 transition mechanism is constructible (migration pathway from existing systems must be clear); B4 remedy mechanism embedded (each tier must have a remedy design corresponding to article 04's T_Remedy)."
    finding: FTLA is deployable in sub-domains where "sovereignty density is stratifiable + engineering community exists"; for domains where "sovereignty density is uniformly high" (e.g., national civic identity root) or "no engineering community exists," FTLA is not applicable and other designs are needed (such as article 07's MR-CivicProof).
    formal: "applicable(FTLA, subdomain) ⇔ B₁ ∧ B₂ ∧ B₃ ∧ B₄"

chain:
  title: HM Five-Phase Counterfactual Chain&#58; DNS Precondition Removal → Identity Context Derivation
  steps:
    - tag: T0
      kind: deterministic
      text: 1969–1980s — DNS P1 early community established (strong trust, weak commercial interests, state indifference)
    - tag: T1
      kind: deterministic
      text: 1980–90s — DNS P2' US strategic withdrawal (judged commercial growth > cost of control)
    - tag: T2
      kind: deterministic
      text: 1990s–2000s — DNS P3' technical neutrality discourse constructed by IETF culture (rough consensus)
    - tag: T3
      kind: probabilistic
      text: 2014–2016 — DNS P4' IANA Stewardship Transition passed through multiple veto points (NTIA/ICANN/Government Advisory Committee)
    - tag: T4
      kind: deterministic
      text: Identity domain corresponding positions&#58; P1'' government-dominated (not community), P2'' high vigilance (not withdrawal), P3'' involves sovereignty (not neutral), P4'' no transition mechanism
    - tag: T5
      kind: probabilistic
      text: Counterfactuals (a)–(e)&#58; if P_DNS held in the identity domain, different governance paths would result; in reality all four preconditions fail
    - tag: T6
      kind: probabilistic
      text: Conclusion&#58; P_DNS ∩ P_ID = ∅ ⇒ DNS experience is not transferable; FTLA is mixed borrowing, not direct copying
  legend:
    - kind: deterministic
      label: Mechanistic necessity (historical structural facts — counterfactuals cannot overturn them)
    - kind: probabilistic
      label: Probabilistic (contingent on political choice + engineering community culture + multi-veto points passing)

borders:
  - label: Counter-argument 1
    title: The ITU model can be borrowed (state-centric multilateral governance)
    pivot: "The counter-argument claims that 'ITU is a state-centric multilateral governance template that can be directly borrowed into the identity domain.' But examining five criteria&#58; J1 sovereignty density (ITU medium, identity high), J4 standards speed (ITU slow, identity needs fast), J5 remedy mechanism (ITU treaty remedy, identity needs individual remedy) — three criteria do not match. ITU is partially borrowable for the 'cross-border validity' issue of L1 protocol root, but cannot be imported wholesale."
    flip: ITU is not "the template for identity governance" — it is a tool that FTLA's L1 high-sovereignty-density tier can partially borrow. This result inversely supports the "FTLA mixed borrowing" design, not "wholesale ITU transplantation."

  - label: Counter-argument 2
    title: The IETF model can be borrowed (engineer consensus-driven)
    pivot: "The counter-argument claims that 'IETF's rough consensus and running code culture is suitable for all decentralised governance.' But IETF culture was built under the specific historical conditions of 'weak commercial interests + state indifference' — neither condition holds in the identity domain. J1 sovereignty density (IETF low, identity high), J5 remedy mechanism (IETF none, identity essential) — two criteria do not match. IETF is borrowable for L3 implementation layer (open-source SDK standard-setting), but cannot be used for L1."
    flip: IETF is not "the universal solution for identity governance" — it is a culture that FTLA's L3 implementation tier can borrow. This result inversely supports the "FTLA layer-matched mechanism" design.

  - label: Counter-argument 3
    title: The W3C / ICANN model can be borrowed
    pivot: "A genuine partial exception — W3C VC (Verifiable Credentials) has partially succeeded in sub-domains such as academic credentials, and the ICANN multi-stakeholder structure also provides a reference point. But examining J1 sovereignty density (W3C medium, ICANN medium, identity root high), both models are partially borrowable at the L2 standards tier and cannot be extended to L1 protocol root."
    flip: Even if the W3C / ICANN model can be borrowed at L2, universalising "W3C / ICANN is the template for identity governance" cannot be defended. FTLA boundary condition B1 (sovereignty density is stratifiable) precisely demonstrates this kind of exact tier matching.

conditions:
  title: Legitimate Deployment of FTLA Four-Tier Governance Requires Passing Four Boundary Conditions
  formalPrelude: "deploy(FTLA, subdomain) valid ⇔ B₁ ∧ B₂ ∧ B₃ ∧ B₄"
  items:
    - title: B₁ Sovereignty Density Is Stratifiable
      body: The sub-domain must allow the possibility of "allocating sovereignty density by tier." If the entire sub-domain has uniformly high sovereignty density (e.g., the national civic identity root), FTLA degenerates into single-tier governance, which is equivalent to no FTLA. Academic credentials, medical records, and driving licences are stratifiable; civic identity roots are not.
      formal: "B₁: ∃ partition {L₁..L₄} : sovereignty_density(L_ℓ) ≠ sovereignty_density(L_ℓ₊₁)"
    - title: B₂ Engineering Community Culture Exists
      body: The sub-domain must have an IETF-equivalent engineering community culture (rough consensus + running code + open governance). In domains without this culture, FTLA's L3 implementation tier cannot operate, causing the entire framework to collapse to L1+L2 government governance.
      formal: "B₂: ∃ engineering_community(subdomain) ∧ has_culture(rough_consensus, running_code)"
    - title: B₃ Transition Mechanism Is Constructible
      body: The migration pathway from existing systems to FTLA must be constructible jointly by the engineering community and government. Sub-domains without an IANA-equivalent must have an alternative transition mechanism (e.g., staged W3C working group outputs); hard-pushing global unification without a transition mechanism triggers governance risk R3.
      formal: "B₃: ∃ transition_mechanism(current → FTLA) ∧ co-constructed(engineering, government)"
    - title: B₄ Remedy Mechanism Embedded
      body: Each tier L_ℓ must have a remedy design corresponding to article 04's T_Remedy — violation detection + remedy activation + multi-party checks and balances. Tiers without remedy degrade into "vendor lock-in" (L3) or "sovereignty monopoly" (L1).
      formal: "B₄: ∀ ℓ ∈ 1..4 : ∃ remedy(L_ℓ) ⊨ T_Remedy"

conclusion:
  paragraphs:
    - <strong>HM is an application of the methodology of "historical precondition matching," transcending the narrow reading of "a critique of DNS governance."</strong> Directly copying the DNS model onto the identity domain is a category error; the proper course is to examine the differences between the precondition sets P_DNS and P_ID, and then apply the FTLA mixed borrowing design.
    - The debate should shift from "DNS model vs. state model" to <em>"mixed governance stratified by sovereignty density."</em> The value of FTLA lies in selecting the most appropriate tool for each tier by sovereignty density, corresponding to article 07's MR-CivicProof (for the special treatment when L1 sovereignty density is uniformly high); existing models each occupy their tier within FTLA without being displaced.
    - One sovereignty-density principle runs through the entire text&#58; <strong>governance mechanisms must match sovereignty density and cannot be applied across tiers.</strong> L1 high sovereignty density requires state/multilateral mechanisms; L4 low sovereignty density requires market/open-source — this stratification is itself the necessary extension of the FTLA formula.
  formalCoda: |
    Final form:
      HM:  ∀ Pᵢ ∈ P_DNS,  Pᵢ ∉ P_ID  ⇒  ¬transferable(governance_model(DNS), identity)
      FTLA:  ⊨ identity_governance  ⇔  ⋀_{ℓ=1..4} L_ℓ  ∧  sovereignty_density_match(L_ℓ)
      deploy valid  ⇔  ⋀ⱼ Bⱼ  (j ∈ 1..4)
