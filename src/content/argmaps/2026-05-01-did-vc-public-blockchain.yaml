    - tag: T1
      kind: deterministic
      text: Indy 維運成本與技術可持續性壓力浮現（聯盟鏈節點維運 + 升級協調的成本結構，規範必然）
    - tag: T2
      kind: deterministic
      text: 2024-08 — 遷至 Polygon（公共 L2，成本與不可中斷性權衡）
    - tag: T3
