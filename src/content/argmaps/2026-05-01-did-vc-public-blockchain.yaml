# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: 反論 1
    title: CNIL 2018 — 公共鏈與 GDPR Art 17 結構性衝突
    pivot: 反論訴求是 CNIL 2018 〈Blockchain – Solutions for a Responsible Use〉論證公共區塊鏈與 GDPR 第 17 條被遺忘權的衝突——「不可變」特性與「個資刪除權」邏輯不相容。EDPB 後續多份意見延續這條立場。實證強度高，是歐洲個資治理框架的明確立場。
    flip: |
      仔細看，CNIL 與 EDPB 的論證範圍是「公共鏈不適合承載個資」，不是「公共鏈在身分基建無位置」。地圖採此論證並明示「公共鏈不直接寫個資而僅承擔信任錨/時間戳/不可變副本」設計（仿 W3C Bitstring Status List 中立模型 + 台灣 DIW 信任清單錨定模式）。CNIL 反論反向支撐「五個可行位置」的分層設計——公共鏈承擔不寫個資的位置（撤銷狀態 hash、信任清單錨定、時間戳）正是 CNIL 立場可接受的範圍。

  - label: 反論 2
    title: eIDAS 2.0 QTSP 體系 — 法人主體營運責任硬性要求
    pivot: 反論訴求是 eIDAS 2.0 Article 5a + 5b 規定 EUDI Wallet 與 QEAA issuer 必須是 Qualified Trust Service Provider 由會員國指定監督機構審查；EUDI ARF v1.4.0 §6 沿用 XML Trusted List 模型，公共鏈在歐盟法定身分基建沒有承擔 trust root 的位置。實證強度高，是歐盟法的明確立場。
    flip: |
      eIDAS 體系的硬性要求是「法人主體營運責任」，並非「公共鏈不可用」。地圖立場明示在 eIDAS 法域內公共鏈不承擔 trust root（聯盟鏈或 PKI 主導），但保留「五個可行位置」中的撤銷副本、時間戳錨定、審計事件鎖、邊角試錯空間。台灣 DIW 把「信任清單錨定在公共鏈」是 trust root 治理仍由法定機構承擔、公共鏈僅承擔「信任清單錨定」這個有限角色——這恰好對應「法律問責與技術錨定分層」的可行設計。eIDAS 反論反向支撐分層設計的必要性。

  - label: 反論 3
    title: 不丹 NDI 反例不可外推 — 治理脈絡特殊
    pivot: 反論訴求是不丹 NDI 遷至 Ethereum 主網的條件高度特殊——人口規模 80 萬、GDPR 不適用、QTSP 體系不直接約束、KYC 監管壓力相對輕、政府願意承擔技術前緣風險。把這個案例外推到歐盟或東亞主要經濟體不成立。實證強度上，不丹案例的脈絡特殊性是事實。
    flip: |
      不丹的特殊脈絡並非「反例失效」的證據而是「治理與法規條件函數」的證據。地圖立場本來就是「公共鏈在身分基建有特定可行位置，由治理與法規條件決定」——不丹 NDI 在其特殊脈絡下做出公共鏈 trust root 選擇，正是這個函數論的具體實例。台灣 DIW 在更嚴格法規脈絡下選擇「信任清單錨定」而非完整 trust root，QuarkID 在 ZKsync L2 而非主網，三條反例在三個不同強度上對 thesis 提出修正。反論反向支撐「函數論」的核心立場，凸顯「特定位置 + 治理條件函數」的精細化。

# ─────────────────────────────────────────────────────────────
# Procedural Conditions
# ─────────────────────────────────────────────────────────────
conditions:
  title: 任何公共鏈承擔身分基建位置的合法性，必須通過六道條件
  formalPrelude: "valid_position(p) ⇔ V_no_personal_data ∧ V_legal_subject ∧ V_revocation_capable ∧ V_governance_layered ∧ V_finality_acceptable ∧ V_redundancy_principle"
  items:
    - title: 鏈上不寫個資（V_no_personal_data）
      body: |
        公共鏈僅承擔不寫個資的位置——撤銷狀態 hash、信任清單錨定 hash、事件序列指紋；個資鏈下儲存。仿 CNIL 2018 + EDPB 立場。
      formal: "V_no_personal_data: ∀ on-chain_data : ¬personal_data(on-chain_data) ∧ off-chain_storage(personal_data)"
    - title: 法人主體營運責任（V_legal_subject）
      body: |
        即使公共鏈承擔 trust root，治理與營運責任仍由法定機構或法人主體承擔，仿不丹 DHI + GovTech 模式 + 台灣 DIW 數發部模式。
      formal: "V_legal_subject: ∀ governance_decision : ∃ legal_subject(decision) ∧ accountable(legal_subject)"
    - title: 撤銷機制可實作（V_revocation_capable）
      body: |
        VC 撤銷需即時、可重複改寫、可批次更新；公共鏈承擔的位置須與撤銷機制相容（仿 W3C Bitstring Status List 中立模型 + Microsoft ION Sidetree batch anchoring）。
      formal: "V_revocation_capable: ∀ on-chain_position : compatible(position, revocation_requirements)"
    - title: 治理與技術分層（V_governance_layered）
      body: |
        Trust root 的法定授權由法定機構承擔，公共鏈僅承擔特定技術錨定角色（撤銷副本、時間戳、事件鎖）。仿台灣 DIW「信任清單錨定」模式。
      formal: "V_governance_layered: ∀ trust_root : legal_authority(trust_root) ⊥ tech_anchor(trust_root)"
    - title: Finality 可接受（V_finality_acceptable）
      body: |
        公共鏈承擔的位置的 finality 延遲須與該位置的功能需求相容——撤銷副本可接受 10 分鐘 Bitcoin block time、政府級 DID 需 L2/ZK 壓低 finality 至秒級。
      formal: "V_finality_acceptable: ∀ position p : finality_delay(p) ≤ functional_requirement(p)"
    - title: 冗餘原則（V_redundancy_principle）
      body: |
        公共鏈的位置應以「冗餘」而非「主控」為設計關鍵詞——撤銷狀態不可變副本、跨組織信任清單時間戳、事件鎖均屬冗餘層；不取代主控系統而提供獨立可驗證的替代路徑。
      formal: "V_redundancy_principle: ∀ position p : role(p) = redundancy ∨ verification_alternative   ;   ¬substitute_for_main_control"

# ─────────────────────────────────────────────────────────────
# Conclusion + Formal Coda
# ─────────────────────────────────────────────────────────────
conclusion:
  paragraphs:
    - <strong>主流 trust root 走聯盟鏈與 PKI 是四道壓力疊加的結果，並非結構不可行。</strong>2024-2026 三條反例（QuarkID 上 ZKsync L2、不丹 NDI 遷至 Ethereum 主網、台灣 DIW 把信任清單錨在公共鏈）證明公共鏈在身分基建並非結構不可行，而是治理與法規條件的函數。trust root 的選擇不由技術成熟度決定，而由治理與法規條件決定。
    - <em>公共鏈在身分基建保有五個可行位置</em>——撤銷狀態的不可變冗餘副本、跨組織信任清單的時間戳錨定、跨域審計事件鎖、特定治理脈絡下的直接 trust root、邊角實驗的試錯空間。五個位置在四道壓力下保有不同強度的可行性，並非邊角讓步而是公共鏈最擅長的結構位（承重牆比喻）。
    - <strong>本文為主系列 article 08（dns-vs-identity-trust-roots）+ article 12（no-phone-home-engineering-economics）+ article 07（passport-rooted-paradox）的信任根基礎</strong>，提供博論 Ch11.2 主稿。Article 08 對 DNS vs 身分信任根的歷史比較直接對應本文「為何公共鏈在身分基建未複製 DNS 的成功」；article 12 的工程經濟學直接對應本文「撤銷時效 vs 不可變帳本」的工程論證；article 07 的護照根悖論直接對應本文「四道壓力的多重共因均衡」。台灣 DIW 為「治理與法規條件函數」的本地實證案例，QuarkID 與不丹 NDI 為跨大洲反例的關鍵證據。
  formalCoda: |
    Final form:
      Trust_root_choice(j) ∈ {public_chain, consortium, PKI, no_chain}
      Choice(j) = f(governance(j), regulatory(j), tech_readiness(j))
      De-chain_path ⇐ ⋀ᵢ Pᵢ   where P ∈ {GDPR_17, eIDAS_QTSP, FATF_KYC, operational_legal_subject}
      Counter-examples ⊨ ¬structural_inevitability_of_de-chain
      Public_chain_positions = ⟨revocation_mirror, timestamp_anchor, audit_event_lock, contextual_trust_root, experimental_space⟩
      ∀ position p : valid(p) ⇔ V_no_personal_data ∧ V_legal_subject ∧ V_revocation_capable ∧ V_governance_layered ∧ V_finality_acceptable ∧ V_redundancy_principle
