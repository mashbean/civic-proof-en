# Five Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: "§3 — Deductive (PRF formal definition + LegitimacyDegrade + T_PRF0–T_PRF5 + 32-cell bearer matrix)"
    title: The PRF formal skeleton and the 32-cell bearer matrix constitute the formal statement of the four-strand conjunctive floor
    role: Provides the formal skeleton of the conjunctive floor — without formalizing the PRF function definition, LegitimacyDegrade sigmoid, four formal theorems T_PRF1–T_PRF4, and the T_PRF5 engineering unreachability lemma, "four-strand conjunction" remains at the linguistic level only; without unfolding the 8×4 = 32-cell bearer matrix, "series normative floor" is merely rhetorical and "F1 as the full core bearer of all four components" cannot be sustained at the series level.
    body: |
      PRF ≜ ⟨plurality, validity, contestation, agonism⟩ adopts a conjunctive normative floor definition; PRF_violated(d) ⇔ ∃ i : violation(d, PRF_i) (violation of any single component entails violation of the whole; trade-off compensation is not permitted). PRF ⊆ NormativeFloors adopts an open-boundary position (composite floor, not absolutely unique). LegitimacyDegrade(d) adopts a logistic sigmoid form (same form as F1 §3.2 P_degrade); four equal prior weights β = 1.0; θ_dem ≈ 0.5 is an analytically suggested figure (pending reverse-calibration against V-Dem / Bertelsmann / Freedom House). T_PRF0 formalizes PRF_violated ⇒ LegitimacyDegrade ≥ θ_dem; T_PRF1–T_PRF4 bear the individual necessity of the four strands via the structure "reductio: if this strand is violated while the remaining three are satisfied, then degradation to X results" — plurality violation degrades to "procedure without co-present subjects" (Arendt §28 common world), validity violation degrades to "strategic interaction" (Habermas strategisches Handeln), contestation violation degrades to "consensus without contestation channels" (Pettit hegemonic consensus), agonism violation degrades to "antagonist civil war" or "post-political consensual ritual" (Mouffe's two failure modes). T_PRF5 extends the Z₃-intrinsic boundary of F1's RT-ℬ ✗ (plurality + validity dual violation) and AA-ℬ ✗ (contestation + agonism dual violation) into the lemma that "no engineering design can bypass the PRF floor." The 8×4 = 32-cell bearer matrix marks the correspondence intensity of 8 articles × 4 components using three categories ●/○/— with distribution ● 18 / ○ 9 / — 5; F1 is the only article with full core bearing of all four components (4 ●); F2 §9's agonistic engineering upgrade of the CF1-CF5 stress test upgrades F2-agonism from — to ○, leaving only 5 remaining — cells including A3-agonism, A14-plurality, and others.
    finding: The PRF function, plus the LegitimacyDegrade sigmoid, plus the five theorems T_PRF1–T_PRF5, plus the 32-cell bearer matrix, together constitute this article's formal extension of the civic-proof series' normative floor; downstream writers may not claim that any single strand can be substituted by the other three (violating T_PRF1–T_PRF4), nor that engineering bearers can independently sustain legitimacy (violating T_PRF5).
    formal: "PRF ≜ ⟨plurality, validity, contestation, agonism⟩  ;  PRF_violated(d) ⇔ ∃ i : violation(d, PRF_i)  ;  T_PRF0 : PRF_violated(d) ⇒ LegitimacyDegrade(d) ≥ θ_dem ≈ 0.5  ;  T_PRF5 : ∀ engineering d , ¬(PRF_violated(d) ∧ LegitimacyDegrade(d) < θ_dem)"

  - section: "§4 — Philosophical interpretation (Arendt plurality: three ontological conditions + Chinese 'qun' tradition + series scenarios)"
    title: "Arendt plurality adopts three ontological-level conditions (natality + mortality + uniqueness) and cannot be reduced to liberal pluralism"
    role: 'Provides the Arendt ontological bearing for the SA1 plurality component — if plurality is read as "liberal pluralism: coexistence of multiple values" (political-theory level), then the three reasons in F1 §4.1 for "no natality / no mortality stake / no uniqueness disclosure" of AI agents become invalid, leaving no response space to the CF1 Coeckelbergh relational personhood full-replacement objection; if the structural homology between the Chinese "qun" (群) tradition and Arendt plurality is not explicitly stated as a "structurally homologous but with different historical bearing conditions" conservative position, the cross-cultural inference is read as excessive analogy.'
    body: |
      Arendt 1958 *The Human Condition* §1 Prologue — "the fact that men, not Man, live on the earth and inhabit the world" (plural humans co-inhabit the earth; a single abstract "Man" is outside Arendt's position, p.7) — establishes plurality at the ontological level. Three ontological conditions: natality (§44 p.313–320 + p.177 "each man begins something new": the existential condition of "being able to begin," not a biological factual description), mortality (the existential condition counterposed to natality in §44: stake-taking in which action-bearing is irrevocable; an AI agent's capacity for "regeneration" destroys this existential basis), and uniqueness (§24 p.175–181 "The Disclosure of the Agent in Speech and Action": the *who/what* distinction, where *who* can only be disclosed to others in action, and *what* is an attribute-level description). Honig 1993 connects natality to "the openness of political action"; d'Entrèves 1994 and Benhabib 1996 connect the *who/what* distinction to the irreducibility of political subjecthood. Arendt plurality is strictly distinguished from liberal pluralism on three counts: ontological level vs. political-theory level, subject of disclosure vs. subject of choice, co-presence of *who* vs. juxtaposition of values. The Chinese "qun" (群) tradition (Chu Yun-han 2012 on the plural bearers of the Taiwanese public realm; Lin Tsung-hung 2020 on the "legitimate adversary" relationship between Taiwanese social movements and political parties; Wang Hui 2003 on the transformation of the Chinese "gong" concept) shares structural homology with Arendt plurality in the existential condition of "plural humans co-inhabiting," but the historical bearing conditions of "qun" (the hierarchical structure of Confucian self-cultivation → family → governance → world pacification) diverge from the horizontal plurality of Arendt's ontology. Three series scenario correspondences: A1 §2 bears the multiple *who* of anonymous political speech via NAACP v. Alabama and two other cases; A15 §3 bears enrollment condition examination by surveying structural exclusion of undocumented / stateless / exile experiences; F1 §4.1 bears the core reason for "structural non-delegability" via the three-layer ontological argument for AI agents.
    finding: Plurality adopts Arendt's three ontological conditions as the SA1 bearing skeleton; CF1 Coeckelbergh's relational personhood — even if some legal status is recognized — cannot change the ontological structure (F1 §4.1's "one-notch not two-notch reduction" position); CF3 posthumanism's expansionary pressure on plurality is redirected to "examination of subjecthood conditions" (not a "human exceptionalism" position); the Chinese "qun" tradition and plurality adopt the conservative "structurally homologous but with different historical bearing conditions" position.
    formal: "plurality ≜ Arendt(1958)·natality ∧ mortality ∧ uniqueness  ;  plurality ⊥ liberal_pluralism (different levels)  ;  ∀ AI agent a : ¬natality(a) ∧ ¬mortality_stake(a) ∧ ¬uniqueness_disclosure(a) ⇒ ¬plurality_bearer(a)"

  - section: "§5 — Philosophical interpretation (Habermas Öffentlichkeit: three-layer normative structure + Fraser counterpublics + Chinese 'gong' tradition)"
    title: "Habermas Öffentlichkeit adopts a three-layer normative structure (ideal speech situation + three Geltungsansprüche + Sluice model) and cannot be reduced to empirical public opinion"
    role: Provides the Habermas normative-structure bearing for the SA2 validity component — if Öffentlichkeit is read as "empirical public opinion polling" (empirical measurement), then the counterfactual idealization character of the ideal speech situation becomes invalid and the normative force of the three Geltungsansprüche (Wahrheit / Richtigkeit / Wahrhaftigkeit) degrades to a platform algorithm metric; if the Fraser counterpublics correction is not explicitly stated as an "expand while preserving the floor" position, PRF's single Öffentlichkeit structure is read as exclusionary; if the correspondence between the Chinese "gong" (公) tradition and Öffentlichkeit is not explicitly stated to have different historical bearing conditions, the cross-cultural inference is read as excessive analogy.
    body: |
      Habermas's Öffentlichkeit concept runs across three anchor works (1962 *Strukturwandel* + 1981 *TKH* + 1992 *Faktizität und Geltung*). Three-layer normative structure: the first layer is the ideal speech situation (1981 TKH Vol. I §III.3 defines kommunikatives Handeln as "action oriented toward achieving mutual understanding," presupposing four counterfactual conditions: all relevant parties can participate, no power distortions, no time constraints, no internal or external coercion; the ideal speech situation is a counterfactual idealization, not an empirical claim; its function is to provide the normative reference point for "reasonable consensus"); the second layer is the three Geltungsansprüche (TKH §III.3 p.410–427 decomposing speech acts into Wahrheit [truth validity], Richtigkeit [normative rightness], and Wahrhaftigkeit [sincerity/authenticity], retaining German originals to avoid translation ambiguity); the third layer is the Sluice model (1992 *Faktizität und Geltung* Kap. VII–VIII: the legitimacy of democratic legislation derives from the communicative channels of two Sluice layers — "informal opinion formation" and "formal decision-making" — with zivilgesellschaftliche Öffentlichkeit's informal opinion formation placed upstream of institutional decision-making). Öffentlichkeit is strictly distinguished from empirical public opinion on three counts: the input is rational-critical debate in speech acts vs. opinion aggregation; the output is reasonable consensus vs. majority preference measurement; normative structure vs. a metric distortable by platform algorithms. Fraser 1990 *Rethinking the Public Sphere*'s critique of the single-sphere presupposition is systematized by Warner 2002 *Publics and Counterpublics*; this article adopts the "expand while preserving the floor" position: the coexistence of multiple counterpublics conforms to plurality, but each counterpublic must individually satisfy the normative structure of validity. Habermas 1992 Kap. VIII's Sluice model for zivilgesellschaftliche Öffentlichkeit has already partially responded to the Fraser critique. The Chinese "gong" (公) tradition (Wang Hui 2003 on the historical transformation of the Chinese "gong" concept; Chu Yun-han 2012 connecting "gong" to the institutional bearing of Taiwan's public realm: Constitutional Court interpretation, Legislative Yuan operations, referendum system, local councils, media oversight — five major bearers) shares structural homology with Öffentlichkeit in "institutional bearing of normative structure," but the historical bearing conditions of "gong" (imperial examinations, literati-officials, pure discussion) differ from Habermas's 18th-century bourgeois public realm (coffeehouses, salons, print media). Three series scenario correspondences: the GDPR cookie banner's eight-year failure bears the case of Wahrhaftigkeit degrading into ritual; Taiwan's 2018–2021 referendum cases bear the Taiwanese institutional fulfillment of Öffentlichkeit; the 2024 U.S. election platform manipulation bears the erosion of bearer positions for the three Geltungsansprüche under platform mediation.
    finding: Validity adopts Habermas's three-layer normative structure as the SA2 bearing skeleton; the Fraser counterpublics correction adopts the "expand while preserving the floor" position (multiple counterpublics conform to plurality; each individually satisfies validity); the Chinese "gong" tradition and Öffentlichkeit adopt the conservative "structurally homologous but with different historical bearing conditions" position; CF2 Floridi infosphere monism's ontological pressure on plurality is addressed by "distinguishing descriptive ontology from normative floor categories."
    formal: "validity ≜ Habermas·(ideal_speech_situation ∧ Geltungsansprüche ∧ Sluice)  ;  Geltungsansprüche ≜ Wahrheit ∧ Richtigkeit ∧ Wahrhaftigkeit  ;  validity ⊥ empirical_public_opinion (different categories)  ;  counterpublics ⊆ plurality_extension ∧ ∀ cp ∈ counterpublics : satisfies(cp, validity_normative_structure)"

  - section: "§6 — Philosophical interpretation (Pettit contestation: three-layer first-personal requirements + three-layer bearer position + non-domination + Chinese 'jian-yi' tradition)"
    title: "Pettit contestation adopts three-layer first-personal requirements (Equally Accepted Terms + Equally Accessible Influence + Active Stance); bearer position is non-delegable"
    role: Provides the Pettit republican bearing for the SA3 contestation component — if contestation is read as "an input function for dissent" (passively receiving opinion consultations), then the first-personal requirement of active-stance becomes invalid and the logical space for AI agents to serve as contestation bearers is opened, engineering bypassing F1's AA-ℬ ✗ boundary; if freedom as non-domination is not strictly distinguished from Berlin's negative freedom (non-interference) and Lovett's three conditions become inoperative; if the gap between the historical bearing conditions of the Chinese "jian-yi" (諫議) tradition (ruler-minister relations / literati ethics / family-state unity) and Pettit's republican democracy (citizenship / equal political rights / institutional checks and balances) is not explicitly stated, the cross-cultural inference is read as excessive analogy.
    body: |
      Pettit's contestation concept runs across two anchor works (1997 *Republicanism* + 2012 *On the People's Terms*). Three-layer first-personal requirements: the first layer is Equally Accepted Terms (2012 Ch.3 "citizens must be able to accept the terms of public policy under conditions of equality"; this first-personal requirement cannot be replaced by a representative — any representative's acceptance must be conditioned on citizens being able to first-personally accept it themselves); the second layer is Equally Accessible Influence (2012 Ch.5 Eyeball Test p.81–105 "citizens can make eye contact with power holders without flinching," presupposing accessible channels of influence: challenging, appealing, voting, protesting); the third layer is Active Stance (1997 Ch.6 + 2012 Ch.6: the subject of contestation must "actively" adopt a dissenting position, not "passively" accept opinion consultation; the significance of this distinction for AI agent scenarios is that AI can serve as an input function for opinion consultation but cannot serve as an active-stance bearer). F1 §4.3 has already established the three-layer bearer position test (execution: delegable / endorsement: conditionally delegable / bearer: non-delegable, corresponding to Pitkin 1967's formal-substantive representation distinction); F1's RT-ℬ ✗ and AA-ℬ ✗ boundaries are precisely the non-reachability of the third layer. Freedom as non-domination (1997 Ch.2: "not being subject to arbitrary interference by any person or institution") is stronger than Berlin's negative freedom (non-interference); even without actual interference, if the possibility of "being arbitrarily interfered with" exists, domination persists; Lovett's 2010 three conditions (actual exercise of power / dispositional capacity / arbitrary character) — if any is absent, domination status degrades. Implications for digital scenarios: when infrastructure such as wallet schema, verifier algorithms, and issuer revocation mechanisms can "arbitrarily" alter a holder's conditions of action, domination exists even without actual interference; F1 §3.2 P_degrade-TC "calibration is self-reported by the agent with no external contestation channel" is a concrete case of this mechanism. The Chinese "jian-yi" (諫議) tradition (three-layer structure in Chinese history: direct remonstrance / indirect remonstrance / death remonstrance; three-layer structure of Taiwan's Constitutional Court petition system: citizen petition / judge petition / institutional petition) shares structural homology with Pettit's contestation in the bearing of first-personal active-stance, but the historical bearing conditions of "jian-yi" (ruler-minister relations / literati ethics / family-state unity) diverge substantially from those of Pettit's republican democracy (citizenship / equal political rights / institutional checks and balances). Three series scenario correspondences: Taiwan's Constitutional Court petitions (Interpretations No. 803 / 791 / 748) bear the concrete practice of bearer position; CJEU SCHUFA C-634/21 (2023) bears the institutional correspondence of GDPR Art 22's "right not to be subject to automated decision-making"; SEC v. Jarkesy (2024) bears jury trial rights in administrative procedures for fraud cases.
    finding: Contestation adopts Pettit's three-layer first-personal requirements plus the three-layer bearer position test as the SA3 bearing skeleton; freedom as non-domination's probabilistic domination condition is stronger than Berlin's negative freedom; the Chinese "jian-yi" tradition and Pettit's contestation adopt the conservative "structurally homologous but with different historical bearing conditions" position; the Z₃-intrinsic boundary of F1's RT-ℬ ✗ and AA-ℬ ✗ is formalized in T_PRF5 as the engineering unreachability lemma.
    formal: "contestation ≜ Pettit·(Equally_Accepted_Terms ∧ Equally_Accessible_Influence ∧ Active_Stance) ∧ bearer_position_three_layer  ;  freedom_non_domination ⊨ ¬arbitrary_power (Lovett three conditions)  ;  ∀ AI agent a : a ⊨ input_function ∧ ¬active_stance_bearer(a)"

  - section: "§7 — Philosophical interpretation (Mouffe agonism/antagonism: strict distinction + three conditions for legitimate adversary + Habermas + Mouffe conjunction + Chinese 'zheng-you' tradition)"
    title: "Mouffe agonism adopts three conditions for legitimate adversary (mutual recognition ∧ shared rules ∧ agonistic frame) and is strictly distinguished from antagonism's enemy/annihilation logic"
    role: Provides the Mouffe agonistic-politics bearing for the SA4 agonism component — if agonism is read as "antagonism" (without the legitimate adversary presupposition), Schmitt's annihilation logic is introduced and the normative position of agonism collapses; if Habermas + Mouffe are not taken as conjunctive (non-exclusive), the validity and agonism components of PRF are read as mutually exclusive; if the gap between the historical bearing conditions of the Chinese "zheng-you" (諍友) tradition (Confucian ethics / literati relations / private friendship / hierarchical ruler-minister dialogue) and Mouffe's institutional agonism (multi-party politics / public debate / media oversight / civil society confrontation) is not explicitly stated, the cross-cultural inference is read as excessive analogy.
    body: |
      Mouffe's agonism concept runs across two anchor works (2000 *The Democratic Paradox* + 2013 *Agonistics*). Strict distinction between agonism and antagonism: agonism presupposes a legitimate adversary; antagonism presupposes an enemy. Three conditions for legitimate adversary (2000 Ch.4 p.80–107): mutual recognition, shared rules, and agonistic frame; the common presupposition of all three conditions is "the opponent's right to political expression is recognized as legitimate, even if their position opposes one's own." The enemy structure of antagonism does not share this presupposition; the opponent's right to political expression is not recognized and interaction degrades to annihilation logic. Mouffe draws on Schmitt 1932 *The Concept of the Political* for the concept of agonistic politics but rejects Schmitt's friend/enemy annihilation logic; Schmitt was a Nazi legal scholar, and citation requires honest acknowledgment of this boundary — Mouffe absorbs Schmitt's insight that "the political essentially contains adversarialism" and transforms the enemy structure into the legitimate adversary structure. Mouffe 2000 Ch.4 p.102–105 explicitly critiques Habermas's deliberative consensus: "the political cannot be reduced to rational consensus"; reducing democratic legitimacy to consensus dissolves democracy's agonistic dimension and degrades it to post-political consensual ritual. This article adopts the Habermas + Mouffe conjunction (non-exclusive) position, relying on F1 §4.2's existing methodology: the conjunction structure of the two strands lies in Habermas's Öffentlichkeit and three Geltungsansprüche bearing "the normative structure of speech acts," and Mouffe's three conditions for legitimate adversary bearing "the normative structure of agonistic politics"; the two conjoin at the point that "political speech requires human personality subjects" while the tension between "consensus vs. confrontation" is retained. Norval 2007 *Aversive Democracy* (Mouffe + Cavell dialogue) further systematizes this conjunction. The Chinese "zheng-you" (諍友) tradition (*Analects* ·Jishi: "three beneficial friendships: friendship with the upright, friendship with the sincere, friendship with the knowledgeable" — direct honest remonstrance; the tradition of direct honest remonstrance among Chinese literati — Han Yu, Fan Zhongyan, Wang Anshi, Gu Yanwu; the Neo-Confucian "the exemplary person harmonizes without conforming" and the semantic bearing homology with Mouffe's three conditions for legitimate adversary) shares structural homology with Mouffe's agonism in the mutual recognition of a legitimate adversary, but the historical bearing conditions of "zheng-you" (private / semi-public ethical structures) diverge substantially from those of Mouffe's institutional agonism (public-realm structures of multi-party systems). Three series scenario correspondences: the structural dynamics of Taiwan's 2024 post-election legislature ("blue-white coalition" vs. "green minority coalition" under no single party majority) bears the Taiwanese institutional fulfillment of agonism; the agonism/antagonism boundary slippage of Hong Kong's 2019–2020 anti-extradition movement; the 2024 U.S. election polarization bears the impact of agonism degrading into antagonism.
    finding: Agonism adopts Mouffe's three conditions for legitimate adversary as the SA4 bearing skeleton; the strict agonism/antagonism distinction adopts a normative position (empirical distinction is not within this article's bearing scope); the Habermas + Mouffe conjunction (non-exclusive) position relies on F1 §4.2's existing methodology; the Chinese "zheng-you" tradition and Mouffe's agonism adopt the conservative "structurally homologous but with different historical bearing conditions" position; Schmitt citation is limited to agonism's genealogical acknowledgment (not extended to Nazi political positions).
    formal: "agonism ≜ Mouffe·legitimate_adversary(mutual_recognition ∧ shared_rules ∧ agonistic_frame)  ;  agonism ≠ antagonism (annihilation logic rejected)  ;  Habermas ∧ Mouffe : conjunction at 'political speech requires human personality subjects' (tension retained between consensus vs. confrontation)"

# ─────────────────────────────────────────────────────────────
# Causal Chain (four-strand concepts → PRF function → 32-cell matrix → series bearer relationship → normative floor)
# ─────────────────────────────────────────────────────────────
chain:
  title: Four-strand concepts → PRF function conjunctive definition → T_PRF1–T_PRF5 formalization → 32-cell bearer matrix → series 8-article forward-links → civic-proof series normative floor
  legend:
    - kind: deterministic
      label: Mechanically necessary (structural; does not depend on external triggers)
    - kind: probabilistic
      label: Probabilistic (requires external triggers but non-negligible)
  steps:
    - tag: D1
      kind: deterministic
      text: |
        D1 Four-strand original concepts → PRF function conjunctive definition. Arendt 1958 §1+§24+§44 plurality's three ontological conditions, Habermas 1962+1981+1992 Öffentlichkeit's three-layer normative structure, Pettit 1997+2012 contestation's three-layer first-personal requirements, and Mouffe 2000+2013 agonism's three conditions for legitimate adversary are conjoined in §3.1 as PRF ≜ ⟨plurality, validity, contestation, agonism⟩. The formal expression is PRF_satisfied(d) ⇔ ⋀_{i} satisfies(d, PRF_i); the conjunctive floor is defined in §3.2 as PRF_violated(d) ⇔ ∃ i : violation(d, PRF_i), with PRF ⊆ NormativeFloors (composite floor, not absolutely unique).
    - tag: D2
      kind: deterministic
      text: |
        D2 PRF function → T_PRF0 violation entailment + LegitimacyDegrade sigmoid. §3.2 formalizes LegitimacyDegrade as a logistic sigmoid of the four strands' violation_intensity (same form as F1 §3.2 P_degrade), with β = 1.0 prior equal weights and θ_dem ≈ 0.5 as an analytically suggested figure. T_PRF0 formalizes PRF_violated(d) ⇒ LegitimacyDegrade(d) ≥ θ_dem as a conditional entailment; σ(β·1.0) ≈ 0.731 for complete single-component violation, σ(β·0.5) ≈ 0.622 for moderate single-component violation, σ(0) = 0.5 as baseline.
    - tag: D3
      kind: deterministic
      text: |
        D3 T_PRF0 → T_PRF1–T_PRF4 "individual necessity of the four strands" + T_PRF5 engineering unreachability lemma. §3.4's four formal theorems adopt the "reductio: if this strand is violated while the remaining three are satisfied, then degradation to X results" structure — T_PRF1: plurality violation degrades to "procedure without co-present subjects"; T_PRF2: validity violation degrades to "strategic interaction"; T_PRF3: contestation violation degrades to "consensus without contestation channels"; T_PRF4: agonism violation degrades to "antagonist civil war or post-political consensual ritual." T_PRF5 extends the Z₃-intrinsic boundary of F1's RT-ℬ ✗ (plurality + validity dual violation) and AA-ℬ ✗ (contestation + agonism dual violation) into the lemma that "no engineering design can bypass the PRF floor."
    - tag: D4
      kind: deterministic
      text: |
        D4 T_PRF1–T_PRF5 → 32-cell bearer matrix. §3.3 projects the series' 8 core bearer articles (A1 / A3 / A8 / A14 / A15 / F1 / F2 / F3) × 4 components = 32 cells into a bearer matrix using three categories: ● (core bearer: the article's main normative claim directly falls on the component) / ○ (partial bearer: indirect support) / — (no correspondence: no significant relation). Distribution: ● 18 cells / ○ 9 cells / — 5 cells; the count of ● cells per component is plurality 4 / validity 5 / contestation 4 / agonism 5; F1 is the only article with full core bearing of all four components (4 ●); F2 §9's agonistic engineering upgrade of the CF1-CF5 stress test upgrades F2-agonism from — to ○.
    - tag: D5
      kind: deterministic
      text: |
        D5 32-cell matrix → series 8-article forward-links → civic-proof series normative floor. §10 responds to the normative claims of all eight articles — A1 (plurality + agonism dual anchor), A3 (plurality + validity conceptual landscape), A8 (validity + contestation + agonism three-strand governance framework), A14 (contestation + agonism remedy gap), A15 (plurality + validity + contestation three-strand inclusion rights), F1 (all four components core bearing + RT-ℬ ✗ / AA-ℬ ✗ boundaries), F2 (validity + contestation + agonism upgraded receipts), F3 (validity + agonism supporter UI three-layer separation) — bearing the concrete instantiation of the series normative floor. The 32-cell bearer matrix is a "conditional correspondence" not an "absolute description," reflecting the current interpretation of the first 18 articles; if interpretations change, the matrix must be redone (§11 high-risk claim R7).
    - tag: T-LLM-Agent-F1
      kind: probabilistic
      text: |
        T-LLM-Agent-F1 CF5 LLM-agent substitution: engineering-layer extension of F1's boundary — when LLM-agents in wallet from 2026 to 2030 provide three services (comprehension assistance, attribute filtering recommendations, and decision recommendations), the role slippage between agent and supporter weakens the F1 RT-ℬ ✗ / AA-ℬ ✗ boundary at the engineering implementation layer. The mitigation design is the conjunction of four design elements from F1 §7.3.1: AgentDelegationProof + presentationOrigin label + separation of comprehension_attestation and chooser_signature + cryptographic distinction between agent and supporter — these together maintain the boundary, confining extensions to within Z₂ and not bypassing F1's two permanent non-delegable boundaries RT-ℬ ✗ / AA-ℬ ✗. The impact on TW DIW entering the LLM-agent phase is a concrete case.
    - tag: T-CrossTime-Cultural
      kind: probabilistic
      text: |
        T-CrossTime-Cultural Cross-temporal and cross-cultural pressure on the applicability of PRF — the four anchor works are Western political philosophy from 1958 to 2013; this article's application to the 2026 digital scenario depends on the cross-temporal applicability of the four strands (Arendt plurality for LLM-agent scenarios / Habermas Öffentlichkeit for platform scenarios / Pettit contestation for algorithmic governance scenarios / Mouffe agonism for polarization scenarios); cross-cultural inference depends on the structural homology between the Chinese traditions of "qun" (群), "gong" (公), "jian-yi" (諫議), and "zheng-you" (諍友) and the four strands. This article adopts the conservative "structurally homologous but with different historical bearing conditions" position, with honest boundary statements in §11; the gaps in historical bearing conditions are explained individually in §4.3 / §5.4 / §6.4 / §7.3.

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support (corresponding to article §9 CF1 / CF2 / CF5)
# ─────────────────────────────────────────────────────────────
borders:
  - label: Objection 1
    title: "CF1 Coeckelbergh relational personhood as full replacement — AI acquires personhood through relational practices, PRF plurality accommodates AI, hence the four-strand conjunctive floor fails"
    pivot: |
      Coeckelbergh 2020 *AI Ethics* Ch.4–6 and 2024 *Why AI Undermines Democracy* argue for the expansion of relational personhood such that the boundary of "personality subjects" can include AI agents. If AI acquires personhood through relational practices, then PRF plurality's multiple *who* co-presence accommodates AI, PRF validity's Wahrhaftigkeit claim bearers can include AI, and PRF's human presuppositions are fully replaced. Likelihood is assessed as medium (Coeckelbergh 2020 + 2024 have formed structural bearing in Chinese-language academia and parts of European AI ethics); impact is assessed as medium-high (strongest impact on the plurality component; the engineering-layer extension of CF5 LLM-agent substitution also falls within this objection's structure). On empirical strength: from 2027 to 2030, when LLM-agents in wallet provide three services (comprehension assistance, attribute filtering recommendations, decision recommendations), if the engineering community adopts Coeckelbergh's relational personhood position as a design criterion, the F1 RT-ℬ ✗ / AA-ℬ ✗ boundary would be regarded at the engineering implementation layer as "normative over-extension baggage" and bypassed.
    flip: |
      On closer inspection, CF1 triggers inverse support for the "ontological vs. functionalist distinction" of F1 §4.1's "one-notch not two-notch reduction" position — even if some relational personhood is legally recognized, the ontological argument for plurality in §4 (natality + mortality + uniqueness) does not depend on legal recognition; law can recognize some status but cannot change the ontological structure of the subject. The Arendt ontological definition of the plurality component is anchored in "the co-presence of multiple *who* under conditions of natality + mortality"; even if an AI agent's relational personhood is legally recognized, it still lacks natality (each individual as a new beginning) and a mortality stake, so the plurality component still cannot be borne by AI. The Habermas Wahrhaftigkeit requirement of the validity component requires the speaker to "sincerely express one's own intentions"; the problem of attributing intentions to AI agents remains philosophically unresolved, so the validity component still cannot be borne by AI. The internal tensions of Coeckelbergh 2024 inversely support PRF — the book explicitly states that AI poses a threat to democracy (deepfakes, micro-targeting, opinion manipulation) and calls for human democratic subjects' capacity to resist, a position consistent with PRF's "public realm entry conditions are centered on human democratic subjects." The contestation and agonism components under CF1 pressure may "descend one notch but not two notches," potentially expanding AI agents' operational space (e.g., AI as an auxiliary bearer of contestation), but still cannot replace the human active-stance bearer position.

  - label: Objection 2
    title: "CF2 Floridi infosphere monism — humans and AI are both inforgs in informational ontology, and PRF plurality's ontological choice is replaced by a single ontology"
    pivot: |
      Floridi 2014 *The Fourth Revolution* argues for infosphere monism — humans and AI are both inforgs in informational ontology. If PRF's plurality component adopts informational ontology, the co-presence of multiple *who* accommodates all inforgs (including AI agents), and PRF's four-strand conjunction is replaced by infosphere monism's single ontology. Likelihood is assessed as medium (Floridi 2014 has formed structural bearing in information ethics and parts of AI ethics); impact is assessed as medium (strongest impact on the ontological foundations of the plurality component, but the remaining three components have no equivalent replacement). On empirical strength: the ontology shift of infosphere monism can be argued independently as a philosophical position; if PRF's plurality component is replaced by informational ontology, Arendt's phenomenological ontology's three existential conditions of natality + mortality + worldliness would be read as "historical philosophical residue," and digital identity infrastructure could bypass the plurality component under informational ontology presuppositions.
    flip: |
      On closer inspection, CF2 triggers inverse support for the methodological discipline of "distinguishing descriptive ontology from normative floor categories" — Floridi's infosphere monism mainly addresses "descriptive ontology" (the informational nature of humans and AI), which belongs to a different category from PRF's "normative floor." Infosphere monism does not provide equivalent replacement bearing for the validity, contestation, and agonism components; informational ontology does not generate the concrete bearing for three categories of normative subjects: "bearers of legitimacy claims," "active dissenters," and "legitimate adversaries." The PRF framework "weakens but does not overturn" under Floridi pressure testing — the plurality component's ontological choice bears philosophical pressure (PRF honestly acknowledges in §11.4 that adopting Arendt's ontological position is a philosophical choice, not a logical necessity), while the remaining three components are unaffected. The implications of the categorical distinction: PRF need not deny the descriptive power of infosphere ontology, and infosphere ontology need not deny the normative power of PRF; the two serve their respective argumentative tasks in different categories.

  - label: Objection 3
    title: "CF5 Meta-objection 'why these four theorists' — adding or substituting Rawls / Sen / Nussbaum / Honneth in the conjunction: does this weaken or strengthen PRF?"
    pivot: |
      Meta-objection: why choose Arendt / Habermas / Pettit / Mouffe rather than Rawls / Sen / Nussbaum / Honneth / late Habermas Diskursethik, etc.? If Rawls justice, Sen capability, Nussbaum dignity, or Honneth recognition were added to the conjunction or substituted for one of the four strands, would PRF be weakened or strengthened? Likelihood is assessed as high (a reasonable academic challenge; the political philosophy community will inevitably question the selection criterion for the four strands); impact is assessed as low-medium (after the open-boundary position is adopted, the challenge decreases). On empirical strength: if PRF's four-strand selection is read as "the author's arbitrary choice" (without methodological criterion), the reasonableness of the 32-cell bearer matrix is weakened and "F1 as the full core bearer of all four components" is read as circular reasoning (first choosing the four strands, then interpreting F1 through them); if other approaches are added to the conjunction or substituted for one of the four strands, PRF's specific form would need to be redone.
    flip: |
      On closer inspection, CF5 triggers inverse support for the open-boundary position that "PRF is a composite floor, not absolutely unique" and "other approaches are open as ceiling / boundary conditions" — PRF ⊆ NormativeFloors, NormativeFloors ⊇ {Rawls, Sen, Nussbaum, Honneth, ...}. Three selection criteria for the four strands: first, the four strands jointly address the theme of "conditions for entry into the public realm" (Rawls's theme is distributive justice / Sen's is individual capabilities / Nussbaum's is human dignity / Honneth's is mutual recognition — these themes correspond less directly to the civic-proof series' focus on "civic proof that can be legitimately borne"); second, the four strands are most deeply implicitly employed across the civic-proof series' first 18 articles (F1 §4's three-approach conjunction has already established the bearing of Arendt + Habermas + Pettit, with Mouffe serving as an auxiliary in F1 §4.2 (iii); this article elevates Mouffe to an independent component), while other approaches are less deeply implicitly employed in the series' first 18 articles; third, the four strands' impact in digital scenarios is most concrete (Arendt's natality on LLM replication of the existing, Habermas's Wahrhaftigkeit on deepfakes, Pettit's contestation on algorithmic governance, Mouffe's agonism on polarization — all have concrete mechanisms in digital scenarios). CF5's objection inversely supports PRF's openness to adding a fifth component (e.g., Honneth recognition / Sen capability) in the future — the specific bearing structure of PRF is listed in §11.2 as O3 / O21 open questions; future research paths can choose to add them to the conjunction or treat them as boundary conditions.

# ─────────────────────────────────────────────────────────────
# Procedural Conditions (six conditions / firewalls)
# ─────────────────────────────────────────────────────────────
conditions:
  title: Translating PRF's four-strand conjunctive floor into a testable bearer structure requires passing six conditions
  formalPrelude: "PRF_deployable(d) ⇔ V_plurality(d) ∧ V_validity(d) ∧ V_contestation(d) ∧ V_agonism(d) ∧ V_method(d) ∧ V_floor_boundary(d)"
  items:
    - title: "V_plurality — Arendt's three ontological layers (natality + mortality + uniqueness) cannot be replaced by functional perspectival heterogeneity"
      body: |
        V_plurality adopts the conjunction of Arendt's three ontological conditions — natality (the existential condition of "being able to begin" as each actor as a new beginning, not a biological factual description), mortality (stake-taking in which action-bearing is irrevocable; an AI agent's capacity for "regeneration" destroys this existential basis), and uniqueness (the *who/what* distinction; *who* can only be disclosed to others in action). V_plurality adopts the phenomenological ontology position and does not adopt informational ontology (CF2 Floridi infosphere monism adopts the latter as a philosophical choice); does not adopt liberal pluralism's "juxtaposition of multiple values" (different categories: subject of choice vs. subject of disclosure); does not adopt the reductionist approach of functional perspectival heterogeneity (an AI agent's "multiple perspectives" does not equal the co-presence of multiple *who*). Arendt's works' Eurocentric tendency is a known gap (honest boundary statement in §11); cross-cultural application requires structural homology testing.
      formal: "V_plurality(d) ⇔ d ⊨ natality ∧ mortality ∧ uniqueness  ;  V_plurality ⊥ functional_perspectival_heterogeneity  ;  V_plurality ⊥ liberal_pluralism (different levels)"
    - title: "V_validity — Three Geltungsansprüche (Wahrheit + Richtigkeit + Wahrhaftigkeit) + reciprocal recognition"
      body: |
        V_validity adopts the conjunction of Habermas's three-layer normative structure — ideal speech situation (counterfactual idealization with four conditions: all relevant parties can participate + no power distortions + no time constraints + no internal or external coercion), three Geltungsansprüche (Wahrheit [truth validity] regarding the external world, Richtigkeit [normative rightness] regarding the normative world, Wahrhaftigkeit [sincerity/authenticity] regarding the internal world — German originals retained to avoid translation ambiguity), and the Sluice model (two-layer communication channels of informal opinion formation + formal decision-making, with zivilgesellschaftliche Öffentlichkeit's informal opinion formation placed upstream of institutional decision-making). V_validity adopts the normative structure position and does not adopt the aggregation reduction of empirical public opinion; the Fraser counterpublics correction adopts the "expand while preserving the floor" position (the coexistence of multiple counterpublics conforms to plurality; each counterpublic must individually satisfy the normative structure of validity); Habermas's 18th-century bourgeois public realm's Eurocentric tendency is a known gap.
      formal: "V_validity(d) ⇔ d ⊨ ideal_speech_situation ∧ Wahrheit ∧ Richtigkeit ∧ Wahrhaftigkeit ∧ Sluice_model  ;  V_validity ⊥ empirical_public_opinion (different categories)  ;  counterpublics ⊆ plurality_extension ∧ ∀ cp : satisfies(cp, V_validity_normative_structure)"
    - title: "V_contestation — Equally Accepted Terms + Equally Accessible Influence + Active Stance + three-layer bearer position test"
      body: |
        V_contestation adopts the conjunction of Pettit's three-layer first-personal requirements — Equally Accepted Terms (citizens must be able to accept the terms of public policy under conditions of equality; this first-personal requirement cannot be replaced by a representative), Equally Accessible Influence (Eyeball Test: "citizens can make eye contact with power holders without flinching," presupposing accessible channels of influence including challenging, appealing, voting, and protesting), and Active Stance (the subject of contestation must "actively" adopt a dissenting position, not "passively" accept opinion consultation; AI can serve as an input function but cannot serve as an active-stance bearer). The three-layer bearer position test (execution: delegable / endorsement: conditionally delegable / bearer: non-delegable) corresponds to F1 §4.3's existing methodology; F1's RT-ℬ ✗ and AA-ℬ ✗ boundaries are precisely the non-reachability of the third layer. Freedom as non-domination adopts the "without the possibility of arbitrary power" position (stronger than Berlin's negative freedom); if any of Lovett's 2010 three conditions is absent, domination status degrades.
      formal: "V_contestation(d) ⇔ d ⊨ Equally_Accepted_Terms ∧ Equally_Accessible_Influence ∧ Active_Stance ∧ bearer_position_three_layer  ;  freedom_non_domination ⊨ ¬arbitrary_power (Lovett three conditions)  ;  ∀ AI agent a : a ⊨ input_function ∧ ¬active_stance_bearer(a)"
    - title: "V_agonism — strict agonism vs. antagonism distinction + three conditions for legitimate adversary + rejection of Schmitt's annihilation logic"
      body: |
        V_agonism adopts the conjunction of Mouffe's three conditions for legitimate adversary — mutual recognition, shared rules, and agonistic frame. All three conditions share the common presupposition that "the opponent's right to political expression is recognized as legitimate, even if their position opposes one's own." V_agonism strictly distinguishes antagonism's enemy/annihilation logic (the opponent's right to political expression is not recognized; interaction degrades to annihilation); Mouffe absorbs Schmitt 1932's concept of agonistic politics but rejects Schmitt's friend/enemy annihilation logic (Schmitt was a Nazi legal scholar; citation is limited to agonism's genealogical acknowledgment). V_agonism and V_validity adopt a conjunction (non-exclusive) position, relying on F1 §4.2's existing methodology — the two strands conjoin at "political speech requires human personality subjects" while the tension between "consensus vs. confrontation" is retained. The agonism/antagonism boundary easily slips in actual politics (Hong Kong's 2019–2020 anti-extradition movement and the 2024 U.S. election polarization are cases); normatively, the two are strictly distinct.
      formal: "V_agonism(d) ⇔ d ⊨ legitimate_adversary(mutual_recognition ∧ shared_rules ∧ agonistic_frame)  ;  V_agonism ⊥ antagonism (annihilation logic rejected)  ;  V_validity ∧ V_agonism : conjunction at 'political speech requires human personality subjects' (tension retained between consensus vs. confrontation)"
    - title: "V_method — strict normative vs. descriptive separation + conjunction (not synthesis) methodology"
      body: |
        V_method adopts the conjunction of two methodological disciplines — first, strict normative-descriptive separation: PRF's claim adopts the conditional form "if any PRF component is violated, then LegitimacyDegrade(d) ≥ θ_dem" (normative claim), not the empirical description "digital democracy necessarily conforms to PRF" (descriptive claim); PRF is not an inductive generalization from empirical facts; the personhood presuppositions in the four anchor works, Öffentlichkeit normative structure, contestability active-stance bearer, and agonism legitimate adversary are all formalizations of normative conditions. Second, conjunction (not synthesis) methodology: the four strands retain their original positions and tensions within PRF without claiming fusion into a new "composite democratic theory"; the advantage of conjunction methodology is preserving each strand's independent interpretive space, avoiding the pseudo-synthesis of syncretism which tends to forcibly merge concepts from different levels (e.g., Arendt's ontological plurality and Mouffe's political-theoretical agonism) thereby losing the conceptual precision of the original works. F1 §4.4's three-approach conjunction table serves as the methodological precedent; this article extends it to a four-approach conjunction and elevates it to series normative floor bearing.
      formal: "V_method(d) ⇔ normative_descriptive_separated(d) ∧ conjunction_not_synthesis(d)  ;  normative_PRF ⊨ conditional_implication (violation ⇒ LegitimacyDegrade ≥ θ_dem)  ;  ¬ (PRF ⇔ syncretic_fusion(plurality, validity, contestation, agonism))"
    - title: "V_floor_boundary — explicit statement of PRF boundary alongside F1's RT-ℬ ✗ / AA-ℬ ✗ boundaries + T_PRF5 engineering unreachability lemma"
      body: |
        V_floor_boundary adopts an explicit alignment of PRF's boundary with F1's existing boundaries — PRF is a normative floor (not an absolute normative ceiling) and does not claim sufficiency for "attaining the highest level of legitimacy"; PRF ⊆ NormativeFloors, open to Rawls / Sen / Nussbaum / Honneth as ceiling or boundary conditions. F1's RT-ℬ ✗ (first-personal mens rea failure) corresponds to dual violation of PRF's plurality + validity components; F1's AA-ℬ ✗ (contestation bearer failure) corresponds to dual violation of PRF's contestation + agonism components; both are strong cases of PRF violation. T_PRF5 extends this boundary into the lemma that "no engineering design can bypass the PRF floor" — engineering bearers (wallet schema, cryptographic primitives, UX engineering, governance frameworks, legal bearers) can bear the concrete implementations of the four PRF components but cannot replace the normative status of the four components. The CF5 LLM-agent substitution engineering-layer extension is confined to within Z₂ (not bypassing F1's Z₃ boundary); F3's supporter UI three-layer separation is the concrete bearer of this boundary at the UX layer.
      formal: "V_floor_boundary(d) ⇔ PRF ⊆ NormativeFloors ∧ T_PRF5(d)  ;  T_PRF5 : ∀ engineering d , ¬(PRF_violated(d) ∧ LegitimacyDegrade(d) < θ_dem)  ;  F1 RT-ℬ ✗ ⇒ violation(plurality) ∧ violation(validity)  ;  F1 AA-ℬ ✗ ⇒ violation(contestation) ∧ violation(agonism)"

