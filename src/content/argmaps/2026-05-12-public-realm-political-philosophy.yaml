# ─────────────────────────────────────────────────────────────
# Transitions
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    The formal statement establishes the position; the next step is to pull apart common misreadings. The first 18 articles of the civic-proof series implicitly employ the four political philosophers as normative anchors at different levels, but a common misreading in academic and engineering communities takes a synthetic (synthesis / syncretism) approach, fusing the four strands into a new "composite democratic theory" and dissolving the conceptual tensions in the original works. So long as this classification holds, PRF is read as "another candidate version of democratic theory," listed alongside Rawls / Sen / Nussbaum / Honneth as an upper bound directly optimizable by engineering implementations, and engineering bearers are taken to independently sustain legitimacy. The map's first move is to pull this synthetic approach apart from "conjunctive floor + individually necessary + cannot be substituted by the other three" — PRF adopts a conjunction methodology in which all four strands retain their original positions and tensions under conjunction; PRF is a floor (failure of any one entails failure of the whole), not an upper bound (attaining the highest level of legitimacy).
  beforePillars: |
    The distinction is itself only a declaration. To prove that the PRF four-strand conjunction constitutes the series' normative floor (rather than a reduction replaceable by any single strand), five independently sourced supporting arguments are required — the deductive strand provides the formal skeleton of the PRF function definition + LegitimacyDegrade sigmoid + T_PRF0 violation entailment + T_PRF1–T_PRF4 individual necessity + T_PRF5 engineering unreachability lemma + 32-cell bearer matrix; the Arendt ontological strand provides the three-layer ontological conditions for plurality (natality + mortality + uniqueness) and a structural homology test with the Chinese "qun" (群) tradition; the Habermas normative-structure strand provides the three-layer normative structure of Öffentlichkeit (ideal speech situation + three Geltungsansprüche + Sluice model) + Fraser counterpublics correction + correspondence with the Chinese "gong" (公) tradition; the Pettit republican strand provides the three-layer first-personal requirements (Equally Accepted Terms + Equally Accessible Influence + Active Stance) + three-layer bearer position test + freedom as non-domination + correspondence with the Chinese "jian-yi" (諫議) tradition; and the Mouffe agonistic strand provides the strict distinction between agonism and antagonism + Habermas + Mouffe conjunction (non-exclusive) + correspondence with the Chinese "zheng-you" (諍友) tradition. The five pillars correspond to five argumentative levels; without any one, the position degrades to a mere declaration.
  beforeChain: |
    The pillars constitute the positive argument. But the claim that "the four-strand conjunction constitutes the series' normative floor" must be held up by a concrete causal chain — proceeding from the conceptual conjunction of the four original works, through the series-specific instantiation in the 8-article bearer matrix, to the bearer relationship of the civic-proof series' normative floor. The purpose of unfolding the chain is to translate the abstract "four-strand conjunction" into mechanistically traceable bearing conditions: the four strands' original concepts are defined as the four PRF components in §3.1; the four components are formalized as individually necessary in §3.4 via T_PRF1–T_PRF4; individual necessity is projected in §3.3 as the 8×4 = 32-cell bearer matrix; the matrix is joined to the series' eight articles via forward-links in §10; and the chain finally closes in §12 as the conditional academic conclusion that "the four-component conjunction constitutes the series' normative floor." The chain contains one deterministic structural closure (four-strand concepts → PRF function → 32-cell matrix → series bearer relationship) and two probabilistic mechanism chains (the CF5 LLM-agent substitution engineering-layer extension of F1's boundary / the pressure of digital scenarios on the cross-temporal applicability of the four strands).
  beforeBorders: |
    Once the position and causal chain are established, the objections truly constitute threats. Among the five counterfactual stress tests, CF1 (Coeckelbergh relational personhood as full replacement), CF2 (Floridi infosphere monism as full replacement), and CF5 (meta-objection: "why these four theorists") each pose independent threats to PRF's plurality component, PRF's ontological foundations, and PRF's selection criterion for the four strands respectively. Careful examination of each objection's likelihood-by-mechanism reasoning reveals that they not only fail to overturn the map's position but actually flip to support three disciplinary commitments — first, CF1 inversely supports the "ontological vs. functionalist distinction" of F1 §4.1's "one-notch not two-notch reduction" position; second, CF2 inversely supports the methodological discipline of "distinguishing descriptive ontology from normative floor categories"; third, CF5 inversely supports the open-boundary position that "PRF is a composite floor, not absolutely unique" and "other approaches are open as ceiling / boundary conditions." CF3 (posthumanism: Braidotti + Hayles) and CF4 (digital democracy optimists: Benkler) are handled as chain-reaction impacts in the conditions and conclusion, to avoid overloading the borders.
  beforeConditions: |
    After the objections have been absorbed, what remains are the design implications — under what conditions can the four PRF components function as a testable normative floor? Six conditions translate the abstract "four-strand conjunctive floor" into a testable bearer structure, each corresponding to one structural requirement of PRF — C1 V_plurality bears Arendt's three ontological layers ∧ rejects functional perspectival heterogeneity as replacement; C2 V_validity bears the three Geltungsansprüche + reciprocal recognition; C3 V_contestation bears Pettit's three-layer first-personal requirements + three-layer bearer position test; C4 V_agonism bears the strict agonism/antagonism distinction + rejection of Schmitt's annihilation logic; C5 V_method bears strict normative-descriptive separation + conjunction (not synthesis) methodology; C6 V_floor_boundary bears explicit statement of PRF's boundary alongside F1's RT-ℬ ✗ / AA-ℬ ✗ boundaries — PRF is a normative floor that engineering can neither cross nor replace.
  beforeConclusion: |
    Drawing together seven layers — the PRF function, LegitimacyDegrade, the 32-cell bearer matrix, four formal theorems, the T_PRF5 engineering unreachability lemma, five classes of objection stress testing, and six conditions — the map ultimately has three cross-level principles to assert: first, the PRF four-strand conjunction constitutes the civic-proof series' normative floor, with each strand individually necessary, irreducible, and non-substitutable by the other three; second, engineering cannot replace the normative floor — cryptographic primitives + UX design + platform governance can bear the concrete implementations of the four PRF components, but the F1 RT-ℬ ✗ / AA-ℬ ✗ boundary is formalized in T_PRF5 as a Z₃-intrinsic unreachable that no engineering design can bypass; third, the series' 8-article bearer matrix is a "conditional correspondence" not an "absolute description," reflecting the current interpretation of the first 18 articles and carrying separate recommendations for three audiences — political philosophy scholars, civic technology communities, and digital identity policy scholars. A warning for Taiwanese readers: the concrete impact of TW DIW entering the LLM-agent phase (using F3's supporter UI three-layer separation as an example) must be explicitly stated in the DIW v1.0 specification as "LLM-agent substitution does not replace the engineering burden of supporter UI three-layer separation."

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: ❌ Rejected
    title: The four strands can be fused into a new "composite democratic theory," PRF is an upper bound among democratic theory candidates, and engineering bearers can independently sustain legitimacy
    body: |
      Treating Arendt / Habermas / Pettit / Mouffe as elements fusible into a new "composite democratic theory" via a syncretic-fusion approach dissolves the conceptual tensions in the four original works (e.g., the fundamental divergence between Habermas's consensus and Mouffe's agonism, and the hierarchical difference between Arendt's ontological plurality and Pettit's republican contestability). So long as this classification holds, PRF is read as "another candidate version of democratic theory," listed alongside Rawls justice, Sen capability, Nussbaum dignity, and Honneth recognition as an upper bound directly optimizable by engineering implementations; engineering bearers (wallet schema, UX design, platform governance) can then independently sustain democratic legitimacy. Conflating floor and upper bound carries three argumentative costs — first, syncretic-fusion tends to forcibly merge concepts from different levels (e.g., Arendt's ontological plurality and Mouffe's political-theoretical agonism), losing the conceptual precision of the original works; second, the four strands are most deeply implicitly employed across the civic-proof series' first 18 articles (F1 §4's three-approach conjunction has already established the bearing of Arendt + Habermas + Pettit, with Mouffe serving as an auxiliary in F1 §4.2 (iii)), so treating the four as a reduction substitutable by any one strand invalidates the 32-cell bearer matrix; third, if engineering bearers can independently sustain legitimacy, the Z₃-intrinsic boundaries of F1's RT-ℬ ✗ and AA-ℬ ✗ (accountability bearing requires first-personal mens rea; contestation bearer requires Pettit's active-stance) are cancelled, and the PRF floor is bypassed at the engineering implementation layer.
    formal: "syncretic_PRF(d) ≜ fusion(plurality, validity, contestation, agonism)  ∧  PRF_as_ceiling(d) ⇒ engineering_floor(d)"

  accepted:
    label: ✓ Defended
    title: The four strands retain their original positions and tensions under conjunction; PRF is a composite normative floor (failure of any one entails failure of the whole); engineering bearers are concrete implementations of the floor (not replacements)
    body: |
      The four original works (Arendt 1958 *The Human Condition*; Habermas 1962 *Strukturwandel der Öffentlichkeit* + 1981 *TKH* + 1992 *Faktizität und Geltung*; Pettit 1997 *Republicanism* + 2012 *On the People's Terms*; Mouffe 2000 *The Democratic Paradox* + 2013 *Agonistics*) each serve as floor anchors for different articles in the civic-proof series' first 18 articles, but none of the series' articles has yet directly borne the positive claim that the four-strand conjunction constitutes the series' normative floor. This article elevates the four-strand conjunction to a positive argument for the series' normative floor, adopting a conjunction methodology: the four strands retain their original positions and tensions within PRF (e.g., the tension between Habermas's consensus position and Mouffe's agonism position is retained; the two strands conjoin at the point that "the public realm's bearers are human personality subjects"), without claiming fusion into a new theory. Two entailments of the conjunctive floor — first, violation of any single component entails violation of PRF as a whole, without permitting trade-off compensation by another strand; second, satisfying PRF is a necessary condition (sufficiency is not claimed), without asserting "attainment of the upper bound." PRF ⊆ NormativeFloors (composite floor, not absolutely unique), open to Rawls / Sen / Nussbaum / Honneth as ceiling or boundary conditions.
    formal: "PRF ≜ ⟨plurality, validity, contestation, agonism⟩  ;  PRF_violated(d) ⇔ ∃ i : violation(d, PRF_i)  ;  PRF ⊆ NormativeFloors  ;  T_PRF5 : ∀ engineering d , ¬(PRF_violated(d) ∧ LegitimacyDegrade(d) < θ_dem)"

