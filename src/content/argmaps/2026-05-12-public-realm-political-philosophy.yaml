conclusion:
  paragraphs:
    - "<strong>The PRF four-strand conjunction constitutes the civic-proof series' normative floor</strong>. Arendt plurality (ontological co-presence of multiple <em>who</em> + three ontological conditions: natality + mortality + uniqueness), Habermas Öffentlichkeit (ideal speech situation + three Geltungsansprüche: Wahrheit / Richtigkeit / Wahrhaftigkeit + Sluice model), Pettit contestation (Equally Accepted Terms + Equally Accessible Influence + Active Stance + three-layer bearer position test + four conditions of editorial democracy), and Mouffe agonism (three conditions for legitimate adversary: mutual recognition + shared rules + agonistic frame) jointly constitute, within the civic-proof series scenario, the conjunctive floor PRF. Each of the four strands is individually necessary, irreducible, and non-substitutable by the other three (borne by theorems T_PRF1 to T_PRF4); violation of any single component entails LegitimacyDegrade(d) ≥ θ_dem ≈ 0.5 (borne by theorem T_PRF0). <em>θ_dem ≈ 0.5 is an analytically suggested figure</em>, pending reverse-calibration against the distribution of degradation cases in the V-Dem 2024 liberal democracy index, the Bertelsmann Transformation Index, and the Freedom House annual reports. PRF ⊆ NormativeFloors (composite floor, not absolutely unique), open to Rawls / Sen / Nussbaum / Honneth as ceiling or boundary conditions."
    - "<strong>Engineering cannot replace the normative floor</strong>. Engineering bearers such as cryptographic primitives (wallet, receipts, selective disclosure), UX design (supporter UI three-layer separation), and platform governance (FTLA four-layer, cross-border mutual recognition) can bear the concrete implementations of the four PRF components but cannot replace the normative status of the four components. F1's RT-ℬ ✗ (accountability bearing requires first-personal mens rea, corresponding to dual violation of plurality + validity) and AA-ℬ ✗ (contestation bearer requires Pettit's active-stance, corresponding to dual violation of contestation + agonism) Z₃-intrinsic boundary is formalized in theorem T_PRF5 as the 'Engineering Unreachability Lemma of the PRF Floor' — no engineering design can bypass the PRF floor. The CF5 LLM-agent substitution engineering-layer extension is confined to within Z₂ (not bypassing F1's Z₃ boundary); F3's supporter UI three-layer separation is the concrete bearer of this boundary at the UX layer. The normative requirements for infrastructure such as EUDI Wallet, TW DIW, and Aadhaar should use the four PRF components as the floor criterion, with engineering bearers as concrete implementations of the floor; it is not claimed that engineering bearers can independently sustain legitimacy."
    - "<strong>The series' 8-article bearer matrix is a 'conditional correspondence' not an 'absolute description,' plus separate recommendations for three audiences</strong>. The 32-cell bearer matrix (§3.3) reflects the current interpretation of the normative claims of the first 18 articles (● 18 cells / ○ 9 cells / — 5 cells); F1 is the only article with full core bearing of all four components (4 ●); F2 §9's agonistic engineering upgrade of the CF1-CF5 stress test upgrades F2-agonism from — to ○. If other series articles' interpretations are updated or new series articles are added, the matrix must be redone (§11 high-risk claim R7). For <strong>political philosophy scholars</strong>: this article explicitly adopts the conjunction (not synthesis) methodology in §8.2; subsequent scholarship can extend the conjunctive relationship between PRF and other political philosophy approaches (O3 / O21), the correspondences and tensions of cross-cultural PRF (O11 / O22), and the distinction between PRF's descriptive and normative power for non-democratic regimes (O4 / O14). For <strong>civic technology communities</strong>: the 32-cell bearer matrix is the formalization of the series' normative claim bearer relationship; F1's RT-ℬ ✗ / AA-ℬ ✗ boundary is an upper-bound constraint on engineering design; the supporter UI three-layer separation / wallet triple-presupposition degradation analysis / cross-jurisdictional remedy gaps are applications of PRF to engineering bearers. For <strong>digital identity policy scholars</strong>: a warning for Taiwanese readers — <strong>TW DIW entering the LLM-agent phase must explicitly state in the DIW v1.0 specification that 'LLM-agent substitution does not replace the engineering burden of supporter UI three-layer separation, and the human democratic subject bearing of the contestation dimension cannot be replaced by LLM-agents'</strong>; policy assessments of infrastructure such as the EUDI Wallet, India's Aadhaar, and Taiwan's TW DIW can invoke the four PRF components as normative floor criteria."
  formalCoda: |
    Final form:
      PRF ≜ ⟨plurality, validity, contestation, agonism⟩                    (Definition 3.1)
      PRF_violated(d)  ⇔ ∃ i ∈ {plurality, validity, contestation, agonism}
                         : violation(d, PRF_i)
      PRF_satisfied(d) ⇔ ⋀_{i} satisfies(d, PRF_i)
      PRF ⊆ NormativeFloors  (composite floor, not absolutely unique)

      LegitimacyDegrade(d) ≜ σ( β₁·violation_intensity(d, plurality)
                              + β₂·violation_intensity(d, validity)
                              + β₃·violation_intensity(d, contestation)
                              + β₄·violation_intensity(d, agonism) )
