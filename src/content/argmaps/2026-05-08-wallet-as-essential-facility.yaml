slug: 2026-05-08-wallet-as-essential-facility
title: "Why Wallets Should Be Regulated Like Telecoms: Apple Wallet Is Not a Neutral Product"
subtitle: "Wallet as Essential Facility — Argument Map (v2)"

coreThesis:
  text: |
    When a wallet becomes the necessary channel for accessing government services, age verification, and electoral voting, it should be subject to essential facility doctrine, the Digital Markets Act, and the telecom interoperability obligation framework. Specific enforcement follows a multi-pronged path (US Aspen-MCI + EU DMA Article 6 path α + national legislation §251 mechanism layer reference + W3C-OID4VC standards normalization), without requiring new legislation. The SSI counterargument's dual framing shifts from "regulation vs. freedom" to "vendor lock-in vs. interoperability obligations."
  summary: "Wallet meets essential facility doctrine via Aspen-MCI strict four conditions plus sacrifice test, owing common-carrier obligations under multi-pronged enforcement."
  formal:
    expression: |
      Essential_Facility_Wallet:
        ∀ W ∈ {Apple_Wallet, Google_Wallet}:
          (control(W) ∧ ¬reconstructable(W) ∧ refusal_suppresses_competition(W)
           ∧ technical_economic_feasibility(W) ∧ sacrifice_test_passed(W))
          ⇒ owe_common_carrier_obligations(W)

      Multi-pronged_Remedy:
        enforcement(W) =
          (US_Aspen_MCI_path ∧ Issuer_Verifier_access)
          ∨ (DMA_Article_6_7_9_5 ∧ functional_component_continuity)
          ∨ (national_legislation_via_§251_mechanism_β)
          ∨ (W3C_OID4VC_normative_standardization)

      Portability_spec:
        spec(W) ⊨ (credential_export ∧ issuer_choice ∧ verifier_choice ∧ revocation_independence)
        ⇔ ¬vendor_lockin(W) ∧ ssi_vision_realizable(W)
    caption: "When the essential facility five conditions (C1-C4 + sacrifice test) are met, wallet should bear public common carrier obligations; enforcement follows a four-path OR combination; portability spec is compatible with the SSI vision."
    legend:
      - symbol: W
        meaning: Wallet (Apple Wallet / Google Wallet and other dominant-market-share digital wallets)
      - symbol: control(W)
        meaning: C1 condition — dominant actor controls the facility
      - symbol: reconstructable(W)
        meaning: C2 condition — competitors practically cannot reconstruct
      - symbol: refusal_suppresses_competition
        meaning: C3 condition — refusal of access suppresses competition
      - symbol: technical_economic_feasibility
        meaning: C4 condition — access is technically and economically feasible
      - symbol: sacrifice_test_passed
        meaning: Aspen Skiing fifth element — dominant actor's refusal of access entails short-term economic sacrifice
      - symbol: common_carrier_obligations
        meaning: Public common carrier obligations (must not arbitrarily refuse / must not self-preference / must not unilaterally revoke)
      - symbol: functional_component_continuity
        meaning: Path α — iOS/Android already designated → wallet as functional component, a continuity of reasoning
      - symbol: §251_mechanism_β
        meaning: Mechanism layer β isomorphism of Telecom Act §251's four mechanisms (interconnection / unbundling / nondiscriminatory rates / collocation)
      - symbol: vendor_lockin
        meaning: Vendor lock-in (issuer/credential/verifier/revocation monopolized by the wallet vendor)
      - symbol: ⇒
        meaning: "implies" (inference relation)
      - symbol: ⇔
        meaning: "if and only if" (biconditional)
      - symbol: ∧ ∨ ¬
        meaning: conjunction / disjunction / negation (propositional logic operators)

transitions:
  beforeDistinction: "The formula establishes the position, but a distinction between two ways of viewing wallet must first be drawn. Most engineering communities and commercial literature treat wallet as a 'neutral consumer product'; this map rejects that classification — wallet should be viewed as 'the last-mile channel through which citizens access democratic infrastructure,' and therefore falls within the scope of public common carrier accountability."
  beforePillars: "The distinction itself is merely a declaration. To prove the path that 'wallet should be subject to public common carrier obligations,' five independent sources of support are required: US Aspen-MCI essential facility deduction (normative basis), Telecom §251 mechanism analogy (institutional precedent), DMA Article 6 continuity reasoning (existing law implementation), SSI counterargument absorption (handling internal opposition), and portability spec implementation (from slogan to engineering obligation). Without any one of these five, the overall argument risks collapse if a single line of reasoning is refuted."
  beforeChain: "The five pillars above provide positive support. But the claim that 'wallet constitutes a public common carrier' must be underpinned by a concrete causal chain — progressing from the initial assumption of 'neutral commercial product' step by step to the conclusion 'owe common carrier obligations.' The six-step causal chain (control → refusal → competition suppression → sacrifice → public carriage) can be mechanically traced."
  beforeBorders: "Once the position + causal chain are established, the objections become genuinely threatening. 'Trinko has effectively abolished essential facility,' 'self-sovereign = unregulated,' and 'DMA is regional law and cannot be globalized' are frequently cited as reasons; but careful examination of the legal and conceptual structure of each objection reveals that not only do they not support 'wallet is a neutral product,' they actually flip to support public common carrier obligations — that is, the argumentative limits of each objection precisely constitute the second layer of support for the map's position."
  beforeConditions: "After the objections are absorbed, what remains is design implications: under what conditions can wallet public common carrier obligations be legitimately deployed? Four portability specs (credential exportable / issuer selectable / verifier accessible / revocation independent) + four prohibitions (vendor lock-in / interoperability refusal / self-preference / unilateral revocation) + three enforcement mechanism layers (W3C-OID4VC + DMA Article 6 + national legislation) translate the abstract concept of 'public carriage' into verifiable engineering and legal obligations."
  beforeConclusion: "Drawing together the normative basis (essential facility), institutional precedent (Telecom §251), existing law (DMA Article 6), counterargument absorption (SSI dual framing reconstruction), and implementation spec across five layers, the map's final message is the policy design achievement (antitrust is merely an instrument, not an end), and a dual principle spanning all levels: vendor lock-in vs. interoperability obligations."

distinction:
  rejected:
    label: ❌ Rejected
    title: Wallet Is a Neutral Commercial Product
    body: "Treating Apple Wallet and Google Wallet as ordinary consumer products, regulated by market and consumer choice, without requiring public common carrier obligations. This classification assumes users have real alternatives and that wallet refusal of access is merely a commercial choice rather than structural suppression. But iOS 50%+ US market share, 35–45% EU market share, and the selective power over issuer/verifier access have already undermined the empirical basis for the 'free market regulation' premise."
    formal: "wallet ∈ Commodity_Market  ⇒  ¬owe_common_carrier_obligations  (rejected basis)"
  accepted:
    label: ✓ Defended
    title: Wallet Is a Public Common Carrier + Multi-Pronged Enforcement + Vendor Lock-In vs. Interoperability Obligations Dual
    body: "At the issuer access and verifier access levels, wallet already satisfies the strict four conditions of essential facility doctrine plus the Aspen Skiing sacrifice test. Specific enforcement follows a multi-pronged path (US Aspen-MCI + EU DMA Article 6 path α + national legislation §251 mechanism layer reference + W3C-OID4VC standards normalization), without requiring new legislation. The SSI counterargument's 'regulation vs. freedom' dual rests on conceptual conflation; the correct dual is 'vendor lock-in vs. interoperability obligations' — interoperability obligations preserve a diverse wallet ecosystem and are compatible with the SSI vision."
    formal: "(C1 ∧ C2 ∧ C3 ∧ C4 ∧ sacrifice_test) ⇒ owe_common_carrier_obligations(W)  ∧  enforcement = ⋁_i path_i"

pillars:
  - section: §2 — US Essential Facility Deduction
    title: Strict Four Conditions + Aspen Skiing Sacrifice Test
    role: "Provides the normative basis — without a mature legal framework, 'wallet should be subject to public common carrier obligations' would be dismissed as an arbitrary claim. The Areeda-Hovenkamp strict four conditions + Aspen Skiing sacrifice test provide authoritative grounding in US antitrust law; Trinko tightened but did not abolish the doctrine, and the wallet scenario (not subject to traditional regulation) falls precisely in the sweet spot where Trinko limitations do not apply."
    body: "MCI v. AT&T 1983's Seventh Circuit synthesis of 'three conditions' was not a Supreme Court holding; the strict version must add the Aspen Skiing 1985 sacrifice test and C4 technical-economic feasibility, totaling five elements. Trinko 2004 pushed the doctrine back toward the sacrifice path, and applies only to traditionally regulated industries (such as the 1996 Telecom Act) — wallet is not among them. Applying the four-level analysis to wallet: Issuer access + Verifier access hit all five elements and constitute the strongest pillar; OS-NFC is strong but sacrifice evidence needs reconstruction via EEA iOS 17.4 counterevidence; Wallet UI is weakest and is recommended to be omitted."
    finding: "Essential facility litigation at the Issuer/Verifier access level is practically viable in US courts; Wallet UI layer omitted to avoid weakening the overall argument."
    formal: "(MCI_strict_four_conditions ∧ Aspen_Skiing_sacrifice_test ∧ ¬Trinko_regulated_industry)(W) ⇒ essential_facility(W)"

  - section: §3.1-3.2 — Telecom §251 Mechanism Layer Analogy
    title: "β Isomorphism: Four Interoperability Mechanisms Transferable"
    role: "Provides institutional precedent — if wallet public common carrier obligations sound 'overly novel,' §251 provides mature precedent dating from 1996. The analogy's strength is locked at mechanism layer β rather than historical condition layer γ, avoiding the objection that 'natural monopoly theory has collapsed' from destroying the overall argument in one blow."
    body: "1996 Telecommunications Act §251 four mechanisms: (a) interconnection (b) unbundling (c) nondiscriminatory rates (d) collocation. Each corresponds to wallet: (a) any OID4VC credential should be accepted; (b) credential decoupled from wallet UI; (c) issuer/verifier access rates non-discriminatory; (d) multiple wallets co-existing on the same device. Analogy strength: (a)+(b)+(c) are β (highly transferable mechanism layer), (d) is α (purely technical question), historical condition layer is γ (natural monopoly theory does not apply). TELRIC pricing mechanism does not apply to wallet (marginal cost near zero); replaced by DMA 6(12) FRAND standard. The history of USTA II + TRRO 2003–2005 contracting unbundling obligations must be actively addressed rather than avoided."
    finding: "§251 mechanism layer provides a concrete template transferable to national legislation; the collapse of the historical condition layer does not affect the strength of the mechanism layer analogy."
    formal: "isomorphic_β({§251.a, §251.b, §251.c}, {wallet.OID4VC_accept, wallet.UI_unbundle, wallet.fair_rate})  ∧  γ_only({natural_monopoly_premise, TELRIC})"

  - section: §3.3-3.6 — DMA Article 6 Path α
    title: iOS/Android Already Designated → Wallet as Functional Component Continuity Reasoning
    role: "Provides existing law implementation — if waiting for new legislation is required, wallet common carriage will be indefinitely deferred. DMA Article 6 + Article 8 specification procedure can already be enforced in the EU; the 2025-04 fine precedent demonstrates EU Commission enforcement resolve. Path α (functional component perspective) allows wallet obligations to begin immediately without new designation."
    body: "Apple iOS and Google Android have been listed as gatekeeper CPS under DMA Article 3. Apple Wallet and Google Wallet are CPS sub-products; path α (continuity reasoning) extends Article 6 obligations without needing to go through Article 3 re-designation. Three specific Article 6 correspondences: 6(7) interoperability (specifiable) → wallet should accept any OID4VC credential; 6(9) portability (absolute) → credentials exportable to competing wallets; 6(5) self-preference prohibition (limited to ranking) → iPhone double-pressing power button must not default to Apple Wallet. Enforcement feasibility: 2025-04-23 Apple €500 million (Case DMA.100203) + Meta €200 million (Case DMA.100204) non-compliance fines. Payment wallet (TFEU 102 path, case closed 2024-07) vs. identity wallet (DMA Article 8, not yet initiated) must be kept separate."
    finding: "DMA path α can be initiated immediately in the EU; 2025 fine precedents demonstrate substantive enforcement capacity of the specification procedure; separating payment/identity wallet avoids conflation."
    formal: "designated(iOS, Android) ∧ functional_component(W ⊆ {iOS, Android})  ⇒  Article_6_obligations(W) ⊨ {6(7), 6(9), 6(5)}"

  - section: §4 — SSI Counterargument Dual Framing Reconstruction
    title: "\"Vendor Lock-In vs. Interoperability Obligations\" Replaces \"Regulation vs. Freedom\""
    role: "Provides counterargument absorption — without addressing the SSI advocates' objection, this argument would be accused of 'suppressing self-sovereign innovation.' The SSI counterargument rests on conceptual conflation between 'normative mandate (compulsory use of a specific wallet)' and 'interoperability obligations (requiring all wallets to follow open standards).' This pillar deconstructs three variants and proposes the dual framing reconstruction, making interoperability obligations logically compatible with the SSI vision."
    body: "SSI counterargument three variants: A government regulation will turn wallets into new surveillance tools; B OID4VC is an EU standard and should not be globalized; C free choice is the foundation of democracy. All three conflate instrument A (standards mandate: compulsory use of a specific wallet) with instrument B (interoperability obligations: requiring all wallets to follow open standards). Responses: interoperability obligations do not require vendors to disclose internal structures (A invalid); OID4VC is a W3C/OpenID Foundation open standard (B invalid); multiple wallets coexisting preserves user choice (C invalid). The SSI vision's three core layers (user holds credential / can choose wallet / can revoke authorization) can only be realized under interoperability obligations, not in an unregulated free market. Tim Bray (2023–2024) and Christopher Allen (2023) positions partially recognize this argument (weak inductive, no claim of collective SSI community endorsement)."
    finding: "The SSI counterargument's 'regulation vs. freedom' dual is obscured by conceptual conflation; the correct dual 'vendor lock-in vs. interoperability obligations' makes the SSI vision logically compatible with public common carrier obligations."
    formal: "interoperability_obligation(W) ⇔ (user_holds_credential(W) ∧ wallet_choice(W) ∧ revocation_authority(W))  ∧  ¬standards_mandate"

  - section: §5 — Wallet Portability Spec Implementation
    title: 4 Portability Specs + 4 Prohibitions + Three-Layer Enforcement Mechanism
    role: "Provides implementation feasibility — without a concrete spec, public common carrier obligations are merely a slogan. This pillar maps the 4 portability specs and 4 prohibitions to W3C VC / OID4VC / DC API / Bitstring Status List existing technical standards, and proposes three enforcement mechanism layers (standards normalization + DMA mandate + national legislation). Spec items can be asymmetrically staged for legislation, reducing political resistance."
    body: "Spec 1 credential exportable (OID4VCI Implementer's Draft 4 §6.5 informative, expected to be upgraded to normative in 2025-Q4); Spec 2 issuer can select multiple wallets (technically feasible, Apple/Google API lock-in is the obstacle); Spec 3 verifier can access multiple wallets (W3C DC API 2024 draft, requires multi-browser cooperation for implementation); Spec 4 revocation rights not monopolized by wallet vendor (OID4VCI status list / Bitstring Status List 1.0). Corresponding prohibitions: vendor lock-in / interoperability refusal / self-preference / unilateral revocation, corresponding to DMA 6(9) / 6(7) / 6(5) / statutory respectively. Three enforcement layers: W3C-OID4VC normative (2025-Q4) → DMA Article 6 mandate (2026-Q2) → national legislation follow-on (US ADPPA, Taiwan PDPA, Japan APPI, Singapore IMDA)."
    finding: "4 specs correspond to existing technical standards; technical feasibility is already in place; bottleneck is at the policy layer (voluntary vs. mandatory obligations); staged legislation reduces implementation costs."
    formal: "spec_implementable(W) ⇔ ⋀_{i=1..4} spec_i(W)  ∧  ⋀_{j=1..3} enforcement_layer_j(W)"

chain:
  title: "Wallet Public Common Carrier Six-Step Causal Chain: Neutral Product → Owe Common Carrier Obligations"
  legend:
    - kind: deterministic
      label: Mechanically necessary (legally / engineering structural, not dependent on external trigger)
    - kind: probabilistic
      label: Probabilistic (dependent on policy choices + litigation and fine enforcement)
  steps:
    - tag: T0
      kind: deterministic
      text: "Wallet becomes a necessary channel for government services, age verification, platform login, and electoral voting (infrastructure character established)"
    - tag: T1
      kind: deterministic
      text: "C1 dominant actor control: Apple iOS 50%+ US market share; Google Android + Wallet global dominance; issuer/verifier access selectively determined by vendors"
    - tag: T2
      kind: deterministic
      text: "C2 non-reconstructable + C3 refusal suppresses competition: third-party wallets cannot bypass Apple/Google-controlled issuer access pathways and OS-level NFC APIs"
    - tag: T3
      kind: probabilistic
      text: "C4 technically economically feasible + sacrifice test: iOS 17.4 EEA NFC opening proves technical feasibility; Apple's refusal of issuer access causes short-term commission loss (sacrifice evidence)"
    - tag: T4
      kind: deterministic
      text: "Aspen-MCI essential facility doctrine all five elements satisfied → wallet owes common carrier obligations"
    - tag: T5
      kind: probabilistic
      text: "Multi-pronged enforcement: US Aspen-MCI (issuer/verifier litigation) ∨ EU DMA Article 6 path α ∨ national legislation §251 mechanism ∨ W3C-OID4VC standards normalization"

borders:
  - label: Objection 1
    title: Trinko Has Effectively Abolished Essential Facility Doctrine
    pivot: "The objection claims that 'Justice Scalia wrote in 540 U.S. 411 \"we have never recognized such a doctrine, and we find no need either to recognize it or to repudiate it here,\" so essential facility has effectively lapsed in US courts.' But reading Trinko fully, Scalia was addressing a domain where the 1996 Telecom Act had established detailed ex ante regulation; Trinko did not deny the doctrine's applicability in domains not subject to traditional regulation, and still affirmed the Aspen Skiing sacrifice test as one element of antitrust violation. Hovenkamp 6th edition, while partially supporting 'Trinko has effectively abolished' the position, still acknowledges that the Aspen-MCI path has applicability to unregulated digital platforms."
    flip: "The outer boundary Trinko sets for essential facility doctrine not only fails to support 'wallet does not apply,' it actually provides the strongest argument for 'wallet belongs to the unregulated domain where Trinko limitations do not apply, precisely the sweet spot' — Trinko's own limiting scope explains the viability of wallet litigation."
  - label: Objection 2
    title: Self-Sovereign Identity = Unregulated Free Market
    pivot: "The objection's three variants claim that 'government regulation will turn wallets into new surveillance tools; OID4VC is an EU standard and should not be globalized; free choice is the foundation of democracy.' But careful examination of each variant shows that all conflate instrument A (normative mandate: compulsory use of a specific wallet) with instrument B (interoperability obligations: requiring all wallets to follow open standards). Interoperability obligations do not require vendors to disclose internal structures; OID4VC is a W3C/OpenID Foundation open standard, not an EU regional standard; multiple wallets coexisting preserves user choice."
    flip: "The SSI vision's three core layers (user holds credential / can choose wallet / can revoke authorization) can only be realized under interoperability obligations, not in an unregulated free market — if Apple Wallet locks in credentials, users do not actually hold credentials; they are 'renting credentials provided by Apple.' The SSI counterargument inversely supports the 'vendor lock-in vs. interoperability obligations' dual."
  - label: Objection 3
    title: DMA Is EU Regional Law and Cannot Be Globalized
    pivot: "The objection claims that 'DMA enforcement jurisdiction is limited to the EU, and the actual impact of cross-border wallet services is bounded. Apple has adopted a regionalization strategy in its iOS 17.4 EEA limited version — EU users enjoy interoperability, US users remain in a closed system. Treating DMA as a global template is legal imperialism.'"
    flip: "Regional differentiation not only fails to support 'wallet common carriage cannot advance,' it actually provides the strongest argument for the multi-pronged enforcement path. DMA provides EU precedent; US Aspen-MCI provides the US path; §251 mechanism layer provides a nationally legislatively transferable template for other countries; W3C-OID4VC provides standards-layer coordination. Multiple parallel paths avoid any single jurisdiction becoming the sole enforcement instrument — this precisely demonstrates how cross-jurisdictional coordination can constrain regional limitations."

conditions:
  title: Legitimate deployment of wallet public common carrier obligations must first pass four portability specs + four prohibitions + three enforcement mechanism layers
  formalPrelude: "deploy(common_carrier_obligations, W) valid ⇔ Spec₁ ∧ Spec₂ ∧ Spec₃ ∧ Spec₄ ∧ Ban₁ ∧ Ban₂ ∧ Ban₃ ∧ Ban₄ ∧ Layer₁ ∧ Layer₂ ∧ Layer₃"
  items:
    - title: Spec 1 — Credential Exportable
      body: "Wallet must provide a credential export endpoint, allowing users to export stored credentials to competing wallets. Standard status: OID4VCI Implementer's Draft 4 §6.5 informative, expected to be upgraded to normative in 2025-Q4. Corresponds to DMA Article 6(9) portability obligations."
      formal: "Spec₁: ∀ W : ∃ export_endpoint(W) ∧ format ∈ {OID4VCI, W3C_VCDM_2.0}"
    - title: Spec 2 — Issuer Can Select Multiple Wallets
      body: "Issuer must be able to directly call multiple wallet APIs (OID4VCI) rather than being bound to one of Apple/Google. Technically feasible; the implementation gap lies in Apple/Google API lock-in + vendor review system. Corresponds to DMA Article 6(7) interoperability obligations."
      formal: "Spec₂: ∀ issuer : ∃ wallet_API ∈ {Apple, Google, third_party} : direct_call_supported"
    - title: Spec 3 — Verifier Can Access Multiple Wallets
      body: "Verifier must be able to access any wallet through the W3C Digital Credentials API (browser-native) without going through Apple/Google proprietary APIs. Standard status: W3C draft 2024; requires multi-browser cooperation (Chrome / Firefox / Safari / Edge) for implementation. Corresponds to DMA Article 6(5) self-preference prohibition."
      formal: "Spec₃: ∀ verifier : ∃ DC_API_browser_native : verify(W, credential) without lock-in"
    - title: Spec 4 — Revocation Rights Not Monopolized by Wallet Vendor
      body: "Issuer must retain revocation rights, not monopolized by wallet vendor. Technical mechanism OID4VCI status list / Bitstring Status List 1.0 already in place; implementation gap is that wallet vendors may unilaterally conceal revocation status. New legislation explicitly prohibiting unilateral revocation is required."
      formal: "Spec₄: ∀ credential ∈ W : revocation_authority(credential) = issuer ∧ ¬wallet_vendor_monopoly"
    - title: Ban 1-4 — Four Prohibitions
      body: "Prohibition pairs corresponding to four portability specs: (1) vendor lock-in prohibition corresponding to Spec 1; (2) interoperability refusal prohibition corresponding to Spec 2; (3) self-preference prohibition corresponding to Spec 3; (4) unilateral revocation prohibition corresponding to Spec 4. Each prohibition has a corresponding DMA Article or statutory basis."
      formal: "⋀_{i=1..4} Ban_i = ¬violation(Spec_i)"
    - title: Layer 1 — W3C / OID4VC Standards Normalization
      body: "Advance existing W3C VCDM 2.0 / DC API / OID4VCI / OID4VP / Bitstring Status List 1.0 drafts to normative recommendation status, enabling all wallet vendors to comply at the technical layer. Expected timeline 2025-Q4."
      formal: "Layer₁: W3C_recommendation_status({VCDM_2.0, DC_API, OID4VCI, OID4VP, status_list}) by 2025-Q4"
    - title: Layer 2 — DMA Article 6 Mandate (EU)
      body: "Concretize 6(7)+(9)+(5) obligations at the wallet level through the Article 8 specification procedure. 2025-04-23 Apple €500 million + Meta €200 million non-compliance fines + 2025-03-19 messaging specification decision demonstrate enforcement capacity. Expected timeline 2026-Q2."
      formal: "Layer₂: DMA_Article_8_specification(W, 6.7 ∧ 6.9 ∧ 6.5) by 2026-Q2"
    - title: Layer 3 — National Legislation Follow-On
      body: "US ADPPA, Taiwan PDPA sixth amendment, Japan APPI 2025, Singapore IMDA using §251 mechanism layer analogy to establish parallel mechanisms, avoiding regional standards fragmentation. Long-term diplomatic path: G20 Digital Economy Working Group proposals, ITU-T listing OID4VC as international standard, bilateral/multilateral trade agreements."
      formal: "Layer₃: ⋃_{country ∈ {US, TW, JP, SG, ...}} national_legislation(country, §251_mechanism_β)"

conclusion:
  paragraphs:
    - <strong>Wallet is not a neutral commercial product; it is the last-mile channel through which citizens access democratic infrastructure.</strong> Treating it as an ordinary consumer product assumes the premise of "free market regulation," but iOS 50%+ US market share, 35–45% EU market share, and the selective power over issuer/verifier access have already undermined the empirical basis for that premise. Essential facility doctrine's strict four conditions plus the Aspen Skiing sacrifice test are satisfied in the wallet scenario; public common carrier obligations represent an extension of the existing doctrinal framework rather than the creation of new law.
    - "The debate should shift from 'regulation vs. innovation' to <em>'vendor lock-in vs. interoperability obligations.'</em> The SSI advocates' core vision (user holds credential / can choose wallet / can revoke authorization) can only be realized under interoperability obligations, not in an unregulated free market — this dual framing reconstruction makes SSI and common carriage logically compatible, preventing the false 'freedom vs. regulation' dual from continuing to incorrectly mobilize the SSI community against wallet policy."
    - "A multi-pronged principle runs throughout: <strong>no single enforcement path is sufficient to address the global wallet problem; US Aspen-MCI + EU DMA path α + national legislation §251 mechanism + W3C-OID4VC standards — four parallel paths — are necessary to maintain enforcement feasibility given the weakest link of cross-jurisdictional coordination.</strong> This article extends article 09 NCT's structural critique of 'commercial monopoly + democratic regime → infrastructural tyranny' from the Nordic BankID scenario to the concrete enforcement spec of the wallet layer; it forms cross-article coupled arguments with article 02 𝒩.M₂/M₄, article 06 D₂*, article 07 SRP, and article 15 inclusion baseline."
  formalCoda: |
    Final form:

      Essential_Facility_Wallet:
        ∀ W ∈ {Apple_Wallet, Google_Wallet}:
          (control(W) ∧ ¬reconstructable(W) ∧ refusal_suppresses_competition(W)
           ∧ technical_economic_feasibility(W) ∧ sacrifice_test_passed(W))
          ⇒ owe_common_carrier_obligations(W)

      Multi-pronged_Remedy:
        enforcement(W) =
          (US_Aspen_MCI_path ∧ Issuer_Verifier_access)
          ∨ (DMA_Article_6_7_9_5 ∧ functional_component_continuity)
          ∨ (national_legislation_via_§251_mechanism_β)
          ∨ (W3C_OID4VC_normative_standardization)

      Portability_spec:
        spec(W) ⊨ (Spec₁ ∧ Spec₂ ∧ Spec₃ ∧ Spec₄)
        ⇔ ¬vendor_lockin(W) ∧ ssi_vision_realizable(W)

      deploy valid  ⇔  ⋀_{i=1..4} Spec_i ∧ ⋀_{j=1..4} Ban_j ∧ ⋀_{k=1..3} Layer_k

    Cross-article coupling:
      article_02.{M₂, M₄}      ← wallet corresponds to qualification + privacy assessment
      article_06.D₂*           ← wallet must provide non-smartphone fallback (inclusion obligation for the vulnerable)
      article_07.SRP           ← contemporary form of the sovereign container paradox of wallet vendor lock-in
      article_09.NCT           ← last-mile form of commercial monopoly + democratic regime → infrastructural tyranny
      article_15.inclusion     ← government wallet should be the inclusion baseline, not replaceable by commercial wallets
