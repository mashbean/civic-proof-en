slug: 2026-05-08-wallet-as-essential-facility
title: "為什麼皮夾應該被當成電信業：Apple Wallet 不是中性產品"
subtitle: "Wallet as Essential Facility — Argument Map (v2)"

coreThesis:
  text: |
    當 wallet 變成進入政府服務、年齡驗證、選舉投票的必要通道，它應受 essential facility doctrine、Digital Markets Act 與電信業互通義務 framework 約束。具體執行採 multi-pronged 路徑（US Aspen-MCI + EU DMA Article 6 路徑甲 + 國家立法 §251 機制層參考 + W3C-OID4VC 標準正式化），不需立新法。SSI 反論的對偶從「監管 vs 自由」改寫為「廠商鎖定 vs 互通性義務」。
  summary: "Wallet meets essential facility doctrine via Aspen-MCI strict four conditions plus sacrifice test, owing common-carrier obligations under multi-pronged enforcement."
  formal:
    expression: |
      Essential_Facility_Wallet:
        ∀ W ∈ {Apple_Wallet, Google_Wallet}:
          (control(W) ∧ ¬reconstructable(W) ∧ refusal_suppresses_competition(W)
           ∧ technical_economic_feasibility(W) ∧ sacrifice_test_passed(W))
          ⇒ owe_common_carrier_obligations(W)

      Multi-pronged_Remedy:
        enforcement(W) =
          (US_Aspen_MCI_path ∧ Issuer_Verifier_access)
          ∨ (DMA_Article_6_7_9_5 ∧ functional_component_continuity)
          ∨ (national_legislation_via_§251_mechanism_β)
          ∨ (W3C_OID4VC_normative_standardization)

      Portability_spec:
        spec(W) ⊨ (credential_export ∧ issuer_choice ∧ verifier_choice ∧ revocation_independence)
        ⇔ ¬vendor_lockin(W) ∧ ssi_vision_realizable(W)
    caption: "Essential facility 五條件（C1-C4 + sacrifice test）成立時 wallet 應承擔公共承載人義務；執行採四路徑 OR 組合；portability spec 與 SSI 願景兼容。"
    legend:
      - symbol: W
        meaning: Wallet（Apple Wallet / Google Wallet 等主導市占的數位皮夾）
      - symbol: control(W)
        meaning: C1 條件——主導者控制設施
      - symbol: reconstructable(W)
        meaning: C2 條件——競爭者實際無法重建
      - symbol: refusal_suppresses_competition
        meaning: C3 條件——拒絕接入會壓制競爭
      - symbol: technical_economic_feasibility
        meaning: C4 條件——接入在技術與經濟上可行
      - symbol: sacrifice_test_passed
        meaning: Aspen Skiing 第五要件——主導者拒絕接入有短期經濟犧牲
      - symbol: common_carrier_obligations
        meaning: 公共承載人義務（不得任意拒絕 / 不得自我優先 / 不得單方撤銷）
      - symbol: functional_component_continuity
        meaning: 路徑甲——iOS/Android 已 designated → wallet 為功能組件視角的連續推理
      - symbol: §251_mechanism_β
        meaning: Telecom Act §251 四項機制（interconnection / unbundling / nondiscriminatory rates / collocation）的機制層 β 同構
      - symbol: vendor_lockin
        meaning: 廠商鎖定（issuer/credential/verifier/revocation 由 wallet 廠商獨佔）
      - symbol: ⇒
        meaning: 「推得」（推論關係）
      - symbol: ⇔
        meaning: 「當且僅當」（雙向蘊含）
      - symbol: ∧ ∨ ¬
        meaning: 合取 / 析取 / 否定（命題邏輯算子）

transitions:
  beforeDistinction: "公式給出立場，但要先區分兩種看待 wallet 的方式。多數工程社群與商業文獻把 wallet 視為「中性消費產品」，本地圖反對該分類；wallet 應被視為「公民進入民主基礎設施的最後一哩通道」，因此屬於公共承載人責任化的範疇。"
  beforePillars: "區分本身只是宣告。要證明「wallet 應受公共承載人義務約束」這條路徑，需要五條獨立來源的支撐：US Aspen-MCI essential facility 演繹（規範性根據）、Telecom §251 機制類比（制度先例）、DMA Article 6 連續推理（既有法律落地）、SSI 反論吸收（內部反對的處理）、portability spec 實作（從口號到工程義務）。五者缺一，整體論證會被「單線推理被反證即崩塌」拖垮。"
  beforeChain: "前面五條 pillar 是正向支撐。但「wallet 屬公共承載人」這個主張，必須有一條具體的因果鏈頂住——從「中性商業產品」這個初始預設，逐步推到「owe common carrier obligations」這個結論。六步因果鏈（控制 → 拒絕 → 競爭壓制 → sacrifice → 公共承載）可被機制性追溯。"
  beforeBorders: "立場 + 因果鏈成立後，反論才真的具威脅。「Trinko 已廢除 essential facility」「self-sovereign = 無監管」「DMA 是區域法不可全球化」三條反論常被引為理由；但仔細檢驗每條反論的法律與概念結構，會發現它們不僅未支持「wallet 是中性產品」，反而 flips to support 公共承載人義務化——亦即反論自己的論證邊界，正好是地圖的第二層支撐。"
  beforeConditions: "反論被吸收後，留下的是設計含意：在什麼條件下，wallet 公共承載人義務可以被合法部署？四項可遷移性（credential 可導出 / issuer 可選擇 / verifier 可接入 / 撤銷權獨立）+ 四項禁令（廠商鎖定 / 互通拒絕 / 自我優先 / 單方撤銷）+ 三層執行機制（W3C-OID4VC + DMA Article 6 + 國家立法），把抽象的「公共承載」翻譯成可被檢驗的工程與法律義務。"
  beforeConclusion: "把規範根據（essential facility）、制度先例（Telecom §251）、既有法律（DMA Article 6）、反論吸收（SSI 對偶重構）、實作 spec 五層收束起來，地圖最終要說的是政策設計上的成就（反壟斷只是工具，不是目的），以及一條跨越所有層級的對偶原則：廠商鎖定 vs 互通性義務。"

distinction:
  rejected:
    label: ❌ 被拒絕
    title: Wallet 是中性商業產品
    body: "把 Apple Wallet 與 Google Wallet 視為一般消費產品，由市場與消費者選擇調節，不需要公共承載人義務。這個分類預設使用者有實際替代品，而 wallet 拒絕接入只是商業選擇而非結構性壓制。但 iOS 50%+ 美國市占、35-45% 歐盟市占、以及 issuer/verifier 接入的選擇性權力，已使「自由市場調節」這個前提失去實證基礎。"
    formal: "wallet ∈ Commodity_Market  ⇒  ¬owe_common_carrier_obligations  (rejected basis)"
  accepted:
    label: ✓ 被辯護
    title: Wallet 是公共承載人 + multi-pronged 執行 + 廠商鎖定 vs 互通性義務對偶
    body: "Wallet 在 issuer 接入與 verifier 接入兩個層級，已滿足 essential facility doctrine 的嚴格四條件加上 Aspen Skiing sacrifice test。具體執行採 multi-pronged 路徑（US Aspen-MCI + EU DMA Article 6 路徑甲 + 國家立法 §251 機制層參考 + W3C-OID4VC 標準正式化），不需立新法。SSI 反論的「監管 vs 自由」對偶建立在概念混淆上，正確對偶是「廠商鎖定 vs 互通性義務」——互通性義務保留多元並存的 wallet 生態，與 SSI 願景兼容。"
    formal: "(C1 ∧ C2 ∧ C3 ∧ C4 ∧ sacrifice_test) ⇒ owe_common_carrier_obligations(W)  ∧  enforcement = ⋁_i path_i"

pillars:
  - section: §2 — US Essential Facility 演繹
    title: 嚴格四條件 + Aspen Skiing Sacrifice Test
    role: "提供規範性根據——若沒有一個成熟法律框架，「wallet 應受公共承載」會被指控為任意主張。Areeda-Hovenkamp 嚴格四條件 + Aspen Skiing sacrifice test 提供 US 反托拉斯法的權威基礎；Trinko 雖收緊但未廢除 doctrine，wallet 場景（未受傳統監管）正好在 Trinko 限制不適用的 sweet spot。"
    body: "MCI v. AT&T 1983 第七巡迴整理的「三條件」非最高法院 holding；採嚴格版本必須加上 Aspen Skiing 1985 sacrifice test 與 C4 技術經濟可行性，合計五要件。Trinko 2004 把 doctrine 推回 sacrifice 路徑，且僅限於受傳統監管產業（如 1996 Telecom Act），wallet 不在其中。套用 wallet 四層級結論：Issuer 接入 + Verifier 接入命中五要件全部，是最強支柱；OS-NFC 強但 sacrifice 證據需靠 EEA iOS 17.4 反證重建；Wallet UI 最弱建議省略。"
    finding: "Issuer/Verifier 接入層的 essential facility 訴訟在美國法院實質可行；Wallet UI 層省略以避免削弱整體論證。"
    formal: "(MCI_strict_four_conditions ∧ Aspen_Skiing_sacrifice_test ∧ ¬Trinko_regulated_industry)(W) ⇒ essential_facility(W)"

  - section: §3.1-3.2 — Telecom §251 機制層類比
    title: β 同構：四項互通機制可移植
    role: "提供制度先例——若 wallet 公共承載義務聽起來「過於嶄新」，§251 提供 1996 年起的成熟先例。類比強度鎖在機制層 β 而非歷史條件層 γ，避免「自然壟斷論已崩塌」這個反論一擊摧毀整體論證。"
    body: "1996 Telecommunications Act §251 四項機制：(a) interconnection (b) unbundling (c) nondiscriminatory rates (d) collocation。每項對應 wallet：(a) 任何 OID4VC credential 應可被接受；(b) credential 與 wallet UI 解綁；(c) issuer/verifier 接入費率非歧視；(d) 多 wallet 在同一裝置共存。類比強度：(a)+(b)+(c) 為 β（高度可移植機制層），(d) 為 α（純技術問題），歷史條件層為 γ（自然壟斷論不適用）。TELRIC 訂價機制不適用 wallet（邊際成本接近零），改採 DMA 6(12) FRAND 標準替代。USTA II + TRRO 2003-2005 收縮 unbundling 義務的歷史，必須主動處理而非迴避。"
    finding: "§251 機制層提供國家立法可移植的具體模板；歷史條件層的崩塌不影響機制層類比強度。"
    formal: "isomorphic_β({§251.a, §251.b, §251.c}, {wallet.OID4VC_accept, wallet.UI_unbundle, wallet.fair_rate})  ∧  γ_only({natural_monopoly_premise, TELRIC})"

  - section: §3.3-3.6 — DMA Article 6 路徑甲
    title: iOS/Android 已 designated → wallet 為功能組件連續推理
    role: "提供既有法律落地——若需要等待新立法，wallet 公共承載化會無限延期。DMA Article 6 + Article 8 specification 程序已可在歐盟執行，2025-04 罰款先例證明 EU Commission 執法決心。路徑甲（功能組件視角）使 wallet 義務不需新 designation，可立即啟動。"
    body: "Apple iOS 與 Google Android 已被 DMA Article 3 列為 gatekeeper CPS。Apple Wallet 與 Google Wallet 是 CPS 子產品；採路徑甲（連續推理）延伸 Article 6 義務，不需走 Article 3 重新 designation。Article 6 三條精確對應：6(7) 互通性（specifiable）→ wallet 應接受任何 OID4VC credential；6(9) 可攜性（absolute）→ credential 可導出到競爭 wallet；6(5) 自我優先禁令（限 ranking）→ iPhone 雙擊 power button 不得預設 Apple Wallet。執法可行性：2025-04-23 Apple 5 億歐元（Case DMA.100203）+ Meta 2 億歐元（Case DMA.100204）non-compliance 罰款。支付 wallet（TFEU 102 路徑，2024-07 結案）vs 身分 wallet（DMA Article 8，未啟動）必須拆開。"
    finding: "DMA 路徑甲在歐盟可立即啟動；2025 罰款先例證明 specification 程序的實質執法能力；支付/身分 wallet 拆開避免混淆。"
    formal: "designated(iOS, Android) ∧ functional_component(W ⊆ {iOS, Android})  ⇒  Article_6_obligations(W) ⊨ {6(7), 6(9), 6(5)}"

  - section: §4 — SSI 反論對偶重構
    title: 「廠商鎖定 vs 互通性義務」取代「監管 vs 自由」
    role: "提供反論吸收——若不處理 SSI 倡議者的反論，本論證會被指控為「壓制 self-sovereign 創新」。SSI 反論建立在「規範強制（強制使用某 wallet）」與「互通性義務（要求所有 wallet 遵循開放標準）」的概念混淆上。本 pillar 拆解三變體並提出對偶重構，使互通性義務與 SSI 願景在邏輯上兼容。"
    body: "SSI 反論三變體：A 政府規範會把 wallet 變成新監控工具；B OID4VC 是 EU 標準不應全球化；C 自由選擇是民主基礎。三者都把工具 A（標準強制）與工具 B（互通性義務）混為一談。回應：互通性義務不要求廠商揭露內部結構（A 無效）；OID4VC 是 W3C/OpenID Foundation 開放標準（B 無效）；多 wallet 並存保留用戶選擇（C 無效）。SSI 願景核心三層（用戶持有 credential / 可選擇 wallet / 可撤銷授權）只能在互通性義務下實現，不能在無監管自由市場下實現。Tim Bray 2023-2024 與 Christopher Allen 2023 立場部分認可此論（弱歸納，不主張 SSI 社群集體背書）。"
    finding: "SSI 反論的「監管 vs 自由」對偶被概念混淆遮蔽；正確對偶「廠商鎖定 vs 互通性義務」使 SSI 願景與公共承載義務邏輯兼容。"
    formal: "interoperability_obligation(W) ⇔ (user_holds_credential(W) ∧ wallet_choice(W) ∧ revocation_authority(W))  ∧  ¬standards_mandate"

  - section: §5 — Wallet Portability Spec 實作
    title: 4 項可遷移性 + 4 項禁令 + 三層執行機制
    role: "提供實作可行性——若沒有具體 spec，公共承載義務只是口號。本 pillar 把 4 項可遷移性與 4 項禁令對應到 W3C VC / OID4VC / DC API / Bitstring Status List 既有技術標準，並提出三層執行機制（標準正式化 + DMA 強制 + 國家立法）。spec items 不對稱可拆卸分階段立法，降低政治阻力。"
    body: "Spec 1 credential 可導出（OID4VCI Implementer's Draft 4 §6.5 informative，預期 2025-Q4 升 normative）；Spec 2 issuer 可選擇多 wallet（技術可行，Apple/Google API 鎖定為阻礙）；Spec 3 verifier 可接入多 wallet（W3C DC API 2024 draft，需多瀏覽器配合）；Spec 4 撤銷權不被獨佔（OID4VCI status list / Bitstring Status List 1.0）。對應禁令：廠商鎖定 / 互通拒絕 / 自我優先 / 單方撤銷，分別對應 DMA 6(9) / 6(7) / 6(5) / 法定。三層執行：W3C-OID4VC normative（2025-Q4）→ DMA Article 6 強制（2026-Q2）→ 國家立法跟進（美國 ADPPA、台灣個資法、日本 APPI、新加坡 IMDA）。"
    finding: "4 項 spec 對應現有技術標準，技術可行性已經就緒；落地瓶頸在政策層（自願 vs 強制義務）；可拆卸分階段立法降低執行成本。"
    formal: "spec_implementable(W) ⇔ ⋀_{i=1..4} spec_i(W)  ∧  ⋀_{j=1..3} enforcement_layer_j(W)"

chain:
  title: Wallet 公共承載六步因果鏈：中性產品 → owe common carrier obligations
  legend:
    - kind: deterministic
      label: 機制必然（法律 / 工程結構性，不依賴外部 trigger）
    - kind: probabilistic
      label: 概率性（依賴政策選擇 + 訴訟與罰款執行）
  steps:
    - tag: T0
      kind: deterministic
      text: "Wallet 在政府服務、年齡驗證、平台登入、選舉投票成為必要通道（基礎設施性質確立）"
    - tag: T1
      kind: deterministic
      text: "C1 主導者控制：Apple iOS 50%+ 美國市占；Google Android + Wallet 全球主導；issuer/verifier 接入由廠商選擇性決定"
    - tag: T2
      kind: deterministic
      text: "C2 不可重建 + C3 拒絕壓制競爭：第三方 wallet 無法繞過 Apple/Google 控制的 issuer 接入路徑與 OS-level NFC API"
    - tag: T3
      kind: probabilistic
      text: "C4 技術經濟可行 + sacrifice test：iOS 17.4 EEA 開放 NFC 證明技術可行；Apple 拒絕 issuer 接入造成短期 commission 損失（sacrifice 證據）"
    - tag: T4
      kind: deterministic
      text: "Aspen-MCI essential facility doctrine 五要件全部成立 → wallet owe common carrier obligations"
