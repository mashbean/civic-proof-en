borders:
  - label: 反論 1
    title: Trinko 已實質廢除 essential facility doctrine
    pivot: "反論訴求是「Justice Scalia 在 540 U.S. 411 寫『we have never recognized such a doctrine, and we find no need either to recognize it or to repudiate it here』，因此 essential facility 在美國法院已實質失效」。但細讀 Trinko 全文，Scalia 處理的是 1996 Telecom Act 已建立詳盡 ex ante 監管的場域；Trinko 並未否定 doctrine 在未受傳統監管場域的適用性，且仍肯認 Aspen Skiing sacrifice test 為反托拉斯成立要件之一。Hovenkamp 6th edition 雖部分支持「Trinko 已實質廢除」立場，仍承認對未受監管的數位平台 Aspen-MCI 路徑有適用空間。"
    flip: "Trinko 為 essential facility doctrine 設定的 outer boundary 不僅未支持「wallet 不適用」，反而給「wallet 屬未受傳統監管場域，正好是 Trinko 限制不適用的 sweet spot」提供了最強論證——Trinko 自身的限制範圍說明了 wallet 訴訟的可行性。"
  - label: 反論 2
    title: Self-sovereign identity = 無監管自由市場
    pivot: "反論訴求是「政府規範會把 wallet 變成新監控工具；OID4VC 是 EU 標準不應全球化；自由選擇是民主基礎」三個變體。但仔細檢驗每個變體，都把工具 A（規範強制：強制使用某特定 wallet）與工具 B（互通性義務：要求所有 wallet 遵循開放標準）混為一談。互通性義務不要求廠商揭露內部結構；OID4VC 是 W3C/OpenID Foundation 開放標準而非 EU 區域標準；多 wallet 並存保留用戶選擇。"
    flip: "SSI 願景的核心三層（用戶持有 credential / 可選擇 wallet / 可撤銷授權）只能在互通性義務下實現，不能在無監管自由市場下實現——若 Apple Wallet 鎖定 credential，用戶實際上不持有 credential，是「用戶租用 Apple 提供的 credential」。SSI 反論反向支持「廠商鎖定 vs 互通性義務」對偶。"
  - label: 反論 3
    title: DMA 是歐盟區域法不可全球化
    pivot: "反論訴求是「DMA 執法管轄限於歐盟，跨國 wallet 服務的實際影響有界。Apple 已在 iOS 17.4 EEA 限制版本中採取地區化策略——歐盟使用者享受互通性，美國使用者仍是封閉系統。把 DMA 當作全球範本是法律帝國主義」。"
    flip: "區域差異不僅未支持「wallet 公共承載化不可推進」，反而給 multi-pronged 執行路徑提供了最強論證。DMA 提供歐盟先例；US Aspen-MCI 提供美國路徑；§251 機制層提供其他國家立法可移植模板；W3C-OID4VC 提供標準層協調。多路徑並進避免單一法域成為唯一執法工具——這恰好示範跨法域協調如何約束區域局限。"

conditions:
  title: Wallet 公共承載義務的合法部署，必須先通過四項 portability spec + 四項禁令 + 三層執行機制
  formalPrelude: "deploy(common_carrier_obligations, W) valid ⇔ Spec₁ ∧ Spec₂ ∧ Spec₃ ∧ Spec₄ ∧ Ban₁ ∧ Ban₂ ∧ Ban₃ ∧ Ban₄ ∧ Layer₁ ∧ Layer₂ ∧ Layer₃"
  items:
    - title: Spec 1 — credential 可導出
      body: "Wallet 必須提供 credential export endpoint，使用者可導出已存 credential 到競爭 wallet。標準狀態 OID4VCI Implementer's Draft 4 §6.5 informative，預期 2025-Q4 升 normative。對應 DMA Article 6(9) 可攜性義務。"
      formal: "Spec₁: ∀ W : ∃ export_endpoint(W) ∧ format ∈ {OID4VCI, W3C_VCDM_2.0}"
    - title: Spec 2 — issuer 可選擇多 wallet
      body: "Issuer 必須能直接呼叫多個 wallet API（OID4VCI），而非被綁定到 Apple/Google 之一。技術可行，落地缺口在 Apple/Google API 鎖定 + 廠商審核制度。對應 DMA Article 6(7) 互通性義務。"
      formal: "Spec₂: ∀ issuer : ∃ wallet_API ∈ {Apple, Google, third_party} : direct_call_supported"
    - title: Spec 3 — verifier 可接入多 wallet
      body: "Verifier 必須能透過 W3C Digital Credentials API（browser-native）接入任何 wallet，不需走 Apple/Google 專屬 API。標準狀態 W3C draft 2024，需 Chrome / Firefox / Safari / Edge 多瀏覽器配合落地。對應 DMA Article 6(5) 自我優先禁令。"
      formal: "Spec₃: ∀ verifier : ∃ DC_API_browser_native : verify(W, credential) without lock-in"
    - title: Spec 4 — 撤銷權不被 wallet 廠商獨佔
      body: "Issuer 必須保留 revocation rights，不被 wallet 廠商獨佔。技術機制 OID4VCI status list / Bitstring Status List 1.0 已就緒；落地缺口是 wallet 廠商可能單方掩蓋撤銷狀態。需新立法明確禁止單方撤銷。"
      formal: "Spec₄: ∀ credential ∈ W : revocation_authority(credential) = issuer ∧ ¬wallet_vendor_monopoly"
    - title: Ban 1-4 — 四項禁令
      body: "對應四項可遷移性的禁令配對：(1) 廠商鎖定禁令對 Spec 1；(2) 互通拒絕禁令對 Spec 2；(3) 自我優先禁令對 Spec 3；(4) 單方撤銷禁令對 Spec 4。每項禁令都有對應 DMA Article 或法定根據。"
      formal: "⋀_{i=1..4} Ban_i = ¬violation(Spec_i)"
    - title: Layer 1 — W3C / OID4VC 標準正式化
      body: "把現有 W3C VCDM 2.0 / DC API / OID4VCI / OID4VP / Bitstring Status List 1.0 等 draft 推進到 normative recommendation，使所有 wallet 廠商在技術層可遵循。預期時程 2025-Q4。"
      formal: "Layer₁: W3C_recommendation_status({VCDM_2.0, DC_API, OID4VCI, OID4VP, status_list}) by 2025-Q4"
    - title: Layer 2 — DMA Article 6 強制（歐盟）
      body: "透過 Article 8 specification 程序把 6(7)+(9)+(5) 義務具體化到 wallet 層級。2025-04-23 Apple 5 億 + Meta 2 億歐元 non-compliance 罰款 + 2025-03-19 messaging specification decision 證明執法能力。預期時程 2026-Q2。"
      formal: "Layer₂: DMA_Article_8_specification(W, 6.7 ∧ 6.9 ∧ 6.5) by 2026-Q2"
    - title: Layer 3 — 國家立法跟進
      body: "美國 ADPPA、台灣個資法第六次修正、日本 APPI 2025、新加坡 IMDA 採 §251 機制層類比建立平行機制，避免地區性標準碎片化。長期外交路徑：G20 Digital Economy Working Group 提案、ITU-T 把 OID4VC 列入國際標準、雙邊/多邊貿易協定。"
      formal: "Layer₃: ⋃_{country ∈ {US, TW, JP, SG, ...}} national_legislation(country, §251_mechanism_β)"

conclusion:
  paragraphs:
    - <strong>Wallet 不是中性商業產品，是公民進入民主基礎設施的最後一哩通道。</strong>把它視為一般消費品的分類預設了「自由市場調節」這個前提，但 iOS 50%+ 美國市占、35-45% 歐盟市占、以及 issuer/verifier 接入的選擇性權力，已使該前提失去實證基礎。Essential facility doctrine 的嚴格四條件加上 Aspen Skiing sacrifice test 在 wallet 場景成立，公共承載人義務化是延伸既有 doctrinal framework 而非立新法。
    - 辯論應從「監管 vs 創新」轉向<em>「廠商鎖定 vs 互通性義務」</em>。SSI 倡議者的核心願景（用戶持有 credential / 可選擇 wallet / 可撤銷授權）只能在互通性義務下實現，不能在無監管自由市場下實現——這個對偶重構使 SSI 與公共承載化在邏輯上兼容，避免「自由 vs 監管」這個錯誤對偶持續錯誤動員 SSI 社群反對 wallet 政策。
    - 一條 multi-pronged 原則貫穿全文：<strong>單一執法路徑不足以解決全球 wallet 問題；US Aspen-MCI + EU DMA 路徑甲 + 國家立法 §251 機制 + W3C-OID4VC 標準四路徑並進，方能在跨法域協調這個最薄弱環節下保持執行可行性。</strong>本文延續 article 09 NCT「商業壟斷 + 民主政體 → infrastructural tyranny」的結構批判，把該結構從北歐 BankID 場景延伸到 wallet 層的具體執行 spec；與 article 02 𝒩.M₂/M₄、article 06 D₂*、article 07 SRP、article 15 inclusion baseline 形成跨文章的耦合論證。
  formalCoda: |
    Final form:

      Essential_Facility_Wallet:
        ∀ W ∈ {Apple_Wallet, Google_Wallet}:
          (control(W) ∧ ¬reconstructable(W) ∧ refusal_suppresses_competition(W)
           ∧ technical_economic_feasibility(W) ∧ sacrifice_test_passed(W))
          ⇒ owe_common_carrier_obligations(W)

      Multi-pronged_Remedy:
        enforcement(W) =
          (US_Aspen_MCI_path ∧ Issuer_Verifier_access)
          ∨ (DMA_Article_6_7_9_5 ∧ functional_component_continuity)
          ∨ (national_legislation_via_§251_mechanism_β)
          ∨ (W3C_OID4VC_normative_standardization)

      Portability_spec:
        spec(W) ⊨ (Spec₁ ∧ Spec₂ ∧ Spec₃ ∧ Spec₄)
        ⇔ ¬vendor_lockin(W) ∧ ssi_vision_realizable(W)

      deploy valid  ⇔  ⋀_{i=1..4} Spec_i ∧ ⋀_{j=1..4} Ban_j ∧ ⋀_{k=1..3} Layer_k

    Cross-article coupling:
      article_02.{M₂, M₄}      ← wallet 對應資格性 + 隱私衡量
      article_06.D₂*           ← wallet 必須提供非智慧手機 fallback（弱勢者 inclusion 義務）
      article_07.SRP           ← wallet 廠商鎖定的主權容器悖論當代形式
      article_09.NCT           ← 商業壟斷 + 民主政體 → infrastructural tyranny 的 last-mile 形態
      article_15.inclusion     ← 政府 wallet 應為 inclusion baseline，不得被商業 wallet 取代
