conclusion:
  paragraphs:
    - <strong>四原語落地的條件性可行性</strong>。civic receipts 作為條件可委任區 Z₂ 中 supported / substituted 可區分性的密碼學承載，在 W3C VCDM v2.0 Recommendation (2025-05-15)、IETF SD-JWT-VC draft-16 (2026-04-24)、W3C BBS Cryptosuite CRD (2026-04-07)、EUDI ARF 2025-12 iteration、IRTF CFRG BBS Signatures draft-07 五條既有規範路徑下，可在 5-10 年內標準化落地。落地的形式承載為 14 欄位 schema 與 V_receipt 函數的 C1-C6 六道條件。條件性表述——若 W3C BBS Cryptosuite 在 2027 Q1 前達 Recommendation，第一原語 mixed strategy 採 baseline SD-JWT-VC + 高階 BBS+ 雙層分工；否則 baseline 退回到只用 SD-JWT-VC、BBS+ 分層推遲到 2028。30 年下限為「分析性建議數」而非「規範性硬約束」、限定為「無聲明保留之 OECD 與 CRPD 締約國」範圍；FRE 902(14) 對 holder-controlled 屬非主路徑、改走 901(b)(9) 較重路徑；Apostille 公私文書區分構成跨境承認層破口、civic receipts 是否屬 public document 須補論。
    - <strong>跨境治理時間階段化</strong>。跨境互認透過 G_recognition^A 軟法層 5 / 10 / 15 年三段推進——OECD AI Principles 補充指引 2029-2031、CETS 225 補充協議 2030-2035、Hague PIL e-Apostille digital identity extension 2038-2041；時程為條件性估計、order of magnitude，非絕對句式。OECD 涵蓋全球 GDP 約 65% 但人口僅約 18%，<em>OECD 外覆蓋空白為承認非預測</em>，非 OECD 並行軌（AU、APEC CBPR、印度 DEPA、巴西 LGPD、印尼 PDP、GCC、ASEAN DEFA）以「並行」而非「替代」角度設計。EUDI 強制階段為 OECD 5 年路徑 accelerator。對台灣的具體承載——APEC CBPR + Global CBPR Forum 為非 OECD / 非 CoE / 非 EU 的主要承接軌道；CF4 觸發下兩岸軌結構性斷裂為 F2 thesis 對台灣場景的最弱承諾，三個場景（陸配權利保護、台商長期居留 receipts、兩岸投資人權利保護）同時顯現結構性斷裂、SA4 緩解設計只能提供降級互通而非對等互認。
    - <strong>working thesis 與 strengthened thesis 的嚴格區分，三大緩解 critical path 承擔生存差距</strong>。F2 working thesis（無緩解版）在 CF2 或 CF5 任一單獨觸發下實證失效；F2 strengthened thesis（含三大緩解 critical path——crypto-agility by design、第三方 trusted preservation service 對接、G_recognition^A 多軌備援）在五個 CF 全部觸發的極端情境下保留核心功能（第三段全球互認失敗、第二段 OECD 內互認部分保留、第一段單原語密碼學承載完整保留）。F2 主文採 strengthened thesis 為正式立場、working thesis 僅作為論證起點。對 CRPD GC1 §29 audit trail 義務——strengthened thesis 在 Z₂ 範圍內透過四原語可履行、超出 Z₂ 進入 Z₃-intrinsic（RT-ℬ ✗ 與 AA-ℬ ✗ 兩 cell）不可履行，這是密碼學原語對存在論結構的不可達邊界（定理 T2）。對台灣 TW DIW 進入 LLM-agent 階段前的具體警示——<strong>若未具備 civic receipts 工程，supported decision 證據鏈無法在民事訴訟 30 年窗口內被重建；DIW v1.0 spec 應明文 QPSP 對接條款 + 30 年保存承諾</strong>。
  formalCoda: |
    Final form:
