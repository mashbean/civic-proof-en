conclusion:
  paragraphs:
    - "<strong>Conditional feasibility of four-primitive implementation.</strong> Civic receipts, as the cryptographic bearer of supported / substituted distinguishability within the conditionally delegable zone Z₂, can achieve standardised implementation within 5–10 years under five existing standards pathways: W3C VCDM v2.0 Recommendation (2025-05-15), IETF SD-JWT-VC draft-16 (2026-04-24), W3C BBS Cryptosuite CRD (2026-04-07), EUDI ARF 2025-12 iteration, and IRTF CFRG BBS Signatures draft-07. The formal bearer of implementation is the 14-field schema and V_receipt function's C1–C6 six conditions. Conditional statement — if W3C BBS Cryptosuite reaches Recommendation before 2027 Q1, the first primitive mixed strategy adopts a two-tier division of baseline SD-JWT-VC + advanced BBS+; otherwise baseline reverts to SD-JWT-VC only and BBS+ layering is deferred to 2028. The 30-year floor is an \"analytical recommendation value,\" not a \"normative hard constraint,\" limited to \"OECD and CRPD states parties without declared reservations.\" FRE 902(14) for holder-controlled is not the primary path; the heavier 901(b)(9) path is taken instead. The Apostille public/private document distinction constitutes a gap in the cross-border recognition layer; whether civic receipts qualify as public documents requires supplementary argument."
    - "<strong>Cross-border governance time staging.</strong> Cross-border mutual recognition advances through the G_recognition^A soft-law layer in three phases of 5 / 10 / 15 years — OECD AI Principles supplementary guidance 2029–2031, CETS 225 supplementary protocol 2030–2035, Hague PIL e-Apostille digital identity extension 2038–2041. The timeline is a conditional estimate, order of magnitude — not an absolute sentence. OECD covers approximately 65% of global GDP but only approximately 18% of global population; <em>OECD coverage gaps are acknowledged, not predicted.</em> Non-OECD parallel tracks (AU, APEC CBPR, India DEPA, Brazil LGPD, Indonesia PDP, GCC, ASEAN DEFA) are designed as \"parallel\" not \"substitute.\" The EUDI mandatory phase is an accelerator for the OECD 5-year pathway. Taiwan's specific bearing: APEC CBPR + Global CBPR Forum is the main acceptance track for non-OECD / non-CoE / non-EU. Under CF4 triggering, cross-strait structural breakage is F2 thesis's weakest commitment to Taiwan scenarios — the three scenarios (mainland-born spouses' rights protection, Taiwan businesspeople's long-term residency receipts, cross-strait investor rights protection) simultaneously exhibit structural breakage, and SA4 mitigation design can only provide downgraded interoperability, not equivalent mutual recognition."
    - "<strong>Strict distinction between working thesis and strengthened thesis, with three critical-path mitigations bearing the survival gap.</strong> F2 working thesis (without mitigations) empirically fails under either CF2 or CF5 triggering alone; F2 strengthened thesis (including three critical-path mitigations — crypto-agility by design, third-party trusted preservation service integration, G_recognition^A multi-track fallback) retains core functionality under the extreme scenario of all five CFs triggering simultaneously (third phase: global mutual recognition fails; second phase: OECD-internal mutual recognition partially preserved; first phase: single-primitive cryptographic bearing fully preserved). F2 main text adopts the strengthened thesis as the formal position; the working thesis serves only as the starting point of argumentation. Regarding CRPD GC1 §29 audit trail obligation — the strengthened thesis fulfils it within Z₂ via the four primitives; beyond Z₂ entering Z₃-intrinsic (RT-ℬ ✗ and AA-ℬ ✗ two cells) it is unfulfillable — this is the unreachable boundary of cryptographic primitives against ontological structure (Theorem T2). A specific warning for Taiwan's TW DIW before entering the LLM-agent phase — <strong>if civic receipts engineering is absent, the supported decision evidence chain cannot be reconstructed within the 30-year civil litigation window; DIW v1.0 spec should explicitly include QPSP integration provisions + 30-year preservation commitment.</strong>"
  formalCoda: |
    Final form:
      Receipt(r) ≜ ⟨cryptosuite_id, holder_did, agent_did?, deliberation_hash, retention_floor,
                    jurisdictional_profile, audit_release_policy, recognition_chain, ...⟩  (14 group / 23 leaf)

      V_receipt(r) ⇔ ⋀_{i=1..6} Cᵢ(r)
                  ⇔ V_cryptosuite(r) ∧ V_preservation(r) ∧ V_admissibility(r) ∧ V_recognition(r)         (T3)
                  ⇔ ex_ante_deliberation(r) ∧ ex_post_reversibility(r) ∧ decision_trace(r)               (T4)

      CriticalPath : SA1 → SA2 → SA3 → SA4   (linear verification closure with deterministic D1, D2, D3)
      FeedbackLoop : SA4 → SA1               (jurisdictional_profile reverse-constrains AcceptedSuites(τ))

      Cryptosuite ∈ {SD-JWT-VC (RFC 9901 + draft-16, MUST baseline),
                     BBS+ (W3C CRD, conditional advanced — IF W3C Rec by 2027 Q1 ELSE 2028),
                     ZK-SNARK (Explorer Note, narrow profile, F3 issue)}
      Preservation = {holder-controlled} ⊕ {QPSP encrypted backup, threshold signatures t=2/n=3}
                     ;  retention ≥ 30y  (limited to "OECD + CRPD states parties without declared reservations")
                     ;  Design ∈ {A, C, A⊕C}  ;  Design B ⊨ violates CRPD §28
