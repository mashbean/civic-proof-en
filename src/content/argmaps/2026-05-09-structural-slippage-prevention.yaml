slug: 2026-05-09-structural-slippage-prevention
title: "Why Identity Infrastructure Always Expands — and How to Prevent It"
subtitle: "Structural Slippage Prevention — Argument Map (v2)"

coreThesis:
  text: |
    Once identity infrastructure is built, **it has a strong tendency toward expanded use in the absence of countervailing institutional pressure** (strong tendency, reversible). The weak necessary condition for expansion is the dual absence of legal restrictions and technical binding (corrected by the Austrian sourcePIN and German nPA counterexamples). Three mechanisms in aggregate produce the strong tendency: path dependency × infrastructure invisibility × institutional layering — all three are probabilistic language, not logical necessity. MVSR (Minimum Viable Slippage Resistance) four-layer clauses written *before construction* into specifications and legal sources can significantly raise the marginal cost of expansion: sunset + scope-bound + split-key + opt-out by design are complementarily cross-level, with each tool's failure mode absorbed by another tool. EUDI ARF v1.4/1.5 and California AB1043 are two prima facie early evidence candidates, but both have been live for < 3 years, while path dependency's time constant is 5–10 years — the current absence of slippage cannot be distinguished from "not yet slipped," and ongoing observation is required.
  summary: "Structural slippage is real but not necessary; it is a strong tendency, reversible under reverse institutional pressure. The MVSR four-layered combination (sunset + scope-bound + split-key + opt-out) raises the marginal cost of expansion. EUDI ARF and AB1043 provide prima facie evidence pending 5–10 year stress test."
  formal:
    expression: |
      Strong_Tendency_Theorem (STT):
        ∀ infra I :
          P(I expands | ¬legal_clause(I) ∧ ¬technical_binding(I) ∧ ¬reverse_pressure)
          ≈ 0.85 to 1.0     (empirical, 4 cases / 14–90 yrs)
          where
            legal_clause(I)      ::= sunset ∨ function_creep_prevention
            technical_binding(I) ::= scope_bound ∨ sectoral_derivation
            reverse_pressure     ∈ {constitutional_review, civic_movement,
                                     cross_national_pressure, technical_affordance}

      Weak_Necessary_Condition (WNC, corrected from intake):
        expansion(I) > threshold  ⇒  ¬legal_clause(I) ∧ ¬technical_binding(I)
        (counterexamples: Austria sourcePIN, German nPA — either one existing is sufficient to significantly slow expansion)

      Three_Mechanism_Aggregate:
        P(expand | ¬clause ∧ ¬binding) =
            f( P_path_dependency, P_infra_invisibility, P_institutional_layering )
        where each P ∈ probability_language  ¬⊨  logical_necessity
        reverse_pressure ⇒ one of the three mechanisms is interrupted:
          constitutional_review  ⇒  ¬path_lock        (e.g., Volkszählungsurteil 1983)
          technical_affordance   ⇒  ¬invisibility      (e.g., Estonia X-Road audit log)
          civic_movement +       ⇒  ¬layering          (e.g., UK ID Card 2010 abolished)
          regime_change

      MVSR_Layered_Defense:
        expansion(I) ≤ threshold  ⇔  Layer₁ ∧ Layer₂ ∧ Layer₃  ∧  (Layer₄ recommended)
        Layer₁: sunset_clauses           (legal layer, automatic_lapse > periodic_review)
        Layer₂: scope_bound              (cryptographic layer, SD-JWT VC + KB-JWT + audience claim)
        Layer₃: split_key                (governance + cryptographic, k-of-n threshold + cross-class shareholder)
        Layer₄: opt_out_by_design        (legal + UX + engineering three layers)
        failure_mode(Layer_i)  absorbed_by  Layer_j        (i ≠ j)

      Time_Window:
        preset_clauses(I) viable        ⇔  pre_construction_phase(I)
        post_construction_clauses(I)    ⇒  political_cost(t) ↗ exponential

      Prima_Facie_Evidence_Limit:
        ARF_v1.5, AB1043 ∈ candidate_evidence  ∧  uptime < 3yr
        path_dependency_constant ≈ 5–10yr
        ⇒  ¬distinguish( no_slippage, not_yet_slippage )

    caption: "STT describes a strong tendency but not necessity; WNC corrects the weak necessary condition for expansion to dual absence of legal + technical; MVSR four-layer layered defense raises marginal cost through complementary absorption; Time Window emphasizes the pre-construction political opportunity window; Prima Facie limits EUDI ARF and AB1043 to candidate evidence rather than verified effectiveness."
    legend:
      - symbol: I
        meaning: Identity infrastructure (including Aadhaar, SSN, eIDAS, nPA, sourcePIN, ARF wallet, etc.)
      - symbol: legal_clause(I)
        meaning: Legal-layer restriction clause (sunset clause or function-creep prevention clause)
      - symbol: technical_binding(I)
        meaning: Technical-layer scope binding (scope-bound design or sectoral derivation)
      - symbol: reverse_pressure
        meaning: Reverse institutional pressure (constitutional review / strong civic movement / cross-national comparative pressure / technical affordance structural limitation)
      - symbol: P_path_dependency
        meaning: Path dependency mechanism probability (Pierson 2004, North 1990)
      - symbol: P_infra_invisibility
        meaning: Infrastructure invisibilization mechanism probability (Bowker–Star 1999, Edwards 2003, 2010)
      - symbol: P_institutional_layering
        meaning: Institutional layering mechanism probability (Mahoney–Thelen 2010, Hacker 2004)
      - symbol: Layer₁..₄
        meaning: MVSR four-layer clauses (sunset / scope-bound / split-key / opt-out by design)
      - symbol: failure_mode(Layer_i)
        meaning: The failure mode of that layer's tool (sunset extension / verifier collusion / de facto centralization / dark pattern)
      - symbol: pre_construction_phase(I)
        meaning: Specification drafting phase (before normative text v1 publication; ARF v1.5 still within window; Aadhaar window has passed)
      - symbol: ⇔
        meaning: "if and only if"
      - symbol: ⊨
        meaning: '"satisfies" (model satisfies formula)'

transitions:
  beforeDistinction: "The formula establishes the position, but a distinction between two ways of viewing structural slippage must first be drawn. Most policy discourse treats expansion as either 'structural necessity → should not build' (nihilist misreading) or 'weak political will → strengthen oversight' (individualist misreading); this map rejects both — it should be viewed as 'a strong tendency, reversible under reverse institutional pressure,' with pre-construction clauses significantly raising the marginal cost of expansion."
  beforePillars: "The distinction itself is merely a declaration. To prove the path that 'slippage is a strong tendency but not necessity,' five independent sources are required: four historical expansion cases (I inductive), Austrian sourcePIN + German nPA two critical counterexamples (inductive correction), path dependency × infrastructure invisibility × institutional layering triangular derivation (D deductive + C causal), specific clauses and failure modes of four cross-level prevention tools (I+A implementation), and EUDI ARF + AB1043 early evidence (Ab abductive). Without any one of these five, the argument risks being destroyed in one blow by typical objections such as 'but these are just a few cases,' 'but the mechanism is necessary,' and 'but sunsets will be extended.'"
  beforeChain: "The five pillars above provide positive support. But the claim 'how slippage forms' requires a concrete causal chain to sustain it: the evolution chain from the original construction purpose to expanded uses. The six-step causal chain shows how this mechanism formed and at which nodes it can be interrupted by MVSR clauses."
  beforeBorders: "Once the position + causal chain are established, the objections become genuinely threatening. 'Simply do not build any identity infrastructure,' 'sunsets will be extended under political pressure,' and 'institutional clauses are institutional theatre' are frequently cited as reasons; but careful examination of the evidentiary strength of each objection reveals that not only do they not support 'slippage cannot be prevented,' they actually flip to support layered defense — that is, the limiting scope of each objection precisely constitutes the second layer of support for the map."
  beforeConditions: "After the objections are absorbed, what remains is design implications: under what conditions can prevention clauses be written *before construction* and actually take effect? Four-component MVSR push + four failure mode complementary absorptions + pre-construction time window, three-dimensional constraints, translate the abstract 'prevent slippage' into verifiable engineering and policy obligations."
  beforeConclusion: "Drawing together five layers — historical cases, mechanism derivation, prevention tools, early evidence, and objection responses — the map's final message is the political-economic character of slippage, and a design principle spanning all levels: the timing of writing determines clause effectiveness; the pre-construction political opportunity window closes by month and by political situation, and will not wait for academic research to complete."

distinction:
  rejected:
    label: ❌ Rejected
    title: "\"Structural Necessity → Do Not Build Identity Infrastructure\" / \"Weak Political Will → Strengthen Oversight\""
    body: "Both misreadings are rejected. The first misreading writes expansion as structural necessity — since Aadhaar, SSN, and eIDAS have all slipped, any centralized identity infrastructure once built will expand, and institutional design tools are merely placebos that delay slippage. This misreading's policy conclusion is to give up treatment. The second misreading writes expansion as weak political will — if legislators were more careful, administrative bureaucrats more restrained, and civil society more vigilant, slippage would not occur. This misreading degrades a structural problem to an individual problem, equating slippage with moral deficiency rather than institutional design failure. The German Volkszählungsurteil 1983, UK ID Card abolition 2010, US CAB abolition 1985, and Estonia X-Road maintaining limited scope — these four counterexamples simultaneously falsify both extremes: 'structural necessity' and 'individual will as dominant.'"
    formal: "(expansion(I) ⊨ logical_necessity)  ⇒  no_prevention_possible       (rejected; reverse_pressure cases falsify)\n(expansion(I) ⊨ political_will_failure) ⇒  individualist_remedy_only   (rejected; structural mechanisms exist independently)"
  accepted:
    label: ✓ Defended
    title: "\"Strong Tendency + Reversible Under Reverse Institutional Pressure; Pre-Construction MVSR Four-Layer Clauses Significantly Raise Marginal Cost\""
    body: "Structural slippage is real (path dependency × infrastructure invisibility × institutional layering three mechanisms in aggregate produce a strong tendency), but is not logical necessity — all three mechanisms are probabilistic language. Reverse institutional pressure (constitutional review, strong civic movement, cross-national comparative pressure, technical affordance structural limitation) can reverse slippage in multiple historical cases. The real prevention tools are pre-construction structural clauses: MVSR four layers (sunset + scope-bound + split-key + opt-out by design) are cross-level complementary, with each tool's failure mode absorbed by another. EUDI ARF v1.4/1.5 and California AB1043 are two prima facie early evidence candidates, but require 5–10 year slippage stress testing before claiming verified effectiveness."
    formal: "(STT_strong_tendency) ∧ (WNC_dual_absence) ∧ (MVSR_layered_defense) ∧ (Prima_Facie_evidence_limit) ⇒ slippage(I) ≤ threshold   (under pre-construction-phase deployment)"

pillars:
  - section: §2 — Four Historical Expansion Cases
    title: "Expansion Trajectories of Aadhaar / SSN / eIDAS / China Real-Name"
    role: "Provides inductive empirical basis — without credible historical case comparison, 'slippage is a real mechanism' is an empty claim. This pillar unfolds the expansion timelines of four large-scale national identity infrastructure systems, explicitly distinguishing institutional layer vs. practice layer, avoiding mistaking practice-layer evidence for proof of institutional-layer expansion."
    body: "Aadhaar started in 2009 for welfare delivery → 2011 PDS → 2013 bank KYC → 2017 PAN/SIM → 2021–2026 voter list / NPR / CAA companion (Puttaswamy II 2018 partially revoked SIM mandate). SSN 1936 tax identification → 1943 military → 1961 IRS TIN → 1965 Medicare → 1976 driver's license → 1990s credit scoring / employer background checks (90-year slippage, described in Database Nation as de facto national identifier). eIDAS 1.0 (2014 electronic signatures) → 2.0 (2024 wallet + PID + QEAA) → under discussion: KYC / age verification / transit tickets (10-year normative text expansion, each wave enacted through formal legislation but actual objection windows structurally compressed). China real-name 2012 network registration → 2014–2018 instant messaging + Weibo + e-commerce → 2020+ mobile payment + health code + online medical → 2024 AI-generated content (rolling implementation, 60+ ministerial-level normative documents, half without legislative-level review)."
    finding: "Common pattern across four cases: no functional restriction clause in founding legal source + no technical scope binding during construction phase → expansion to new uses unauthorized by original legal source within 5–15 years. Expansion mechanisms vary by case (Aadhaar administrative orders, SSN inter-agency conventions, eIDAS normative text, China ministerial-level orders), but the common conditions are highly consistent."
    formal: "∀ I ∈ {Aadhaar, SSN, eIDAS, China_realname}: ¬legal_clause(I) ∧ ¬technical_binding(I)  ∧  expansion(I, t≥10yr) ≫ original_scope(I)"

  - section: §3 — Two Critical Counterexamples and Corrected Induction
    title: "Austrian sourcePIN (No Legal Clause, Has Technical Binding) + German nPA (Has Legal Clause, No Technical Binding)"
    role: "Provides inductive correction basis — without introducing counterexamples, 'no clauses written → slippage' would be directly refuted. Austrian sourcePIN deployed for 22 years with no significant expansion (no legal restriction clause, but sectoral derivation cryptographic binding serves the role of restriction clause); German nPA deployed for 16 years with three expansions (PAuswG §18-19 restrictions exist, but technically reconfigurable allows BVA administrative layer to slowly hollow them out). Both counterexamples jointly support the corrected version: dual absence of legal + technical is the weak necessary condition for expansion; either one existing is sufficient to significantly slow."
    body: "Austrian sourcePIN (E-Government Act 2004 §6): sourcePIN is never revealed to verifiers in its original form; each use context (taxation, health insurance, private sector KYC) receives a sectoral PIN (ssPIN), generated from sourcePIN through symmetric cryptographic derivation; different sector ssPINs are cryptographically irrecomposable (Hörbe & Hörbst 2008). After 22 years of deployment, scope of use remains within original design sectors, with no Aadhaar-style cross-domain layering and no SSN-style universal identifier transformation. German nPA (PAuswG 2010 §18-19): function-restricted reading + Berechtigungszertifikat authorization + pseudonym default mode; but the core chip supports multiple applications, and BVA authorization scope can be adjusted by administrative order; under OZG 2017 push, BVA gradually expanded the authorization list (three expansions in 2014, 2017, 2021); CCC and Stiftung Datenschutz criticized BVA for substantively assuming a quasi-legislative role."
    finding: "Corrected induction: 'no functional restriction clauses written AND no technical binding' is the weak necessary condition for large-scale national identity infrastructure expansion. Legal clauses and technical binding are mutually complementary absorbers."
    formal: "WNC: expansion(I) > threshold ⇒ ¬legal_clause(I) ∧ ¬technical_binding(I)\nAustria: ¬legal_clause(I) ∧ technical_binding(I) ⇒ expansion ≤ threshold\nGermany_nPA: legal_clause(I) ∧ ¬technical_binding(I) ⇒ slow_erosion (not significant expansion, but loosening trajectory visible)"

  - section: §4 — Triangular Causal Mechanisms
    title: "Path Dependency × Infrastructure Invisibility × Institutional Layering (Probabilistic Aggregation, Not Logical Necessity)"
    role: "Provides causal basis — without explaining 'why expansion occurs,' the argument remains at the descriptive level. Three mechanisms in aggregate: (a) Pierson / North path dependency (increasing returns lock-in), (b) Bowker–Star / Edwards infrastructure invisibility (stability then withdrawal from public deliberation), (c) Mahoney–Thelen / Hacker institutional layering (drift / layering / conversion three forms). All three mechanisms are probabilistic language; aggregation can only push to 'strong tendency,' not to 'logical necessity.'"
    body: "Path dependency four micro-foundations (Pierson 2000): increasing returns to adoption + learning effects + coordination effects + adaptive expectations. Identity infrastructure satisfies these to a high degree (Aadhaar 1.3 billion CIDR accumulated; ministries' learning investment sunk; PDS / bank / tax API integration complete; citizens and administrative officials expect continuation). Infrastructure invisibility (Bowker–Star 1999, Star 1999, Edwards 2003, 2010): after infrastructure operates stably it becomes invisible; existence is treated as natural fact rather than political choice; new expansions are framed as technical integration rather than political choices. SSN's 90-year invisibility trajectory is especially extreme. Institutional layering (Mahoney–Thelen 2010, Hacker 2004): new policy demands tend to be layered onto existing institutions; rebuilding requires supermajority while layering requires only marginal majority; every wave of SSN / Aadhaar expansion is layering rather than revision. **Revision convergence**: all three mechanisms are probabilistic; aggregation can only push to high probability, not logical necessity. Counterexamples: German Volkszählungsurteil 1983 (constitutional review interrupts path dependency); Estonia X-Road (cryptographic logging keeps infrastructure from becoming invisible); UK ID Card abolition 2010 (strong civic movement + regime change reverses layering); US CAB abolition 1985 (industry pressure + cross-partisan consensus reduces institutional scope)."
    finding: "Three mechanisms in aggregate produce 'strong tendency' rather than 'logical necessity'; when reverse institutional pressure appears, slippage can be reversed; Nordic displacement in certain political cultures replaces the layering form but does *not* replace expansion outcomes (Swedish personnummer trajectory) — institutional design form and expansion outcomes do not have a one-to-one correspondence."
    formal: "P(expand | ¬clause ∧ ¬binding) = f(P_path, P_invisible, P_layering)\n∀ P_i ∈ probability_language: P_i ¬⊨ logical_necessity\nreverse_pressure ⇒ ∃ i: P_i interrupted (case-specific: constitutional_review ⇒ ¬path_lock; technical_affordance ⇒ ¬invisibility; civic_movement+regime_change ⇒ ¬layering)"

  - section: §5 — Four Cross-Level Prevention Tools
    title: "Sunset + Scope-Bound + Split-Key + Opt-Out by Design (MVSR Three-Component Core + Supplement)"
    role: "Provides implementation basis — without showing specific enforceable clauses, 'cross-level combination' is an abstract claim. Writing the 4 tools as clauses that legislators can directly copy, that W3C / IETF / EUDI ARF can directly write into annexes, and that cryptography implementers can directly code into reference implementations; while also honestly listing each tool's failure mode, to be absorbed by other tools."
    body: "(a) **Sunset clauses (legal layer)**: Australian Legislation Act 2003 §50A template, *automatic lapse* rather than *periodic review* (Schoenmaker–Wierts, Davis 2017 cross-domain survival rate data); mandatory *Sunset Audit Report* obligation. Failure mode: political pressure extension (PATRIOT Act §215 multiple extension history). (b) **Scope-bound (cryptographic layer)**: IETF SD-JWT VC + KB-JWT + audience claim + selective disclosure (W3C VCDM 2.0 + EUDI ARF v1.4/1.5 + AB1043 §22585(b)). Failure mode: verifier collusion to recompose attributes (Ohm 2010 broken anonymization); wallet-side aggregation control countermeasure under research. (c) **Split-key (governance + cryptographic layer)**: (k=4, n=7) Pedersen VSS + BLS threshold (Shamir 1979 / Pedersen 1991 / BLS 2001 / FROST 2020); shareholders span seven categories: supervisory authority, audit authority, legislature, civil society, academia, mutual recognition authority, vendor; shareholder replacement threshold higher than daily threshold. Failure mode: de facto centralization (Parity / Multichain / Ronin DAO governance post-mortems). (d) **Opt-out by design (legal + UX + engineering three layers)**: CCPA §1798.135 + GDPR Art. 17 right to erasure; symmetry principle (difficulty of withdrawal must not exceed difficulty of registration); GPC signal support; log retention limit + differential privacy + backup auto-expiry. Failure mode (most serious): dark pattern (Mathur et al. 2019) + residual log + derived analytics not thorough (Netflix re-identification, Narayanan–Shmatikov 2008)."
    finding: "MVSR Layer 1 (sunset + scope-bound + split-key, three-component core) must be done; Layer 2 (opt-out) strongly recommended; Layer 3 (constitutional guarantee) ideal conditions. Each tool has failure modes; combined use makes each failure mode absorbed by another tool. Opt-out is the weakest of the 4 tools, but remains citizens' last bargaining chip."
    formal: "MVSR_optimal: Layer₁ ∧ Layer₂ ∧ Layer₃  ∧  recommended(Layer₄)\nfailure(Layer₁_sunset_extended) absorbed_by Layer₂ ∧ Layer₃  (even if sunset is extended, scope-bound + split-key prevents functional expansion)\nfailure(Layer₂_verifier_collusion) absorbed_by Layer₄  (citizens can exit specific verifier)\nfailure(Layer₃_de_facto_centralization) absorbed_by Layer₁  (sunset forces periodic re-deliberation of centralization legitimacy)\nfailure(Layer₄_dark_pattern) absorbed_by Layer₁ ∧ Layer₂ ∧ Layer₃  (other three layers prevent data from entering derived analytics)"

  - section: §6 — EUDI ARF + AB1043 Prima Facie Early Evidence
    title: High Consistency at Normative Text Level (Pending 5–10 Year Stress Test)
    role: "Provides abductive basis — without evaluating early evidence candidates, 'prevention tools are effective' is a claim based on reverse inference. EUDI ARF v1.4/v1.5 adopts minimum disclosure / unobservability / no phone home / scope binding four clauses; California AB 1043 §22585(b) establishes attribute-bounded mode + §22585(e) liability shift. Both have been live for < 3 years while path dependency's time constant is 5–10 years — currently cannot distinguish 'no slippage' from 'not yet slippage.'"
    body: "EUDI ARF v1.4/v1.5 (Regulation (EU) 2024/1183 companion): §4–§6 minimum disclosure + unobservability + no phone home + scope binding; EDPB & EDPS Joint Opinion 2/2023 some recommendations adopted (unlinkability, minimum disclosure written in), some not adopted (mandatory pairwise pseudonym not explicitly required). AB 1043 (2023, Cal. Civ. Code §22585): §22585(b) age verification systems may only transmit a single boolean signal (age ≥ X), prohibiting transmission of specific age / birthday / other attributes; §22585(e) liability shift transfers out-of-scope liability to the verifier; companion §1798.135 CCPA opt-out + GPC signal + §1798.140 strict de-identified boundary. **Evidence limits**: (1) time constant constraint (< 3 years vs. 5–10 years); (2) not yet stress-tested for slippage pressure (regime change / national security incident / cross-border crisis); (3) level jump from normative text to enforcement behavior (German nPA shows text can be slowly hollowed at enforcement layer); (4) sample size constraint (two cases cannot generalize across countries and domains)."
    finding: "Prima facie conclusion: current early evidence has not yet falsified H1 (prevention tool hypothesis), and ARF and AB1043 clauses at the normative level demonstrate high consistency with slippage prevention doctrine — this provides reasonable candidate basis for the policy recommendation 'should be written in,' but makes no claim for 'already verified effective.' Four critical nodes require ongoing observation: ARF Implementing Acts, California AB 1043 first substantive enforcement, EU member state local implementation differences, and weakest link in cross-border mutual recognition."
    formal: "ARF_v1.5 ⊨ {minimum_disclosure, unobservability, no_phone_home, scope_binding}\nAB1043 §22585(b) ⊨ attribute_bounded ∧ §22585(e) ⊨ liability_shift\nbut: uptime < 3yr  ∧  path_constant ≈ 5–10yr  ⇒  ¬falsified(H1) ∧ ¬verified(H1)\nstatus: prima_facie_support  (pending ongoing observation)"

chain:
  title: "Six-Step Causal Chain of Slippage Formation: From Original Construction Purpose to Expanded Uses"
  legend:
    - kind: deterministic
      label: Mechanically necessary (structural, not dependent on external trigger)
    - kind: probabilistic
      label: Probabilistic (dependent on policy choices + whether reverse institutional pressure appears)
  steps:
    - tag: T0
      kind: deterministic
      text: "Identity infrastructure built for original limited purpose (Aadhaar welfare delivery / SSN taxation / eIDAS electronic signatures / China real-name network registration)"
    - tag: T1
      kind: deterministic
      text: "Increasing returns locks in path dependency: CIDR / numbering system / trust list / user database accumulates; marginal cost of building alternatives rises exponentially"
    - tag: T2
      kind: deterministic
      text: "Infrastructure becomes invisible after stabilization: treated as natural fact rather than political choice; public deliberation trigger mechanisms fail (SSN 90-year invisibility / Aadhaar 5-year invisibility)"
    - tag: T3
      kind: probabilistic
      text: "New policy demands layered onto existing systems: one of drift / layering / conversion three forms occurs (SIM mandatory linking, Medicare identification, wallet scope expansion, health code); layering requires only marginal majority"
    - tag: T4
      kind: probabilistic
      text: "If legal or technical binding is absent, expansion channels amplify: either legal clause or technical binding existing is sufficient to significantly slow (Austrian sourcePIN, German nPA partially); dual absence produces strong expansion pressure"
    - tag: T5
      kind: probabilistic
      text: "When reverse institutional pressure appears, slippage can be reversed: constitutional review interrupts path lock (Volkszählungsurteil) / technical affordance rejects invisibility (X-Road audit log) / civic movement + regime change reverses layering (UK ID Card abolition)"

borders:
  - label: Objection 1
    title: Nihilism (Since Slippage Will Occur, Simply Do Not Build Any Identity Infrastructure)
    pivot: "The objection claims that 'any centralized identity infrastructure once built will expand; institutional design tools are placebos that delay slippage; the rational conclusion is to build nothing, replaced by SSI / ZKP.' Strongest supporters: cypherpunk tradition (May 1992, Hughes 1993), anarcho-capitalist (Friedman 1989), post-Snowden comprehensive skepticism (Greenwald 2014, Lyon 2014). But counterfactual scenario testing: if G20 stopped all new centralized identity infrastructure from 2026, World Bank Findex 2021 estimates the 1.4 billion unbanked adults would expand by 200–400 million due to verification difficulties; cross-border employment compliance costs would rise 30–50%; US Federal Reserve estimates synthetic identity fraud annual cost (approximately $20 billion in 2020) would multiply; private sector alternatives (Apple ID / Mastercard ID / platform accounts) would fill the vacuum but with lower governance quality than democratic country systems."
    flip: "The 'do not build' objection not only fails to support 'no prevention possible,' it actually provides the strongest argument for 'not building has concrete normative costs' — Anderson's Private Government shows that 'not building' transfers governance costs to the most vulnerable; Habermas's Between Facts and Norms shows the normative argument for infrastructure as a public good; SSI / ZKP on low-end Android devices have ZKP computation times of 5–30 seconds (unstable), BBS+ issuer-side computation cost still higher than traditional PKI, and distributed trust anchor key recovery problems. The question 'should we build' has been answered by real civic society needs; the remaining question is 'how to build.'"
  - label: Objection 2
    title: "Public Choice Critique of Sunset (PATRIOT Act §215 Proves Sunsets Will Be Extended)"
    pivot: "The objection claims that 'sunset clauses will be extended under political pressure — PATRIOT Act §215 is the classic counterexample; administrative bureaucrats have strong rent-seeking motives to maintain power (Niskanen 1971); lobby groups dissipate institutional constraints (Olson 1965); legislators themselves have extension motives (Buchanan & Tullock 1962).' The most refined version proposes a category mistake proposition: sunset is institutional theatre; what really works is regime change / judicial review / civic movement. But cross-domain empirical data: Australian Legislation Act 2003 §50A sunset 38% automatic lapse rate (Davis 2017); financial regulation sunsets with automatic lapse failure rate significantly higher than periodic review (Schoenmaker–Wierts 2011); real sunset abolition cases (US Independent Counsel Act 1999, Australian control orders partially lapsed, Canadian Anti-terrorism Act 2007)."
    flip: "The 'sunsets will be extended' objection not only fails to support 'institutional theatre,' it actually provides the strongest argument for 'sunset + supporting layered defense' — when sunset is combined with scope-bound + split-key, even if extension passes, functions cannot expand; the Independent Counsel Act 1999 lapse was precisely supported by companion liability clauses. 'Will be extended' also does not equal 'ineffective'; the extension process itself creates public deliberation windows and raises marginal cost (PATRIOT Act §215's multiple extensions were all accompanied by ACLU/EFF opposition campaigns, and 2015 USA Freedom Act partially amended bulk metadata collection). Full lapse rate + partial amendment rate + marginal deterrence effect in aggregate means sunset's political-economic effect far exceeds the two-extreme comparison of 'complete failure.'"
  - label: Objection 3
    title: EUDI ARF and AB1043 Are Too New to Support Any Conclusions
    pivot: "The objection claims that 'both cases have been live < 3 years; path dependency time constant is 5–10 years; current \"no slippage\" cannot be distinguished from \"not yet slipped\"; using prima facie evidence to support policy recommendations is a premature conclusion.' This is a serious methodological critique that this article must honestly face. But acknowledging evidence limits *itself* does not negate the policy significance of prima facie evidence: (1) clause design at the normative text level is highly consistent with slippage prevention doctrine — this is an argument independent of uptime; (2) ARF + AB1043's clause structure is precisely based on reverse inference from the preceding four historical cases (Aadhaar / SSN / eIDAS / China real-name); (3) policy recommendations target identity infrastructure *currently under planning* (Taiwan DIW, UK OSA secondary legislation, California OpenCred, etc.), not already-built systems."
    flip: "'Sample size too small' not only fails to support 'policy recommendations premature,' it actually provides argument for 'need for ongoing observation + simultaneously write into new infrastructure' — if 5–10 years must pass to confirm prevention tool effectiveness, all identity infrastructure currently under planning during that period will miss the pre-construction time window. Rational policy decisions must be made under imperfect evidence; prima facie evidence + reverse causal argument + cross-level complementary design in aggregate is sufficient to support the policy recommendation 'write MVSR clauses into new infrastructure,' while preserving the academic discipline of 'ongoing observation and preparation for revision.'"

conditions:
  title: Legitimate deployment of MVSR prevention clauses must pass four-component layered defense + four failure mode complementary absorptions + pre-construction time window, three-dimensional constraints
  formalPrelude: "deploy(MVSR, I) viable ⇔ (Layer₁ ∧ Layer₂ ∧ Layer₃) ∧ recommended(Layer₄) ∧ ⋀_{i,j} absorb(failure_mode(Layer_i), Layer_j) ∧ pre_construction_phase(I)"
  items:
    - title: Layer 1 — Sunset Clauses (Legal Layer)
      body: "5–7 year automatic lapse (not periodic review), burden of proof on the continuing party; mandatory Sunset Audit Report submission to the legislative layer; Australian Legislation Act 2003 §50A provides the template. Failure mode: political pressure extension (PATRIOT §215)."
      formal: "Layer₁: sunset_period ∈ [5, 7]yr ∧ automatic_lapse ∧ audit_report_required"
    - title: Layer 2 — Scope-Bound Infrastructure (Cryptographic + Standards Layer)
      body: "Mandatory SD-JWT VC + KB-JWT + audience claim + selective disclosure; EUDI ARF v1.4/v1.5 + AB 1043 §22585(b) provide clause templates; violating verifiers may not receive. Failure mode: verifier collusion for recomposition (Ohm 2010)."
      formal: "Layer₂: ∀ credential c: c ⊨ (SD_JWT_VC ∧ KB_JWT ∧ audience_claim ∧ selective_disclosure)"
    - title: Layer 3 — Split-Key Governance (Governance + Cryptographic Layer)
      body: "(k=4, n=7) Pedersen VSS + BLS threshold; shareholders span seven categories: supervisory authority, audit authority, legislature, civil society, academia, mutual recognition authority, vendor; shareholder replacement threshold higher than daily threshold. Failure mode: de facto centralization (Parity / Multichain / Ronin)."
      formal: "Layer₃: issuer_key ⊨ (k, n) Pedersen_VSS ∧ shareholder_class ∈ 7_categories ∧ replacement_threshold > daily_threshold"
    - title: Layer 4 — Opt-Out by Design (Legal + UX + Engineering Three Layers)
      body: "Personal data law explicit exit right (CCPA §1798.135 + GDPR Art. 17 template); symmetry principle (difficulty of withdrawal must not exceed difficulty of registration); GPC signal support; log retention limit + differential privacy + backup auto-expiry. Failure mode (most serious): dark pattern + residual log (Mathur 2019, Netflix re-id)."
      formal: "Layer₄: opt_out ⊨ (legal_right ∧ symmetry ∧ GPC_signal ∧ log_retention_limit ∧ DP_processing ∧ backup_auto_expiry)"
    - title: Failure-Mode Complementary Absorption
      body: "Layer₁ extension → Layer₂ + Layer₃ prevent functional expansion; Layer₂ verifier collusion → Layer₄ citizen exits specific verifier; Layer₃ centralization → Layer₁ sunset periodically re-deliberates; Layer₄ dark pattern → Layer₁+Layer₂+Layer₃ prevent data from entering derived analytics. Each failure mode has a corresponding absorption mechanism."
      formal: "∀ Layer_i, ∃ Layer_j (i ≠ j): absorb(failure_mode(Layer_i), Layer_j)"
    - title: Time Window — Pre-Construction Political Opportunity Window
      body: "MVSR clauses must be written during the specification drafting phase; post-construction supplementary clauses face exponentially rising political cost (German nPA supplementary clauses post-deployment are nearly impossible; SSN after 90 years still unable to fully retract expansion scope; Aadhaar — Puttaswamy II — courts can only subsequently reduce scope, cannot reset clauses). Current windows: EUDI ARF v1.5 + Implementing Acts, Taiwan digital credential wallet pilot, California AB 1043 secondary legislation, UK OSA secondary legislation."
      formal: "preset_clauses(I) viable ⇔ pre_construction_phase(I) ∧ ¬path_dependency_lock(I)\npost_construction_clauses(I) ⇒ political_cost(t) ↗ exponential"

conclusion:
  paragraphs:
    - '<strong>Structural slippage is a strong tendency, not logical necessity.</strong> Path dependency × infrastructure invisibility × institutional layering three mechanisms in aggregate produce a high probability of expansion, but all three mechanisms are probabilistic language; reverse institutional pressure (constitutional review / strong civic movement / cross-national comparative pressure / technical affordance structural limitation) can reverse slippage in multiple historical cases. Aadhaar, SSN, eIDAS, and China real-name four high-expansion cases, together with Austrian sourcePIN (no legal clause but has technical binding), German nPA (has legal clause but no technical binding), German Volkszählungsurteil 1983, Estonia X-Road, UK ID Card abolition, and US CAB abolition — six counterexamples — simultaneously falsify both extreme misreadings: "structural necessity" and "weak political will."'
    - "The debate should shift from <em>'slippage is necessary vs. contingent'</em> to <em>'timing and level combination of clause writing.'</em> MVSR four-layer layered defense (sunset + scope-bound + split-key + opt-out by design), written in before construction, can significantly raise the marginal cost of expansion; each tool's failure mode is absorbed by another tool (sunset extension → scope-bound + split-key; verifier collusion → opt-out; centralization → sunset; dark pattern → other three layers). EUDI ARF v1.4/v1.5 and California AB 1043 are two prima facie early evidence candidates, but require 5–10 year slippage stress testing before claiming verified effectiveness."
    - "A cross-level principle runs throughout: <strong>the timing of writing determines clause effectiveness; the pre-construction political opportunity window closes by month and by political situation, and will not wait for academic research to complete.</strong> This article extends article 06's 'civic burden redistribution,' article 07's 'passport-rooted paradox,' and article 11's 'wallet as essential facility' judgment mode of 'structural conditions vs. individual will,' applying the same analysis to the causal mechanisms of slippage and preventive institutional design; it forms cross-article coupled arguments with article 09 'BankID Nordic commercial monopoly' and article 12 'no-phone-home engineering economics' — the political-economic character of infrastructure reappears on every issue. Returning the politics of slippage to politics requires not more warnings, but translating warnings into clauses that can be written concretely into specifications."
