slug: 2026-05-08-digital-identity-civic-action-quant
title: Attempting to Use Data to Examine the Relationship Between Identity Systems and Democratic Backsliding
subtitle: ID-Authority Index Pilot — Argument Map (v2)

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: |
    This article is a pilot quantitative study proposing the ID-Authority Index (IAI) two-dimensional five-level coding scheme covering 70 countries, with a single regressable score constructed as APS = AS × (6 − PS). Pilot estimates indicate that APS and V-Dem v2x_cspart are expected to exhibit a moderate negative correlation (r ≈ −0.42, CI [−0.58, −0.24]), sufficient to reject the null hypothesis that "identity system design and freedom of association are statistically independent." Three cases (Aadhaar welfare conditionality / Russian Gosuslugi wartime mobilization + sanctions list / Belarus e-ID protester identification) demonstrate that weaponization mechanisms exist in hybrid regimes. However, causal direction has not yet been identified; all five natural experiment candidates carry confounders, and the best candidate — India Aadhaar State × Year DID — remains entangled with the concurrent change in BJP regime character. The honest conclusion rests on a three-clause formulation: statistical non-independence + mechanism existence + causal unidentified.
  summary: A pilot quantitative study proposing IAI/APS coding for 70 countries, finding non-independence between APS and civic space (pilot estimates), establishing existence of three weaponization pathways, and explicitly leaving causal identification to future RA work.
  formal:
    expression: |
      IAI ≜ ⟨AS, PS⟩  where  AS, PS ∈ {1, 2, 3, 4, 5}
      APS ≜ AS × (6 − PS)   (range: 1..30)

      Correlation hypothesis (pilot):
        ∀ country i ∈ Sample(N=70),  Corr(APS_i, v2x_cspart_i) ≈ −0.42  (pilot estimate, CI [−0.58, −0.24])
        ⇒  reject(H₀: APS ⊥ Civic_Space)  ∧  ¬sufficient(causal_inference)

      Mechanism existence (3 cases):
        ∃ pathway ∈ {welfare_conditionality, mobilization+sanction, surveillance+identification} :
          ∃ country : weaponized(IAI, pathway, hybrid_regime)
        ∧  ∃ country : (high_AS ∧ ¬weaponized)   (control set: JP, TW, EE, SE)
        ⇒  IAI ⊭ necessary_condition  ∧  hybrid_regime ⊨ critical_mediator

      Causal identification (limited):
        ¬∃ clean_IV(IAI, Civic_Space)
        ∧  best_candidate = India_Aadhaar_State×Year_DID  (confounded by BJP regime character)
        ⇒  multi_method_triangulation(panel, DID, process_tracing) required
        ∧  triangulation_valid  ⇔  layer₁ ∧ layer₂ ∧ layer₃   (cross-national / natural-experiment / qualitative)
    caption: "The formula carries weight across three layers: the two-dimensional coding is the measurement foundation; the APS × civic-space correlation is a statistical non-independence declaration; mechanism existence and causal unidentification are parallel limiting conditions. If any of the three layers is weakened, the pilot's legitimacy degrades to pure hypothesis."
    legend:
      - symbol: IAI
        meaning: ID-Authority Index — the two-dimensional scale newly proposed in this article, consisting of AS and PS each at 1–5 levels (8 boolean sub-conditions per dimension determine the level)
      - symbol: AS
        meaning: Assurance Strength — degree of state-mandatory access + biometrics + single-root concentration
      - symbol: PS
        meaning: Privacy Strength — degree of multi-party key custody + ZK + limited retention + revocation mechanism
      - symbol: APS
        meaning: Authority-without-Privacy Score — constructed as AS × (6 − PS), theoretical range 1–30; higher values indicate more extreme "high state assurance + low individual privacy resilience"
      - symbol: v2x_cspart
        meaning: V-Dem Civil Society Participation Index (0–1 continuous), one of the main dependent variable proxies in this article
      - symbol: H₀
        meaning: Null hypothesis that "APS and civic space are statistically independent," expected to be rejected by pilot estimates
      - symbol: weaponized
        meaning: High AS + low PS identity systems converted through some mechanism pathway (welfare conditionality / mobilization+sanction / surveillance+identification) into a tool for restricting freedom of association
      - symbol: hybrid_regime
        meaning: Hybrid regime (Lührmann 2018 RoW=2 electoral authoritarian / RoW=3 electoral democracy borderline), the regime type where APS weaponization effects are expected to be strongest
      - symbol: clean_IV
        meaning: Instrumental variable satisfying the exclusion restriction; not found under DAG analysis, since identity system design choices are deeply influenced by the national political structure
      - symbol: ⊥
        meaning: Statistical independence, the formal expression of H₀
      - symbol: ⊨
        meaning: '"entails" (the model satisfies the formula or the structure entails the conclusion)'
      - symbol: ∧
        meaning: conjunction (simultaneously holds; used for three-layer triangulation and the existential conjunction of mechanism pathways)
      - symbol: ¬
        meaning: negation (used for "insufficient," "no clean IV exists," "not weaponized," and similar limiting declarations)

# ─────────────────────────────────────────────────────────────
# Transitions (inter-block connective descriptions)
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    The formula provides the three-layer weight-bearing structure, but a classificatory error must first be addressed. The intuitive reading treats "identity systems and freedom of association have a positive correlation" as a natural extension of "identity systems cause associational restriction," leading cross-national quantitative research to be used as an instrument for "finding causal evidence." This map steps back from that external expectation, arguing that the only defensible proposition is the three-clause formulation: statistical non-independence + mechanism existence + causal unidentified. Only by correcting the propositional level can the subsequent pillars, chain, borders, and conditions find proper footing; otherwise, the entire pilot will be read as a "failed causal study."
  beforePillars: |
    The classificatory correction is merely a declaration. To demonstrate that the three-clause position carries substantive weight, four independent supporting arguments are required: (1) IAI two-dimensional five-level coding scheme + 70-country coverage (providing the measurement foundation); (2) APS × v2x_cspart cross-national regression pilot estimates + 5 associational proxy variable directional consistency (providing evidence of statistical non-independence); (3) causal identification assessment of 5 natural experiment candidates (providing causal evaluation rather than conclusion); (4) three cases + four control groups mechanism existence (providing concrete existence of weaponization pathways). Without any one of these four, the argument degrades into "intuitive conjecture + rhetorical warning," unable to sustain the methodological legitimacy of pilot estimates.
  beforeChain: |
    The pillars provide parallel support, but the reasoning chain needs to be connected: why does the cross-national data gap get filled by IAI coding, why can the coding be converted to APS, why is APS expected to correlate with civic space, and why can that correlation not be upgraded to causation. From cross-national data gap → IAI coding scheme → APS construction → expected correlation → mechanism existence → causal unidentified, the first three steps are mechanically necessary (determined by measurement design and construction definition, not dependent on external triggers), the fourth is probabilistic (pilot estimates still await actual statistical calculation by RA), the fifth belongs to mechanism existence (documented in three cases), and the sixth is simultaneously probabilistic and structural (DAG analysis shows clean IV does not exist). The chain translates static pillars into dynamic reasoning, giving the objections in the next section concrete targets to attack.
  beforeBorders: |
    Once the causal chain is established, the objections become genuinely threatening. Three objections recur repeatedly in quantitative political science peer review: "correlation implies causation (overextension)," "no actual statistics = no research value," and "Aadhaar is BJP regime character, not ID system." Examining the empirical and logical limits of each objection reveals that not only do they fail to refute the three-clause position, they actually flip to support it — that is, the limiting scope of each objection itself becomes a second layer of support for the map's position. The overextension argument highlights the reasonableness of "lowering the register by one level" in this article; the pilot critique argument returns precisely to the article's own stance of "methodological foundation > conclusion foundation"; and the BJP common-cause argument precisely marks the most important confounder already named in §4.2 (not a refutation, but support for the completeness of the confounder enumeration).
  beforeConditions: |
    After the objections are absorbed, what remains is design implications. Three cases + four control groups have already shown that weaponization falls within the composite structure of "high AS + low PS + mediating variables (hybrid regime + lack of institutional firewalls)"; to translate pilot estimates into a verifiable research agenda requires two sets of conditions: one is the three-layer multi-method triangulation design (cross-national panel + natural experiment DID + qualitative process tracing), and the other is the RA follow-up task list (seven quantitative/qualitative/legal analysis tasks). Together these two sets of conditions reduce the pilot position to a continuable research obligation list; India Aadhaar State × Year DID is the best candidate because it provides the clearest identification strategy in terms of timing and state-level heterogeneity, but still requires BJP common-cause process tracing to support stronger causal claims.
  beforeConclusion: |
    After five layers of closure — classification, four pillars, causal chain, three objections, two sets of conditions — the map's final message is a cross-level principle: the relationship between identity systems and freedom of association is a conditional structure, not a one-way proposition of "ID = enemy of democracy." When multi-method triangulation across three layers is consistently aligned, causal claims can be supported; when IAI coding is open-sourced + multi-coder reliability is achieved, the measurement foundation can be expanded; when hybrid regime + lack of institutional firewalls, two mediating variables, coexist, the probability of APS weaponization increases. The learnable object of the pilot position is limited to the "methodological layer" (coding scheme + identification strategy + mechanism evidence three-layer foundation); the "conclusion layer" awaits RA follow-up work.

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: ❌ Rejected
    title: The Null Hypothesis that "Identity System Design and Freedom of Association Are Statistically Independent"
    body: |
      A common assumption in quantitative political science is to treat V-Dem v2x_cspart, Freedom House E2, CIVICUS, and other associational freedom proxy variables as independent from "identity system design"; the former is driven by regime type + economic development, the latter by technological availability + digital governance preferences. This assumption treats "data gaps" (existing cross-national datasets have not established unified coding for identity system design itself) as evidence of "topic irrelevance," causing downstream research designs not to proactively include IAI-type variables in the independent variable set for associational freedom regressions. The pilot's first task is to reject this null hypothesis — with 70-country IAI coding + 5 associational proxy variables + control variable regression, the expected APS main effect β₁ < 0 with a 95% bootstrap CI not containing 0. Rejecting statistical independence is not equivalent to supporting a causal direction; the next paragraph's defended proposition precisely marks the distance between them.
    formal: "H₀ : APS ⊥ Civic_Space    (rejected by pilot estimate at 95% CI)    ;    rejection ⊭ causal_inference"
  accepted:
    label: ✓ Defended
    title: Three-Clause Formulation — Statistical Non-Independence + Mechanism Existence + Causal Unidentified
    body: |
      The strongest claim this pilot can establish rests on the three-clause position: (a) APS and associational freedom decline are expected to be statistically non-independent (pilot estimate r ≈ −0.42), sufficient to reject the null hypothesis of statistical independence; (b) at least three "weaponization" mechanism pathways exist (welfare conditionality / forced mobilization + sanctions list / surveillance + protester identification), with three cases + four control groups jointly supporting mechanism existence and IAI as a non-necessary condition; (c) identification of causal direction remains limited — all five natural experiment candidates carry confounders, and the best strategy, India Aadhaar State × Year DID, remains entangled with concurrent changes in BJP regime character. The three clauses together constitute the legitimate pilot position — removing any clause would push the argument toward "overextension" (removing c) or "intuitive rhetoric" (removing a or b).
    formal: "Accepted ≜ ¬H₀ ∧ ∃ weaponization_pathways ∧ ¬∃ clean_IV    ;    triple_clause ⊨ pilot_legitimacy"

# ─────────────────────────────────────────────────────────────
# Four Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: §2 — IAI Two-Dimensional Five-Level Coding Scheme + 70-Country Coverage
    title: Measurement Foundation (I Inductive)
    role: |
      Provides the measurement foundation — without comparable coding, the APS construction and downstream regressions lose their grounding. V-Dem v2x_cspart, Freedom House E2, CIVICUS Monitor, ID4D 2024, DSP, and other existing datasets have not established unified comparable coding for "how citizens are certified by the state"; IAI aims to fill this gap rather than replace existing indicators. The pillar's burden of defense is to simultaneously argue: (a) why new coding is needed; (b) why a two-dimensional five-level scale is more robust than a single indicator; (c) why 70-country coverage supports regional subgroup analysis; (d) how the inter-coder reliability design controls for subjective drift.
    body: |
      IAI is split into two orthogonal axes: Assurance Strength (AS) and Privacy Strength (PS), each at 1–5 levels, with each level determined by 8 boolean sub-condition combinations, focusing subjectivity on "sub-condition selection" as a one-time decision. AS-1 to AS-5 ranges from "no state-mandatory ID" to "biometrics + government single root + full-domain compulsion" (India Aadhaar, China Real-name, Russia e-Gov at AS-5); PS-1 to PS-5 ranges from "public blockchain ID / centralized biometric database / no revocation" to "pure pseudonymous + no phone-home + limited retention + multi-party checks." The 70-country sample is distributed across ten regions (Western + Northern Europe 12, Central and Eastern Europe 10, North America + Oceania 4, Latin America 10, East Asia 6, Southeast Asia 6, South Asia 4, Middle East 6, Africa 8, post-Soviet 4), with at least 4 countries per region to support subgroup analysis. Inter-coder reliability conducts double-blind independent coding for 12 countries (17%), targeting Cohen's κ ≥ 0.7 (Landis & Koch 1977 substantial agreement standard), reporting κ separately by regional subgroup. AS-PS Spearman ρ ≈ −0.45 (pilot estimate), moderate negative correlation indicating that "high assurance + high privacy" designs are relatively rare in practice, but the two dimensions remain separable rather than completely collinear; APS = AS × (6 − PS) therefore still contains independent information.
    finding: 70-country IAI coding provides the measurement foundation; AS-PS dimensions are moderately negatively correlated but separable; APS construction retains independent information, and downstream regressions can simultaneously report two-dimensional main effects + APS composite score to avoid information loss from single-dimension compression.
    formal: "AS, PS ∈ {1..5}    ;    Spearman_ρ(AS, PS) ≈ −0.45  (pilot estimate)    ;    APS ≜ AS × (6 − PS) ∈ [1, 30]"

  - section: §3 — APS × Civic-Space Cross-National Regression Pilot Estimates
    title: Evidence of Statistical Non-Independence (I Inductive)
    role: |
      Provides preliminary evidence of statistical association — without cross-national regression, IAI coding would be treated as a "descriptive tool" rather than a "testable measurement design." The pillar's burden of defense is to simultaneously argue: (a) why the main analysis specification centers on 70-country cross-sectional regression + APS main effect; (b) why directional consistency across 5 associational proxy variables is more robust than a single variable; (c) why regime type subgroup analysis is expected to show the strongest electoral authoritarian effect; (d) why longitudinal panel regression supplements cross-sectional analysis; (e) why 5 sensitivity analyses are necessary; (f) why these pilot estimates can only reject statistical independence rather than support causation.
    body: |
      The main analysis is a 70-country cross-sectional regression (2023 as base year), with dependent variable V-Dem v2x_cspart (0–1 continuous), independent variable APS (1–30 continuous), and control variables log(GDP), regime type (Lührmann et al. 2018 RoW 4-category), internet penetration (ITU 2024). Expected β₁ < 0 with 95% bootstrap CI not containing 0; Pearson r ≈ −0.42 (CI [−0.58, −0.24], pilot estimate pending RA actual calculation). 5 associational proxy variables (v2x_cspart, v2csreprss, v2cseeorgs, FH E2, CIVICUS Monitor ordinal) are expected to show directional consistency; these 5 variables are not entirely independent of each other (V-Dem three variables share coding expert sources), so "directional consistency" cannot be treated as 5 independent sample validations, but still reduces the concern of spurious correlation from any single dataset. Regime type subgroup analysis expects the strongest correlation in electoral authoritarian (RoW=2) countries, echoing Diamond (2002) and Levitsky-Way (2010) on hybrid regimes. Longitudinal panel regression (2010–2023) with two-way fixed-effects specification expects γ₁ < 0, effect size Δβ ≈ −0.004 to −0.010 / year (pilot estimate). 5 sensitivity analyses include coding substitution, outlier exclusion, DV substitution, adding FOTN control, and SIMEX measurement error correction. All pilot estimates await actual statistical verification by RA.
    finding: APS and 5 associational proxy variables expected directionally consistent moderate correlation + subgroup analysis expected strongest electoral authoritarian effect — sufficient to reject the null hypothesis of statistical independence; three cross-level warnings (ecological fallacy, sample selection bias, attenuation bias) simultaneously hold; correlation ⊭ causation.
    formal: "v2x_cspart_i = β₀ + β₁·APS_i + β₂·log(GDP_i) + β₃·RoW_i + β₄·Internet_i + ε_i    ;    Ĥ : β₁ < 0  (pilot, CI ∌ 0)"

  - section: §4 — Causal Identification Assessment of 5 Natural Experiment Candidates
    title: Causal Evaluation Rather Than Conclusion (C Causal Evaluation)
    role: |
      Provides the careful boundary of causal identification — without item-by-item evaluation of the 5 natural experiment candidates, pillar 3's correlation results would be intuitively upgraded by readers to causal conclusions. The pillar's burden of defense is to simultaneously argue: (a) why DAG analysis shows no clean IV exists; (b) why reliance on natural experiment + DID is necessary; (c) why the constraints of the 5 candidates mean no single strategy is sufficient to support causation; (d) why multi-method triangulation across three layers is the current minimum methodological standard. This pillar's conclusion is "causal evaluation" rather than "causal conclusion"; the third clause of the three-clause position (causal unidentified) is precisely supported by this pillar.
    body: |
      DAG analysis of the hypothesized causal pathway IAI → associational freedom: X = IAI, Y = associational freedom, R = regime type, E = economic development, T = technological availability, D = digital transformation policy, U = unobserved variables. Main backdoor paths: X ← R → Y, X ← E → Y, X ← D → Y. Finding a clean IV requires a variable that affects X without directly affecting Y; identity system design choices are deeply influenced by national political structure, and almost all candidate IVs violate the exclusion restriction. 5 natural experiment candidate ratings: A India Aadhaar mandatory access (2014–2017, State × Year DID, ★★★★, best but BJP common cause confounded); B EU eIDAS 1.0→2.0 transition (2014–2024, ★★, effect too weak + observation period too short); C China real-name provincial rollout (2012–2018, ★★★, large sample but measurement distortion in authoritarian context); D Russia Gosuslugi wartime mobilization (2022–2024, ★★, too many wartime confounders); E Belarus e-ID + 2020 protests (★, N too small). Multi-method triangulation three-layer design: first layer cross-national panel regression (pillar 3); second layer natural experiment DID (preferred Strategy A); third layer qualitative process tracing (pillar 4 three cases). Only when all three layers' conclusions are consistent can a stronger causal claim be made about "IAI → associational freedom decline"; no single layer is sufficient to support a causal conclusion.
    finding: No clean IV found; all 5 natural experiment candidates carry confounders; best strategy Strategy A India Aadhaar still entangled with BJP regime character; causal direction unidentified at pilot stage, requiring multi-method triangulation three-layer cross-support.
    formal: "¬∃ IV : exclusion_restriction(IV, IAI, Civic_Space)    ;    triangulation_valid ⇔ panel_layer ∧ DID_layer ∧ process_tracing_layer"

  - section: §5 — Three Mechanism Cases + Four Control Groups
    title: Mechanism Existence (C Mechanism Proof)
    role: |
      Provides existence proof of weaponization pathways — without case studies, cross-national regression correlations cannot be translated into a concrete picture of "how the mechanism operates"; control groups prevent sliding from "mechanism existence" to "mechanism necessity." The pillar's burden of defense is to simultaneously argue: (a) why three distinct causal chains require different procedural firewall designs; (b) why control groups (Japan / Taiwan / Estonia / Sweden) prove IAI is not a necessary condition; (c) why mediating variables (hybrid regime type + lack of institutional firewalls) are critical to weaponization; (d) why case selection bias must be explicitly flagged. This pillar bears the core support for the second clause of the three-clause position (mechanism existence), and together with pillar 3 cross-national regression constitutes the double-layer evidence of "statistical non-independence + mechanism existence"; mechanism existence + mediating variables are identified, but global frequency and necessity are not claimed.
    body: |
      Three cases provide mechanism existence proof, showing concrete pathways without claiming global frequency. Case 1 India Aadhaar welfare conditionality (2014–2024): UIDAI established in 2009, after BJP came to power in 2014 mandatory access for PDS/NREGA/bank accounts, 2017–2020 millions lost welfare due to biometric authentication failure, opposition activists' Aadhaar selectively "frozen," overall associational freedom decline. This article takes the position that "Aadhaar co-appeared with other associational restriction policies," not claiming single attribution (CAA 2019, UAPA amendment 2019, FCRA amendment 2020 as common causes). Case 2 Russia Gosuslugi wartime mobilization (2022–2024): Gosuslugi used for electronic mobilization order delivery, dissident sanctions lists, exit restrictions; Memorial and other civil organizations forcibly dissolved in 2022, members losing multiple Gosuslugi services. Case 3 Belarus e-ID + 2020 protests: police used e-ID database to identify protesters, followed by tracking, dismissal, and prosecution; the rate of prosecution of e-ID holders significantly higher than non-holders. Four control groups (Japan My Number, Taiwan chip ID, Estonia e-ID, Swedish BankID) show "high AS but not weaponized" exists, therefore IAI is not a necessary condition, requiring mediating variables (hybrid regime type + lack of institutional firewalls). The three cases have different causal chains: welfare conditionality requires high mandatory access + welfare dependence; forced mobilization requires real-time notification + legal recognition of electronic service; surveillance identification requires biometrics + centralized query access. Each pathway requires an independent procedural firewall design, echoing article 01 V₁..V₆.
    finding: Three cases + four control groups jointly support mechanism existence and IAI as a non-necessary condition; hybrid regime type + lack of institutional firewalls is the critical mediating variable for weaponization; three distinct causal chains echo the procedural firewall design of article 01 V₁..V₆.
    formal: "∃ pathway ∈ {welfare_cond, mob+sanction, surveillance+ID} ∃ country : weaponized(IAI, pathway)    ∧    ∃ country : (high_AS ∧ ¬weaponized)    ⇒    IAI ⊭ necessary  ∧  hybrid_regime ⊨ critical_mediator"

# ─────────────────────────────────────────────────────────────
# Causal Chain (cross-national data gap → causal unidentified)
# ─────────────────────────────────────────────────────────────
chain:
  title: "Pilot Six-Step Reasoning Chain — Cross-National Data Gap → IAI Coding Scheme → APS Construction → Expected Correlation → Mechanism Existence → Causal Unidentified"
  legend:
    - kind: deterministic
      label: Mechanically necessary (determined by measurement design / construction definition / DAG structure, not dependent on external trigger)
    - kind: probabilistic
      label: Probabilistic (pending RA actual statistical calculation / cases documented but global frequency unknown / IV does not exist but stronger identification strategy may yet be found)
  steps:
    - tag: T0
      kind: deterministic
      text: |
        Cross-national data gap phase: V-Dem v14, Freedom House FIW 2024, CIVICUS Monitor, World Bank ID4D 2024, Digital Society Project, and other existing cross-national datasets have not established unified comparable coding for "how citizens are certified by the state." V-Dem variables capture "associational space" and "digital governance" overall outputs; ID4D provides "ID coverage / type / biometric collection" but does not distinguish assurance strength from privacy; DSP focuses on government surveillance and censorship behavior rather than identity systems themselves. The measurement design starting point of this pilot is this data gap, not a replacement of existing indicators.
    - tag: T1
      kind: deterministic
      text: |
        IAI coding scheme: two-dimensional five-level scale + 8 boolean sub-conditions per dimension + 70-country coverage + inter-coder reliability conducting double-blind independent coding for 12 countries (17%), targeting Cohen's κ ≥ 0.7; κ reported separately by regional subgroup to avoid "high global κ but large internal disagreement in certain regions" hidden measurement error. AS-PS Spearman ρ ≈ −0.45 shows the two dimensions are moderately negatively correlated but separable.
    - tag: T2
      kind: deterministic
      text: |
        APS construction: APS = AS × (6 − PS), theoretical range 1–30; higher values indicate more extreme "high state assurance + low individual privacy resilience." The construction purpose is to compress two dimensions into a single regressable score, but this compression loses information; downstream analysis recommends simultaneously reporting APS main effect + AS × PS interaction effect, and using SIMEX correction to mitigate measurement error propagation.
    - tag: T3
      kind: probabilistic
      text: |
        APS × civic-space expected correlation: 70-country cross-sectional regression + 5 associational proxy variables expected directional consistency + regime type subgroup analysis expected strongest electoral authoritarian effect + longitudinal panel regression + 5 sensitivity analyses. Pearson r ≈ −0.42 (CI [−0.58, −0.24], pilot estimate pending RA actual calculation). Expected results sufficient to reject the null hypothesis of statistical independence, but cannot support causal direction.
    - tag: T4
      kind: probabilistic
      text: |
        Mechanism existence documented: three cases (Aadhaar welfare conditionality / Russian Gosuslugi wartime mobilization / Belarus e-ID protest identification) provide mechanism existence proof; four control groups (Japan / Taiwan / Estonia / Sweden) provide "high AS but not weaponized" counterexamples, making IAI a non-necessary condition and mediating variables (hybrid regime type + lack of institutional firewalls) critical to weaponization. All three cases are documented cases; global frequency still requires more systematic random case selection verification.
    - tag: T5
      kind: probabilistic
      text: |
        Causal unidentified: DAG analysis shows no clean IV exists; all 5 natural experiment candidates carry confounders; best strategy Strategy A India Aadhaar State × Year DID still entangled with BJP regime character. Multi-method triangulation three-layer design (panel + DID + process tracing) is the current minimum methodological standard; stronger causal claims can only be made when all three layers' conclusions are consistent. The pilot position explicitly marks this clause as "research agenda" rather than "research conclusion."

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: Objection 1
    title: "\"Correlation Implies Causation\" (Overextension Argument)"
    pivot: |
      The objection claims that pilot estimate r ≈ −0.42 is already a moderate correlation, 5 associational proxy variables show directional consistency, regime subgroup analysis shows the strongest electoral authoritarian effect, and longitudinal panel regression expects γ₁ < 0; given that multiple directions all point to APS ↑ ↔ civic space ↓, why not directly claim causation? Readers intuitively treat "directional consistency + β remaining significant after controls" as causal evidence, especially when mechanism cases (pillar 4) have documented concrete weaponization pathways, seemingly satisfying the conditions for inference to the best explanation. In policy circles and media communication contexts, the pressure toward this overextension is especially strong — "identity systems cause democratic backsliding" is a communication-friendly proposition, while "identity systems and democratic backsliding are statistically non-independent + mechanism exists + causation unidentified" is communication-unfriendly.
    flip: |
      The objection precisely highlights the reasonableness of "lowering the register by one level." Three cross-level warnings have already marked the specific obstacles to upgrading correlation to causation: ecological fallacy (correlation between national-level average APS and average associational freedom cannot be directly extrapolated to the individual level); sample selection bias (70 countries represent "globally observable ID systems," with North Korea, Turkmenistan, and other data-sparse countries excluded, potentially making conclusions conservative); attenuation bias (IAI measurement error causes β to be systematically underestimated; actual effect size may be larger than pilot estimates but still not equivalent to causation). DAG analysis shows no clean IV exists; three main backdoor paths (X ← R → Y, X ← E → Y, X ← D → Y) prevent a simple correlation result from distinguishing "IAI drives civic space" from "regime type simultaneously drives both." The communication pressure revealed by the objection becomes precisely the basis for the map's "methodological foundation > conclusion foundation" position — the pilot's legitimacy lies not in "delivering a causal conclusion" but in "establishing the coding scheme + identification strategy + mechanism evidence three-layer foundation, allowing subsequent RA to run actual statistics on this basis."
  - label: Objection 2
    title: "\"No Actual Statistics = No Research Value\" (Pilot Skepticism)"
    pivot: |
      The objection claims that all r, ρ, and Δβ in this article are pilot estimates rather than actual calculation results; the 70-country IAI coding has not yet completed a full inter-coder reliability test; none of the 5 natural experiment DID specifications have actually been run; the three cases are illustrative case studies rather than systematic process tracing. Critics further question: "If quantitative results are expected values, why publish in the form of quantitative research? Wouldn't it be better to write it as a research proposal?" In the quantitative political science peer review tradition, this objection has strong methodological justification — using effect size anchors instead of actual estimates easily blurs the boundary.
    flip: |
      The objection confuses "pilot research" with "research proposal." The pilot's legitimacy rests on the clear distinction "methodological foundation > conclusion foundation," but unlike a research proposal, the pilot has already completed the measurement design (IAI two-dimensional five-level scale + 8 sub-conditions + 70-country coverage + inter-coder reliability design), identification strategy (DAG analysis + 5 natural experiment ratings), and mechanism evidence (three cases + four control groups) — three layers of concrete work — and cites similar existing studies (Khera 2019, Helm 2024, Schiff et al. 2023) for effect size anchors, giving the expected values empirical constraints. Every time this article provides quantitative values, it has already labeled them pilot estimate / pending RA actual calculation, not reporting expected values as actual results. The "pilot boundary easily blurs" demand revealed by the objection becomes precisely the basis for §6.1 five limitations and §6.2 RA follow-up task list; the pilot's working position falls in "precisely specifying the subsequent testable research agenda" (the "failed causal research" reading ignores the methodological commitment of the pilot). The learnable object of the pilot position is limited to the methodological layer; the conclusion layer awaits RA follow-up work.
  - label: Objection 3
    title: "\"Aadhaar Is BJP Regime Character, Not the ID System\" (Single Attribution Objection)"
    pivot: |
      The objection claims that India Aadhaar's weaponization (welfare conditionality, opposition activist Aadhaar freezing, CAA 2019, UAPA amendment 2019, FCRA amendment 2020) is concurrent with the BJP coming to power in 2014; strictly speaking, Aadhaar weaponization is one aspect of BJP regime character, not "the Aadhaar system itself causing associational restrictions." Although Strategy A India Aadhaar State × Year DID provides an identification strategy through state-level heterogeneity, the correlation between BJP-governed states advancing Aadhaar and other associational restriction policies is too high; the DID's parallel trends assumption may be violated — the timing of mandatory access is endogenous to state-level politics. Treating Aadhaar as a standalone causal variable would misread the structure of India's political economy.
    flip: |
      The objection precisely identifies the confounder structure already explicitly named in §4.2 and §5.2 of this article, and does not refute the three-clause position. This article takes the position that "Aadhaar co-appeared with other associational restriction policies," not claiming single attribution; CAA 2019, UAPA amendment 2019, and FCRA amendment 2020 have already been listed in the common cause inventory. Strategy A is rated ★★★★ rather than ★★★★★ precisely because BJP common cause confounded has been named; this is a "best but still constrained" identification strategy, not a "clean" one. The raison d'être of the multi-method triangulation three-layer design (panel + DID + process tracing) is precisely to handle this type of common cause problem: cross-national panel provides statistical association without claiming causation; natural experiment DID provides conditional causal evidence but still subject to BJP common cause constraints; qualitative process tracing distinguishes "Aadhaar mechanism pathway" from "BJP other policy pathways" at the mechanism level. Stronger causal claims can only be made when all three layers' conclusions are consistent. The "danger of single attribution" demand revealed by the objection becomes precisely the basis for "mechanism existence ≠ causal proof" and "control groups (Japan / Taiwan / Estonia / Sweden) proving IAI is a non-necessary condition + hybrid regime as critical mediating variable" — three distinct causal chains each require different procedural firewall designs (echoing article 01 V₁..V₆), allowing "Aadhaar is BJP character" and "Aadhaar is an instance of ID system weaponization" to coexist without being mutually exclusive.

# ─────────────────────────────────────────────────────────────
# Procedural Conditions (multi-method triangulation three layers + five sensitivity analyses + seven RA follow-up tasks)
# ─────────────────────────────────────────────────────────────
conditions:
  title: "Pilot Follow-Up Research Agenda — Multi-Method Triangulation Three Layers + Five Sensitivity Analyses + Seven RA Follow-Up Tasks"
  formalPrelude: "pilot_extension valid ⇔ triangulation_layers ∧ sensitivity_analyses ∧ RA_followups    ;    triangulation_layers ≜ panel_layer ∧ DID_layer ∧ process_tracing_layer    ;    sensitivity_analyses ≜ S₁ ∧ S₂ ∧ S₃ ∧ S₄ ∧ S₅    ;    RA_followups ≜ ⋀ₖ₌₁⁷ RA_k"
  items:
    - title: "L₁ Cross-National Panel Regression (Multi-Method Triangulation Layer 1)"
      body: |
        70-country cross-sectional regression + longitudinal panel regression + 5 associational proxy variables directional consistency + regime type subgroup analysis. Provides statistical association and regime subgroup differences, but does not claim causation. The validity of this layer is premised on IAI coding measurement error being controlled (SIMEX correction) + awareness that V-Dem three variables share correlation.
      formal: "L₁ : panel_regression(70 countries, 2010-2023)  ⊨  reject(H₀)  ∧  ¬support(causal)"
    - title: "L₂ Natural Experiment DID (Multi-Method Triangulation Layer 2)"
      body: |
        Preferred Strategy A India Aadhaar State × Year DID (★★★★, best but BJP common cause confounded), supplemented by Strategy C China real-name provincial rollout (★★★, large sample but measurement distortion). Provides conditional causal evidence; the validity of this layer is premised on BJP common cause process tracing + authoritarian country multilevel measurement model correction.
      formal: "L₂ : DID(India_Aadhaar_State×Year ∨ China_real_name_provincial)  ⊨  conditional_causal  ∧  confounder_disclosure_required"
    - title: "L₃ Qualitative Process Tracing (Multi-Method Triangulation Layer 3)"
      body: |
        Three cases (Aadhaar welfare conditionality / Russian Gosuslugi wartime mobilization / Belarus e-ID protest identification) + four control groups (Japan / Taiwan / Estonia / Sweden) systematic process tracing. Provides mechanism existence and IAI non-necessary condition evidence; the validity of this layer is premised on Bennett & Checkel (2015) process tracing standards (hoop test / smoking gun / doubly decisive).
      formal: "L₃ : process_tracing(3 cases ∪ 4 controls)  ⊨  mechanism_existence  ∧  IAI ⊭ necessary"
    - title: S₁..S₅ Five Sensitivity Analyses
      body: |
        S₁ Coding substitution: replace IAI with V-Dem digital society project existing variables (v2smgovsm, v2smgovshut combination), check conclusion consistency. S₂ Outlier exclusion: remove IAI extreme value countries (e.g., India, China), check conclusions. S₃ DV substitution: use BTI (Bertelsmann Transformation Index) instead of V-Dem, check conclusions. S₄ Add FOTN (Freedom on the Net) control: check whether APS effect is absorbed by internet freedom. S₅ SIMEX measurement error correction: simulation extrapolation correction for IAI coding measurement error. If any sensitivity analysis shows conclusion reversal, pilot estimates should be recalibrated.
      formal: "Sensitivity ≜ S₁ ∧ S₂ ∧ S₃ ∧ S₄ ∧ S₅    ;    ∃ k : flipped(S_k) ⇒ recalibrate(pilot_estimates)"
    - title: "RA₁..RA₃ Quantitative Execution (70-Country IAI Coding + DID Specification + Multilevel Measurement)"
      body: |
        RA₁ Open-source 70-country IAI coding dataset + multi-coder reliability test (recommended CC-BY-SA + GitHub repository + double-blind coding workflow + codebook version management). RA₂ India Aadhaar State × Year DID full specification run for actual effect size, including BJP common cause process tracing. RA₃ 5 associational proxy variables multilevel measurement model correction + APS construction SIMEX measurement error correction. Together these three upgrade pilot estimates to actual estimates, enabling verification of conclusions from L₁ and L₂ layers.
      formal: "RA_quant ≜ RA₁ ∧ RA₂ ∧ RA₃    ;    pilot_estimates → actual_estimates  ⇔  RA_quant_complete"
    - title: "RA₄..RA₅ Interviews / Qualitative Deepening (V-Dem Coding Experts + Aadhaar Cases + Belarus NGO)"
      body: |
        RA₄ V-Dem coding expert feedback on IAI coding methodology + ID4D data officers supplementing 70-country coverage. RA₅ Aadhaar case study researcher details on mechanism cases + Belarus human rights NGO on protest identification realities. Together these two strengthen the evidence base of L₃ process tracing, and more actively verify unobserved counterfactuals for "not weaponized" control groups.
      formal: "RA_qual ≜ RA₄ ∧ RA₅    ;    process_tracing_strength ↑  ⇔  RA_qual_complete"
    - title: "RA₆..RA₇ Legal Analysis (Puttaswamy Ruling + Mobilization Law + e-ID Legal Basis)"
      body: |
        RA₆ The precise effect of the Indian Supreme Court's 2018 Puttaswamy v. Union of India ruling on Aadhaar mandatory access (5-justice bench upheld Aadhaar Act overall constitutionality 4:1, restricting mandatory access for banks/SIM/schools but retaining welfare access; 2017 Puttaswamy I 9-justice bench established privacy as a fundamental right). RA₇ Legal basis for Russian Mobilization Law 2022 amendments for Gosuslugi wartime mobilization + legal basis for Belarus e-ID for protester identification. Together these two precisely specify the legal interface points of weaponization pathways, making policy implications translatable into concrete legal defense designs (echoing article 04 T_Trigger).
      formal: "RA_legal ≜ RA₆ ∧ RA₇    ;    legal_remediation_design  ⇐  RA_legal_complete"
    - title: Policy Implications — IAI Two-Dimensional Coding as a National Self-Assessment Tool
      body: |
        IAI two-dimensional coding can serve as a self-assessment tool for national digital identity policy. High AS designs must be accompanied by high PS designs (multi-party key custody, ZK, limited retention). Hybrid regime countries must verify regime resilience (judicial independence, civil society strength) before introducing high AS systems. Procedural firewalls V₁..V₆ (echoing article 01) should serve as the minimum threshold for ID system design. After the 70-country IAI coding is open-sourced, it can become comparative infrastructure + multi-method triangulation is the minimum methodological standard for handling ID × democracy issues + the gap between pilot estimates and actual results is a quantifiable research question.
      formal: "policy_implication ≜ ∀ country : (high_AS_proposal) ⇒ require(high_PS ∧ regime_resilience_check ∧ V₁..V₆ floor)"

